name: Deploy Cloudflare Worker

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: Choose the deployment target
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wrangler
        run: npm install --no-save wrangler@^4

      - name: Upload preview Worker version
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: versions upload

  production:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wrangler
        run: npm install --no-save wrangler@^4

      - name: Deploy production Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: deploy
