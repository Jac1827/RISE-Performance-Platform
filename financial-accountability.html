<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RISE Residential Financial Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1a1a2e;font-size:13px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const D="#013e51",L="#6ba2b8",G="#059669",R="#dc2626",A="#d97706",P="#7c3aed";
const ENTITIES=[
{id:"rise_corp",label:"RISE Residential (Corporate)"},
{id:"nocatee",label:"RISE at Nocatee"},
{id:"gkp",label:"RISE at Glen Kernan Park"},
{id:"viera",label:"RISE Viera"},
{id:"maple_hall",label:"Maple Hall (NJIT)"},
{id:"florence",label:"RISE Florence Villa"},
{id:"sereno",label:"RISE Sereno"},
{id:"doro",label:"Doro High Rise"},
{id:"beacon",label:"Beacon East & West / Poplar Hall"},
{id:"flagler",label:"RISE Flagler"},
{id:"other",label:"Other Community"}
];
const f$=v=>{if(v==null||isNaN(v))return"\u2014";const n=v<0,a=Math.abs(v);return(n?"(":"")+"$"+a.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})+(n?")":"");};
const fp=v=>v==null||isNaN(v)?"\u2014":(v>=0?"+":"")+v.toFixed(1)+"%";

function parseCSV(text){
const p=Papa.parse(text,{dynamicTyping:false,skipEmptyLines:true,delimitersToGuess:[",","\t","|",";"]});
const raw=p.data;let hIdx=raw.findIndex(r=>r[0]&&String(r[0]).trim()==="Account");
if(hIdx<0)hIdx=raw.findIndex(r=>r.some(c=>String(c||"").toLowerCase().includes("account name")));
if(hIdx<0)hIdx=4;
const rows=[];let sec="",sub="";
const num=v=>{const s=String(v||"").replace(/[$,%()]/g,"").replace(/,/g,"").trim();const n=parseFloat(s);return isNaN(n)?0:n;};
for(let i=hIdx+1;i<raw.length;i++){
const r=raw[i];if(!r||r.length<3)continue;
const c0=String(r[0]||"").trim(),c1=String(r[1]||"").trim();
if(!c0&&c1){sub=c1;continue;}
if(c0&&!c1&&isNaN(parseInt(c0))){sec=c0;continue;}
if(c0&&(/^\d{4}/.test(c0)||parseInt(c0)>=1000)){
rows.push({gl:c0,name:c1,section:sec,subsection:sub,mAct:num(r[2]),mBud:num(r[3]),mVar:num(r[4]),mVarPct:num(r[5]),yAct:num(r[6]),yBud:num(r[7]),yVar:num(r[8]),yVarPct:num(r[9]),annBud:num(r[10]),comment:String(r[11]||"").trim()});
}}
return rows;
}

function getSt(a,b,inc){if(!b)return"on";if(inc)return a/b>=1?"on":a/b>=.9?"watch":"under";const r=a/b;return r<=1?"on":r<=1.1?"watch":"over";}

let state={store:{},entity:"rise_corp",tab:"dash",selDs:null,cmpA:null,cmpB:null,search:"",filterSec:"all",filterSt:"all",sortCol:null,sortDir:"desc",uploadEntity:"rise_corp",loading:false};

function getEntityDS(){return state.store[state.entity]||[];}
function getActive(){const ds=getEntityDS();return ds.find(d=>d.id===state.selDs)||ds[ds.length-1]||null;}
function isInc(r){return(r.section&&r.section.toLowerCase().includes("income"))||parseInt(r.gl)<5000;}

function enrich(rows){return rows.map(r=>{const inc=isInc(r);const st=getSt(r.yAct,r.yBud,inc);const rr=2>0?r.yAct/2:0;const pe=rr*12;const rem=r.annBud-r.yAct;const pu=r.annBud?(r.yAct/r.annBud)*100:0;return Object.assign({},r,{isIncome:inc,status:st,runRate:rr,projEOY:pe,remaining:rem,budgetPctUsed:pu});});}

function getSummary(enriched){
if(!enriched.length)return null;
const inc=enriched.filter(r=>r.isIncome),exp=enriched.filter(r=>!r.isIncome);
const t=(a,k)=>a.reduce((s,r)=>s+r[k],0);
const sg=_.groupBy(enriched,"section");
const ss=Object.entries(sg).map(([n,items])=>({name:n,count:items.length,yAct:t(items,"yAct"),yBud:t(items,"yBud"),annBud:t(items,"annBud"),overCount:items.filter(r=>r.status==="over").length,watchCount:items.filter(r=>r.status==="watch").length,isIncome:items[0]&&items[0].isIncome}));
return{incYA:t(inc,"yAct"),incYB:t(inc,"yBud"),incAnn:t(inc,"annBud"),expYA:t(exp,"yAct"),expYB:t(exp,"yBud"),expAnn:t(exp,"annBud"),totalOver:enriched.filter(r=>r.status==="over").length,totalWatch:enriched.filter(r=>r.status==="watch").length,totalOn:enriched.filter(r=>r.status==="on").length,ss:ss,noi:t(inc,"yAct")-t(exp,"yAct"),noiBud:t(inc,"yBud")-t(exp,"yBud")};
}

function getRecs(enriched,summary){
if(!enriched.length)return[];const r=[];
const ov=enriched.filter(x=>!x.isIncome&&x.status==="over").sort((a,b)=>a.yVar-b.yVar);
ov.slice(0,5).forEach(x=>r.push({t:"danger",gl:x.gl,n:x.name,m:"Over YTD budget by "+f$(Math.abs(x.yVar))+". Run rate projects "+f$(x.projEOY)+" vs "+f$(x.annBud)+" annual."+(x.comment?" Comment: "+x.comment:"")}));
const ui=enriched.filter(x=>x.isIncome&&x.yAct<x.yBud*.9&&x.yBud>5000);
ui.slice(0,3).forEach(x=>r.push({t:"warning",gl:x.gl,n:x.name,m:"Income "+f$(x.yBud-x.yAct)+" below target."}));
const bs=enriched.filter(x=>!x.isIncome&&x.yBud>0&&x.yAct<x.yBud*.7&&x.yBud>5000).sort((a,b)=>(b.yBud-b.yAct)-(a.yBud-a.yAct));
if(bs.length)r.push({t:"info",gl:"",n:"Offsets",m:bs.length+" lines under budget. Top: "+bs.slice(0,3).map(x=>x.name+" ("+f$(x.yBud-x.yAct)+")").join("; ")});
if(summary){const nv=summary.noi-summary.noiBud;r.push({t:nv>=0?"success":"danger",gl:"",n:"NOI",m:"NOI "+f$(Math.abs(nv))+" "+(nv>=0?"above":"below")+" budget. YTD: "+f$(summary.noi)+" vs "+f$(summary.noiBud)});}
return r;
}

function statusBadge(s){const m={on:{l:"On Track",c:G,b:"#ecfdf5"},watch:{l:"Watch",c:A,b:"#fffbeb"},over:{l:"Over",c:R,b:"#fef2f2"},under:{l:"Under",c:A,b:"#fffbeb"}};const x=m[s]||m.on;return '<span style="display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600;color:'+x.c+';background:'+x.b+'">'+x.l+'</span>';}

function loadFile(file,ent){
state.loading=true;render();
file.text().then(text=>{
const rows=parseCSV(text);
const nameMatch=file.name.match(/(\d{2})[.\-_](\d{2})[.\-_](\d{2,4})/);
let period=file.name.replace(/\.\w+$/,"");
if(nameMatch){const m=nameMatch[1],y=nameMatch[3];period=m+"/"+(y.length===2?"20"+y:y);}
const ds={id:Date.now(),name:file.name.replace(/\.\w+$/,""),period:period,date:new Date().toLocaleDateString(),rows:rows,rowCount:rows.length};
if(!state.store[ent])state.store[ent]=[];
state.store[ent]=[...state.store[ent],ds];
state.entity=ent;state.selDs=ds.id;state.tab="dash";state.loading=false;render();
}).catch(e=>{console.error(e);state.loading=false;render();});
}

function doSort(c){if(state.sortCol===c)state.sortDir=state.sortDir==="asc"?"desc":"asc";else{state.sortCol=c;state.sortDir="desc";}render();}

function drawBarChart(canvasId,data,key1,key2,name1,name2,labelKey){
const canvas=document.getElementById(canvasId);if(!canvas)return;
const ctx=canvas.getContext("2d");
const dpr=window.devicePixelRatio||1;
const rect=canvas.getBoundingClientRect();
canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
ctx.scale(dpr,dpr);
const w=rect.width,h=rect.height;
const margin={top:24,right:15,bottom:60,left:55};
const cw=w-margin.left-margin.right,ch=h-margin.top-margin.bottom;
ctx.clearRect(0,0,w,h);
if(!data.length)return;
const maxVal=Math.max(...data.map(d=>Math.max(d[key1]||0,d[key2]||0)));
const barGroupW=cw/data.length;
const barW=barGroupW*0.35;
ctx.font="10px system-ui";ctx.textAlign="center";
data.forEach((d,i)=>{
const x=margin.left+i*barGroupW;
const h1=maxVal?(d[key1]/maxVal)*ch:0;
const h2=maxVal?(d[key2]/maxVal)*ch:0;
ctx.fillStyle=D;
ctx.fillRect(x+barGroupW*0.1,margin.top+ch-h1,barW,h1);
ctx.fillStyle=L;
ctx.fillRect(x+barGroupW*0.1+barW+2,margin.top+ch-h2,barW,h2);
ctx.fillStyle="#64748b";ctx.save();ctx.translate(x+barGroupW/2,margin.top+ch+8);ctx.rotate(-0.3);
const label=d[labelKey]||"";ctx.fillText(label.length>14?label.substring(0,14)+"..":label,0,0);ctx.restore();
});
ctx.strokeStyle="#e2e8f0";ctx.lineWidth=0.5;
for(let i=0;i<=4;i++){
const y=margin.top+ch-i*(ch/4);
ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(margin.left+cw,y);ctx.stroke();
ctx.fillStyle="#94a3b8";ctx.textAlign="right";ctx.font="10px system-ui";
const val=Math.round(maxVal*i/4);ctx.fillText(val>=1000?(val/1000).toFixed(0)+"k":val,margin.left-5,y+4);
}
ctx.font="10px system-ui";ctx.textAlign="left";
ctx.fillStyle=D;ctx.fillRect(margin.left,margin.top-16,10,10);ctx.fillText(name1,margin.left+14,margin.top-7);
ctx.fillStyle=L;ctx.fillRect(margin.left+90,margin.top-16,10,10);ctx.fillText(name2,margin.left+104,margin.top-7);
}

function render(){
const app=document.getElementById("app");
const active=getActive();
const entityDS=getEntityDS();
const curEntity=ENTITIES.find(e=>e.id===state.entity);
const rows=active?active.rows:[];
const enriched=enrich(rows);
const sections=[...new Set(enriched.map(r=>r.section).filter(Boolean))];
let filtered=enriched.slice();
if(state.search){const s=state.search.toLowerCase();filtered=filtered.filter(r=>r.gl.toLowerCase().includes(s)||r.name.toLowerCase().includes(s));}
if(state.filterSec!=="all")filtered=filtered.filter(r=>r.section===state.filterSec);
if(state.filterSt!=="all")filtered=filtered.filter(r=>r.status===state.filterSt);
if(state.sortCol)filtered.sort((a,b)=>state.sortDir==="asc"?(a[state.sortCol]||0)-(b[state.sortCol]||0):(b[state.sortCol]||0)-(a[state.sortCol]||0));
const summary=getSummary(enriched);
const recs=getRecs(enriched,summary);
const rC={danger:R,warning:A,info:"#2563eb",success:G};
const rB={danger:"#fef2f2",warning:"#fffbeb",info:"#eff6ff",success:"#ecfdf5"};

let html='<div style="max-width:1000px;margin:0 auto;padding:16px;">';

/* HEADER */
html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;border-bottom:2px solid '+L+';padding-bottom:8px;">';
html+='<div><h1 style="margin:0;font-size:18px;font-weight:700;color:'+D+'">RISE Residential Financial Platform</h1>';
html+='<p style="margin:0;font-size:11px;color:#64748b;">'+curEntity.label+(active?' &middot; '+(active.period||active.name):'')+'</p></div>';
html+='<select id="entitySel" style="padding:6px 10px;border:2px solid '+D+';border-radius:6px;font-size:12px;font-weight:600;color:'+D+';background:white;min-width:220px;">';
ENTITIES.forEach(e=>{const cnt=(state.store[e.id]||[]).length;html+='<option value="'+e.id+'"'+(state.entity===e.id?' selected':'')+'>'+e.label+(cnt?' ('+cnt+')':'')+'</option>';});
html+='</select></div>';

/* TABS */
const tabs=[["dash","Dashboard"],["detail","Line Items"],["history","Historical"],["compare","Compare"],["recs","Recommendations"],["report","Investor Report"],["upload","Upload"]];
html+='<div style="display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap;">';
tabs.forEach(([k,l])=>{html+='<button class="tabBtn" data-tab="'+k+'" style="padding:5px 11px;font-size:11px;font-weight:600;border:none;border-radius:5px;cursor:pointer;background:'+(state.tab===k?D:"#e2e8f0")+';color:'+(state.tab===k?"white":"#64748b")+'">'+l+'</button>';});
html+='</div>';

/* DATASET SELECTOR */
if(entityDS.length>1&&state.tab!=="upload"&&state.tab!=="history"&&state.tab!=="compare"){
html+='<div style="margin-bottom:10px;"><select id="dsSel" style="padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;">';
entityDS.forEach(d=>{html+='<option value="'+d.id+'"'+(state.selDs===d.id?' selected':'')+'>'+d.name+' ('+(d.period||d.date)+')</option>';});
html+='</select></div>';
}

if(!active&&state.tab!=="upload"&&state.tab!=="history"&&state.tab!=="compare"){
html+='<div style="text-align:center;padding:40px;"><div style="font-size:32px;margin-bottom:12px;">&#128193;</div>';
html+='<div style="font-size:14px;color:#64748b;">No data for '+curEntity.label+'. Upload a CSV to get started.</div>';
html+='<button class="tabBtn" data-tab="upload" style="margin-top:12px;padding:8px 20px;background:'+D+';color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Upload Now</button></div>';
} else {

/* ===== DASHBOARD ===== */
if(state.tab==="dash"&&summary){
html+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px;">';
[{l:"Revenue YTD",v:f$(summary.incYA),c:G},{l:"Rev Budget",v:f$(summary.incYB),c:L},{l:"Expense YTD",v:f$(summary.expYA),c:R},{l:"Exp Budget",v:f$(summary.expYB),c:L},{l:"NOI",v:f$(summary.noi),c:summary.noi>=summary.noiBud?G:R},{l:"NOI Budget",v:f$(summary.noiBud),c:P}].forEach(c=>{
html+='<div style="background:white;border-radius:8px;padding:8px 6px;text-align:center;border:1px solid #e2e8f0;">';
html+='<div style="font-size:9px;color:#94a3b8;font-weight:600;text-transform:uppercase">'+c.l+'</div>';
html+='<div style="font-size:15px;font-weight:700;color:'+c.c+';margin-top:2px">'+c.v+'</div></div>';
});
html+='</div>';

html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">';
html+='<div style="background:white;border-radius:8px;padding:12px;border:1px solid #e2e8f0;">';
html+='<div style="font-size:12px;font-weight:700;color:'+D+';margin-bottom:8px">YTD Actual vs Budget by Section</div>';
html+='<canvas id="secChart" style="width:100%;height:200px;"></canvas></div>';

html+='<div style="background:white;border-radius:8px;padding:12px;border:1px solid #e2e8f0;">';
html+='<div style="font-size:12px;font-weight:700;color:'+D+';margin-bottom:8px">Budget Pace - Top Expense Lines</div>';
html+='<div style="font-size:10px;color:#64748b;margin-bottom:6px">Gray line = 16.7% expected pace (2/12 months)</div>';
enriched.filter(r=>!r.isIncome&&r.annBud>15000).sort((a,b)=>b.budgetPctUsed-a.budgetPctUsed).slice(0,8).forEach(r=>{
html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">';
html+='<div style="width:110px;font-size:9px;color:#475569;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</div>';
html+='<div style="flex:1;height:12px;background:#e2e8f0;border-radius:6px;position:relative;overflow:hidden">';
html+='<div style="position:absolute;left:16.67%;top:0;bottom:0;width:1px;background:#94a3b8;z-index:2"></div>';
html+='<div style="height:100%;border-radius:6px;width:'+Math.min(r.budgetPctUsed,100)+'%;background:'+(r.budgetPctUsed>25?R:r.budgetPctUsed>18?A:G)+'"></div></div>';
html+='<div style="width:36px;font-size:9px;color:#64748b">'+r.budgetPctUsed.toFixed(1)+'%</div></div>';
});
html+='</div></div>';

html+='<div style="background:white;border-radius:8px;padding:12px;border:1px solid #e2e8f0;">';
html+='<div style="font-size:12px;font-weight:700;color:'+D+';margin-bottom:6px">Section Summary</div>';
html+='<table style="width:100%;border-collapse:collapse;font-size:10px;"><thead><tr style="border-bottom:2px solid #e2e8f0">';
["Section","#","YTD Act","YTD Bud","Variance","Ann Bud","% Used","Alerts"].forEach(h=>{
html+='<th style="text-align:'+(h==="Section"?"left":"right")+';padding:4px 5px;color:#64748b;font-weight:600;font-size:9px">'+h+'</th>';
});
html+='</tr></thead><tbody>';
summary.ss.forEach(s=>{
const v=s.yBud-s.yAct;const pu=s.annBud?((s.yAct/s.annBud)*100):0;
const vc=s.isIncome?(v<=0?R:G):(v>=0?G:R);
html+='<tr class="secRow" data-sec="'+s.name+'" style="border-bottom:1px solid #f1f5f9;cursor:pointer">';
html+='<td style="padding:5px;font-weight:600;font-size:11px">'+s.name+'</td>';
html+='<td style="padding:5px;text-align:right">'+s.count+'</td>';
html+='<td style="padding:5px;text-align:right">'+f$(s.yAct)+'</td>';
html+='<td style="padding:5px;text-align:right">'+f$(s.yBud)+'</td>';
html+='<td style="padding:5px;text-align:right;color:'+vc+';font-weight:600">'+f$(v)+'</td>';
html+='<td style="padding:5px;text-align:right">'+f$(s.annBud)+'</td>';
html+='<td style="padding:5px;text-align:right">'+pu.toFixed(1)+'%</td>';
html+='<td style="padding:5px;text-align:right">'+(s.overCount>0?'<span style="color:'+R+';font-size:10px">'+s.overCount+'&#9888;</span>':'')+'</td></tr>';
});
html+='</tbody></table></div>';
}

/* ===== DETAIL ===== */
if(state.tab==="detail"){
html+='<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;">';
html+='<input id="searchInp" placeholder="Search GL or name..." value="'+state.search+'" style="flex:1;min-width:180px;padding:5px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;"/>';
html+='<select id="secFilter" style="padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:10px;"><option value="all">All Sections</option>';
sections.forEach(s=>{html+='<option value="'+s+'"'+(state.filterSec===s?' selected':'')+'>'+s+'</option>';});
html+='</select>';
html+='<select id="stFilter" style="padding:5px;border:1px solid #d1d5db;border-radius:4px;font-size:10px;"><option value="all">All</option><option value="on"'+(state.filterSt==="on"?" selected":"")+'>On Track</option><option value="watch"'+(state.filterSt==="watch"?" selected":"")+'>Watch</option><option value="over"'+(state.filterSt==="over"?" selected":"")+'>Over</option></select>';
html+='<button id="clearBtn" style="padding:5px 8px;font-size:10px;border:1px solid #d1d5db;border-radius:4px;cursor:pointer;background:white;">Clear</button></div>';
html+='<div style="background:white;border-radius:8px;border:1px solid #e2e8f0;overflow:auto;max-height:440px;">';
html+='<table style="width:100%;border-collapse:collapse;font-size:10px;"><thead style="position:sticky;top:0;background:white;z-index:1"><tr style="border-bottom:2px solid #e2e8f0">';
[["gl","GL"],["name","Account"],["mAct","Mo Act"],["mBud","Mo Bud"],["mVar","Mo Var"],["yAct","YTD Act"],["yBud","YTD Bud"],["yVar","YTD Var"],["annBud","Ann Bud"],["budgetPctUsed","% Used"],["projEOY","Proj EOY"],["status","Status"]].forEach(([k,l])=>{
html+='<th class="sortTh" data-col="'+k+'" style="text-align:'+(["name","gl"].includes(k)?"left":"right")+';padding:5px 3px;color:#64748b;font-weight:600;font-size:9px;cursor:'+(["name","gl","status"].includes(k)?"default":"pointer")+';white-space:nowrap">'+l+'</th>';
});
html+='</tr></thead><tbody>';
filtered.forEach(r=>{
const mvC=r.isIncome?(r.mVar<=0?R:G):(r.mVar>=0?G:R);
const yvC=r.isIncome?(r.yVar<=0?R:G):(r.yVar>=0?G:R);
const peC=r.projEOY>r.annBud*1.1?R:r.projEOY>r.annBud?A:G;
html+='<tr style="border-bottom:1px solid #f1f5f9;background:'+(r.status==="over"?"#fff5f5":"white")+'" title="'+(r.comment||"")+'">';
html+='<td style="padding:4px 3px;font-family:monospace;font-size:9px">'+r.gl+'</td>';
html+='<td style="padding:4px 3px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</td>';
html+='<td style="padding:4px 3px;text-align:right">'+f$(r.mAct)+'</td>';
html+='<td style="padding:4px 3px;text-align:right">'+f$(r.mBud)+'</td>';
html+='<td style="padding:4px 3px;text-align:right;color:'+mvC+';font-weight:600">'+f$(r.mVar)+'</td>';
html+='<td style="padding:4px 3px;text-align:right;font-weight:600">'+f$(r.yAct)+'</td>';
html+='<td style="padding:4px 3px;text-align:right">'+f$(r.yBud)+'</td>';
html+='<td style="padding:4px 3px;text-align:right;color:'+yvC+';font-weight:600">'+f$(r.yVar)+'</td>';
html+='<td style="padding:4px 3px;text-align:right">'+f$(r.annBud)+'</td>';
html+='<td style="padding:4px 3px;text-align:right">'+r.budgetPctUsed.toFixed(1)+'%</td>';
html+='<td style="padding:4px 3px;text-align:right;color:'+peC+'">'+f$(r.projEOY)+'</td>';
html+='<td style="padding:4px 3px;text-align:right">'+statusBadge(r.status)+'</td></tr>';
});
html+='</tbody></table></div>';
}

/* ===== HISTORICAL ===== */
if(state.tab==="history"){
html+='<div style="font-size:14px;font-weight:700;color:'+D+';margin-bottom:10px">Historical Reports - '+curEntity.label+'</div>';
if(!entityDS.length){html+='<div style="text-align:center;padding:30px;color:#94a3b8">No historical data. Upload income statements to build history.</div>';}
else{html+='<div style="display:grid;gap:8px;">';
entityDS.forEach(d=>{
html+='<div style="padding:10px 14px;background:white;border-radius:8px;border:'+(state.selDs===d.id?"2px solid "+D:"1px solid #e2e8f0")+';cursor:pointer;display:flex;justify-content:space-between;align-items:center" class="histItem" data-id="'+d.id+'">';
html+='<div><div style="font-size:13px;font-weight:600;color:'+D+'">'+d.name+'</div>';
html+='<div style="font-size:11px;color:#94a3b8">Period: '+d.period+' &middot; '+d.rowCount+' accounts &middot; Uploaded '+d.date+'</div></div>';
html+='<div style="display:flex;gap:6px;">';
html+='<button class="setCmpA" data-id="'+d.id+'" style="padding:3px 8px;font-size:10px;background:'+L+';color:white;border:none;border-radius:4px;cursor:pointer">Set as A</button>';
html+='<button class="setCmpB" data-id="'+d.id+'" style="padding:3px 8px;font-size:10px;background:'+P+';color:white;border:none;border-radius:4px;cursor:pointer">Set as B</button>';
html+='<button class="delDs" data-id="'+d.id+'" style="padding:3px 8px;font-size:10px;background:#fee2e2;color:'+R+';border:none;border-radius:4px;cursor:pointer">Delete</button>';
html+='</div></div>';
});
html+='</div>';}
html+=uploadAreaHTML(state.entity);
}

/* ===== COMPARE ===== */
if(state.tab==="compare"){
html+='<div style="font-size:14px;font-weight:700;color:'+D+';margin-bottom:10px">Period Comparison - '+curEntity.label+'</div>';
html+='<div style="display:flex;gap:12px;margin-bottom:14px;">';
html+='<div style="flex:1"><label style="font-size:11px;font-weight:600;color:'+L+';display:block;margin-bottom:3px">Period A (Current/Newer)</label>';
html+='<select id="cmpASel" style="width:100%;padding:6px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;"><option value="">Select...</option>';
entityDS.forEach(d=>{html+='<option value="'+d.id+'"'+(state.cmpA===d.id?' selected':'')+'>'+d.name+' ('+d.period+')</option>';});
html+='</select></div>';
html+='<div style="flex:1"><label style="font-size:11px;font-weight:600;color:'+P+';display:block;margin-bottom:3px">Period B (Prior/Older)</label>';
html+='<select id="cmpBSel" style="width:100%;padding:6px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;"><option value="">Select...</option>';
entityDS.forEach(d=>{html+='<option value="'+d.id+'"'+(state.cmpB===d.id?' selected':'')+'>'+d.name+' ('+d.period+')</option>';});
html+='</select></div></div>';
const cmpDataA=entityDS.find(d=>d.id===state.cmpA);
const cmpDataB=entityDS.find(d=>d.id===state.cmpB);
if(cmpDataA&&cmpDataB){
const mapA=_.keyBy(cmpDataA.rows,"gl"),mapB=_.keyBy(cmpDataB.rows,"gl");
const allGLs=[...new Set([...Object.keys(mapA),...Object.keys(mapB)])];
const compResults=allGLs.map(gl=>{const a=mapA[gl]||{yAct:0,yBud:0};const b=mapB[gl]||{yAct:0,yBud:0};return{gl:gl,name:a.name||b.name||"",section:a.section||b.section||"",aYAct:a.yAct,bYAct:b.yAct,yoyChange:a.yAct&&b.yAct?((a.yAct-b.yAct)/Math.abs(b.yAct))*100:0,worse:a.yAct>a.yBud&&b.yAct<=b.yBud};}).filter(r=>r.aYAct||r.bYAct);
const bySec=_.groupBy(compResults,"section");
const compChartData=Object.entries(bySec).map(([sec,items])=>({section:sec,periodA:items.reduce((s,r)=>s+r.aYAct,0),periodB:items.reduce((s,r)=>s+r.bYAct,0)})).filter(r=>r.periodA||r.periodB);
if(compChartData.length){
html+='<div style="background:white;border-radius:8px;padding:12px;border:1px solid #e2e8f0;margin-bottom:12px;">';
html+='<div style="font-size:12px;font-weight:700;color:'+D+';margin-bottom:6px">Section-Level YTD Comparison</div>';
html+='<canvas id="cmpChart" style="width:100%;height:220px;"></canvas></div>';
html+='<div style="background:white;border-radius:8px;border:1px solid #e2e8f0;overflow:auto;max-height:350px;">';
html+='<table style="width:100%;border-collapse:collapse;font-size:10px;"><thead style="position:sticky;top:0;background:white"><tr style="border-bottom:2px solid #e2e8f0">';
html+='<th style="text-align:left;padding:5px">GL</th><th style="text-align:left;padding:5px">Account</th>';
html+='<th style="text-align:right;padding:5px">'+(cmpDataA.period||"A")+' YTD</th>';
html+='<th style="text-align:right;padding:5px">'+(cmpDataB.period||"B")+' YTD</th>';
html+='<th style="text-align:right;padding:5px">YOY Chg</th></tr></thead><tbody>';
compResults.sort((a,b)=>Math.abs(b.yoyChange)-Math.abs(a.yoyChange)).slice(0,60).forEach(r=>{
const bad=(!r.section.toLowerCase().includes("income")&&r.yoyChange>10)||(r.section.toLowerCase().includes("income")&&r.yoyChange<-10);
html+='<tr style="border-bottom:1px solid #f1f5f9;background:'+(bad?"#fff5f5":"white")+'">';
html+='<td style="padding:4px;font-family:monospace;font-size:9px">'+r.gl+'</td>';
html+='<td style="padding:4px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</td>';
html+='<td style="padding:4px;text-align:right">'+f$(r.aYAct)+'</td>';
html+='<td style="padding:4px;text-align:right">'+f$(r.bYAct)+'</td>';
html+='<td style="padding:4px;text-align:right;font-weight:600;color:'+(bad?R:Math.abs(r.yoyChange)<5?"#64748b":G)+'">'+fp(r.yoyChange)+'</td></tr>';
});
html+='</tbody></table></div>';
window._cmpChartData=compChartData;window._cmpLabels=[cmpDataA.period||"A",cmpDataB.period||"B"];
}
} else {
html+='<div style="text-align:center;padding:30px;color:#94a3b8">Select two periods above to compare.</div>';
}
}

/* ===== RECOMMENDATIONS ===== */
if(state.tab==="recs"){
html+='<div style="font-size:14px;font-weight:700;color:'+D+';margin-bottom:10px">Recommendations & Alerts</div>';
recs.forEach(r=>{
html+='<div style="background:'+rB[r.t]+';border:1px solid '+rC[r.t]+'33;border-left:4px solid '+rC[r.t]+';border-radius:6px;padding:8px 12px;margin-bottom:6px;">';
html+='<div style="display:flex;gap:5px;align-items:center;margin-bottom:2px;">';
const icons={danger:"\u26a0\ufe0f CRITICAL",warning:"\ud83d\udfe0 WATCH",success:"\u2705 POSITIVE",info:"\u2139\ufe0f INFO"};
html+='<span style="font-size:10px;font-weight:700;color:'+rC[r.t]+'">'+icons[r.t]+'</span>';
if(r.gl)html+='<span style="font-size:9px;font-family:monospace;color:#64748b">GL '+r.gl+'</span>';
html+='<span style="font-size:10px;font-weight:600;color:#475569">'+r.n+'</span></div>';
html+='<div style="font-size:11px;color:#334155;line-height:1.4">'+r.m+'</div></div>';
});
if(!recs.length)html+='<div style="text-align:center;padding:30px;color:#94a3b8">Upload data to see recommendations.</div>';
}

/* ===== REPORT ===== */
if(state.tab==="report"){
html+='<div style="font-size:14px;font-weight:700;color:'+D+';margin-bottom:10px">Investor Report Generator</div>';
html+='<div style="background:white;border-radius:8px;padding:16px;border:1px solid #e2e8f0;margin-bottom:12px;">';
html+='<div style="font-size:13px;color:#334155;margin-bottom:12px">Generate an investor-facing HTML report for <strong>'+curEntity.label+'</strong> covering the <strong>'+(active?active.period||"current":"current")+'</strong> period.</div>';
html+='<button id="genReport" style="padding:10px 24px;background:'+D+';color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;">&#128196; Generate & Download Report</button>';
html+='<div style="font-size:11px;color:#94a3b8;margin-top:8px">Downloads as an HTML file.</div></div>';
if(summary){
html+='<div style="background:#f8fafc;border-radius:8px;padding:14px;border:1px solid #e2e8f0;">';
html+='<div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px">Report Preview</div>';
html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">';
[{l:"Revenue",v:f$(summary.incYA)},{l:"Expenses",v:f$(summary.expYA)},{l:"NOI",v:f$(summary.noi)},{l:"NOI vs Budget",v:f$(summary.noi-summary.noiBud)}].forEach(c=>{
html+='<div style="text-align:center;padding:8px;background:white;border-radius:6px;">';
html+='<div style="font-size:9px;color:#94a3b8">'+c.l+'</div>';
html+='<div style="font-size:14px;font-weight:700;color:'+D+'">'+c.v+'</div></div>';
});
html+='</div></div>';
}
}

/* ===== UPLOAD ===== */
if(state.tab==="upload"){
html+='<div style="font-size:14px;font-weight:700;color:'+D+';margin-bottom:10px">Upload Financial Data</div>';
html+=uploadAreaHTML(state.uploadEntity);
if(state.loading)html+='<div style="margin-top:12px;color:'+L+';font-weight:600">Processing...</div>';
html+='<div style="margin-top:20px;"><div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px">Data Library</div>';
ENTITIES.filter(e=>(state.store[e.id]||[]).length>0).forEach(e=>{
html+='<div style="margin-bottom:10px;"><div style="font-size:12px;font-weight:600;color:'+D+';margin-bottom:4px">'+e.label+' ('+state.store[e.id].length+' reports)</div>';
state.store[e.id].forEach(d=>{
html+='<div style="padding:6px 10px;background:white;border-radius:6px;border:1px solid #e2e8f0;margin-bottom:3px;display:flex;justify-content:space-between;font-size:11px;">';
html+='<span>'+d.name+' &middot; '+d.period+'</span><span style="color:#94a3b8">'+d.rowCount+' accts</span></div>';
});
html+='</div>';
});
html+='</div>';
}

} /* end else (has active data) */
html+='</div>';
app.innerHTML=html;
bindEvents(summary,enriched);
if(state.tab==="dash"&&summary){
setTimeout(()=>drawBarChart("secChart",summary.ss.filter(s=>s.yAct||s.yBud),"yAct","yBud","Actual","Budget","name"),50);
}
if(state.tab==="compare"&&window._cmpChartData){
setTimeout(()=>drawBarChart("cmpChart",window._cmpChartData,"periodA","periodB",window._cmpLabels[0],window._cmpLabels[1],"section"),50);
}
}

function uploadAreaHTML(ent){
let h='<div style="margin-top:16px;"><div style="margin-bottom:12px;">';
h+='<label style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:4px">Assign to Community/Entity:</label>';
h+='<select id="uploadEntSel" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;width:100%;">';
ENTITIES.forEach(e=>{h+='<option value="'+e.id+'"'+(ent===e.id?' selected':'')+'>'+e.label+'</option>';});
h+='</select></div>';
h+='<div id="dropZone" style="border:2px dashed #cbd5e1;border-radius:10px;padding:36px;text-align:center;background:white;cursor:pointer;">';
h+='<div style="font-size:32px;margin-bottom:8px">&#128202;</div>';
h+='<div style="font-size:14px;font-weight:600;color:'+D+'">Upload Income Statement / Budget CSV</div>';
h+='<div style="font-size:12px;color:#64748b;margin-top:4px">Click or drag & drop</div>';
h+='<input id="fileInput" type="file" accept=".csv,.txt" style="display:none"/>';
h+='</div></div>';
return h;
}

function bindEvents(summary,enriched){
document.querySelectorAll(".tabBtn").forEach(b=>b.addEventListener("click",()=>{state.tab=b.dataset.tab;render();}));
const entitySel=document.getElementById("entitySel");
if(entitySel)entitySel.addEventListener("change",()=>{state.entity=entitySel.value;state.selDs=null;state.cmpA=null;state.cmpB=null;render();});
const dsSel=document.getElementById("dsSel");
if(dsSel)dsSel.addEventListener("change",()=>{state.selDs=parseInt(dsSel.value);render();});
const searchInp=document.getElementById("searchInp");
if(searchInp){searchInp.addEventListener("input",()=>{state.search=searchInp.value;render();setTimeout(()=>{const el=document.getElementById("searchInp");if(el){el.focus();el.setSelectionRange(state.search.length,state.search.length);}},10);});}
const secFilter=document.getElementById("secFilter");
if(secFilter)secFilter.addEventListener("change",()=>{state.filterSec=secFilter.value;render();});
const stFilter=document.getElementById("stFilter");
if(stFilter)stFilter.addEventListener("change",()=>{state.filterSt=stFilter.value;render();});
const clearBtn=document.getElementById("clearBtn");
if(clearBtn)clearBtn.addEventListener("click",()=>{state.search="";state.filterSec="all";state.filterSt="all";state.sortCol=null;render();});
document.querySelectorAll(".sortTh").forEach(th=>{
if(!["name","gl","status"].includes(th.dataset.col))th.addEventListener("click",()=>doSort(th.dataset.col));
});
document.querySelectorAll(".secRow").forEach(tr=>tr.addEventListener("click",()=>{state.filterSec=tr.dataset.sec;state.tab="detail";render();}));
document.querySelectorAll(".histItem").forEach(el=>el.addEventListener("click",e=>{if(e.target.tagName==="BUTTON")return;state.selDs=parseInt(el.dataset.id);state.tab="dash";render();}));
document.querySelectorAll(".setCmpA").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();state.cmpA=parseInt(b.dataset.id);state.tab="compare";render();}));
document.querySelectorAll(".setCmpB").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();state.cmpB=parseInt(b.dataset.id);state.tab="compare";render();}));
document.querySelectorAll(".delDs").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const id=parseInt(b.dataset.id);state.store[state.entity]=(state.store[state.entity]||[]).filter(x=>x.id!==id);render();}));
const cmpASel=document.getElementById("cmpASel");
if(cmpASel)cmpASel.addEventListener("change",()=>{state.cmpA=cmpASel.value?parseInt(cmpASel.value):null;render();});
const cmpBSel=document.getElementById("cmpBSel");
if(cmpBSel)cmpBSel.addEventListener("change",()=>{state.cmpB=cmpBSel.value?parseInt(cmpBSel.value):null;render();});
const uploadEntSel=document.getElementById("uploadEntSel");
if(uploadEntSel)uploadEntSel.addEventListener("change",()=>{if(state.tab==="upload")state.uploadEntity=uploadEntSel.value;else state.entity=uploadEntSel.value;});
const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("fileInput");
if(dropZone&&fileInput){
dropZone.addEventListener("click",()=>fileInput.click());
dropZone.addEventListener("dragover",e=>{e.preventDefault();dropZone.style.borderColor=D;dropZone.style.background="#f0f9ff";});
dropZone.addEventListener("dragleave",()=>{dropZone.style.borderColor="#cbd5e1";dropZone.style.background="white";});
dropZone.addEventListener("drop",e=>{e.preventDefault();dropZone.style.borderColor="#cbd5e1";const f=e.dataTransfer&&e.dataTransfer.files[0];const ent=(uploadEntSel?uploadEntSel.value:state.entity);if(f)loadFile(f,ent);});
fileInput.addEventListener("change",()=>{const f=fileInput.files[0];const ent=(uploadEntSel?uploadEntSel.value:state.entity);if(f)loadFile(f,ent);});
}
const genBtn=document.getElementById("genReport");
if(genBtn&&summary){genBtn.addEventListener("click",()=>{
const active=getActive();const curEntity=ENTITIES.find(e=>e.id===state.entity);
const recs=getRecs(enrich(active?active.rows:[]),summary);
const h='<html><head><title>'+curEntity.label+' - Budget Report</title><style>body{font-family:system-ui;max-width:800px;margin:40px auto;color:#1a1a2e;padding:20px}h1{color:'+D+';border-bottom:3px solid '+L+';padding-bottom:8px}h2{color:'+D+';margin-top:24px}.kpi{display:flex;gap:16px;margin:16px 0}.kpi>div{flex:1;background:#f8fafc;border-radius:8px;padding:12px;text-align:center;border:1px solid #e2e8f0}.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase}.kpi .val{font-size:20px;font-weight:700;margin-top:4px}table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}th{background:#f1f5f9;padding:8px;text-align:left;border-bottom:2px solid #cbd5e1}td{padding:6px 8px;border-bottom:1px solid #f1f5f9}.pos{color:'+G+'}.neg{color:'+R+'}.footer{margin-top:32px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8}</style></head><body><h1>'+curEntity.label+'</h1><p>Financial Performance Summary - '+(active?active.period||"":"Current Period")+'</p><div class="kpi"><div><div class="label">Revenue YTD</div><div class="val">'+f$(summary.incYA)+'</div></div><div><div class="label">Expenses YTD</div><div class="val">'+f$(summary.expYA)+'</div></div><div><div class="label">NOI</div><div class="val" style="color:'+(summary.noi>=summary.noiBud?G:R)+'">'+f$(summary.noi)+'</div></div><div><div class="label">NOI vs Budget</div><div class="val" style="color:'+(summary.noi>=summary.noiBud?G:R)+'">'+f$(summary.noi-summary.noiBud)+'</div></div></div><h2>Budget Performance by Category</h2><table><tr><th>Category</th><th>YTD Actual</th><th>YTD Budget</th><th>Variance</th><th>Annual Budget</th><th>% Used</th></tr>'+summary.ss.map(s=>{const v=s.yBud-s.yAct;const pu=s.annBud?((s.yAct/s.annBud)*100).toFixed(1):0;return'<tr><td><strong>'+s.name+'</strong></td><td>'+f$(s.yAct)+'</td><td>'+f$(s.yBud)+'</td><td class="'+(s.isIncome?(v<=0?"neg":"pos"):(v>=0?"pos":"neg"))+'">'+f$(v)+'</td><td>'+f$(s.annBud)+'</td><td>'+pu+'%</td></tr>';}).join("")+'</table><h2>Key Observations</h2><ul>'+recs.slice(0,6).map(r=>'<li><strong>'+(r.n||"")+(r.gl?" (GL "+r.gl+")":"")+'</strong>: '+r.m+'</li>').join("")+'</ul><div class="footer">Generated '+new Date().toLocaleDateString()+' | RISE Residential, LLC | Confidential</div></body></html>';
const blob=new Blob([h],{type:"text/html"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=curEntity.label.replace(/[^a-zA-Z0-9]/g,"_")+"_Budget_Report.html";a.click();URL.revokeObjectURL(url);
});}
}

render();
</script>
</body>
</html>
