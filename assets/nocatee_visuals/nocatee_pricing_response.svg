  <text x="72.00" y="96.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#5f7080" text-anchor="start">The visual case here is not that every price move worked. It is that pricing was active, and the response pattern is now clear by plan.</text>

  
