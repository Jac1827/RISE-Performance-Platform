  <text x="110.00" y="612.15" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#2f6bff" text-anchor="middle">60.1%</text><text x="503.33" y="533.40" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#2f6bff" text-anchor="middle">62.4%</text><text x="896.67" y="494.20" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#2f6bff" text-anchor="middle">63.5%</text><text x="1290.00" y="454.65" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#2f6bff" text-anchor="middle">64.6%</text><text x="896.67" y="415.45" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#f08a24" text-anchor="middle">Scenario 65.7%</text>

  <rect x="100" y="638" width="16" height="16" rx="4" fill="#2fa26b"/>
  <text x="126.00" y="651.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">Monthly budget occupancy</text>
  <rect x="306" y="638" width="16" height="16" rx="4" fill="#2f6bff"/>
  <text x="332.00" y="651.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">March 24 DLR projection</text>
  <rect x="532" y="638" width="16" height="16" rx="4" fill="#f08a24"/>
  <text x="558.00" y="651.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">Post-03/24 scenario if the 4 visible April/May signings were incremental</text>

  <rect x="96" y="770" width="1208" height="82" rx="18" fill="#fff8ef" stroke="#f0d8b2"/>
  <text x="120.00" y="804.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#c58a14" text-anchor="start">Key read</text>
  <text x="120.00" y="832.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#163047" text-anchor="start">On March 24, 2026 the property was ahead of March budget and projected ahead of April budget. May was the first clear forward gap, and even that gap narrows materially once the post-DLR signings are layered in.</text>
</svg>
