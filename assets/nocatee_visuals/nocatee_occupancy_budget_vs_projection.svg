<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f6f7fb"/>
  <text x="72.00" y="66.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f2235" text-anchor="start">Nocatee Occupancy vs Budget</text>
  <text x="72.00" y="96.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#5f7080" text-anchor="start">Uses the March 24, 2026 DLR budget path and a clearly labeled post-DLR scenario for April and May signings.</text>

  
    <g>
      <rect x="72" y="126" width="290" height="116" rx="18" fill="#ffffff" stroke="#dfe6ee"/>
      <rect x="90" y="144" width="10" height="80" rx="5" fill="#2f6bff" opacity="0.9"/>
      <text x="116.00" y="160.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="start">Current Occupied (03/24/2026)</text>
      <text x="116.00" y="198.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f2235" text-anchor="start">60.11%</text>
      <text x="116.00" y="222.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">Ahead of March budget by 81 bps</text>
    </g>
    
  
    <g>
      <rect x="386" y="126" width="290" height="116" rx="18" fill="#ffffff" stroke="#dfe6ee"/>
      <rect x="404" y="144" width="10" height="80" rx="5" fill="#22b8b3" opacity="0.9"/>
      <text x="430.00" y="160.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="start">Current Leased (03/24/2026)</text>
      <text x="430.00" y="198.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f2235" text-anchor="start">65.73%</text>
      <text x="430.00" y="222.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">10 leased-not-occupied units in the cushion</text>
    </g>
    
  
    <g>
      <rect x="700" y="126" width="290" height="116" rx="18" fill="#ffffff" stroke="#dfe6ee"/>
      <rect x="718" y="144" width="10" height="80" rx="5" fill="#2fa26b" opacity="0.9"/>
      <text x="744.00" y="160.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="start">April Budget vs DLR</text>
      <text x="744.00" y="198.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f2235" text-anchor="start">+0.76 pts</text>
      <text x="744.00" y="222.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">62.36% projected vs 61.60% budget</text>
    </g>
    
  
    <g>
      <rect x="1014" y="126" width="314" height="116" rx="18" fill="#ffffff" stroke="#dfe6ee"/>
      <rect x="1032" y="144" width="10" height="80" rx="5" fill="#df5f59" opacity="0.9"/>
      <text x="1058.00" y="160.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="start">May Budget Gap</text>
      <text x="1058.00" y="198.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f2235" text-anchor="start">2.62 pts</text>
      <text x="1058.00" y="222.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">Before post-03/24 signings were added</text>
    </g>
    

  <rect x="72" y="260" width="1256" height="486" rx="24" fill="#ffffff" stroke="#dfe6ee"/>
  <text x="96.00" y="302.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f2235" text-anchor="start">Budget line vs live DLR projection</text>
  <text x="96.00" y="328.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" fill="#5f7080" text-anchor="start">The data supports a March/April budget defense. The real pressure point is May and later if fresh leasing does not continue.</text>

  <line x1="110" y1="700.00" x2="1290" y2="700.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="705.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">58.0%</text><line x1="110" y1="630.00" x2="1290" y2="630.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="635.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">60.0%</text><line x1="110" y1="560.00" x2="1290" y2="560.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="565.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">62.0%</text><line x1="110" y1="490.00" x2="1290" y2="490.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="495.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">64.0%</text><line x1="110" y1="420.00" x2="1290" y2="420.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="425.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">66.0%</text><line x1="110" y1="350.00" x2="1290" y2="350.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="355.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">68.0%</text><line x1="110" y1="280.00" x2="1290" y2="280.00" stroke="#dbe3eb" stroke-dasharray="4 8"/><text x="92.00" y="285.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="end">70.0%</text>
  <line x1="110.00" y1="280" x2="110.00" y2="700" stroke="#eef2f6"/><text x="110.00" y="728.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="middle">Mar-26</text><line x1="503.33" y1="280" x2="503.33" y2="700" stroke="#eef2f6"/><text x="503.33" y="728.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="middle">Apr-26</text><line x1="896.67" y1="280" x2="896.67" y2="700" stroke="#eef2f6"/><text x="896.67" y="728.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="middle">May-26</text><line x1="1290.00" y1="280" x2="1290.00" y2="700" stroke="#eef2f6"/><text x="1290.00" y="728.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f7080" text-anchor="middle">Jun-26</text>
  <path d="M 110.00 654.50 L 503.33 574.00 L 896.67 416.50 L 1290.00 311.50" fill="none" stroke="#2fa26b" stroke-width="4"/>
  <path d="M 110.00 626.15 L 503.33 547.40 L 896.67 508.20 L 1290.00 468.65" fill="none" stroke="#2f6bff" stroke-width="4"/>
  <path d="M 110.00 626.15 L 503.33 488.25 L 896.67 429.45 L 1290.00 389.90" fill="none" stroke="#f08a24" stroke-width="4" stroke-dasharray="10 10"/>
