  <text x="72.00" y="66.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f2235" text-anchor="start">Nocatee Leasing Funnel</text>
  <text x="72.00" y="96.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400" fill="#5f7080" text-anchor="start">Q1 2025 compared with year-to-date 2026 through late March. This is the cleanest visual for the 'lead volume and activity' rebuttal.</text>

  
    <g>
