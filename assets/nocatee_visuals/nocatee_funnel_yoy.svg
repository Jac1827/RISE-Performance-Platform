  <text x="622.00" y="676.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="400" fill="#163047" text-anchor="start">Traffic is not the missing piece at Nocatee. Through late March 2026, the property was ahead of Q1 lead target, ahead of Q1 2025 on leads and tours, and materially ahead on applications.</text>
