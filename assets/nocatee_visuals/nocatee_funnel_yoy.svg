      <text x="116.00" y="222.00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="400" fill="#5f7080" text-anchor="start">174 YTD 2026 vs 160 in Q1 2025</text>
    </g>
    
  
