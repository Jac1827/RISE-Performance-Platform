<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RISE Portfolio Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --border: #30363d;
    --border2: #21262d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #4493f8;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #a371f7;
    --orange: #db6d28;
    --teal: #2dd4bf;
    --curve-budget: #4ade80;
    --curve-aggressive: #f87171;
    --curve-ease: #c084fc;
    --curve-linear: #2dd4bf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .rise-brand { display:flex; align-items:center; gap:12px; }
  .rise-logo { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#4493f8,#2dd4bf); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(68,147,248,0.22); }
  .rise-logo svg { width:30px; height:30px; }
  .header-title h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
  .header-title p { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Buttons */
  .btn { border: none; cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: 600; padding: 8px 14px; border-radius: 8px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; }
  .btn-green { background: #238636; color: #fff; }
  .btn-green:hover { background: #2ea043; }
  .btn-blue { background: #1f6feb; color: #fff; }
  .btn-blue:hover { background: #388bfd; }
  .btn-gray { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-gray:hover { background: var(--bg2); }
  .btn-sm { font-size: 0.72rem; padding: 5px 10px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Cards */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin-bottom: 8px; }

  /* Property Selector */
  .prop-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .prop-btn { background: var(--bg3); border: 1px solid var(--border); color: #cdd9e5; font-size: 0.75rem; font-weight: 500; padding: 7px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; position: relative; font-family: inherit; }
  .prop-btn:hover { background: var(--bg2); }
  .prop-btn.active { background: #1f6feb; border-color: #4493f8; color: #fff; }
  .prop-btn .units { font-size: 0.65rem; opacity: 0.7; margin-left: 2px; }
  .prop-btn .units.tbd { color: #d29922; opacity: 1; }
  .saved-dot { position: absolute; top: -3px; right: -3px; width: 7px; height: 7px; background: var(--green); border-radius: 50%; }
  .tbd-input-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .tbd-input-row label { font-size: 0.72rem; color: #d29922; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 16px; }
  .tab { flex: 1; background: none; border: none; color: var(--muted); font-family: inherit; font-size: 0.78rem; font-weight: 500; padding: 8px 4px; border-radius: 7px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab.active { background: #1f6feb; color: #fff; }
  .tab:hover:not(.active) { color: var(--text); }

  /* Grid layouts */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
  @media(max-width:768px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:480px) { .grid-4 { grid-template-columns: 1fr 1fr; } .tabs { overflow-x: auto; } .tab { font-size: 0.68rem; } }

  /* Stat boxes */
  .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .stat-box .label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
  .stat-box .value { font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-box .sub { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

  /* Inputs */
  input[type=number], input[type=text], select {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 0.82rem; font-family: inherit;
    width: 100%; outline: none; transition: border 0.15s;
  }
  input[type=number]:focus, select:focus { border-color: var(--accent); }
  .inp-pct { font-size: 0.75rem; color: var(--accent); margin-top: 4px; }
  .pct-bar-wrap { width: 100%; background: var(--bg3); border-radius: 20px; height: 5px; margin-top: 5px; }
  .pct-bar { height: 5px; border-radius: 20px; transition: width 0.4s; }
  .pct-goal { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  /* Table */
  .tbl-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; margin-bottom: 16px; }
  .tbl-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .tbl-header h2 { font-size: 0.9rem; font-weight: 600; }
  .tbl-header p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  table { width: 100%; font-size: 0.78rem; border-collapse: collapse; }
  thead tr { background: rgba(0,0,0,0.3); }
  th { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; padding: 8px 10px; white-space: nowrap; }
  th.l { text-align: left; }
  th.c { text-align: center; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border2); vertical-align: middle; text-align: center; }
  td.l { text-align: left; }
  tr.past { opacity: 0.35; }
  tr.current-row { background: rgba(31,111,235,0.08); }
  .tbl-inp { width: 58px; background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; padding: 4px 6px; text-align: center; font-size: 0.75rem; color: var(--text); font-family: inherit; outline: none; }
  .tbl-inp:focus { border-color: var(--accent); }
  .now-badge { background: #1f6feb; color: #fff; font-size: 0.6rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-left: 5px; }
  .goal-sub { font-size: 0.62rem; margin-top: 1px; }

  /* Chart */
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .chart-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .chart-header h2 { font-size: 0.9rem; font-weight: 600; }
  .chart-header p { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .curve-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
  .curve-toggle { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.68rem; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .curve-toggle.on { background: var(--bg3); }
  .chart-area { display: flex; margin-top: 8px; }
  .chart-yaxis { display: flex; flex-direction: column; justify-content: space-between; width: 32px; font-size: 0.62rem; color: var(--muted); text-align: right; padding-right: 6px; }
  .chart-body { flex: 1; position: relative; height: 220px; }
  .chart-grid-line { position: absolute; left: 0; right: 0; border-top: 1px solid rgba(48,54,61,0.6); }
  .chart-goal-line { position: absolute; left: 0; right: 0; border-top: 2px dashed rgba(68,147,248,0.4); z-index: 5; }
  .chart-goal-label { position: absolute; left: 0; top: -16px; font-size: 0.62rem; color: rgba(68,147,248,0.9); background: var(--bg2); padding: 0 3px; border-radius: 3px; }
  .chart-bars { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: space-around; padding: 0 2px; }
  .chart-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; height: 100%; position: relative; }
  .chart-col:hover .chart-tooltip { opacity: 1; pointer-events: auto; }
  .chart-bars-inner { display: flex; align-items: flex-end; gap: 1px; width: 100%; justify-content: center; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; min-width: 3px; transition: opacity 0.2s; }
  .bar-budget { background: rgba(210,153,34,0.2); border: 1px solid rgba(210,153,34,0.4); }
  .bar-phys-past { background: rgba(125,133,144,0.4); border: 1px solid rgba(125,133,144,0.5); }
  .bar-phys-now { background: rgba(68,147,248,0.8); border: 1px solid #4493f8; }
  .bar-phys-ahead { background: rgba(63,185,80,0.7); border: 1px solid #3fb950; }
  .bar-phys-behind { background: rgba(248,81,73,0.7); border: 1px solid #f85149; }
  .bar-phys-future { background: rgba(68,147,248,0.65); border: 1px solid #4493f8; }
  .chart-month-label { font-size: 0.6rem; margin-top: 4px; color: var(--muted); }
  .chart-month-label.now { color: var(--accent); font-weight: 700; }
  .chart-delta { font-size: 0.6rem; font-weight: 700; }
  .chart-tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; font-size: 0.67rem; white-space: nowrap; opacity: 0; z-index: 20; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.5); margin-bottom: 6px; }
  .chart-tooltip-title { font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .chart-svg { position: absolute; inset: 0; width: 100%; pointer-events: none; overflow: visible; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; padding-left: 34px; font-size: 0.68rem; color: var(--muted); align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }

  /* Exposure panel */
  .exposure-panel { background: rgba(248,81,73,0.06); border: 1px solid rgba(248,81,73,0.3); border-radius: 10px; padding: 16px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  @media(max-width:600px){ .exposure-panel { grid-template-columns: repeat(2,1fr); } }
  .expo-item .expo-label { font-size: 0.68rem; margin-bottom: 3px; }
  .expo-item .expo-val { font-size: 1.25rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* Curve buttons */
  .curve-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .curve-btn { border: none; cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: 600; padding: 8px 14px; border-radius: 8px; color: #fff; transition: all 0.15s; }
  .curve-btn.active-curve { outline: 2px solid #fff; outline-offset: 2px; }
  .curve-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Funnel bars */
  .funnel-bar-wrap { background: var(--bg3); border-radius: 20px; height: 18px; position: relative; width: 100%; }
  .funnel-bar { height: 18px; border-radius: 20px; transition: width 0.5s; }
  .funnel-bar-pct { position: absolute; right: 8px; top: 0; font-size: 0.68rem; color: #fff; line-height: 18px; }

  /* Seasonality chart */
  .season-bars { display: flex; align-items: flex-end; gap: 2px; height: 90px; margin-bottom: 16px; }
  .season-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .season-bar { width: 100%; border-radius: 3px 3px 0 0; }
  .season-label { font-size: 0.58rem; margin-top: 4px; color: var(--muted); }
  .season-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; }
  @media(max-width:600px){ .season-grid { grid-template-columns: repeat(3,1fr); } }
  .season-cell { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
  .season-cell.now-cell { border-color: var(--accent); }
  .season-cell-label { font-size: 0.7rem; font-weight: 600; margin-bottom: 6px; }

  /* CSV tab */
  .csv-dropzone { border: 2px dashed rgba(68,147,248,0.4); border-radius: 10px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .csv-dropzone:hover { border-color: var(--accent); background: rgba(68,147,248,0.04); }
  .csv-dropzone input { display: none; }
  .csv-drop-icon { font-size: 2rem; color: var(--accent); margin-bottom: 6px; }
  .csv-field-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  @media(max-width:500px){ .csv-field-grid { grid-template-columns: 1fr; } }
  .csv-field-cell { background: var(--bg3); border-radius: 7px; padding: 10px; font-size: 0.72rem; }
  .csv-field-name { font-weight: 600; margin-bottom: 3px; }
  .csv-field-variants { color: var(--muted); }
  .code-block { background: var(--bg); border-radius: 8px; padding: 12px; overflow-x: auto; font-size: 0.7rem; color: #3fb950; font-family: 'JetBrains Mono', monospace; white-space: pre; }
  .alert-green { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.4); border-radius: 8px; padding: 10px 14px; font-size: 0.75rem; }
  .alert-red { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.4); border-radius: 8px; padding: 10px 14px; font-size: 0.75rem; color: #f85149; }
  .mb4 { margin-bottom: 16px; }
  .mb8 { margin-bottom: 8px; }
  .mb2 { margin-bottom: 8px; }

  /* How seasonality explanation */
  .season-explain-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  @media(max-width:600px){ .season-explain-grid { grid-template-columns: 1fr; } }
  .season-explain-cell { background: var(--bg3); border-radius: 8px; padding: 10px; font-size: 0.72rem; color: var(--muted); }
  .season-explain-title { font-weight: 700; margin-bottom: 4px; }

  /* Pace / velocity */
  .pace-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .pace-bar-wrap { background: var(--bg3); border-radius: 20px; height: 10px; width: 100%; margin: 6px 0 2px; }
  .pace-bar { height: 10px; border-radius: 20px; transition: width 0.4s; }
  .pace-label { font-size: 0.68rem; color: var(--muted); }

  /* Weekly alert banner */
  .alert-banner { border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; font-size: 0.78rem; display: flex; align-items: flex-start; gap: 10px; }
  .alert-warn  { background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.4); color: #d29922; }
  .alert-good  { background: rgba(63,185,80,0.08);  border: 1px solid rgba(63,185,80,0.4);  color: #3fb950; }
  .alert-crit  { background: rgba(248,81,73,0.08);  border: 1px solid rgba(248,81,73,0.4);  color: #f85149; }
  .alert-banner .alert-icon { font-size: 1.1rem; line-height: 1; }
  .alert-banner .alert-body { flex: 1; }
  .alert-banner .alert-title { font-weight: 700; margin-bottom: 2px; }
  .alert-banner .alert-detail { font-size: 0.7rem; opacity: 0.85; }

  /* Bonus calculator */
  .bonus-card { background: linear-gradient(135deg, rgba(163,113,247,0.06), rgba(63,185,80,0.06)); border: 1px solid rgba(163,113,247,0.25); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .bonus-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 12px; }
  @media(max-width:600px){ .bonus-grid { grid-template-columns: 1fr; } }
  .bonus-goal-cell { background: var(--bg3); border-radius: 8px; padding: 10px; text-align: center; }
  .bonus-goal-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; }
  .bonus-goal-payout { font-size: 1.3rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .bonus-goal-status { font-size: 0.68rem; margin-top: 4px; }
  .bonus-total { background: rgba(163,113,247,0.1); border: 1px solid rgba(163,113,247,0.3); border-radius: 8px; padding: 12px; text-align: center; margin-top: 12px; }
  .bonus-total-label { font-size: 0.72rem; color: var(--muted); }
  .bonus-total-val { font-size: 1.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #a371f7; }
  .bonus-payout-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bonus-payout-row label { font-size: 0.72rem; color: var(--muted); width: 130px; flex-shrink: 0; }
  .bonus-payout-row input { width: 90px; }

  /* Bonus tab */
  .bonus-tab-section { margin-bottom: 16px; }
  .bonus-role-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .bonus-role-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; cursor: pointer; }
  .bonus-role-header:hover { opacity: 0.85; }
  .bonus-role-name { font-size: 0.9rem; font-weight: 700; }
  .bonus-role-meta { font-size: 0.72rem; color: var(--muted); }
  .bonus-role-summary { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.75rem; }
  .bonus-role-summary .earned { color: #3fb950; font-weight: 700; }
  .bonus-role-summary .potential { color: #a371f7; }
  .bonus-role-summary .missed { color: #f85149; }
  .bonus-metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
  @media(max-width:768px) { .bonus-metrics-grid { grid-template-columns: repeat(2, 1fr); } }
  .bonus-metric-cell { background: var(--bg3); border-radius: 8px; padding: 10px; border: 1px solid var(--border); }
  .bonus-metric-cell.hit     { border-color: rgba(63,185,80,0.5);  background: rgba(63,185,80,0.05); }
  .bonus-metric-cell.partial { border-color: rgba(210,153,34,0.5); background: rgba(210,153,34,0.05); }
  .bonus-metric-cell.kicker  { border-color: rgba(45,212,191,0.6); background: rgba(45,212,191,0.06); }
  .bonus-metric-cell.miss    { border-color: rgba(248,81,73,0.3);  background: rgba(248,81,73,0.03); }
  .vp-kpi-threshold { font-size: 0.6rem; color: var(--muted); margin-top: 5px; line-height: 1.6; border-top: 1px solid var(--border2); padding-top: 5px; }
  .vp-kpi-threshold span { display: block; }
  .vp-kpi-bar-wrap { background: var(--bg); border-radius: 10px; height: 4px; margin: 5px 0 2px; overflow: hidden; }
  .vp-kpi-bar { height: 4px; border-radius: 10px; transition: width 0.4s; }
  .bonus-metric-name { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .bonus-metric-payout { font-size: 1.1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .bonus-metric-detail { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
  .bonus-metric-status { font-size: 0.72rem; font-weight: 700; margin-top: 4px; }
  .bonus-inp-sm { width: 70px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 3px 6px; text-align: center; font-size: 0.75rem; color: var(--text); font-family: inherit; outline: none; }
  .bonus-inp-sm:focus { border-color: var(--accent); }
  .bonus-quarterly-summary { background: linear-gradient(135deg, rgba(163,113,247,0.08), rgba(63,185,80,0.08)); border: 1px solid rgba(163,113,247,0.3); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .bonus-q-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 12px; }
  @media(max-width:600px) { .bonus-q-grid { grid-template-columns: repeat(2, 1fr); } }
  .bonus-q-cell { background: var(--bg3); border-radius: 8px; padding: 12px; text-align: center; }
  .bonus-q-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; }
  .bonus-q-val { font-size: 1.4rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .bonus-comm-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media(max-width:600px) { .bonus-comm-grid { grid-template-columns: repeat(2, 1fr); } }
  .bonus-comm-cell { background: var(--bg3); border-radius: 8px; padding: 10px; text-align: center; border: 1px solid var(--border); }
  .bonus-role-body { transition: max-height 0.3s ease; }
  .bonus-role-body.collapsed { max-height: 0; overflow: hidden; }

function normalizeCommissionData(data) {
  const defaults = defaultCommissionData();
  const input = data ?? {};
  let agents = Array.isArray(input.agents) ? input.agents.map(a => ({ name: a?.name ?? "" })) : [];
  if (agents.length === 0) {
    const legacyNames = [input.agent1Name, input.agent2Name].filter(Boolean);
    agents = legacyNames.length > 0
      ? legacyNames.map(name => ({ name }))
      : defaults.agents.map(a => ({ ...a }));
  }
  const totalAgents = Math.max(1, Number(input.totalAgents ?? agents.length ?? defaults.totalAgents));
  while (agents.length < totalAgents) agents.push({ name: `Agent ${agents.length + 1}` });
  agents = agents.slice(0, totalAgents).map((agent, idx) => ({
    name: agent.name && String(agent.name).trim().length > 0 ? String(agent.name) : `Agent ${idx + 1}`
  }));
  return {
    totalAgents,
    agents,
    baseTier: input.baseTier ?? defaults.baseTier,
    bonusTier: input.bonusTier ?? defaults.bonusTier,
    appGoalOverride: Number(input.appGoalOverride ?? defaults.appGoalOverride),
    appKickers: Array.isArray(input.appKickers) && input.appKickers.length === 3 ? input.appKickers : defaults.appKickers,
    monthlyPayouts: Array.isArray(input.monthlyPayouts) && input.monthlyPayouts.length === 12 ? input.monthlyPayouts.map(v => Number(v) || 0) : defaults.monthlyPayouts
  };
}

function getMonthsToStabilization() {
  const totalUnits = getTotalUnits();
  if (totalUnits === 0) return { months: null, targetUnits: 0, avgNetAbsorption: 0, reason: "Enter unit count" };
  const targetUnits = Math.ceil(totalUnits * 0.95);
  const unitsNeeded = Math.max(targetUnits - currentOccupied, 0);
  if (unitsNeeded === 0) return { months: 0, targetUnits, avgNetAbsorption: 0, reason: "At or above 95%" };
  const documented = getDocumentedMonthlyAbsorption(currentMonth);
  if (documented.length === 0) return { months: null, targetUnits, avgNetAbsorption: 0, reason: "No documented move-in / move-out history yet" };
  const avgNetAbsorption = documented.reduce((sum, v) => sum + v, 0) / documented.length;
  if (avgNetAbsorption <= 0) return { months: null, targetUnits, avgNetAbsorption, reason: `Documented net absorption is flat or negative across ${documented.length} month(s)` };
  return {
    months: Math.ceil(unitsNeeded / avgNetAbsorption),
    targetUnits,
    avgNetAbsorption,
    reason: `${unitsNeeded} units to 95% using ${documented.length} documented month(s)`
  };
}

function getApplicationsApprovedCount(monthEntry = {}) {
  if (Object.prototype.hasOwnProperty.call(monthEntry ?? {}, "applicationsApproved")) {

  }
  return Math.max(0, Number(monthEntry.leasesSignedActual) || 0);
}

function getApplicationDecisionMetrics(monthEntry = {}) {
  const applications = Math.max(0, Number(monthEntry.applications) || 0);
  const approvals = Math.min(getApplicationsApprovedCount(monthEntry), applications || Number.MAX_SAFE_INTEGER);
  const denials = Math.max(applications - approvals, 0);
  const leases = Math.max(0, Number(monthEntry.leasesSignedActual) || 0);
  const approvalPct = applications > 0 ? (approvals / applications) * 100 : 0;
  const denialPct = applications > 0 ? (denials / applications) * 100 : 0;
  const appToLeasePct = applications > 0 ? (leases / applications) * 100 : 0;
  return { applications, approvals, denials, leases, approvalPct, denialPct, appToLeasePct };
}

function getRenewalSummaryForMonth(monthEntry = {}) {
  const expirations = Math.max(0, Number(monthEntry.renewalExpirations) || 0);
  const signed = Math.max(0, Number(monthEntry.renewalSigned) || 0);
  const ntv = Math.max(0, Number(monthEntry.renewalNTV) || 0);
  const transfers = Math.max(0, Number(monthEntry.renewalTransfers) || 0);
  const rawUndecided = Number(monthEntry.renewalUndecided);
  const undecided = Number.isFinite(rawUndecided)
    ? Math.max(0, rawUndecided)
    : Math.max(expirations - signed - ntv - transfers, 0);
  const retentionRate = expirations > 0 ? (signed / expirations) * 100 : 0;
  const decidedBase = signed + ntv;
  const decidedRetentionRate = decidedBase > 0 ? (signed / decidedBase) * 100 : 0;
  const projectedUndecidedLosses = undecided > 0
    ? Math.round(undecided * ((100 - (decidedBase > 0 ? decidedRetentionRate : 50)) / 100))
    : 0;
  const projectedAttrition = Math.max(ntv + projectedUndecidedLosses, 0);
  const projectedRetention = Math.max(expirations - projectedAttrition, 0);
  return {
    expirations,
    signed,
    ntv,
    transfers,
    undecided,
    retentionRate,
    decidedRetentionRate,
    projectedUndecidedLosses,
    projectedAttrition,
    projectedRetention
  };
}

function estimateSnapshotUnitsForMonth(targetMonth, anchorMonth, anchorUnits, snapshotKey) {
  const totalUnits = getTotalUnits();
  let runningUnits = Math.max(0, Number(anchorUnits) || 0);
  if (!Number.isInteger(targetMonth) || !Number.isInteger(anchorMonth)) return runningUnits;
  if (targetMonth === anchorMonth) return runningUnits;
  if (targetMonth < anchorMonth) {
    for (let month = anchorMonth; month > targetMonth; month--) {
      const priorSnapshot = Number(monthlyData[month - 1]?.[snapshotKey] ?? 0);
      if (priorSnapshot > 0) return priorSnapshot;
      runningUnits = Math.max(runningUnits + (monthlyData[month]?.moveOuts ?? 0) - (monthlyData[month]?.moveIns ?? 0), 0);
      runningUnits = totalUnits > 0 ? Math.min(runningUnits, totalUnits) : runningUnits;
    }
    return runningUnits;
  }
  for (let month = anchorMonth + 1; month <= targetMonth; month++) {
    const explicitSnapshot = Number(monthlyData[month]?.[snapshotKey] ?? 0);
    if (explicitSnapshot > 0) {
      runningUnits = explicitSnapshot;
      continue;
    }
    runningUnits = Math.max(runningUnits - (monthlyData[month]?.moveOuts ?? 0) + (monthlyData[month]?.moveIns ?? 0), 0);
    runningUnits = totalUnits > 0 ? Math.min(runningUnits, totalUnits) : runningUnits;
  }
  return runningUnits;
}

function restoreCurrentMonthSnapshots(monthIdx = currentMonth, fallback = null) {
  const monthEntry = monthlyData[monthIdx] ?? {};
  const occSnapshot = Number(monthEntry.occupiedSnapshot ?? 0);
  const leasedSnapshot = Number(monthEntry.leasedSnapshot ?? 0);
  if (occSnapshot > 0) currentOccupied = occSnapshot;
  else if (fallback) currentOccupied = estimateSnapshotUnitsForMonth(monthIdx, fallback.anchorMonth, fallback.occupiedUnits, "occupiedSnapshot");
  if (leasedSnapshot > 0) currentLeased = leasedSnapshot;
  else if (fallback) currentLeased = estimateSnapshotUnitsForMonth(monthIdx, fallback.anchorMonth, fallback.leasedUnits, "leasedSnapshot");
}

function storeCurrentMonthSnapshots(monthIdx = currentMonth, occupiedUnits = currentOccupied, leasedUnits = currentLeased) {
  if (!Number.isInteger(monthIdx) || monthIdx < 0 || monthIdx > 11) return;
  if (!monthlyData[monthIdx]) monthlyData[monthIdx] = defaultMonthly()[monthIdx];
  monthlyData[monthIdx] = {
    ...monthlyData[monthIdx],
    occupiedSnapshot: Number(occupiedUnits) || 0,
    leasedSnapshot: Number(leasedUnits) || 0
  };
}

function getLeasedTrendPctSeries() {
  const totalUnits = getTotalUnits();
  if (totalUnits === 0) return Array(12).fill(null);
  const series = Array(12).fill(null);
  let reverseRunning = currentLeased;
  series[currentMonth] = (currentLeased / totalUnits) * 100;
  for (let i = currentMonth - 1; i >= 0; i--) {
    const snapshotUnits = Number(monthlyData[i]?.leasedSnapshot ?? 0);
    if (snapshotUnits > 0) {
      reverseRunning = snapshotUnits;
    } else {
      reverseRunning = Math.max(reverseRunning + (monthlyData[i + 1]?.moveOuts ?? 0) - (monthlyData[i + 1]?.moveIns ?? 0), 0);
      reverseRunning = Math.min(reverseRunning, totalUnits);
    }
    series[i] = (reverseRunning / totalUnits) * 100;
  }
  let runningLeased = currentLeased;
  for (let i = currentMonth + 1; i < 12; i++) {
    runningLeased = Math.max(runningLeased - (monthlyData[i]?.moveOuts ?? 0) + (monthlyData[i]?.moveIns ?? 0), 0);
    runningLeased = Math.min(runningLeased, totalUnits);
    series[i] = (runningLeased / totalUnits) * 100;
  }
  return series;
}

function formatGoalGapLabel(gapUnits, onTrack) {
  if (!onTrack) return `${gapUnits} units behind · ⚠️ Behind`;
  return gapUnits === 0
    ? `0 units behind · ✅ On Track`
    : `${Math.abs(gapUnits)} units ahead · ✅ On Track`;
}

function computeCurve(mode, curMonth, curOccPct, curLeasedPct, occGoal, totalUnits, budgetTargets, seas) {
  const monthsRemaining = 12 - curMonth;
  if (monthsRemaining <= 0 || totalUnits === 0) return Array(12).fill(null);
  const gap = occGoal - curOccPct;
  const remainWeights = seas.slice(curMonth);
  const weightSum = remainWeights.reduce((a,b) => a+b, 0);
  const normalizedWeights = remainWeights.map(w => w / weightSum);
  let cumulative = 0;
  return MONTHS.map((_,i) => {
    if (i < curMonth) return null;
    if (mode === "budget") return budgetTargets[i] ?? 0;
    const idx = i - curMonth;
    const progress = (idx+1) / monthsRemaining;
    let eased;
    if (mode === "linear") { cumulative += normalizedWeights[idx]; eased = cumulative; }
    else if (mode === "aggressive") {
      const b = 1 - Math.pow(1 - progress, 2.5);
      const sb = normalizedWeights[idx] * monthsRemaining;
      eased = Math.min(b * (0.7 + 0.3*sb), 1);
    } else {
      const b = progress < 0.5 ? 2*progress*progress : 1 - Math.pow(-2*progress+2,2)/2;
      const sb = normalizedWeights[idx] * monthsRemaining;
      eased = Math.min(b * (0.7 + 0.3*sb), 1);
    }
    const baseTarget = Math.min(curOccPct + gap * eased, occGoal);
    if (mode === "aggressive") {
      const budgetFloor = budgetTargets[i] ?? 0;
      const startingFloor = Math.max(curOccPct + 3, curLeasedPct + 1);
      const rampFloor = startingFloor + (idx * 0.4);
      return Math.min(Math.max(baseTarget, rampFloor, budgetFloor), occGoal);
    }
    return baseTarget;
  });
}

function getAllCurves() {
  const res = {};
  CURVES.forEach(c => {
    res[c.key] = computeCurve(c.key, currentMonth, currentOccPct(), currentLeasedPct(), occupancyGoal, getTotalUnits(), savedBudgetTargets, seasonal);
  });
  return res;
}

function computeScheduleFromContext(ctx) {
  const totalUnits = Number(ctx.totalUnits) || 0;
  const scopeCurrentOccupied = Number(ctx.currentOccupied) || 0;
  const scopeCurrentLeased = Number(ctx.currentLeased) || 0;
  const scopeOccupancyGoal = Number(ctx.occupancyGoal) || 0;
  const scopeLeasedGoal = Number(ctx.leasedGoal) || 0;
  const scopeCurrentMonth = Number.isInteger(ctx.currentMonth) ? ctx.currentMonth : 0;
  const scopeConversionRate = Number(ctx.conversionRate) || 0;
  const scopeMonthlyData = Array.isArray(ctx.monthlyData) && ctx.monthlyData.length === 12 ? ctx.monthlyData : defaultMonthly();
  const scopeSeasonal = Array.isArray(ctx.seasonal) && ctx.seasonal.length === 12 ? ctx.seasonal : [...DEFAULT_SEASONAL];
  if (totalUnits === 0) return MONTHS.map(month => ({
    month, skip: true, grossLeases:0, netOccLeases:0, netLeasedLeases:0, apps:0,
    toursNeeded:0, guestCardsNeeded:0, budgetOcc:0, budgetLeased:0,
    occPct:0, leasedPct:0, moveOuts:0, moveIns:0, seasonFactor:1, renewalRiskUnits:0
  }));

  // leasedGoal always leads occupancyGoal by the configured gap
  const leasedGap = Math.max(scopeLeasedGoal - scopeOccupancyGoal, 0);

  let simOcc    = scopeCurrentOccupied;
  let simLeased = scopeCurrentLeased;

  const monthTargets = MONTHS.map((_, i) => {
    if (i < scopeCurrentMonth) return null;

    const moveOuts  = scopeMonthlyData[i].moveOuts  ?? 0;
    const moveIns   = scopeMonthlyData[i].moveIns   ?? 0;
    const isCurrent = i === scopeCurrentMonth;
    const renewalSummary = getRenewalSummaryForMonth(scopeMonthlyData[i]);

    // After move-outs + scheduled move-ins (current month: use live counts)
    const baseOcc    = isCurrent ? simOcc    : Math.max(simOcc    - moveOuts + moveIns, 0);
    const baseLeased = isCurrent ? simLeased : Math.max(simLeased - moveOuts + moveIns, 0);
    const baseOccPct    = baseOcc    / totalUnits * 100;
    const baseLeasedPct = baseLeased / totalUnits * 100;

    // ── Budget occ % drives both occ AND leased targets ──────────────────────
    const budgetPct = scopeMonthlyData[i].budgetOcc ?? 0;
    let occTarget;
    if (budgetPct > 0) {
      occTarget = baseOccPct >= budgetPct ? baseOccPct : Math.min(budgetPct, scopeOccupancyGoal);
    } else {
      const monthsLeft = Math.max(12 - i, 1);
      occTarget = Math.min(baseOccPct + (scopeOccupancyGoal - baseOccPct) / monthsLeft, scopeOccupancyGoal);
    }

    // Leased target = occ target + gap (synced to same budget curve, capped at leasedGoal)
    const budgetLeasedPct = Math.min(occTarget + leasedGap, scopeLeasedGoal);
    const leasedTarget    = baseLeasedPct >= budgetLeasedPct ? baseLeasedPct : budgetLeasedPct;

    const netOccNeeded    = Math.max(Math.ceil(totalUnits * occTarget    / 100) - baseOcc,    0);
    const netLeasedNeeded = Math.max(Math.ceil(totalUnits * leasedTarget / 100) - baseLeased, 0);
    const netNeeded       = Math.max(netOccNeeded, netLeasedNeeded);

    // Gross leases = net needed + replacement for move-outs
    const moveOutsToReplace = isCurrent
      ? renewalSummary.projectedAttrition
      : Math.max(moveOuts, renewalSummary.projectedAttrition);
    const grossLeases = moveOutsToReplace + netNeeded;

    const newOccupied = Math.min(baseOcc    + netOccNeeded, totalUnits);
    const newLeased   = Math.min(baseLeased + netNeeded,    totalUnits);

    simOcc    = newOccupied;
    simLeased = newLeased;

    return { baseOcc, baseLeased, baseOccPct, baseLeasedPct, occTarget, leasedTarget,
             budgetLeasedPct, netOccNeeded, netLeasedNeeded, grossLeases, newOccupied, newLeased,
             renewalRiskUnits: moveOutsToReplace, renewalSummary };
  });

  return MONTHS.map((month, i) => {
    if (i < scopeCurrentMonth) {
      return {
        month, skip: true,
        occupied: 0, leased: 0,
        moveOuts: scopeMonthlyData[i].moveOuts ?? 0,
        moveIns:  scopeMonthlyData[i].moveIns  ?? 0,
        grossLeases:0, netOccLeases:0, netLeasedLeases:0, apps:0,
        toursNeeded:0, guestCardsNeeded:0,
        budgetOcc:    scopeMonthlyData[i].budgetOcc ?? 0,
        budgetLeased: 0, occPct:0, leasedPct:0, renewalRiskUnits: getRenewalSummaryForMonth(scopeMonthlyData[i]).projectedAttrition
      };
    }

    const t          = monthTargets[i];
    const moveOuts   = scopeMonthlyData[i].moveOuts ?? 0;
    const moveIns    = scopeMonthlyData[i].moveIns  ?? 0;
    const seasonFactor     = scopeSeasonal[i] ?? 1.0;
    const adjConversion    = Math.min(scopeConversionRate * (0.85 + 0.15 * seasonFactor), 100);
    const apps             = t.grossLeases > 0 ? Math.ceil(t.grossLeases / (adjConversion / 100)) : 0;
    const toursNeeded      = apps > 0 ? Math.ceil(apps / 0.6) : 0;
    const guestCardsNeeded = toursNeeded > 0 ? Math.ceil(toursNeeded / 0.5) : 0;

    return {
      month, moveOuts, moveIns,
      occupied:  t.newOccupied,
      leased:    t.newLeased,
      occPct:    (t.newOccupied / totalUnits) * 100,
      leasedPct: (t.newLeased   / totalUnits) * 100,
      netOccLeases:    t.netOccNeeded,
      netLeasedLeases: t.netLeasedNeeded,
      grossLeases:  t.grossLeases,
      budgetLeased: t.budgetLeasedPct,
      apps, toursNeeded, guestCardsNeeded, adjConversion,
      budgetOcc: scopeMonthlyData[i].budgetOcc ?? 0, seasonFactor, renewalRiskUnits: t.renewalRiskUnits, skip: false
    };
  });
}

function computeSchedule() {
  return computeScheduleFromContext({
    totalUnits: getTotalUnits(),
    currentOccupied,
    currentLeased,
    occupancyGoal,
    leasedGoal,
    currentMonth,
    conversionRate,
    monthlyData,
    seasonal
  });
}

// ─── Property Selector ────────────────────────────────────────────────────────
function loadPropertyData(propName) {
  const d = normalizeSavedCommunityRecord(propName, savedData[propName]);
  currentOccupied = d.currentOccupied;
  currentLeased = d.currentLeased;
  occupancyGoal = d.occupancyGoal;
  leasedGoal = d.leasedGoal;
  currentMonth = d.currentMonth;
  conversionRate = d.conversionRate;
  monthlyData = d.monthlyData;
  savedBudgetTargets = d.savedBudgetTargets;
  seasonal = d.seasonal;
  importMonthOverride = d.importMonthOverride;
  importRoutingMode = d.importRoutingMode;
  customUnits = d.customUnits;
  investorName = d.investorName;
  bonusPayouts = d.bonusPayouts;
  bonusConvGoal = d.bonusConvGoal;
  bonusRolesByQ = d.bonusRolesByQ;
  commissionData = d.commissionData;
  propertyTeamConfig = d.propertyTeamConfig;
  reputationData = d.reputationData;
  renewalImportLog = [];
  renewalImportSourceLabel = "";
  restoreCurrentMonthSnapshots(currentMonth);
}

function renderPropGrid() {
  const grid = document.getElementById("prop-grid");
  grid.innerHTML = PROPERTIES.map((p, i) => {
    const isSaved = !!savedData[p.name];
    const isSelected = i === selectedPropIdx;
    const effectiveUnits = getTotalUnitsFor(p, savedData[p.name]?.customUnits);
    const unitsLabel = effectiveUnits > 0 ? `(${effectiveUnits})` : `(TBD)`;
    const tbd = effectiveUnits > 0 ? "" : ' units-tbd';
    return `<button class="prop-btn${isSelected?" active":""}" onclick="selectProp(${i})">
      ${p.name}<span class="units${tbd}">${unitsLabel}</span>
      ${isSaved && !isSelected ? '<span class="saved-dot"></span>' : ''}
    </button>`;
  }).join('');
  // Always show unit input row — for TBD properties it's required, for others it allows correction
  const tbdRow = document.getElementById("tbd-input-row");
  tbdRow.style.display = "flex";
  const p = getProp();
  document.getElementById("custom-units").value = customUnits || "";
  document.getElementById("custom-units").placeholder = p.units ? `Default: ${p.units}` : "e.g. 250";
  document.getElementById("tbd-label").textContent = p.units
    ? `Override unit count for ${p.name} (default: ${p.units}):`
    : `Unit count not set for ${p.name} — enter below:`;
  document.getElementById("header-sub").textContent = getHeaderSubText();
}

function getTotalUnitsFor(p, customOverride) {
  const custom = parseInt(customOverride) || 0;
  if (custom > 0) return custom;
  return p.units ?? 0;
}

function getPropertyByName(propName) {
  return PROPERTIES.find(p => p.name === propName) ?? { name: propName, units: null };
}

function getAllCommunityNames() {
  const names = [];
  const seen = new Set();
  PROPERTIES.forEach(prop => {
    if (!seen.has(prop.name)) {
      seen.add(prop.name);
      names.push(prop.name);
    }
  });
  Object.keys(savedData ?? {}).forEach(name => {
    if (!seen.has(name)) {
      seen.add(name);
      names.push(name);
    }
  });
  return names;
}

function getSavedCommunityNames() {
  return Object.keys(savedData ?? {});
}

function getCommunitySummary(propName, sourceData) {
  if (!sourceData) return null;
  const prop = getPropertyByName(propName);
  const scopeReputation = normalizeReputationData(sourceData.reputationData);
  const scopeMonthlyData = Array.isArray(sourceData.monthlyData) && sourceData.monthlyData.length === 12 ? sourceData.monthlyData : defaultMonthly();
  const scopeSeasonal = Array.isArray(sourceData.seasonal) && sourceData.seasonal.length === 12 ? sourceData.seasonal : [...DEFAULT_SEASONAL];
  const scopeCurrentMonth = Number.isInteger(sourceData.currentMonth) ? sourceData.currentMonth : 2;
  const totalUnits = getTotalUnitsFor(prop, sourceData.customUnits);
  const occupied = Number(sourceData.currentOccupied) || 0;
  const leased = Number(sourceData.currentLeased) || 0;
  const schedule = computeScheduleFromContext({
    totalUnits,
    currentOccupied: occupied,
    currentLeased: leased,
    occupancyGoal: Number(sourceData.occupancyGoal ?? 95),
    leasedGoal: Number(sourceData.leasedGoal ?? 97),
    currentMonth: scopeCurrentMonth,
    conversionRate: Number(sourceData.conversionRate ?? 65),
    monthlyData: scopeMonthlyData,
    seasonal: scopeSeasonal
  });
  const curMonthData = scopeMonthlyData[scopeCurrentMonth] ?? {};
  const prevMonthData = scopeMonthlyData[Math.max(scopeCurrentMonth - 1, 0)] ?? {};
  const currentRow = schedule[scopeCurrentMonth] ?? {};
  const nextRow = schedule[Math.min(scopeCurrentMonth + 1, 11)] ?? currentRow;
  const budgetOccPct = (sourceData.savedBudgetTargets?.[scopeCurrentMonth] ?? 0) > 0
    ? Number(sourceData.savedBudgetTargets[scopeCurrentMonth]) || 0
    : Number(curMonthData.budgetOcc ?? 0);
  const budgetLeasedPct = Number(nextRow.budgetLeased ?? currentRow.budgetLeased ?? 0) || 0;
  const occPct = totalUnits > 0 ? occupied / totalUnits * 100 : 0;
  const leasedPct = totalUnits > 0 ? leased / totalUnits * 100 : 0;
  const guestCardGoal = Number(currentRow.guestCardsNeeded ?? 0) || 0;
  const guestCards = Number(curMonthData.guestCards) || 0;
  const tours = Number(curMonthData.tours) || 0;
  const applicationMetrics = getApplicationDecisionMetrics(curMonthData);
  const renewalSummary = getRenewalSummaryForMonth(curMonthData);
  const applications = applicationMetrics.applications;
  const previousApplications = Number(prevMonthData.applications) || 0;
  const leasesSigned = Number(curMonthData.leasesSignedActual) || 0;
  const moveOuts = Number(curMonthData.moveOuts) || 0;
  const moveIns = Number(curMonthData.moveIns) || 0;
  const budgetOccUnits = totalUnits > 0 && budgetOccPct > 0 ? Math.ceil(totalUnits * budgetOccPct / 100) : 0;
  const budgetLeasedUnits = totalUnits > 0 && budgetLeasedPct > 0 ? Math.ceil(totalUnits * budgetLeasedPct / 100) : 0;
  const moveInGoal = budgetOccUnits > 0 ? Math.max(budgetOccUnits - occupied + moveOuts, 0) : 0;
  const currentNer = (Number(curMonthData.rentRollTotal) || 0) > 0 && occupied > 0
    ? Number(curMonthData.rentRollTotal) / occupied
    : (Number(curMonthData.nerActual) || 0);
  const proformaNer = Number(curMonthData.proformaNER) || 0;
  return {
    propName,
    totalUnits,
    occupied,
    leased,
    currentMonth: scopeCurrentMonth,
    occPct,
    leasedPct,
    budgetOccPct,
    budgetLeasedPct,
    budgetOccUnits,
    budgetLeasedUnits,
    guestCards,
    guestCardGoal,
    tours,
    applications,
    applicationsApproved: applicationMetrics.approvals,
    applicationApprovalPct: applicationMetrics.approvalPct,
    applicationDenialPct: applicationMetrics.denialPct,
    previousApplications,
    leasesSigned,
    moveOuts,
    moveIns,
    moveInGoal,
    renewalExpirations: renewalSummary.expirations,
    renewalsSigned: renewalSummary.signed,
    renewalNTV: renewalSummary.ntv,
    renewalUndecided: renewalSummary.undecided,
    renewalProjectedAttrition: renewalSummary.projectedAttrition,
    renewalRetentionRate: renewalSummary.retentionRate,
    currentNer,
    proformaNer,
    oraScore: scopeReputation.oraScore,
    googleQuarterlyRating: scopeReputation.googleQuarterlyRating,
    googleLifetimeRating: scopeReputation.googleLifetimeRating
  };
}

function aggregateCommunitySummaries(summaries) {
  const totals = summaries.reduce((acc, summary) => {
    acc.totalUnits += summary.totalUnits;
    acc.occupied += summary.occupied;
    acc.leased += summary.leased;
    acc.budgetOccUnits += summary.budgetOccUnits;
    acc.budgetLeasedUnits += summary.budgetLeasedUnits;
    acc.guestCards += summary.guestCards;
    acc.guestCardGoal += summary.guestCardGoal;
    acc.tours += summary.tours;
    acc.applications += summary.applications;
    acc.applicationsApproved += summary.applicationsApproved;
    acc.previousApplications += summary.previousApplications;
    acc.leasesSigned += summary.leasesSigned;
    acc.moveOuts += summary.moveOuts;
    acc.moveIns += summary.moveIns;
    acc.moveInGoal += summary.moveInGoal;
    acc.renewalExpirations += summary.renewalExpirations;
    acc.renewalsSigned += summary.renewalsSigned;
    acc.renewalNTV += summary.renewalNTV;
    acc.renewalUndecided += summary.renewalUndecided;
    acc.renewalProjectedAttrition += summary.renewalProjectedAttrition;
    if (summary.renewalRetentionRate > 0) {
      acc.renewalRetentionRateTotal += summary.renewalRetentionRate;
      acc.renewalRetentionRateCount += 1;
    }
    if (summary.oraScore > 0) {
      acc.oraTotal += summary.oraScore;
      acc.oraCount += 1;
    }
    if (summary.googleQuarterlyRating > 0) {
      acc.googleQuarterlyTotal += summary.googleQuarterlyRating;
      acc.googleQuarterlyCount += 1;
    }
    if (summary.googleLifetimeRating > 0) {
      acc.googleLifetimeTotal += summary.googleLifetimeRating;
      acc.googleLifetimeCount += 1;
    }
    if (summary.currentNer > 0 && summary.proformaNer > 0 && summary.occupied > 0) {
      acc.nerActualWeight += summary.currentNer * summary.occupied;
      acc.nerBudgetWeight += summary.proformaNer * summary.occupied;
      acc.nerWeightUnits += summary.occupied;
    }
    return acc;
  }, {
    totalUnits: 0,
    occupied: 0,
    leased: 0,
    budgetOccUnits: 0,
    budgetLeasedUnits: 0,
    guestCards: 0,
    guestCardGoal: 0,
    tours: 0,
    applications: 0,
    applicationsApproved: 0,
    previousApplications: 0,
    leasesSigned: 0,
    moveOuts: 0,
    moveIns: 0,
    moveInGoal: 0,
    renewalExpirations: 0,
    renewalsSigned: 0,
    renewalNTV: 0,
    renewalUndecided: 0,
    renewalProjectedAttrition: 0,
    renewalRetentionRateTotal: 0,
    renewalRetentionRateCount: 0,
    oraTotal: 0,
    oraCount: 0,
    googleQuarterlyTotal: 0,
    googleQuarterlyCount: 0,
    googleLifetimeTotal: 0,
    googleLifetimeCount: 0,
    nerActualWeight: 0,
    nerBudgetWeight: 0,
    nerWeightUnits: 0
  });
  const occPct = totals.totalUnits > 0 ? (totals.occupied / totals.totalUnits) * 100 : 0;
  const leasedPct = totals.totalUnits > 0 ? (totals.leased / totals.totalUnits) * 100 : 0;
  const budgetOccPct = totals.totalUnits > 0 ? (totals.budgetOccUnits / totals.totalUnits) * 100 : 0;
  const budgetLeasedPct = totals.totalUnits > 0 ? (totals.budgetLeasedUnits / totals.totalUnits) * 100 : 0;
  const avgActualNer = totals.nerWeightUnits > 0 ? totals.nerActualWeight / totals.nerWeightUnits : 0;
  const avgBudgetNer = totals.nerWeightUnits > 0 ? totals.nerBudgetWeight / totals.nerWeightUnits : 0;
  return {
    communityCount: summaries.length,
    totalUnits: totals.totalUnits,
    occupied: totals.occupied,
    leased: totals.leased,
    guestCards: totals.guestCards,
    tours: totals.tours,
    applications: totals.applications,
    applicationsApproved: totals.applicationsApproved,
    occGapPts: budgetOccPct > 0 ? occPct - budgetOccPct : 0,
    leasedGapPts: budgetLeasedPct > 0 ? leasedPct - budgetLeasedPct : 0,
    nerDelta: avgActualNer > 0 && avgBudgetNer > 0 ? avgActualNer - avgBudgetNer : 0,
    exposureGapUnits: Math.max(totals.moveOuts - totals.moveIns, 0),
    exposureRecoveryPct: totals.moveOuts > 0 ? Math.min((totals.moveIns / totals.moveOuts) * 100, 200) : (totals.moveIns > 0 ? 100 : 0),
    monthAbsorption: totals.moveIns - totals.moveOuts,
    guestCardGoalPct: totals.guestCardGoal > 0 ? Math.min((totals.guestCards / totals.guestCardGoal) * 100, 200) : 0,
    budgetAttainmentPct: totals.budgetOccUnits > 0 ? Math.min((totals.occupied / totals.budgetOccUnits) * 100, 125) : 0,
    momAppsGrowthPct: totals.previousApplications > 0 ? ((totals.applications - totals.previousApplications) / totals.previousApplications) * 100 : (totals.applications > 0 ? 100 : 0),
    leadToLeasePct: totals.guestCards > 0 ? (totals.leasesSigned / totals.guestCards) * 100 : 0,
    tourToAppPct: totals.tours > 0 ? (totals.applications / totals.tours) * 100 : 0,
    applicationApprovalPct: totals.applications > 0 ? (totals.applicationsApproved / totals.applications) * 100 : 0,
    applicationDenialPct: totals.applications > 0 ? ((totals.applications - totals.applicationsApproved) / totals.applications) * 100 : 0,
    moveInGoalPct: totals.moveInGoal > 0 ? Math.min((totals.moveIns / totals.moveInGoal) * 100, 200) : 0,
    renewalExpirations: totals.renewalExpirations,
    renewalsSigned: totals.renewalsSigned,
    renewalNTV: totals.renewalNTV,
    renewalUndecided: totals.renewalUndecided,
    renewalProjectedAttrition: totals.renewalProjectedAttrition,
    renewalRetentionRate: totals.renewalRetentionRateCount > 0 ? totals.renewalRetentionRateTotal / totals.renewalRetentionRateCount : 0,
    oraScore: totals.oraCount > 0 ? totals.oraTotal / totals.oraCount : 0,
    googleQuarterlyRating: totals.googleQuarterlyCount > 0 ? totals.googleQuarterlyTotal / totals.googleQuarterlyCount : 0,
    googleLifetimeRating: totals.googleLifetimeCount > 0 ? totals.googleLifetimeTotal / totals.googleLifetimeCount : 0
  };
}

function getJacRoleScope(role) {
  const assignedNames = role.id.startsWith("regional_")
    ? (regionalAssignments[role.id] ?? [])
    : getSavedCommunityNames();
  const savedNames = assignedNames.filter(name => !!savedData[name]);
  const summaries = savedNames.map(name => getCommunitySummary(name, savedData[name])).filter(Boolean);
  return {
    assignedNames,
    savedNames,
    summaries,
    metrics: aggregateCommunitySummaries(summaries)
  };
}

function getJacRoleScopeLabel(role, scope) {
  if (role.id.startsWith("regional_")) {
    if (scope.assignedNames.length === 0) return "No communities assigned yet";
    if (scope.savedNames.length === 0) return `${scope.assignedNames.length} communities selected · save data to activate rollup`;
    return `${scope.savedNames.length} saved communities from ${scope.assignedNames.length} assignments · ${scope.metrics.totalUnits || 0} units`;
  }
  if (scope.savedNames.length === 0) return "Portfolio rollup will activate once communities are saved";
  return `Portfolio rollup across ${scope.savedNames.length} saved communities · ${scope.metrics.totalUnits || 0} units`;
}

function selectProp(idx) {
  selectedPropIdx = idx;
  loadPropertyData(getProp().name);
  renderPropGrid();
  renderTab();
}

function onCustomUnitsChange(val) {
  customUnits = val !== undefined ? val : (document.getElementById("custom-units")?.value ?? "");
  // Sync both inputs
  const headerInput = document.getElementById("custom-units");
  const overviewInput = document.getElementById("overview-custom-units");
  if (headerInput && val !== undefined) headerInput.value = customUnits;
  if (overviewInput && val === undefined) overviewInput.value = customUnits;
  document.getElementById("header-sub").textContent = getHeaderSubText();
  renderTab();
}

function updateInvestorName(val) {
  investorName = String(val ?? "").trim();
  document.getElementById("header-sub").textContent = getHeaderSubText();
  saveCommunityData(true);
}

function updatePropertyTeamCount(roleType, val) {
  propertyTeamConfig[roleType] = Math.max(0, Number(val) || 0);
  bonusRolesByQ = rebuildBonusRolesByQuarter(bonusRolesByQ, propertyTeamConfig);
  renderTab();
}

function setSalaryPassword() {
  const input = document.getElementById("salary-password-set");
  const raw = String(input?.value ?? "").trim();
  if (raw.length < 4) {
    alert("Use at least 4 characters for the salary password.");
    return;
  }
  salarySecurity = { enabled: true, passwordHash: simpleHash(raw) };
  salaryUnlocked = true;
  persistOpsGlobalData();
  if (input) input.value = "";
  renderTab();
}

function unlockSalaryAccess() {
  if (!salarySecurity.enabled) return;
  const input = document.getElementById("salary-password-unlock");
  const raw = String(input?.value ?? "");
  if (simpleHash(raw) !== salarySecurity.passwordHash) {
    alert("Password did not match.");
    return;
  }
  salaryUnlocked = true;
  if (input) input.value = "";
  renderTab();
}

function lockSalaryAccess() {
  salaryUnlocked = false;
  renderTab();
}

function clearSalaryPassword() {
  if (salarySecurity.enabled && !isSalaryAccessAllowed()) {
    alert("Unlock salary access before removing the password.");
    return;
  }
  salarySecurity = defaultSalarySecurity();
  salaryUnlocked = false;
  persistOpsGlobalData();
  renderTab();
}

// ─── Auto Conv Rate ──────────────────────────────────────────────────────────
function autoCalcConvRate() {
  const documentedMonths = monthlyData.slice(0, currentMonth + 1).filter(m =>
    (m?.tours ?? 0) > 0 || (m?.applications ?? 0) > 0 || (m?.leasesSignedActual ?? 0) > 0 || getApplicationsApprovedCount(m) > 0
  );
  const totalTours = documentedMonths.reduce((sum, m) => sum + (m?.tours ?? 0), 0);
  const totalApps = documentedMonths.reduce((sum, m) => sum + (m?.applications ?? 0), 0);
  const totalLeases = documentedMonths.reduce((sum, m) => sum + ((m?.leasesSignedActual ?? 0) || getApplicationsApprovedCount(m)), 0);
  const currentTourToApp = (monthlyData[currentMonth]?.tours ?? 0) > 0
    ? ((monthlyData[currentMonth]?.applications ?? 0) / (monthlyData[currentMonth]?.tours ?? 0)) * 100
    : 0;
  const currentAppToLease = (monthlyData[currentMonth]?.applications ?? 0) > 0
    ? ((((monthlyData[currentMonth]?.leasesSignedActual ?? 0) || getApplicationsApprovedCount(monthlyData[currentMonth])) / (monthlyData[currentMonth]?.applications ?? 0)) * 100)
    : 0;
  const histTourToApp = totalTours > 0 ? (totalApps / totalTours) * 100 : 0;
  const histAppToLease = totalApps > 0 ? (totalLeases / totalApps) * 100 : 0;
  const historicalTrend = [histTourToApp, histAppToLease].filter(v => v > 0).reduce((sum, v, _, arr) => sum + v / arr.length, 0);
  const blendParts = [
    currentTourToApp > 0 ? { value: currentTourToApp, weight: 0.35 } : null,
    currentAppToLease > 0 ? { value: currentAppToLease, weight: 0.30 } : null,
    historicalTrend > 0 ? { value: historicalTrend, weight: 0.35 } : null
  ].filter(Boolean);
  if (blendParts.length === 0) return conversionRate;
  const weightTotal = blendParts.reduce((sum, part) => sum + part.weight, 0);
  const blended = blendParts.reduce((sum, part) => sum + (part.value * part.weight), 0) / weightTotal;
  const achievableBias = blended * 1.08;
  return Math.round(Math.min(95, achievableBias) * 10) / 10;
}

// ─── Auto-Populate Leasing Pace % Target ─────────────────────────────────────
function autoPopulateLeasingPace() {
  const totalUnits = getTotalUnits();
  if (totalUnits === 0) return;
  const futureBudgets = savedBudgetTargets
    .map((pct, month) => ({ month, pct }))
    .filter(entry => entry.month >= currentMonth && entry.pct > 0);
  if (futureBudgets.length === 0) return;

  const currentPct = totalUnits > 0 ? (currentOccupied / totalUnits * 100) : 0;
  const anchors = [{ month: currentMonth - 1, pct: currentPct }, ...futureBudgets];
  let nextAnchorIdx = 1;

  for (let month = currentMonth; month < 12; month++) {
    while (nextAnchorIdx < anchors.length - 1 && month > anchors[nextAnchorIdx].month) {
      nextAnchorIdx++;
    }
    const nextAnchor = anchors[nextAnchorIdx];
    const prevAnchor = anchors[Math.max(0, nextAnchorIdx - 1)];
    let targetPct = nextAnchor?.pct ?? prevAnchor?.pct ?? currentPct;

    if (nextAnchor && prevAnchor && nextAnchor.month !== prevAnchor.month) {
      const span = nextAnchor.month - prevAnchor.month;
      const progress = (month - prevAnchor.month) / span;
      targetPct = prevAnchor.pct + ((nextAnchor.pct - prevAnchor.pct) * progress);
    }

    if (savedBudgetTargets[month] > 0) {
      targetPct = savedBudgetTargets[month];
    }

    monthlyData[month].budgetOcc = Math.max(0, Math.min(100, Math.round(targetPct * 10) / 10));
  }
}

function applyAutoFill(mode) {
  if (getTotalUnits() === 0) return;
  const curPct = currentOccPct();
  const targets = computeCurve(mode, currentMonth, curPct, currentLeasedPct(), occupancyGoal, getTotalUnits(), savedBudgetTargets, seasonal);
  monthlyData = monthlyData.map((m, i) => {
    if (i < currentMonth || targets[i] === null) return m;
    const target = mode === "aggressive"
      ? Math.max(targets[i], curPct + 3, savedBudgetTargets[i] ?? 0)
      : Math.max(targets[i], curPct);
    return { ...m, budgetOcc: Math.round(target * 10) / 10 };
  });
  activeCurve = mode;
  renderTab();
}

// ─── Event listeners (attached after render) ──────────────────────────────────
function attachEventListeners() {
  // Numeric inputs
  document.querySelectorAll("[data-field]").forEach(el => {
    el.addEventListener("change", () => {
      const field = el.dataset.field;
      const idx = parseInt(el.dataset.idx);
      const prevCurrentMonth = currentMonth;
      if (field === "currentOccupied") {
        currentOccupied = Number(el.value);
        storeCurrentMonthSnapshots(currentMonth, currentOccupied, currentLeased);
      }
      else if (field === "currentLeased") {
        currentLeased = Number(el.value);
        storeCurrentMonthSnapshots(currentMonth, currentOccupied, currentLeased);
      }
      else if (field === "occupancyGoal") { occupancyGoal = Number(el.value); }
      else if (field === "leasedGoal") { leasedGoal = Number(el.value); }
      else if (field === "conversionRate") { conversionRate = Number(el.value); }
      else if (field === "currentMonth") {
        storeCurrentMonthSnapshots(prevCurrentMonth, currentOccupied, currentLeased);
        currentMonth = Number(el.value);
        restoreCurrentMonthSnapshots(currentMonth, {
          anchorMonth: prevCurrentMonth,
          occupiedUnits: currentOccupied,
          leasedUnits: currentLeased
        });
      }
      else if (field === "importMonthOverride") { importMonthOverride = Number(el.value); }
      else if (field === "importRoutingMode") { importRoutingMode = el.value === "force_override" ? "force_override" : "file_first"; }
      else if (field === "seasonal") { updateSeasonal(idx, el.value); }
      else if (field === "bonusApps") { bonusPayouts.apps = Number(el.value); }
      else if (field === "bonusLeases") { bonusPayouts.leases = Number(el.value); }
      else if (field === "bonusConversion") { bonusPayouts.conversion = Number(el.value); }
      else if (field === "bonusConvGoal") { bonusConvGoal = Number(el.value); }
      else if (!isNaN(idx)) { updateMonthly(idx, field, el.value); }
      if (field === "currentMonth" && importMonthOverride === prevCurrentMonth) {
        importMonthOverride = currentMonth;
      }
      renderTab();
    });
  });
  // File import (CSV or PDF)
  const csvInput = document.getElementById("csv-input");
  if (csvInput) csvInput.addEventListener("change", function(e) {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    processImportFiles(files);
    e.target.value = "";
  });
  const renewalInput = document.getElementById("renewal-input");
  if (renewalInput) renewalInput.addEventListener("change", function(e) {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    processRenewalFiles(files);
    e.target.value = "";
  });
}
