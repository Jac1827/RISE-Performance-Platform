function parseMonthIndexValue(value) {
  if (value === null || value === undefined) return null;
  const raw = String(value).trim();
  if (!raw) return null;
  const shortMonth = MONTHS.findIndex(month => raw.toLowerCase().startsWith(month.toLowerCase()));
  if (shortMonth !== -1) return shortMonth;
  const fullMonthNames = ["january","february","march","april","may","june","july","august","september","october","november","december"];
  const fullMonthIdx = fullMonthNames.findIndex(month => raw.toLowerCase().includes(month));
  if (fullMonthIdx !== -1) return fullMonthIdx;
  const directMonthNum = raw.match(/^(\d{1,2})(?:[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)?$/);
  if (directMonthNum) {
    const monthNum = Number(directMonthNum[1]);
    if (monthNum >= 1 && monthNum <= 12) return monthNum - 1;
  }
  const dateCandidate = new Date(raw);
  return isNaN(dateCandidate) ? null : dateCandidate.getMonth();
}

function matchPropertyName(rawName) {
  const cleaned = String(rawName ?? "").trim();
  if (!cleaned) return getProp().name;
  const communities = getAllCommunityNames();
  const exact = communities.find(name => name.toLowerCase() === cleaned.toLowerCase());
  if (exact) return exact;
  const fuzzy = communities.find(name => {
    const a = name.toLowerCase();
    const b = cleaned.toLowerCase();
    return a.includes(b) || b.includes(a) || a.split(" ")[0] === b.split(" ")[0];
  });
  return fuzzy ?? cleaned;
}

function getRowTargetMonth(row) {
  if (importRoutingMode === "force_override") return getImportTargetMonth();
  return parseMonthIndexValue(row.month) ?? getImportTargetMonth();
}

function getPropertyRecordForApply(propName) {
  if (propName === getProp().name) return getCurrentCommunityRecord();
  return normalizeSavedCommunityRecord(propName, savedData[propName]);
}

function applyValueToRecord(record, monthIdx, targetKey, numericValue) {
  if (!record.monthlyData[monthIdx]) record.monthlyData[monthIdx] = defaultMonthly()[monthIdx];
  const md = record.monthlyData[monthIdx];
  if (targetKey === "occupied") {
    md.occupiedSnapshot = numericValue;
    if (monthIdx === record.currentMonth) record.currentOccupied = numericValue;
    return true;
  }
  if (targetKey === "leased") {
    md.leasedSnapshot = numericValue;
    if (monthIdx === record.currentMonth) record.currentLeased = numericValue;
    return true;
  }
  if (targetKey === "move_outs") { md.moveOuts = numericValue; return true; }
  if (targetKey === "move_ins") { md.moveIns = numericValue; return true; }
  if (targetKey === "guest_cards") { md.guestCards = numericValue; return true; }
  if (targetKey === "tours") { md.tours = numericValue; return true; }
  if (targetKey === "applications") { md.applications = numericValue; return true; }
  if (targetKey === "applications_approved") { md.applicationsApproved = numericValue; return true; }
  if (targetKey === "leases_signed") { md.leasesSignedActual = numericValue; return true; }
  if (targetKey === "budget_occ") { md.budgetOcc = numericValue; return true; }
  if (targetKey === "market_rent") { md.marketRent = numericValue; return true; }
  if (targetKey === "budget_rent") { md.proformaRent = numericValue; return true; }
  if (targetKey === "concessions") { md.concessions = numericValue; return true; }
  if (targetKey === "ner") { md.nerActual = numericValue; return true; }
  if (targetKey === "renewal_expirations") { md.renewalExpirations = numericValue; return true; }
  if (targetKey === "renewals_signed") { md.renewalSigned = numericValue; return true; }
  if (targetKey === "renewal_ntvs") { md.renewalNTV = numericValue; return true; }
  if (targetKey === "renewal_transfers") { md.renewalTransfers = numericValue; return true; }
  if (targetKey === "renewal_undecided") { md.renewalUndecided = numericValue; return true; }
  return false;
}

function formatPortfolioReportValue(value, kind = "number") {
  if (value === null || value === undefined || value === "") return "—";
  if (kind === "currency") return `$${Number(value).toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
  if (kind === "pct") return `${Number(value).toFixed(1)}%`;
  if (kind === "rating") return Number(value).toFixed(2);
  return Number(value).toLocaleString(undefined, { maximumFractionDigits: 1 });
}

function buildPortfolioSectionMetrics(sectionKey, summary) {
  if (sectionKey === "overview") {
    return [
      { metric: "Physical Occupancy", value: formatPortfolioReportValue(summary.totalUnits > 0 ? (summary.occupied / summary.totalUnits) * 100 : 0, "pct") },
      { metric: "Leased Percentage", value: formatPortfolioReportValue(summary.totalUnits > 0 ? (summary.leased / summary.totalUnits) * 100 : 0, "pct") },
      { metric: "Budget Occ Gap", value: formatPortfolioReportValue(summary.occGapPts, "pct") },
      { metric: "Budget Leased Gap", value: formatPortfolioReportValue(summary.leasedGapPts, "pct") },
      { metric: "NER Delta vs Budget", value: summary.nerDelta !== 0 ? formatPortfolioReportValue(summary.nerDelta, "currency") : "—" }
    ];
  }
  if (sectionKey === "traffic") {
    return [
      { metric: "Guest Cards", value: formatPortfolioReportValue(summary.guestCards) },
      { metric: "Tours", value: formatPortfolioReportValue(summary.tours) },
      { metric: "Applications", value: formatPortfolioReportValue(summary.applications) },
      { metric: "Applications Approved", value: formatPortfolioReportValue(summary.applicationsApproved ?? 0) },
      { metric: "Approval Rate", value: formatPortfolioReportValue(summary.applicationApprovalPct ?? 0, "pct") },
      { metric: "Lead to Lease", value: formatPortfolioReportValue(summary.leadToLeasePct ?? 0, "pct") },
      { metric: "Tour to App", value: formatPortfolioReportValue(summary.tourToAppPct ?? 0, "pct") }
    ];
  }
  if (sectionKey === "renewals") {
    return [
      { metric: "Lease Expirations", value: formatPortfolioReportValue(summary.renewalExpirations ?? 0) },
      { metric: "Renewals Signed", value: formatPortfolioReportValue(summary.renewalsSigned ?? 0) },
      { metric: "NTVs", value: formatPortfolioReportValue(summary.renewalNTV ?? 0) },
      { metric: "Undecided", value: formatPortfolioReportValue(summary.renewalUndecided ?? 0) },
      { metric: "Projected Attrition", value: formatPortfolioReportValue(summary.renewalProjectedAttrition ?? 0) },
      { metric: "Retention Rate", value: formatPortfolioReportValue(summary.renewalRetentionRate ?? 0, "pct") }
    ];
  }
  if (sectionKey === "reputation") {
    return [
      { metric: "ORA Score", value: summary.oraScore > 0 ? formatPortfolioReportValue(summary.oraScore, "rating") : "—" },
      { metric: "Quarterly Google Rating", value: summary.googleQuarterlyRating > 0 ? formatPortfolioReportValue(summary.googleQuarterlyRating, "rating") : "—" },
      { metric: "Lifetime Google Rating", value: summary.googleLifetimeRating > 0 ? formatPortfolioReportValue(summary.googleLifetimeRating, "rating") : "—" }
    ];
  }
  return [];
}

function buildPortfolioReportData() {
  saveCommunityData(true);
  let names = getSavedCommunityNames();
  if (names.length === 0) {
    const currentName = getProp().name;
    savedData[currentName] = getCurrentCommunityRecord();
    names = [currentName];
  }
  const details = names.map(name => {
    const record = normalizeSavedCommunityRecord(name, savedData[name]);
    const summary = getCommunitySummary(name, record);
    return {
      name,
      record,
      summary,
      recommendations: buildRecommendationsForRecord(name, record)
    };
  }).filter(detail => detail.summary);
  return {
    generatedAt: new Date(),
    mode: portfolioReportMode,
    selectedSections: getSelectedPortfolioReportSections(),
    details,
    aggregate: aggregateCommunitySummaries(details.map(detail => detail.summary))
  };
}

function buildPortfolioReportRows() {
  const report = buildPortfolioReportData();
  if (report.selectedSections.length === 0) {
    alert("Select at least one section for the portfolio report.");
    return null;
  }
  const rows = [];
  report.selectedSections.forEach(sectionKey => {
    buildPortfolioSectionMetrics(sectionKey, report.aggregate).forEach(item => {
      rows.push({
        scope: "Portfolio",
        community: "Portfolio",
        section: getPortfolioReportSectionLabel(sectionKey),
        metric: item.metric,
        value: item.value,
        note: report.mode === "owner" ? "Owner summary" : "Regional summary"
      });
    });
    if (report.mode === "regional") {
      report.details.forEach(detail => {
        buildPortfolioSectionMetrics(sectionKey, detail.summary).forEach(item => {
          rows.push({
            scope: "Community",
            community: detail.name,
            section: getPortfolioReportSectionLabel(sectionKey),
            metric: item.metric,
            value: item.value,
            note: ""
          });
        });
      });
    }
  });
  if (report.mode === "regional") {
    const allowedRecommendationSources = new Set(report.selectedSections.flatMap(sectionKey => ({
      overview: ["Overview", "Traffic", "Renewals"],
      traffic: ["Traffic"],
      renewals: ["Renewals"],
      reputation: []
    }[sectionKey] ?? [])));
    report.details.forEach(detail => {
      detail.recommendations.filter(item => allowedRecommendationSources.has(item.source)).forEach(item => {
        rows.push({
          scope: "Recommendation",
          community: detail.name,
          section: item.source,
          metric: item.title,
          value: item.body,
          note: "Recommendation"
        });
      });
    });
  }
  return { report, rows };
}

function exportPortfolioReportCSV() {
  const payload = buildPortfolioReportRows();
  if (!payload) return;
  const { rows } = payload;
  const headers = ["scope","community","section","metric","value","note"];
  const lines = [
    headers.join(","),
    ...rows.map(row => headers.map(key => `"${String(row[key] ?? "").replace(/"/g, '""')}"`).join(","))
  ];
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `rise_portfolio_report_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function toDashboardCsvValue(val) {
  if (val === null || val === undefined) return "";
  return String(val).replace(/"/g, '""');
}

function setExtractedDashboardRows(rows, sourceLabel="Uploaded report") {
  extractedDashboardRows = rows.filter(row => Object.values(row).some(val => val !== "" && val !== null && val !== undefined));
  extractedSourceLabel = sourceLabel;
}

function mergeExtractedDashboardRows(rows, sourceLabel="Uploaded report") {
  const merged = new Map();
  [...extractedDashboardRows, ...rows].forEach(row => {
    const normalized = Object.fromEntries(DASHBOARD_EXTRACT_HEADERS.map(key => [key, row[key] ?? ""]));
    const mapKey = `${normalized.property}::${normalized.month}`;
    if (!merged.has(mapKey)) {
      merged.set(mapKey, normalized);
      return;
    }
    const prev = merged.get(mapKey);
    DASHBOARD_EXTRACT_HEADERS.forEach(key => {
      if (normalized[key] !== "" && normalized[key] !== null && normalized[key] !== undefined) {
        prev[key] = normalized[key];
      }
    });
  });
  extractedDashboardRows = Array.from(merged.values());
  if (sourceLabel) {
    const sources = extractedSourceLabel ? extractedSourceLabel.split(" + ").filter(Boolean) : [];
    if (!sources.includes(sourceLabel)) sources.push(sourceLabel);
    extractedSourceLabel = sources.join(" + ");
  }
}

function updateExtractedDashboardCell(rowIdx, key, val) {
  if (!extractedDashboardRows[rowIdx]) return;
  extractedDashboardRows[rowIdx][key] = val;
}

function updateExtractFieldMap(sourceKey, targetKey) {

  const a = document.createElement("a");

function applyExtractedDashboardRows() {
  if (extractedDashboardRows.length === 0) return;
  let applied = 0;
  const touchedProps = new Set();
  extractedDashboardRows.forEach(row => {
    const monthIdx = getRowTargetMonth(row);
    if (monthIdx === null || monthIdx < 0 || monthIdx > 11) return;
    const propName = matchPropertyName(row.property);
    const record = getPropertyRecordForApply(propName);
    const applyMappedValue = (sourceKey, value) => {
      if (value === "") return;
      const targetKey = extractFieldMap[sourceKey] ?? sourceKey;
      if (targetKey === "ignore") return;
      const numericValue = Number(value);
      if (!Number.isFinite(numericValue)) return;
      if (applyValueToRecord(record, monthIdx, targetKey, numericValue)) applied++;
    };
    EXTRACT_MAPPABLE_FIELDS.forEach(sourceKey => applyMappedValue(sourceKey, row[sourceKey] ?? ""));
    savedData[propName] = normalizeSavedCommunityRecord(propName, record);
    touchedProps.add(propName);
  });
  if (touchedProps.has(getProp().name)) loadPropertyData(getProp().name);
  persistSaved();
  renderPropGrid();
  const communityCount = touchedProps.size;
  csvLog = [`✅ Applied ${applied} extracted values from ${extractedSourceLabel} into ${communityCount} communit${communityCount===1?"y":"ies"}.`, ...csvLog];
  renderTab();
}

// ─── Drag-Drop Handler ────────────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  e.target.style.borderColor = "rgba(68,147,248,0.4)";
  e.target.style.background = "";
  const files = e.dataTransfer.files;
  if (files.length > 0) processImportFiles(Array.from(files));
}

async function processImportFiles(files) {
  for (const file of files) {
    if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
      await handlePDF(file);
    } else if (file.type === "text/csv" || file.name.toLowerCase().endsWith(".csv")) {
      await handleCSVFile(file);
    }
  }
}

function findDlrNumberNear(label, sourceText, windowSize=160) {
  const idx = sourceText.toLowerCase().indexOf(label.toLowerCase());
  if (idx === -1) return null;
  const slice = sourceText.slice(idx, idx + windowSize);
  const match = slice.match(/(-?\d[\d,]*\.?\d*)/);
  return match ? Number(match[1].replace(/,/g, "")) : null;
}

function findDlrCurrencyNear(label, sourceText, windowSize=200) {
  const idx = sourceText.toLowerCase().indexOf(label.toLowerCase());
  if (idx === -1) return null;
  const slice = sourceText.slice(idx, idx + windowSize);
  const match = slice.match(/\$?\s*([\d,]+(?:\.\d+)?)/);
  return match ? Number(match[1].replace(/,/g, "")) : null;
}

function findDlrMtdValue(categoryLabel, sourceText) {
  const patterns = [
    new RegExp(categoryLabel + "[\\s\\S]{0,140}?mtd[\\s:]*(-?\\d[\\d,]*)", "i"),
    new RegExp(categoryLabel + "[\\s\\S]{0,140}?month to date[\\s:]*(-?\\d[\\d,]*)", "i"),
    new RegExp("mtd[\\s\\S]{0,80}" + categoryLabel + "[\\s\\S]{0,80}?(-?\\d[\\d,]*)", "i")
  ];
  for (const pattern of patterns) {
    const match = sourceText.match(pattern);
    if (match) return Number(match[1].replace(/,/g, ""));
  }
  return null;
}

function parseDlrReportDate(sourceText) {
  const match = sourceText.match(/daily leasing report[\s\S]{0,120}?(\d{1,2}\/\d{1,2}\/\d{4})/i);
  if (!match) return null;
  const d = new Date(match[1]);
  return isNaN(d) ? null : d;
}

function parsePendingByMonth(sourceText, kindLabel) {
  const result = {};
  const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];
  monthNames.forEach((monthName, monthIdx) => {
    const pattern = new RegExp(`${monthName}(?:-\\d{2,4})?\\s+Pending\\s+${kindLabel}s?\\s*[:\\-]?\\s*(-?\\d[\\d,]*)`, "i");
    const match = sourceText.match(pattern);
    if (match) result[monthIdx] = Number(match[1].replace(/,/g, ""));
  });
  return result;
}

function parseDlrPdf(sourceText) {
  if (!/daily leasing report/i.test(sourceText)) return null;
  const reportDate = parseDlrReportDate(sourceText);
  const guestCardCategories = [
    "walk in",
    "off site event",
    "phone calls",
    "emails/online",
    "text/chat/other"
  ];
  const guestCardValues = guestCardCategories.map(label => findDlrMtdValue(label, sourceText)).filter(val => val !== null);
  const guestCards = guestCardValues.length > 0 ? guestCardValues.reduce((sum, val) => sum + val, 0) : null;
  return {
    reportDate,
    occupied: findDlrNumberNear("occupied units", sourceText) ?? findDlrNumberNear("occupied", sourceText),
    leased: findDlrNumberNear("leased units", sourceText) ?? findDlrNumberNear("leased", sourceText),
    moveOuts: findDlrNumberNear("move-outs", sourceText) ?? findDlrNumberNear("move outs", sourceText),
    moveIns: findDlrNumberNear("move-ins", sourceText) ?? findDlrNumberNear("move ins", sourceText),
    guestCards,
    tours: findDlrNumberNear("tours", sourceText),
    applications: findDlrNumberNear("applications", sourceText) ?? findDlrNumberNear("application", sourceText),
    marketRent: findDlrCurrencyNear("avg in place rent", sourceText),
    budgetRent: findDlrCurrencyNear("avg. budget rent", sourceText) ?? findDlrCurrencyNear("avg budget rent", sourceText),
    pendingMoveOutsByMonth: parsePendingByMonth(sourceText, "Move-Out"),
    pendingMoveInsByMonth: parsePendingByMonth(sourceText, "Move-In")
  };
}

// ─── PDF Handler ──────────────────────────────────────────────────────────────
async function handlePDF(file) {
  csvError = ""; csvLog = [];
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    let fullText = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      fullText += textContent.items.map(item => item.str).join(" ") + "\n";
    }
    const originalText = fullText.replace(/\s+/g, " ").trim();
    const text = fullText.toLowerCase();
    if (text.trim().length < 10) { csvError = "PDF appears to have no extractable text. Try a CSV export instead."; renderTab(); return; }

    const log = [];
    let matched = 0;
    const propName = getProp().name.toLowerCase();
    const propFirstWord = propName.split(" ")[0];

    // Check if this PDF relates to the selected property
    const hasPropRef = text.includes(propFirstWord);
    if (!hasPropRef) {
      log.push("⚠️ Property name not found in PDF — applying data to current property: " + getProp().name);
    }

    // Detect which month(s) the PDF refers to
    const detectedMonths = [];
    MONTHS.forEach((m, i) => {
      const mLow = m.toLowerCase();
      const fullNames = ["january","february","march","april","may","june","july","august","september","october","november","december"];
      if (text.includes(mLow) || text.includes(fullNames[i])) detectedMonths.push(i);
    });

    const dlr = parseDlrPdf(originalText);
    if (dlr) {
      const reportMonth = dlr.reportDate ? dlr.reportDate.getMonth() : null;
      const manualOverrideActive = importRoutingMode === "force_override";
      const targetMonth = manualOverrideActive
        ? getImportTargetMonth()
        : (reportMonth ?? getImportTargetMonth());
      const totalUnits = getTotalUnits();
      log.push(`↪ DLR format detected${dlr.reportDate ? ` · report date ${dlr.reportDate.toLocaleDateString('en-US')}` : ""}`);
      if (manualOverrideActive) {
        log.push(`↪ Manual month override applied: ${MONTHS[targetMonth]}`);
      } else {
        log.push(`↪ DLR routed to ${MONTHS[targetMonth]} from Daily Leasing Report header date`);
      }

      if (targetMonth === currentMonth) {
        if (dlr.occupied !== null) { currentOccupied = Math.round(dlr.occupied); matched++; log.push(`→ Occupied units: ${currentOccupied}`); }
        if (dlr.leased !== null) { currentLeased = Math.round(dlr.leased); matched++; log.push(`→ Leased units: ${currentLeased}`); }
      } else if (dlr.occupied !== null || dlr.leased !== null) {
        log.push(`→ Live occupied/leased widgets unchanged because ${MONTHS[targetMonth]} is not the active month`);
      }

      const md = monthlyData[targetMonth];
      if (dlr.moveOuts !== null) { md.moveOuts = Math.round(dlr.moveOuts); matched++; log.push(`→ ${MONTHS[targetMonth]} move-outs: ${md.moveOuts}`); }
      if (dlr.moveIns !== null) { md.moveIns = Math.round(dlr.moveIns); matched++; log.push(`→ ${MONTHS[targetMonth]} move-ins: ${md.moveIns}`); }
      if (dlr.guestCards !== null) { md.guestCards = Math.round(dlr.guestCards); matched++; log.push(`→ ${MONTHS[targetMonth]} guest cards: ${md.guestCards} (MTD source rollup)`); }
      if (dlr.tours !== null) { md.tours = Math.round(dlr.tours); matched++; log.push(`→ ${MONTHS[targetMonth]} tours: ${md.tours}`); }
      if (dlr.applications !== null) { md.applications = Math.round(dlr.applications); matched++; log.push(`→ ${MONTHS[targetMonth]} applications: ${md.applications}`); }
      if (dlr.marketRent !== null) { md.marketRent = dlr.marketRent; matched++; log.push(`→ ${MONTHS[targetMonth]} market rent: $${md.marketRent}`); }
      if (dlr.budgetRent !== null) { md.proformaRent = dlr.budgetRent; matched++; log.push(`→ ${MONTHS[targetMonth]} budget rent: $${md.proformaRent}`); }

      Object.entries(dlr.pendingMoveOutsByMonth).forEach(([monthIdx, value]) => {
        monthlyData[Number(monthIdx)].moveOuts = Math.round(value);
        matched++;
        log.push(`→ ${MONTHS[Number(monthIdx)]} pending move-outs: ${monthlyData[Number(monthIdx)].moveOuts}`);
      });
      Object.entries(dlr.pendingMoveInsByMonth).forEach(([monthIdx, value]) => {
        monthlyData[Number(monthIdx)].moveIns = Math.round(value);
        matched++;
        log.push(`→ ${MONTHS[Number(monthIdx)]} pending move-ins: ${monthlyData[Number(monthIdx)].moveIns}`);
      });

      if (matched === 0) {
        csvError = "DLR format detected, but no mapped fields were found. We may need one more sample to tighten the parser.";
        renderTab();
        return;
      }

      csvLog = [
        `✅ Extracted ${matched} mapped DLR values into the preview for ${MONTHS[targetMonth]}`,
        ...log,
        "ℹ Leases Signed, Rent Roll / NER, and historical-trend fields remain excluded because you marked them as separate reports."
      ];
      mergeExtractedDashboardRows(buildDlrDashboardRows(dlr, targetMonth), `DLR PDF${dlr.reportDate ? ` (${dlr.reportDate.toLocaleDateString('en-US')})` : ""}`);
      renderTab();
      return;
    }

    // Helper: find a number near a keyword in the text
    function findNumberNear(keyword, searchText) {
      const idx = searchText.indexOf(keyword);
      if (idx === -1) return null;
      // Look at the 120 characters after the keyword for a number
      const after = searchText.substring(idx, idx + 120);
      const nums = after.match(/[\d,]+\.?\d*/g);
      if (nums && nums.length > 0) {
        // Skip the keyword itself if it contains a number, get the next meaningful number
        for (const n of nums) {
          const parsed = parseFloat(n.replace(/,/g, ""));
          if (!isNaN(parsed) && parsed > 0) return parsed;
        }
      }
      return null;
    }

    // Helper: find percentage near keyword
    function findPctNear(keyword, searchText) {
      const idx = searchText.indexOf(keyword);
      if (idx === -1) return null;
      const after = searchText.substring(idx, idx + 100);
      const pctMatch = after.match(/([\d.]+)\s*%/);
      if (pctMatch) return parseFloat(pctMatch[1]);
      return null;
    }

    // ── Map to dashboard fields ──
    // Occupancy / Leasing metrics
    const keywordMap = [
      { field: "occupied", keywords: ["occupied units","physical occupancy","occupied"], pct: false },
      { field: "leased", keywords: ["leased units","total leased","leased"], pct: false },
      { field: "occupancy", keywords: ["physical occupancy","occupancy rate","occ rate","occupancy %"], pct: true },
      { field: "leasedPct", keywords: ["leased %","leased occupancy","lease rate","leased rate"], pct: true },
      { field: "moveOuts", keywords: ["move-outs","move outs","moveouts","notice to vacate","ntv","scheduled move-out"], pct: false },
      { field: "moveIns", keywords: ["move-ins","move ins","moveins","move-in","scheduled move-in"], pct: false },
      { field: "guestCards", keywords: ["guest cards","guest card","leads","prospects","traffic","inquiries"], pct: false },
      { field: "tours", keywords: ["tours","showings","total tours"], pct: false },
      { field: "applications", keywords: ["applications","apps","total applications","total apps"], pct: false },
      { field: "leasesSignedActual", keywords: ["leases signed","new leases","signed leases","executed leases","total leases"], pct: false },
      { field: "marketRent", keywords: ["market rent","asking rent","average rent","avg rent"], pct: false },
      { field: "concessions", keywords: ["concessions","concession amount","avg concession"], pct: false },
      { field: "nerActual", keywords: ["effective rent","net effective","ner ","ner/"], pct: false },
      { field: "budgetOcc", keywords: ["budget occ","budgeted occ","budget occupancy"], pct: true },
      { field: "delinquency", keywords: ["delinquency","delinquent","delinq"], pct: true },
      { field: "ora", keywords: ["ora score","ora ","online reputation"], pct: false },
      { field: "turnTimes", keywords: ["turn time","turn days","avg turn","average turn"], pct: false },
      { field: "woClosurePct", keywords: ["work order closure","wo closure","work order completion","wo %"], pct: true },
    ];

    const foundValues = {};
    keywordMap.forEach(entry => {
      for (const kw of entry.keywords) {
        const val = entry.pct ? findPctNear(kw, text) : findNumberNear(kw, text);
        if (val !== null) {
          foundValues[entry.field] = val;
          log.push(`Found ${entry.field}: ${val}${entry.pct ? "%" : ""} (near "${kw}")`);
          matched++;
          break;
        }
      }
    });

    if (matched === 0) {
      csvError = "Could not match any data fields from the PDF text. Try exporting as CSV for more reliable import.";
      renderTab();
      return;
    }

    // Extract values into dashboard-shaped rows
    const detectedMonth = detectedMonths.length > 0 ? detectedMonths[detectedMonths.length - 1] : null;
    const targetMonth = importRoutingMode === "force_override"
      ? getImportTargetMonth()
      : (detectedMonth ?? getImportTargetMonth());
    if (detectedMonth !== null && targetMonth !== detectedMonth) {
      log.push(`↪ Month override applied: using ${MONTHS[targetMonth]} instead of detected ${MONTHS[detectedMonth]}`);
    } else {
      log.push(`↪ Import routed to ${MONTHS[targetMonth]}`);
    }
    const genericRows = [{
      property: getProp().name,
      month: MONTHS[targetMonth],
      occupied: foundValues.occupied ?? "",
      leased: foundValues.leased ?? "",
      move_outs: foundValues.moveOuts ?? "",
      move_ins: foundValues.moveIns ?? "",
      guest_cards: foundValues.guestCards ?? "",
      tours: foundValues.tours ?? "",
      applications: foundValues.applications ?? "",
      leases_signed: foundValues.leasesSignedActual ?? "",
      budget_occ: foundValues.budgetOcc ?? "",
      market_rent: foundValues.marketRent ?? "",
      budget_rent: "",
      concessions: foundValues.concessions ?? "",
      ner: foundValues.nerActual ?? ""
    }];
    mergeExtractedDashboardRows(genericRows, `PDF ${file.name}`);
    csvLog = [
      `✅ Extracted ${matched} fields from PDF into the preview for ${MONTHS[targetMonth]}`,
      ...log
    ];
    renderTab();
  } catch(err) { csvError = "Failed to parse PDF: " + err.message; renderTab(); }
}

// ─── CSV Handler ──────────────────────────────────────────────────────────────
async function handleCSVFile(file) {
  if (!file) return;
  csvError = ""; csvLog = [];
  try {
      const text = await file.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { csvError = "CSV appears empty or has no data rows."; renderTab(); return; }
      const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/[^a-z0-9_]/g,"_"));
      const rows = lines.slice(1).map(line => {
        const vals = line.split(",").map(v => v.trim().replace(/^"|"$/g,""));
        return Object.fromEntries(headers.map((h,i) => [h, vals[i] ?? ""]));
      });
      const fieldMap = {
        occupied: ["occupied","occupied_units","physical_occupied","occ_units","units_occupied"],
        leased: ["leased","leased_units","total_leased","units_leased"],
        moveOuts: ["move_outs","moveouts","move_out","notice_to_vacate","ntv","scheduled_moveouts"],
        moveIns:  ["move_ins","moveins","move_in","scheduled_moveins","net_moveins"],
        guestCards: ["guest_cards","guestcards","leads","prospects","traffic","inquiries"],
        tours: ["tours","showings","total_tours"],
        applications: ["applications","apps","total_applications"],
        applicationsApproved: ["applications_approved","approved","approved_apps","apps_approved"],
        leasesSignedActual: ["leases_signed","leasessigned","new_leases","signed_leases","leases"],
        marketRent: ["market_rent","marketrent","asking_rent","gross_rent","rent"],
        proformaRent: ["budget_rent","budgetrent","proforma_rent","proformarent","budget_rent_base_premiums"],
        concessions: ["concessions","concession","concession_amount","net_concessions"],
        nerActual: ["ner","ner_actual","neractual","net_effective_rent","effective_rent"],
        rentRollTotal: ["rent_roll_total","rentrolltotal","total_rent","total_rent_roll","gross_rent_total","rent_total"],
        budgetOcc: ["budget_occ","budgetocc","budget_occupancy","occ_goal","budgeted_occ"],
        renewalExpirations: ["renewal_expirations","total_lease_expirations","expirations"],
        renewalSigned: ["renewals_signed","renewal_signed","signed_renewals"],
        renewalNTV: ["renewal_ntvs","ntvs","ntv_received"],
        renewalTransfers: ["renewal_transfers","transfers"],
        renewalUndecided: ["renewal_undecided","undecided","pending"],
        month: ["month","period","date","reporting_month"],
        property: ["property","property_name","community","community_name","site"],
      };
      const findVal = (row, keys) => { for (const k of keys) { if (row[k] !== undefined && row[k] !== "") return row[k]; } return null; };
      const log = [];
      let monthlyUpdates = Array.from({length:12}, () => ({}));
      let matched = 0;
      const relevantRows = rows;
      relevantRows.forEach(row => {
        const monthStr = findVal(row, fieldMap.month);
        const monthIdx = importRoutingMode === "force_override"
          ? getImportTargetMonth()
          : (parseMonthIndexValue(monthStr) ?? getImportTargetMonth());
        const propertyName = matchPropertyName(findVal(row, fieldMap.property) ?? getProp().name);
        const trySet = (field, keys) => {
          const val = findVal(row, keys);
          if (val !== null && val !== "") {
            const parsed = Number(String(val).replace(/[$,%]/g,""));
            if (!isNaN(parsed)) {
              if (monthIdx >= 0) monthlyUpdates[monthIdx][field] = parsed;
              matched++;
            }
          }
        };
        Object.entries(fieldMap).forEach(([field, keys]) => { if (field !== "month" && field !== "property") trySet(field, keys); });
        if (monthIdx >= 0) {
          log.push(`${propertyName} · ${MONTHS[monthIdx]}: ${Object.keys(monthlyUpdates[monthIdx]).join(", ") || "no mapped columns"}`);
        }
      });
      if (matched === 0) { csvError = "No recognizable columns found. See the field mapping guide below."; renderTab(); return; }
      mergeExtractedDashboardRows(relevantRows.map(row => ({
        property: matchPropertyName(findVal(row, fieldMap.property) ?? getProp().name),
        month: MONTHS[importRoutingMode === "force_override"
          ? getImportTargetMonth()
          : (parseMonthIndexValue(findVal(row, fieldMap.month)) ?? getImportTargetMonth())],
        occupied: findVal(row, fieldMap.occupied) ?? "",
        leased: findVal(row, fieldMap.leased) ?? "",
        move_outs: findVal(row, fieldMap.moveOuts) ?? "",
        move_ins: findVal(row, fieldMap.moveIns) ?? "",
        guest_cards: findVal(row, fieldMap.guestCards) ?? "",
        tours: findVal(row, fieldMap.tours) ?? "",
        applications: findVal(row, fieldMap.applications) ?? "",
        applications_approved: findVal(row, fieldMap.applicationsApproved) ?? "",
        leases_signed: findVal(row, fieldMap.leasesSignedActual) ?? "",
        budget_occ: findVal(row, fieldMap.budgetOcc) ?? "",
        market_rent: findVal(row, fieldMap.marketRent) ?? "",
        budget_rent: findVal(row, fieldMap.proformaRent) ?? "",
        concessions: findVal(row, fieldMap.concessions) ?? "",
        ner: findVal(row, fieldMap.nerActual) ?? "",
        renewal_expirations: findVal(row, fieldMap.renewalExpirations) ?? "",
        renewals_signed: findVal(row, fieldMap.renewalSigned) ?? "",
        renewal_ntvs: findVal(row, fieldMap.renewalNTV) ?? "",
        renewal_transfers: findVal(row, fieldMap.renewalTransfers) ?? "",
        renewal_undecided: findVal(row, fieldMap.renewalUndecided) ?? ""
      })), `CSV ${file.name}`);
      csvLog = [`✅ Extracted ${matched} values from ${relevantRows.length} CSV row(s) into the preview.`, ...log.slice(0, 18)];
      renderTab();
    } catch(err) { csvError = "Failed to parse CSV: " + err.message; renderTab(); }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadPropertyData(getProp().name);
renderPropGrid();
renderTab();
</script>
