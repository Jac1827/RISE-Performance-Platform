function buildRecommendationsForRecord(propName, sourceData) {
  if (!sourceData) return [];
  const record = normalizeSavedCommunityRecord(propName, sourceData);
  const prop = getPropertyByName(propName);
  const totalUnits = getTotalUnitsFor(prop, record.customUnits);
  const schedule = computeScheduleFromContext({
    totalUnits,
    currentOccupied: record.currentOccupied,
    currentLeased: record.currentLeased,
    occupancyGoal: record.occupancyGoal,
    leasedGoal: record.leasedGoal,
    currentMonth: record.currentMonth,
    conversionRate: record.conversionRate,
    monthlyData: record.monthlyData,
    seasonal: record.seasonal
  });
  const monthIdx = record.currentMonth;
  const monthLabel = MONTHS[monthIdx];
  const monthEntry = record.monthlyData[monthIdx] ?? {};
  const scheduleRow = schedule[monthIdx] ?? {};
  const applicationMetrics = getApplicationDecisionMetrics(monthEntry);
  const renewalSummary = getRenewalSummaryForMonth(monthEntry);
  const guestCards = Number(monthEntry.guestCards) || 0;
  const tours = Number(monthEntry.tours) || 0;
  const tourRate = guestCards > 0 ? (tours / guestCards) * 100 : 0;
  const appRate = tours > 0 ? (applicationMetrics.applications / tours) * 100 : 0;
  const closeRate = applicationMetrics.appToLeasePct;
  const approvalPct = applicationMetrics.approvalPct;
  const occPct = totalUnits > 0 ? (Number(record.currentOccupied) || 0) / totalUnits * 100 : 0;
  const budgetOccPct = (record.savedBudgetTargets?.[monthIdx] ?? 0) > 0
    ? Number(record.savedBudgetTargets[monthIdx]) || 0
    : Number(monthEntry.budgetOcc ?? 0);
  const recommendations = [];

  if (budgetOccPct > 0 && occPct + 0.5 < budgetOccPct) {
    recommendations.push({
      source: "Overview",
      tone: "#f85149",
      title: "Occupancy is trailing budget",
      body: `${propName} is at ${occPct.toFixed(1)}% occupied against a ${budgetOccPct.toFixed(1)}% budget line. Lean on near-term closings and renewal saves before adding more future exposure.`
    });
  }
  if ((scheduleRow.grossLeases ?? 0) > 0 && (scheduleRow.renewalRiskUnits ?? 0) > 0) {
    recommendations.push({
      source: "Renewals",
      tone: "#d29922",
      title: "Lease goal includes renewal exposure",
      body: `${monthLabel} gross lease need is carrying ${scheduleRow.renewalRiskUnits} unit(s) of renewal risk. Focus on closing undecided expirations early so the leasing team is not backfilling preventable loss.`
    });
  }
  if ((scheduleRow.guestCardsNeeded ?? 0) > 0 && guestCards < (scheduleRow.guestCardsNeeded ?? 0) * 0.75) {
    recommendations.push({
      source: "Traffic",
      tone: "#4493f8",
      title: "Traffic generation needs help",
      body: `Lead volume is ${guestCards}/${scheduleRow.guestCardsNeeded ?? 0}. Push fresh traffic sources this week with stale lead revival, resident referrals, employer outreach, and one localized event.`
    });
  }
  if (guestCards > 0 && tourRate < 45) {
    recommendations.push({
      source: "Traffic",
      tone: "#7dd3fc",
      title: "Lead-to-tour conversion is soft",
      body: `Only ${tourRate.toFixed(0)}% of leads are touring in ${monthLabel}. Tighten response time, increase first-day call and text attempts, and ask every lead for a hard appointment.`
    });
  }
  if (tours > 0 && appRate < 35) {
    recommendations.push({
      source: "Traffic",
      tone: "#a371f7",
      title: "Tour-to-application closing opportunity",
      body: `Tour-to-app is ${appRate.toFixed(0)}%. Revisit tour story flow, pricing and concession positioning, and same-day follow-up with a direct apply-now ask.`
    });
  }
  if (applicationMetrics.applications > 0 && approvalPct < 70) {
    recommendations.push({
      source: "Traffic",
      tone: "#f59e0b",
      title: "Approval fallout needs review",
      body: `${approvalPct.toFixed(0)}% of applications are approving so far. Audit denial reasons, tighten pre-qualification, and escalate document or guarantor issues within 24 hours.`
    });
  }
  if (applicationMetrics.applications > 0 && closeRate > 0 && closeRate < 60) {
    recommendations.push({
      source: "Traffic",
      tone: "#3fb950",
      title: "Approved applications are not closing fast enough",
      body: `App-to-lease is ${closeRate.toFixed(0)}%. Work every approved file daily until it either signs or is formally withdrawn so approvals turn into executed leases.`
    });
  }
  if (renewalSummary.expirations > 0 && renewalSummary.retentionRate < 60) {
    recommendations.push({
      source: "Renewals",
      tone: "#f97316",
      title: "Renewal retention is below target",
      body: `${monthLabel} retention is ${renewalSummary.retentionRate.toFixed(0)}% across ${renewalSummary.expirations} expirations. Price review, resident outreach, and manager-touch saves should be the first renewal focus this cycle.`
    });
  }
  if (renewalSummary.undecided > 0) {
    recommendations.push({
      source: "Renewals",
      tone: "#22c55e",
      title: "Undecided renewals can still protect pace",
      body: `${renewalSummary.undecided} expiration(s) are still undecided for ${monthLabel}. A targeted save push here can shrink projected attrition before the leasing team has to backfill it.`
    });
  }
  if (recommendations.length === 0) {
    recommendations.push({
      source: "Overview",
      tone: "#3fb950",
      title: "Current trends are healthy",
      body: `${propName} is generally holding pace on occupancy, funnel conversion, and renewal risk for ${monthLabel}. Keep speed-to-lead, same-day follow-up, and renewal outreach disciplined.`
    });
  }
  return recommendations;
}

function renderRecommendationsCard(items, title, subtitle) {
  return `<div class="card mb4">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <div>
        <h2 style="font-size:0.9rem;font-weight:600">${title}</h2>
        <p style="font-size:0.72rem;color:var(--muted);margin-top:2px">${subtitle}</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px">
      ${items.map(item => `<div style="background:var(--bg3);border:1px solid var(--border);border-left:3px solid ${item.tone};border-radius:8px;padding:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">
          <div style="font-size:0.64rem;text-transform:uppercase;letter-spacing:0.08em;color:${item.tone};font-weight:700">${item.source}</div>
        </div>
        <div style="font-size:0.74rem;font-weight:700;color:${item.tone};margin-bottom:6px">${item.title}</div>
        <div style="font-size:0.72rem;color:var(--muted);line-height:1.5">${item.body}</div>
      </div>`).join("")}
    </div>
  </div>`;
}

// ─── Overview Tab ─────────────────────────────────────────────────────────────
function renderOverviewTab() {
  const totalUnits = getTotalUnits();
  const oCPct = currentOccPct();
  const lCPct = currentLeasedPct();
  const occGoalUnits = Math.ceil(totalUnits * occupancyGoal / 100);
  const leasedGoalUnits = Math.ceil(totalUnits * leasedGoal / 100);
  const upcomingMoveOuts30 = monthlyData[currentMonth]?.moveOuts ?? 0;
  const upcomingMoveOuts60 = (monthlyData[currentMonth]?.moveOuts ?? 0) + (monthlyData[Math.min(currentMonth+1,11)]?.moveOuts ?? 0);
  const upcomingMoveIns30  = monthlyData[currentMonth]?.moveIns  ?? 0;
  const exposureAfter30 = Math.max(currentOccupied - upcomingMoveOuts30 + upcomingMoveIns30, 0);
  const exposureAfter60 = Math.max(currentOccupied - upcomingMoveOuts60, 0);
  const leasedAfter30 = Math.max(currentLeased - upcomingMoveOuts30 + upcomingMoveIns30, 0);
  const leasedAfter60 = Math.max(currentLeased - upcomingMoveOuts60, 0);
  const currentMonthBudgetOcc = monthlyData[currentMonth]?.budgetOcc ?? 0;
  const schedule = computeSchedule();
  const currentRow = schedule[currentMonth] ?? {};
  const nextMonth = Math.min(currentMonth + 1, 11);
  const nextRow = schedule[nextMonth] ?? {};
  const currentMonthBudgetLeased = currentRow.budgetLeased ?? 0;
  const upcomingBudgetLeased = nextRow.budgetLeased ?? currentMonthBudgetLeased;
  const upcomingBudgetLeasedUnits = totalUnits > 0 ? Math.ceil(totalUnits * upcomingBudgetLeased / 100) : 0;
  const stabilization = getMonthsToStabilization();
  const quarterlyAbsorption = getQuarterlyAbsorptionTotals();
  const allCurves = getAllCurves();
  const hasSavedBudget = savedBudgetTargets.some(v => v > 0);
  const overviewRecommendations = buildRecommendationsForRecord(getProp().name, getCurrentCommunityRecord());
  const recommendationsPanel = renderRecommendationsCard(
    overviewRecommendations,
    "Recommendations & Focus Areas",
    "Centralized observations from traffic, renewal exposure, and current occupancy pacing so the team has one place to work from."
  );

  // ── Weekly pace alerts ──────────────────────────────────────────────────────
  const cm = monthlyData[currentMonth] ?? {};
  const weeksElapsed = Math.max(1, Math.min(4, Math.ceil(new Date().getDate() / 7)));
  const weeksLeft    = Math.max(1, 4 - weeksElapsed + 1);
  const leasesNeeded  = currentRow.grossLeases ?? 0;
  const leasedSoFar   = cm.leasesSignedActual ?? 0;
  const leasesRemain  = Math.max(leasesNeeded - leasedSoFar, 0);
  const weeklyPace    = leasedSoFar > 0 ? (leasedSoFar / weeksElapsed).toFixed(1) : "0";
  const weeklyTarget  = weeksLeft > 0 ? Math.ceil(leasesRemain / weeksLeft) : 0;
  const paceRatio     = leasesNeeded > 0 ? leasedSoFar / leasesNeeded : 0;
  const gcSoFar       = cm.guestCards ?? 0;
  const gcNeeded      = currentRow.guestCardsNeeded ?? 0;
  const gcPace        = gcSoFar > 0 ? (gcSoFar / weeksElapsed).toFixed(1) : "0";
  const gcWeeklyNeeded = gcNeeded > 0 ? Math.ceil((gcNeeded - gcSoFar) / weeksLeft) : 0;

  // Velocity: projected month-end leases based on current pace
  const projectedMonthEndLeases = parseFloat(weeklyPace) * 4;
  const velocityStatus = projectedMonthEndLeases >= leasesNeeded ? "on-pace" : projectedMonthEndLeases >= leasesNeeded * 0.75 ? "warn" : "behind";

  let alertBanners = "";
  if (totalUnits > 0 && leasesNeeded > 0) {
    if (paceRatio >= 1) {
      alertBanners += `<div class="alert-banner alert-good"><div class="alert-icon">✅</div><div class="alert-body"><div class="alert-title">On Track — ${MONTHS[currentMonth]} Leasing Goal Met</div><div class="alert-detail">${leasedSoFar} leases signed vs. ${leasesNeeded} goal · Pace: ${weeklyPace}/wk</div></div></div>`;
    } else if (paceRatio >= 0.6) {
      alertBanners += `<div class="alert-banner alert-warn"><div class="alert-icon">⚠️</div><div class="alert-body"><div class="alert-title">Pace Alert — Need ${weeklyTarget} Leases/Week to Hit Goal</div><div class="alert-detail">${leasedSoFar}/${leasesNeeded} leases · ${leasesRemain} remaining over ~${weeksLeft} week(s) · Current pace: ${weeklyPace}/wk</div></div></div>`;
    } else {
      alertBanners += `<div class="alert-banner alert-crit"><div class="alert-icon">🚨</div><div class="alert-body"><div class="alert-title">Behind Pace — ${leasesRemain} Leases Needed in ${weeksLeft} Week(s)</div><div class="alert-detail">${leasedSoFar}/${leasesNeeded} leases · Need ${weeklyTarget}/wk · Current pace: ${weeklyPace}/wk</div></div></div>`;
    }
    if (gcSoFar < gcNeeded * 0.5 && weeksElapsed >= 2) {
      alertBanners += `<div class="alert-banner alert-warn"><div class="alert-icon">📋</div><div class="alert-body"><div class="alert-title">Lead Volume Low — ${gcSoFar}/${gcNeeded} Guest Cards</div><div class="alert-detail">Need ${gcWeeklyNeeded} new leads/week · Current pace: ${gcPace}/wk · Insufficient leads will limit lease velocity</div></div></div>`;
    }
    // Leased % vs budgetLeased check
    if (upcomingBudgetLeased > 0 && lCPct < upcomingBudgetLeased - 1) {
      alertBanners += `<div class="alert-banner alert-warn"><div class="alert-icon">📊</div><div class="alert-body"><div class="alert-title">Leased % Below Upcoming Budget Target (${lCPct.toFixed(1)}% vs ${upcomingBudgetLeased.toFixed(1)}% goal)</div><div class="alert-detail">Need ${Math.max(upcomingBudgetLeasedUnits - currentLeased, 0)} more leased units to hit ${MONTHS[nextMonth]}'s leased budget</div></div></div>`;
    }
  }

  // ── NER / Rent roll section ─────────────────────────────────────────────────
  const cmMR       = cm.marketRent    ?? 0;
  const cmPFRent   = cm.proformaRent  ?? 0;
  const cmRRTotal  = cm.rentRollTotal ?? 0;
  // nerActual: if a total rent roll $ is entered, derive per-unit NER from it;
  // otherwise fall back to the manually entered per-unit value
  const cmNER = cmRRTotal > 0 && currentOccupied > 0
    ? cmRRTotal / currentOccupied
    : (cm.nerActual ?? 0);

  // Calculations
  const rrVsMarket     = cmNER > 0 && cmMR > 0 ? cmNER - cmMR : null;
  const rrVsBudgetRent = cmNER > 0 && cmPFRent > 0 ? cmNER - cmPFRent : null;
  const marketVsBudgetRent = cmPFRent > 0 && cmMR > 0 ? cmMR - cmPFRent : null;

  const varSpan = (val, prefix="$") => val === null ? `<span style="color:var(--muted)">—</span>`
    : `<strong style="color:${val>=0?"#3fb950":"#f85149"}">${val>=0?"▲":"▼"}${prefix}${Math.abs(val).toFixed(2)}</strong>`;

  const nerSection = `<div class="card mb4">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">💰 NER &amp; Rent Roll Comparison — ${MONTHS[currentMonth]}</div>
      <div style="font-size:0.68rem;color:var(--muted)">Rent Roll = actual in-place · Market vs Budget tracks pricing gap</div>
    </div>

    <div class="ner-grid">
      <div style="background:var(--bg3);border:1px solid rgba(68,147,248,0.3);border-radius:8px;padding:12px">
        <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:#4493f8;font-weight:700;margin-bottom:8px">📊 Market vs Budget Rent</div>
        <div class="label">Avg Market Rent ($)</div>
        ${numInp("marketRent", cmMR, `data-idx="${currentMonth}"`, 0, 9999999)}
        <div class="label">Budget Rent ($)</div>
        ${numInp("proformaRent", cmPFRent, `data-idx="${currentMonth}"`, 0, 9999999)}
        <div style="margin-top:8px;font-size:0.7rem;color:var(--muted)">
          Market vs Budget Rent: ${varSpan(marketVsBudgetRent)}
        </div>
      </div>

      <div style="background:var(--bg3);border:1px solid rgba(63,185,80,0.3);border-radius:8px;padding:12px">
        <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:#3fb950;font-weight:700;margin-bottom:8px">🏠 Rent Roll (Actual)</div>

        <div class="label">Total Rent Roll ($) <span style="font-size:0.62rem;color:var(--muted);font-weight:400">— enter total collected</span></div>
        ${numInp("rentRollTotal", cmRRTotal, `data-idx="${currentMonth}"`, 0, 99999999)}
        <div style="font-size:0.68rem;color:var(--muted);margin-top:3px">
          ${currentOccupied > 0
            ? `÷ ${currentOccupied} occupied units`
            : `<span style="color:#f85149">Enter occupied units on Overview first</span>`}
        </div>

        <div style="margin-top:10px;padding:8px;background:var(--bg2);border-radius:6px;border:1px solid rgba(63,185,80,0.2)">
          <div style="font-size:0.65rem;color:var(--muted);margin-bottom:2px">Avg NER per unit</div>
          <div style="font-size:1.3rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:#3fb950">
            ${cmNER > 0 ? "$"+cmNER.toFixed(2) : "—"}
          </div>
          ${cmRRTotal > 0 && currentOccupied > 0
            ? `<div style="font-size:0.62rem;color:var(--muted);margin-top:2px">$${cmRRTotal.toLocaleString()} ÷ ${currentOccupied} units</div>`
            : cmRRTotal === 0
              ? `<div style="font-size:0.62rem;color:var(--muted);margin-top:2px">Or enter per-unit NER manually below</div>`
              : ""}
        </div>

        <div class="label" style="margin-top:8px">Per-Unit NER override ($) <span style="font-size:0.62rem;color:var(--muted);font-weight:400">— used if no total entered</span></div>
        ${numInp("nerActual", cm.nerActual ?? 0, `data-idx="${currentMonth}"`, 0, 9999999)}

        <div style="margin-top:8px;font-size:0.7rem;color:var(--muted)">
          vs Market: ${varSpan(rrVsMarket)}
          ${rrVsBudgetRent !== null ? `&nbsp;·&nbsp; vs Budget Rent: ${varSpan(rrVsBudgetRent)}` : ""}
        </div>
      </div>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:16px;padding:10px;background:var(--bg3);border-radius:8px;font-size:0.75rem;align-items:center">
      <span style="color:var(--muted)">Summary:</span>
      ${cmMR > 0 ? `<span>Market: <strong style="color:#4493f8">$${cmMR.toFixed(2)}</strong></span>` : ""}
      ${cmPFRent > 0 ? `<span>Budget Rent: <strong style="color:#a371f7">$${cmPFRent.toFixed(2)}</strong></span>` : ""}
      ${cmNER > 0 ? `<span>Rent Roll NER: <strong style="color:#3fb950">$${cmNER.toFixed(2)}</strong>${cmRRTotal > 0 ? ` <span style="font-size:0.62rem;color:var(--muted)">(from total)</span>` : ""}</span>` : ""}
      ${rrVsMarket !== null ? `<span>RR vs Market: ${varSpan(rrVsMarket)}</span>` : ""}
      ${rrVsBudgetRent !== null ? `<span>RR vs Budget Rent: ${varSpan(rrVsBudgetRent)}</span>` : ""}
      ${cmRRTotal > 0 ? `<span>Total Rent Roll: <strong style="color:#3fb950">$${cmRRTotal.toLocaleString(undefined,{maximumFractionDigits:0})}</strong></span>` : ""}
      ${cmNER > 0 && currentOccupied > 0 ? `<span>Est. Monthly Revenue: <strong style="color:#d29922">$${(cmNER * currentOccupied).toLocaleString(undefined,{maximumFractionDigits:0})}</strong></span>` : ""}
    </div>
  </div>`;

  // Curve buttons
  const curveBtns = CURVES.filter(c => c.key !== "budget").map(c =>
    `<button class="curve-btn${activeCurve===c.key?" active-curve":""}" style="background:${c.color}" onclick="applyAutoFill('${c.key}')" ${totalUnits===0?"disabled":""}>${c.label}${activeCurve===c.key?" ✓":""}</button>`
  ).join('');

  // Inputs grid
  const inputsGrid = `
  <div class="grid-4">
    <div class="card">
      <div class="label">Occupied Units <span style="color:var(--muted);font-weight:400;font-size:0.72rem">(# of units)</span></div>
      ${numInp("currentOccupied", currentOccupied)}
      <div class="inp-pct">${oCPct.toFixed(1)}% occupied</div>
      ${pctBar(oCPct, occupancyGoal, "#4493f8")}
    </div>
    <div class="card">
      <div class="label">Leased Units <span style="color:var(--muted);font-weight:400;font-size:0.72rem">(# of units)</span></div>
      ${numInp("currentLeased", currentLeased)}
      <div class="inp-pct" style="color:#a371f7">${lCPct.toFixed(1)}% leased</div>
      ${pctBar(lCPct, leasedGoal, "#a371f7")}
      ${upcomingBudgetLeased > 0 ? `<div class="pct-goal" style="color:${lCPct>=upcomingBudgetLeased?"#3fb950":"#f85149"}">${MONTHS[nextMonth]} Budget Leased: ${upcomingBudgetLeased.toFixed(1)}% (${upcomingBudgetLeasedUnits} units) ${lCPct>=upcomingBudgetLeased?"✓":"← need "+Math.max(upcomingBudgetLeasedUnits-currentLeased,0)+" more"}</div>` : ""}
    </div>
    <div class="card">
      <div class="label">Occupancy Goal %</div>
      ${numInp("occupancyGoal", occupancyGoal, "", 1, 100)}
      <div class="pct-goal">= ${occGoalUnits} units</div>
    </div>
    <div class="card">
      <div class="label">Leased % Goal</div>
      ${numInp("leasedGoal", leasedGoal, "", 1, 100)}
      <div class="pct-goal">= ${leasedGoalUnits} units</div>
    </div>
  </div>
  <div class="grid-4">
    <div class="card">
      <div class="label">Blended Conversion Rate %</div>
      ${numInp("conversionRate", conversionRate, "", 1, 100)}
      <div class="pct-goal">${autoCalcConvRate() !== conversionRate ? `<span style="color:#4493f8;cursor:pointer" onclick="conversionRate=${autoCalcConvRate()};renderTab()">Blend: ${autoCalcConvRate()}% ← click to apply</span>` : "Tour→App + App→Lease + historical trend blend"}</div>
    </div>
    <div class="card">
      <div class="label">Current Month</div>
      <select data-field="currentMonth">
        ${MONTHS.map((m,i) => `<option value="${i}" ${i===currentMonth?"selected":""}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="card" style="border-color:rgba(248,81,73,0.4);background:rgba(248,81,73,0.05)">
      <div class="label" style="color:#f85149">📋 Move-Outs Next 30 Days</div>
      <div class="value" style="font-size:1.5rem;font-weight:700;color:#fca5a5">${upcomingMoveOuts30}</div>
      <div class="sub">Leased after: ${leasedAfter30} (${totalUnits>0?(leasedAfter30/totalUnits*100).toFixed(1):"—"}%)</div>
    </div>
    <div class="card" style="border-color:rgba(45,212,191,0.4);background:rgba(45,212,191,0.05)">
      <div class="label" style="color:#2dd4bf">🔑 Move-Ins This Month</div>
      <div class="value" style="font-size:1.5rem;font-weight:700;color:#5eead4">${upcomingMoveIns30}</div>
      <div class="sub">Occ after move-ins: ${exposureAfter30} (${totalUnits>0?(exposureAfter30/totalUnits*100).toFixed(1):"—"}%)</div>
    </div>
  </div>`;

  // Exposure panel
  let exposurePanel = "";
  if ((upcomingMoveOuts30 > 0 || upcomingMoveOuts60 > 0) && totalUnits > 0) {
    exposurePanel = `<div class="exposure-panel mb4">
      <div class="expo-item"><div class="expo-label" style="color:#f87171">Occ After 30-Day Move-Outs</div><div class="expo-val" style="color:#fca5a5">${(exposureAfter30/totalUnits*100).toFixed(1)}%</div></div>
      <div class="expo-item"><div class="expo-label" style="color:#fb923c">Occ After 60-Day Move-Outs</div><div class="expo-val" style="color:#fdba74">${(exposureAfter60/totalUnits*100).toFixed(1)}%</div></div>
      <div class="expo-item"><div class="expo-label" style="color:#f87171">Leases to Recover (30-Day)</div><div class="expo-val" style="color:#fca5a5">${Math.max(occGoalUnits-leasedAfter30,0)}</div></div>
      <div class="expo-item"><div class="expo-label" style="color:#fb923c">Leases to Recover (60-Day)</div><div class="expo-val" style="color:#fdba74">${Math.max(occGoalUnits-leasedAfter60,0)}</div></div>
    </div>`;
  }

  // Stats row — Budget Occ pulls from saved budget for CURRENT month (falls back to entered budgetOcc),
  //             Budget Leased pulls from saved budget for NEXT month (falls back to next month budgetOcc)
  const savedBudgetOcc    = savedBudgetTargets[currentMonth] > 0
    ? savedBudgetTargets[currentMonth]
    : (monthlyData[currentMonth]?.budgetOcc ?? 0);
  const savedBudgetLeased = nextRow.budgetLeased ?? 0;
  const savedBudgetOccUnits    = totalUnits > 0 && savedBudgetOcc > 0 ? Math.ceil(totalUnits * savedBudgetOcc / 100) : 0;
  const savedBudgetLeasedUnits = totalUnits > 0 && savedBudgetLeased > 0 ? Math.ceil(totalUnits * savedBudgetLeased / 100) : 0;
  const onTrackOcc    = savedBudgetOcc > 0 && oCPct >= savedBudgetOcc;
  const onTrackLeased = savedBudgetLeased > 0 && lCPct >= savedBudgetLeased;
  const occGapUnits = savedBudgetOcc > 0 ? savedBudgetOccUnits - currentOccupied : 0;
  const leasedGapUnits = savedBudgetLeased > 0 ? savedBudgetLeasedUnits - currentLeased : 0;
  const budgetOccSource    = savedBudgetTargets[currentMonth] > 0 ? "saved budget" : "schedule entry";
  const budgetLeasedSource = savedBudgetTargets[nextMonth] > 0 ? "saved budget" : "schedule entry";
  const stabilizationValue = stabilization.months === 0
    ? "0 mo"
    : stabilization.months === null
      ? "Stalled"
      : `${stabilization.months} mo`;
  const stabilizationSub = stabilization.months === 0
    ? `95% reached at ${stabilization.targetUnits} units`
    : stabilization.months === null
      ? `${stabilization.reason} · Avg net absorption ${stabilization.avgNetAbsorption.toFixed(1)}/mo`
      : `${stabilization.reason} · Avg net absorption ${stabilization.avgNetAbsorption.toFixed(1)}/mo`;
  const statsRow = `<div class="grid-4 mb4">
    ${statBox("Budget Occ % Goal", savedBudgetOcc>0?`${savedBudgetOcc.toFixed(1)}%`:"Not Set", savedBudgetOcc>0?`${formatGoalGapLabel(occGapUnits, onTrackOcc)} <span style="font-size:0.6rem;opacity:0.6">(${budgetOccSource})</span>`:"Enter budget occ % in schedule below", onTrackOcc&&savedBudgetOcc>0?"#4ade80":"#d29922")}
    ${statBox(`Budget Leased % Goal <span style="font-size:0.6rem;color:var(--muted);font-weight:400">(${MONTHS[nextMonth]})</span>`, savedBudgetLeased>0?`${savedBudgetLeased.toFixed(1)}%`:"Not Set", savedBudgetLeased>0?`${formatGoalGapLabel(leasedGapUnits, onTrackLeased)} <span style="font-size:0.6rem;opacity:0.6">(${budgetLeasedSource})</span>`:"Enter budget occ % in schedule below", onTrackLeased&&savedBudgetLeased>0?"#a371f7":"#f85149")}
    ${statBox("Units to Leased Goal", totalUnits>0?Math.max(leasedGoalUnits-currentLeased,0):"—", `${leasedGoalUnits} units at ${leasedGoal}%`, "#a371f7")}
    ${statBox("Months to Stabilization", totalUnits>0?stabilizationValue:"—", stabilizationSub, stabilization.months === null ? "#f85149" : stabilization.months <= 3 ? "#3fb950" : "#d29922")}
  </div>`;

  const absorptionCells = ["Q1","Q2","Q3","Q4"].map(q => {
    const total = quarterlyAbsorption[q];
    const color = total > 0 ? "#3fb950" : total < 0 ? "#f85149" : "#d29922";
    const bg = total > 0 ? "rgba(63,185,80,0.06)" : total < 0 ? "rgba(248,81,73,0.06)" : "rgba(210,153,34,0.06)";
    return `<div class="season-cell" style="background:${bg};border-color:${q===bonusQuarter?"rgba(68,147,248,0.45)":"var(--border)"}">
      <div class="season-cell-label">${q} Absorption ${q===bonusQuarter?`<span style="color:#4493f8">● Bonus Quarter</span>`:""}</div>
      <div style="font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:${color}">${total > 0 ? "+" : ""}${total}</div>
      <div style="font-size:0.68rem;color:var(--muted);margin-top:4px">Move-ins minus move-outs from manual monthly entries</div>
    </div>`;
  }).join('');

  const absorptionPanel = `<div class="card mb4">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <div>
        <h2 style="font-size:0.9rem;font-weight:600">Positive / Negative Absorption</h2>
        <p style="font-size:0.72rem;color:var(--muted);margin-top:2px">Quarterly rollup of manual move-ins minus move-outs. These totals sync directly into matching Absorption bonus metrics.</p>
      </div>
    </div>
    <div class="season-grid">${absorptionCells}</div>
  </div>`;

  // Chart
  const CHART_H = 220;
  const scale = pct => Math.min((pct/100)*CHART_H, CHART_H);

  const gridLines = [0,20,40,60,80,100].map(v =>
    `<div class="chart-grid-line" style="bottom:${(v/100)*CHART_H}px"></div>`
  ).join('');

  const goalLine = totalUnits > 0 ? `<div class="chart-goal-line" style="bottom:${scale(occupancyGoal)}px"><span class="chart-goal-label">Goal: ${occupancyGoal}%</span></div>` : "";
  const budgetLine = currentMonthBudgetOcc > 0 && totalUnits > 0 ?
    `<div style="position:absolute;left:0;right:0;border-top:2px dashed rgba(210,153,34,0.6);z-index:5;bottom:${scale(currentMonthBudgetOcc)}px"><span style="position:absolute;right:0;top:-16px;font-size:0.62rem;color:#d29922;background:var(--bg2);padding:0 3px;border-radius:3px">${MONTHS[currentMonth]}: ${currentMonthBudgetOcc}%</span></div>` : "";

  // SVG curves
  const leasedTrendSeries = getLeasedTrendPctSeries();
  const leasedTrendPts = leasedTrendSeries
    .map((value, i) => value !== null ? { x:i, y:value } : null)
    .filter(Boolean);

  const leasedTrendLine = leasedTrendPts.length >= 2
    ? (() => {
      const bwPct = 100/12;
      const pointsStr = leasedTrendPts.map(p => `${(p.x/12*100)+bwPct/2}%,${CHART_H-scale(p.y)}`).join(" ");
      const circles = leasedTrendPts.map(p => `<circle cx="${(p.x/12*100)+bwPct/2}%" cy="${CHART_H-scale(p.y)}" r="3" fill="#a371f7"/>`).join('');
      return `<polyline fill="none" stroke="#a371f7" stroke-width="2.5" points="${pointsStr}" vector-effect="non-scaling-stroke"/>${circles}`;
    })()
    : "";

  const svgCurves = CURVES.map(c => {
    if (!visibleCurves[c.key]) return "";
    const pts = allCurves[c.key].map((v,i) => v!==null?{x:i,y:v}:null).filter(Boolean);
    if (pts.length < 2) return "";
    const bwPct = 100/12;
    const pointsStr = pts.map(p => `${(p.x/12*100)+bwPct/2}%,${CHART_H-scale(p.y)}`).join(" ");
    const circles = pts.map(p =>
      `<circle cx="${(p.x/12*100)+bwPct/2}%" cy="${CHART_H-scale(p.y)}" r="3" fill="${c.lineColor}"/>`
    ).join('');
    return `<polyline fill="none" stroke="${c.lineColor}" stroke-width="2" ${c.key!=="budget"?'stroke-dasharray="4,3"':''} points="${pointsStr}" vector-effect="non-scaling-stroke"/>${circles}`;
  }).join('') + leasedTrendLine;

  // Bar columns
  const barCols = schedule.map((row, i) => {
    const isPast = i < currentMonth, isCurrent = i === currentMonth;
    const budgetPct = monthlyData[i].budgetOcc;
    const occPct = isPast ? currentOccPct() : row.occPct;
    const ahead = budgetPct > 0 && occPct >= budgetPct;
    const behind = budgetPct > 0 && occPct < budgetPct;
    let barClass = isPast ? "bar bar-phys-past" : isCurrent ? "bar bar-phys-now" : ahead ? "bar bar-phys-ahead" : behind ? "bar bar-phys-behind" : "bar bar-phys-future";

    const vsbudget = budgetPct > 0 ? occPct - budgetPct : null;

    // Tooltip content
    const curveTooltipLines = CURVES.filter(c => visibleCurves[c.key] && allCurves[c.key][i] !== null).map(c =>
      `<div style="color:${c.lineColor}">${c.label.replace(/[^\w\s]/g,'').trim()}: ${allCurves[c.key][i]?.toFixed(1)}%</div>`
    ).join('');

    const tooltip = `<div class="chart-tooltip">
      <div class="chart-tooltip-title">${row.month}${isCurrent?" (Now)":""}</div>
      <div style="color:#4493f8">Physical: ${occPct.toFixed(1)}%</div>
      ${budgetPct>0?`<div style="color:#d29922">Budget: ${budgetPct}%</div>`:""}
      ${curveTooltipLines}
      <div style="color:var(--muted);margin-top:3px">Move-Outs: ${monthlyData[i].moveOuts}</div>
    </div>`;

    return `<div class="chart-col">
      ${tooltip}
      <div class="chart-bars-inner" style="height:${CHART_H}px;align-items:flex-end;padding-bottom:0">
        ${budgetPct>0?`<div class="bar bar-budget" style="height:${scale(budgetPct)}px"></div>`:""}
        <div class="${barClass}" style="height:${scale(occPct)}px"></div>
      </div>
      <span class="chart-month-label${isCurrent?" now":""}">${row.month}</span>
      ${!isPast&&budgetPct>0?`<span class="chart-delta" style="color:${ahead?"#3fb950":"#f85149"}">${ahead?"▲":"▼"}${Math.abs(occPct-budgetPct).toFixed(0)}%</span>`:""}
    </div>`;
  }).join('');

  // Curve toggle buttons
  const curveToggles = CURVES.map(c =>
    `<button class="curve-toggle${visibleCurves[c.key]?" on":""}" style="${visibleCurves[c.key]?`border-color:${c.lineColor};color:${c.lineColor}`:"color:var(--muted)"}" onclick="toggleCurve('${c.key}')">${c.label}${visibleCurves[c.key]?" ✓":""}</button>`
  ).join('');

  // Legend
  const legend = `<div class="chart-legend">
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(210,153,34,0.25);border:1px solid rgba(210,153,34,0.5)"></div>Budget %</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(68,147,248,0.8);border:1px solid #4493f8"></div>Physical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(63,185,80,0.7);border:1px solid #3fb950"></div>Ahead</div>
    <div class="legend-item"><div class="legend-swatch" style="background:rgba(248,81,73,0.7);border:1px solid #f85149"></div>Behind</div>
    <div class="legend-item"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="#a371f7" stroke-width="2.5"/></svg><span style="color:#a371f7">Leased % Trend</span></div>
    ${CURVES.filter(c=>visibleCurves[c.key]).map(c=>`<div class="legend-item"><svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="${c.lineColor}" stroke-width="2" ${c.key!=="budget"?'stroke-dasharray="4,3"':''}/></svg><span style="color:${c.lineColor}">${c.label}</span></div>`).join('')}
  </div>`;

  const chart = `<div class="chart-card mb4">
    <div class="chart-header">
      <div><h2>Budget vs. Physical Occupancy</h2><p>Curves are seasonally weighted.</p></div>
      <div class="curve-toggles">${curveToggles}</div>
    </div>
    <div class="chart-area">
      <div class="chart-yaxis">${[100,80,60,40,20,0].map(v=>`<span>${v}%</span>`).join('')}</div>
      <div class="chart-body">
        ${gridLines}${goalLine}${budgetLine}
        <svg class="chart-svg" style="height:${CHART_H}px" preserveAspectRatio="none">${svgCurves}</svg>
        <div class="chart-bars" style="height:${CHART_H}px">${barCols}</div>
      </div>
    </div>
    ${legend}
  </div>`;

  // Pre-simulate rolling leased % for each future month based on current leased + move-ins/move-outs
  const rollingLeasedPct = leasedTrendSeries;

  // Schedule table
  const tableRows = schedule.map((row, i) => {
    const isPast = i < currentMonth, isCurrent = i === currentMonth;
    const budgetPct = monthlyData[i].budgetOcc ?? 0, savedPct = savedBudgetTargets[i];
    const occPct = isPast ? currentOccPct() : row.occPct;
    const vsbudget = budgetPct > 0 ? occPct - budgetPct : null;
    const atOcc = !isPast && row.occPct >= occupancyGoal;
    const thisRollingLeased = rollingLeasedPct[i];
    const vsLeasedBudget = savedPct > 0 && thisRollingLeased !== null ? thisRollingLeased - savedPct : null;

    return `<tr class="${isPast?"past":isCurrent?"current-row":""}">
      <td class="l">${row.month}${isCurrent?`<span class="now-badge">Now</span>`:""}</td>
      <td>${isPast?`<span style="color:var(--muted)">${row.moveOuts}</span>`:`${monthInpField(i,"moveOuts",monthlyData[i].moveOuts??0)}`}</td>
      <td>${isPast?`<span style="color:#2dd4bf;font-size:0.7rem">${row.moveIns}</span>`:`${monthInpField(i,"moveIns",monthlyData[i].moveIns??0)}`}</td>
      <td>${isPast?`<span style="color:var(--muted)">${budgetPct}%</span>`:`<div style="display:flex;align-items:center;justify-content:center;gap:3px">${monthInpField(i,"budgetOcc",budgetPct)}<span style="color:var(--muted);font-size:0.7rem">%</span></div>`}</td>
      <td>${thisRollingLeased !== null ? `<div><span style="font-weight:700;color:${thisRollingLeased>=(leasedGoal)?"#a371f7":thisRollingLeased>=90?"#3fb950":thisRollingLeased>=85?"#d29922":"#f85149"}">${thisRollingLeased.toFixed(1)}%</span>${vsLeasedBudget!==null?`<div class="goal-sub" style="color:${vsLeasedBudget>=0?"#3fb950":"#f85149"}">${vsLeasedBudget>=0?"▲":"▼"}${Math.abs(vsLeasedBudget).toFixed(1)}% vs saved</div>`:""}</div>` : `<span style="color:var(--border)">—</span>`}</td>
      <td>${savedPct>0?`<span style="color:#4ade80;font-weight:600">${savedPct.toFixed(1)}%</span>${!isPast?`<div class="goal-sub" style="color:${budgetPct-savedPct>=0?"#4493f8":"#fb923c"}">${budgetPct-savedPct>=0?"▲":"▼"}${Math.abs(budgetPct-savedPct).toFixed(1)}%</div>`:""}`:`<span style="color:var(--border)">—</span>`}</td>
      <td><span style="font-size:0.72rem;font-weight:700;color:${(seasonal[i]??1)>=1.0?"#3fb950":(seasonal[i]??1)>=0.8?"#d29922":"#f85149"}">${(seasonal[i]??1).toFixed(2)}x</span></td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<span style="color:#d29922;font-weight:700">${row.netOccLeases}</span>`}</td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<span style="color:#fb923c;font-weight:700">${row.grossLeases}</span>`}</td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<span style="color:#3fb950;font-weight:700">${row.apps}</span>`}</td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<span style="color:#4493f8;font-weight:700">${row.toursNeeded}</span>`}</td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<span style="color:#a371f7;font-weight:700">${row.guestCardsNeeded}</span>`}</td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<div><span style="font-weight:700;color:${atOcc?"#4493f8":row.occPct>80?"#d29922":"#f85149"}">${row.occPct.toFixed(1)}%</span>${vsbudget!==null?`<div class="goal-sub" style="color:${vsbudget>=0?"#3fb950":"#f85149"}">${vsbudget>=0?"▲":"▼"}${Math.abs(vsbudget).toFixed(1)}%</div>`:""}</div>`}</td>
      <td>${isPast?`<span style="color:var(--muted)">—</span>`:`<span style="font-weight:700;color:${row.leasedPct>=leasedGoal?"#a371f7":row.leasedPct>80?"#d29922":"#f85149"}">${row.leasedPct.toFixed(1)}%</span>`}</td>
    </tr>`;
  }).join('');

  const scheduleTable = `<div class="tbl-wrap mb4">
    <div class="tbl-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h2>Monthly Leasing Schedule</h2>
      <button class="btn btn-blue btn-sm" onclick="autoPopulateLeasingPace();renderTab()" ${savedBudgetTargets.some(v=>v>0)?"":' disabled title="Save a budget curve first"'}>⚡ Auto-Populate Pace to Budget</button>
    </div>
    <table>
      <thead><tr>
        <th class="l">Month</th>
        <th class="c">Move-Outs</th>
        <th class="c">Move-Ins</th>
        <th class="c">Leasing Pace % Target</th>
        <th class="c">Current Leased %</th>
        <th class="c">Saved Budget</th>
        <th class="c">Season</th>
        <th class="c">Net Occ</th>
        <th class="c">Gross Leases</th>
        <th class="c">Apps</th>
        <th class="c">Tours</th>
        <th class="c">Guest Cards</th>
        <th class="c">Occ %</th>
        <th class="c">Leased %</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
  </div>`;

  return `<div class="card mb4">
    <div class="card-title">Auto-Fill Budget Occ % — Seasonally Adjusted</div>
    <div class="curve-btns">${curveBtns}${hasSavedBudget ? `<button class="curve-btn${activeCurve==="budget"?" active-curve":""}" style="background:#1a3a2a;border:1.5px solid #4ade80;color:#4ade80" onclick="revertToBudget()">📋 Saved Budget${activeCurve==="budget"?" ✓":""}</button>` : `<button class="curve-btn" style="background:var(--bg3);border:1.5px solid var(--border);color:var(--muted)" disabled title="No saved budget yet — use Save as Budget Curve first">📋 Saved Budget</button>`}</div>
    <p style="font-size:0.68rem;color:var(--muted);margin-top:8px">All curves are weighted by the seasonal factors set in the Seasonality tab. Budget Occ % drives the Leased % target automatically.</p>
  </div>
  ${alertBanners}${recommendationsPanel}
  ${inputsGrid}${exposurePanel}${statsRow}${absorptionPanel}${nerSection}${chart}${scheduleTable}`;
}

// ─── Traffic Tab ──────────────────────────────────────────────────────────────
function renderTrafficTab() {
  const cm = monthlyData[currentMonth] ?? {};
  const schedule = computeSchedule();
  const currentRow = schedule[currentMonth] ?? {};
  const totalUnits = getTotalUnits();
  const applicationMetrics = getApplicationDecisionMetrics(cm);
  const tourRate = cm.guestCards > 0 ? (cm.tours / cm.guestCards) * 100 : 0;
  const appRate = cm.tours > 0 ? (applicationMetrics.applications / cm.tours) * 100 : 0;
  const closeRate = applicationMetrics.appToLeasePct;
  const overallRateBase = applicationMetrics.leases > 0 ? applicationMetrics.leases : applicationMetrics.approvals;
  const overallRate = cm.guestCards > 0 ? (overallRateBase / cm.guestCards) * 100 : 0;

  const tourConv    = cm.guestCards > 0 ? (cm.tours / cm.guestCards * 100).toFixed(0) + "%" : "—";
  const appConv     = cm.tours > 0 ? (applicationMetrics.applications / cm.tours * 100).toFixed(0) + "%" : "—";
  const approvalConv = applicationMetrics.applications > 0 ? (applicationMetrics.approvals / applicationMetrics.applications * 100).toFixed(0) + "%" : "—";
  const leaseConv   = applicationMetrics.applications > 0 ? (applicationMetrics.leases / applicationMetrics.applications * 100).toFixed(0) + "%" : "—";
  const approvalBreakout = applicationMetrics.applications > 0
    ? `${applicationMetrics.approvalPct.toFixed(0)}% / ${applicationMetrics.denialPct.toFixed(0)}%`
    : "—";

  const convGrid = `<div class="mb4" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
    ${[
      {label:"Guest Cards → Tour", val:tourConv, sub:`${cm.tours ?? 0} tours / ${cm.guestCards ?? 0} leads`, color:"#4493f8"},
      {label:"Tour → Application", val:appConv, sub:`${applicationMetrics.applications} apps / ${cm.tours ?? 0} tours`, color:"#a371f7"},
      {label:"Applications Approved", val:String(applicationMetrics.approvals), sub:`${applicationMetrics.approvals} approved out of ${applicationMetrics.applications} apps`, color:"#3fb950"},
      {label:"App → Lease", val:leaseConv, sub:`${applicationMetrics.leases} leases / ${applicationMetrics.applications} apps`, color:"#d29922"},
      {label:"Approval / Denial", val:approvalBreakout, sub:`${applicationMetrics.denials} denied applications`, color:"#fb923c"},
    ].map(s => statBox(s.label, s.val, s.sub, s.color)).join('')}
  </div>`;

  // ── Leasing Velocity / Pace ───────────────────────────────────────────────
  const weeksElapsed = Math.max(1, Math.min(4, Math.ceil(new Date().getDate() / 7)));
  const weeksLeft    = Math.max(1, 4 - weeksElapsed + 1);
  const leasesGoal   = currentRow.grossLeases ?? 0;
  const leasedActual = applicationMetrics.leases;
  const approvalsActual = applicationMetrics.approvals;
  const gcActual     = cm.guestCards ?? 0;
  const gcGoal       = currentRow.guestCardsNeeded ?? 0;
  const toursActual  = cm.tours ?? 0;
  const toursGoal    = currentRow.toursNeeded ?? 0;
  const appsActual   = applicationMetrics.applications;
  const appsGoal     = currentRow.apps ?? 0;
  const approvalsGoal = leasesGoal;

  const weeklyLeasePace  = (leasedActual / weeksElapsed).toFixed(1);
  const projectedLeases  = parseFloat(weeklyLeasePace) * 4;
  const projVsGoal       = leasesGoal > 0 ? projectedLeases - leasesGoal : 0;
  const weeklyGCPace     = (gcActual / weeksElapsed).toFixed(1);
  const neededPerWeekGC  = gcGoal > 0 ? Math.max(Math.ceil((gcGoal - gcActual) / weeksLeft), 0) : 0;
  const neededPerWeekL   = leasesGoal > 0 ? Math.max(Math.ceil((leasesGoal - leasedActual) / weeksLeft), 0) : 0;

  // Overall conversion projection: use the configured overall conversion rate as the only driver
  const overallConversionProjection = gcActual > 0 ? Math.round(gcActual * (conversionRate / 100)) : 0;
  const conversionProjectionPct = leasesGoal > 0 ? (overallConversionProjection / leasesGoal * 100) : 0;

  const velocityCard = `<div class="pace-card mb4">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <div>
        <h2 style="font-size:0.9rem;font-weight:600">📈 ${MONTHS[currentMonth]} Leasing Velocity</h2>
        <p style="font-size:0.72rem;color:var(--muted);margin-top:2px">Week ${weeksElapsed} of 4 · ${weeksLeft} week(s) remaining</p>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.68rem;color:var(--muted)">Pace-Based Projection <span style="color:var(--border)">·</span> extrapolates current signing rate</div>
        <div style="font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:${projVsGoal>=0?"#3fb950":"#f85149"}">${projectedLeases.toFixed(0)} leases</div>
        <div style="font-size:0.68rem;color:${projVsGoal>=0?"#3fb950":"#f85149"}">${projVsGoal>=0?"▲":"▼"} ${Math.abs(projVsGoal).toFixed(0)} vs goal of ${leasesGoal}</div>
        <div style="font-size:0.63rem;color:var(--muted);margin-top:2px">${leasedActual} signed ÷ ${weeksElapsed} wk × 4 wks</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div class="pace-label">Lease Pace: <strong style="color:#3fb950">${weeklyLeasePace}/wk</strong> · Need <strong style="color:#d29922">${neededPerWeekL}/wk</strong></div>
        <div class="pace-bar-wrap"><div class="pace-bar" style="width:${Math.min(leasedActual/Math.max(leasesGoal,1)*100,100)}%;background:#3fb950"></div></div>
        <div class="pace-label">${leasedActual} of ${leasesGoal} leases signed</div>
      </div>
      <div>
        <div class="pace-label">Lead Pace: <strong style="color:#4493f8">${weeklyGCPace}/wk</strong> · Need <strong style="color:#d29922">${neededPerWeekGC}/wk</strong></div>
        <div class="pace-bar-wrap"><div class="pace-bar" style="width:${Math.min(gcActual/Math.max(gcGoal,1)*100,100)}%;background:#4493f8"></div></div>
        <div class="pace-label">${gcActual} of ${gcGoal} guest cards</div>
      </div>
    </div>
    <div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:8px;font-size:0.72rem">
      <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:4px">Pipeline-Based Projection <span style="font-weight:400;text-transform:none;letter-spacing:0">— driven only by the Overall Conversion Rate %</span></div>
      <span style="color:var(--muted)">Overall Conversion Projection: </span>
      <strong style="color:${conversionProjectionPct>=100?"#3fb950":conversionProjectionPct>=70?"#d29922":"#f85149"}">${overallConversionProjection} leases</strong>
      <span style="color:var(--muted)"> from ${gcActual} leads × ${conversionRate}% overall conversion · </span>
      <strong style="color:${conversionProjectionPct>=100?"#3fb950":conversionProjectionPct>=70?"#d29922":"#f85149"}">${conversionProjectionPct.toFixed(0)}% of ${leasesGoal} goal</strong>
      <div style="font-size:0.63rem;color:var(--muted);margin-top:4px">This projection ignores intermediate lead-to-lease or app-to-lease ratios and uses only the configured conversion percentage. Applications approved are tracked separately below and do not overwrite lease totals.</div>
    </div>
    </div>
  </div>`;


  // ── Funnel bars ────────────────────────────────────────────────────────────
  // Move-in goal: units needed to physically reach the budget occupancy % this month.
  // Uses savedBudgetTargets first, falls back to the budgetOcc entered in the schedule row.
  const savedBudgetOccPct = savedBudgetTargets[currentMonth] > 0
    ? savedBudgetTargets[currentMonth]
    : (monthlyData[currentMonth]?.budgetOcc ?? 0);
  const savedBudgetOccUnits = totalUnits > 0 && savedBudgetOccPct > 0
    ? Math.ceil(totalUnits * savedBudgetOccPct / 100) : 0;
  const moveOutsThisMonth   = monthlyData[currentMonth]?.moveOuts ?? 0;
  const moveInGoal = savedBudgetOccUnits > 0
    ? Math.max(savedBudgetOccUnits - currentOccupied + moveOutsThisMonth, 0)
    : 0;

  const funnelItems = [
    {label:"Guest Cards / Leads", actual: gcActual,       goal: gcGoal,       color:"#4493f8"},
    {label:"Tours",               actual: toursActual,    goal: toursGoal,    color:"#a371f7"},
    {label:"Applications",        actual: appsActual,     goal: appsGoal,     color:"#db6d28"},
    {label:"Applications Approved", actual: approvalsActual, goal: approvalsGoal, color:"#3fb950"},
    {label:"Move-Ins",            actual: cm.moveIns??0,  goal: moveInGoal,   color:"#2dd4bf"},
  ];

  const funnelBars = funnelItems.map(f => {
    const pct = f.goal > 0 ? Math.min(f.actual/f.goal*100, 100) : 0;
    const ahead = f.actual >= f.goal;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:4px">
        <span style="color:var(--text);font-weight:500">${f.label}</span>
        <span style="color:${ahead?"#3fb950":"#d29922"}">${f.actual} / ${f.goal} ${ahead?"✓":`(${f.goal-f.actual} to go)`}</span>
      </div>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${pct}%;background:${f.color}"></div><span class="funnel-bar-pct">${pct.toFixed(0)}%</span></div>
    </div>`;
  }).join('');

  const funnelCard = `<div class="card mb4">
    <h2 style="font-size:0.9rem;font-weight:600;margin-bottom:4px">${MONTHS[currentMonth]} Leasing Funnel — Actual vs. Goal</h2>
    <p style="font-size:0.68rem;color:var(--muted);margin-bottom:14px">Move-In goal = units needed to reach ${savedBudgetOccPct > 0 ? `budget occ of ${savedBudgetOccPct.toFixed(1)}% (${savedBudgetOccUnits} units)` : "budget occ — enter a Leasing Pace % Target in the schedule on the Overview tab"}. Applications Approved is the pre-lease approval stage and lease pace still reads from signed lease data when present.</p>
    ${funnelBars}
  </div>`;

  // Table with move-ins column
  const tableRows = MONTHS.map((month, i) => {
    const isCurrent = i === currentMonth;
    const d = monthlyData[i] ?? {}, row = schedule[i];
    const decisionMetrics = getApplicationDecisionMetrics(d);
    const gcConv = d.guestCards > 0 ? (d.tours / d.guestCards * 100).toFixed(0) + "%" : "—";
    const tConv  = d.tours > 0 ? (decisionMetrics.applications / d.tours * 100).toFixed(0) + "%" : "—";
    const aConv  = decisionMetrics.applications > 0 ? (decisionMetrics.leases / decisionMetrics.applications * 100).toFixed(0) + "%" : "—";
    const approvalMix = decisionMetrics.applications > 0
      ? `${decisionMetrics.approvalPct.toFixed(0)}% / ${decisionMetrics.denialPct.toFixed(0)}%`
      : "—";
    const goals  = [row?.guestCardsNeeded, row?.toursNeeded, row?.apps, row?.grossLeases];
    const colors = ["#4493f8","#a371f7","#fb923c","#3fb950"];
    const fields = ["guestCards","tours","applications","applicationsApproved"];

    const fieldCells = fields.map((field, fi) => {
      const fieldValue = field === "applicationsApproved" ? getApplicationsApprovedCount(d) : (d[field] ?? 0);
      return `<td>${monthInpField(i, field, fieldValue)}${i>=currentMonth?`<div class="goal-sub" style="color:${colors[fi]}">Goal: ${goals[fi]??0}</div>`:""}</td>`;
    }).join('');

    // Move-ins target: units needed to reach budget occ % for this month
    // Uses savedBudgetTargets first, falls back to the budgetOcc entered in the schedule row
    const rowSavedBudgetPct = savedBudgetTargets[i] > 0
      ? savedBudgetTargets[i]
      : (monthlyData[i]?.budgetOcc ?? 0);
    const rowSavedBudgetUnits = totalUnits > 0 && rowSavedBudgetPct > 0
      ? Math.ceil(totalUnits * rowSavedBudgetPct / 100) : 0;
    const rowMoveOutsThisMonth = d.moveOuts ?? 0;
    const rowMoveInTarget = rowSavedBudgetUnits > 0
      ? Math.max(rowSavedBudgetUnits - currentOccupied + rowMoveOutsThisMonth, 0)
      : 0;
    const moveInCell = `<td>${monthInpField(i, "moveIns", d.moveIns??0)}${i>=currentMonth?`<div class="goal-sub" style="color:#2dd4bf">Target: ${rowMoveInTarget}</div>`:""}</td>`;

    return `<tr class="${i<currentMonth?"past":isCurrent?"current-row":""}">
      <td class="l">${month}${isCurrent?`<span class="now-badge">Now</span>`:""}</td>
      ${fieldCells}
      ${moveInCell}
      <td style="color:#7dd3fc;font-size:0.72rem">${gcConv}</td>
      <td style="color:#c4b5fd;font-size:0.72rem">${tConv}</td>
      <td style="color:#fdba74;font-size:0.72rem">${aConv}</td>
      <td style="color:#f59e0b;font-size:0.72rem">${approvalMix}</td>
    </tr>`;
  }).join('');

  const trafficTable = `<div class="tbl-wrap mb4">
    <div class="tbl-header"><h2>Monthly Traffic &amp; Funnel — Enter Actuals</h2><p>Enter actual traffic data each month. Goals auto-calculate from your leasing schedule.</p></div>
    <table>
      <thead><tr>
        <th class="l">Month</th>
        <th class="c">Guest Cards<br><span style="color:rgba(68,147,248,0.5)">Goal</span></th>
        <th class="c">Tours<br><span style="color:rgba(163,113,247,0.5)">Goal</span></th>
        <th class="c">Applications<br><span style="color:rgba(251,146,60,0.5)">Goal</span></th>
        <th class="c">Applications Approved<br><span style="color:rgba(63,185,80,0.5)">Goal</span></th>
        <th class="c">Move-Ins<br><span style="color:rgba(45,212,191,0.5)">Target</span></th>
        <th class="c">GC→Tour</th><th class="c">Tour→App</th><th class="c">App→Lease</th><th class="c">Approval / Denial</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
  </div>`;

  return convGrid + velocityCard + funnelCard + trafficTable;
}

function normalizeWorkbookNumber(value) {
  if (value === null || value === undefined || value === "") return 0;
  if (typeof value === "number") return Number.isFinite(value) ? value : 0;
  const normalized = String(value).replace(/[$,%(),]/g, "").trim();
  const parsed = Number(normalized);
  return Number.isFinite(parsed) ? parsed : 0;
}

function normalizeWorkbookPercent(value) {
  const parsed = normalizeWorkbookNumber(value);
  if (parsed <= 1 && parsed > 0) return parsed * 100;
  return parsed;
}

function findWorksheetRowValue(rows, patterns) {
  const matchers = Array.isArray(patterns) ? patterns : [patterns];
  for (const row of rows) {
    const firstCell = String(row?.[0] ?? "").trim();
    if (!firstCell) continue;
    if (!matchers.some(pattern => pattern.test(firstCell))) continue;
    const nextValue = row.slice(1).find(cell => cell !== null && cell !== undefined && cell !== "");
    if (nextValue !== undefined) return nextValue;
  }
  return null;
}

function extractRenewalSheetSummary(rows) {
  const expirations = normalizeWorkbookNumber(findWorksheetRowValue(rows, /total lease expirations/i));
  const renewalsSigned = normalizeWorkbookNumber(findWorksheetRowValue(rows, /renewals signed/i));
  const ntv = normalizeWorkbookNumber(findWorksheetRowValue(rows, /ntv'?s received/i));
  const transfers = normalizeWorkbookNumber(findWorksheetRowValue(rows, /^transfers$/i));
  const undecided = normalizeWorkbookNumber(findWorksheetRowValue(rows, /pending\s*\/\s*not yet decided/i));
  const retentionRate = normalizeWorkbookPercent(findWorksheetRowValue(rows, /retention rate.*total expirations/i));
  const decidedRetentionRate = normalizeWorkbookPercent(findWorksheetRowValue(rows, /retention rate.*renewals.*ntv/i));
  return { expirations, renewalsSigned, ntv, transfers, undecided, retentionRate, decidedRetentionRate };
}

function applyRenewalSummaryToMonth(monthIdx, summary) {
  if (!monthlyData[monthIdx]) monthlyData[monthIdx] = defaultMonthly()[monthIdx];
  monthlyData[monthIdx] = {
    ...monthlyData[monthIdx],
    renewalExpirations: summary.expirations,
    renewalSigned: summary.renewalsSigned,
    renewalNTV: summary.ntv,
    renewalTransfers: summary.transfers,
    renewalUndecided: summary.undecided
  };
}

async function handleRenewalWorkbook(file) {
  if (typeof XLSX === "undefined") {
    renewalImportLog.push("❌ Renewal workbook parser is unavailable because the XLSX library did not load.");
    return;
  }
  const workbook = XLSX.read(await file.arrayBuffer(), { type: "array" });
  let appliedMonths = 0;
  workbook.SheetNames.forEach(sheetName => {
    const monthIdx = parseMonthIndexValue(sheetName);
    if (monthIdx === null || monthIdx < 0 || monthIdx > 11) return;
    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, defval: "" });
    const summary = extractRenewalSheetSummary(rows);
    if ([summary.expirations, summary.renewalsSigned, summary.ntv, summary.transfers, summary.undecided].every(v => v === 0)) return;
    applyRenewalSummaryToMonth(monthIdx, summary);
    renewalImportLog.push(`✅ ${file.name} → ${MONTHS[monthIdx]} renewals mapped (${summary.expirations} expirations, ${summary.renewalsSigned} signed, ${summary.undecided} undecided).`);
    appliedMonths++;
  });
  if (appliedMonths === 0) {
    renewalImportLog.push(`⚠️ ${file.name} did not contain any month sheets the dashboard could map. Use month-named tabs like "Mar 2026" or update the summary labels.`);
  } else {
    renewalImportSourceLabel = file.name;
  }
}

async function handleRenewalCsv(file) {
  const text = await file.text();
  const lines = text.split(/\r?\n/).filter(line => line.trim());
  if (lines.length < 2) {
    renewalImportLog.push(`⚠️ ${file.name} looks empty.`);
    return;
  }
  const headers = lines[0].split(",").map(header => header.trim().toLowerCase().replace(/[^a-z0-9_]/g, "_"));
  const headerValue = (row, keys) => {
    for (const key of keys) {
      const idx = headers.indexOf(key);
      if (idx >= 0 && row[idx] !== undefined && row[idx] !== "") return row[idx];
    }
    return null;
  };
  let appliedMonths = 0;
  lines.slice(1).forEach(line => {
    const cols = line.split(",").map(value => value.trim().replace(/^"|"$/g, ""));
    const monthIdx = parseMonthIndexValue(headerValue(cols, ["month","period","sheet","reporting_month"]));
    if (monthIdx === null || monthIdx < 0 || monthIdx > 11) return;
    const summary = {
      expirations: normalizeWorkbookNumber(headerValue(cols, ["renewal_expirations","total_lease_expirations","expirations"])),
      renewalsSigned: normalizeWorkbookNumber(headerValue(cols, ["renewals_signed","renewal_signed","signed"])),
      ntv: normalizeWorkbookNumber(headerValue(cols, ["renewal_ntvs","ntvs","ntv_received"])),
      transfers: normalizeWorkbookNumber(headerValue(cols, ["renewal_transfers","transfers"])),
      undecided: normalizeWorkbookNumber(headerValue(cols, ["renewal_undecided","undecided","pending"])),
      retentionRate: normalizeWorkbookPercent(headerValue(cols, ["retention_rate"])),
      decidedRetentionRate: normalizeWorkbookPercent(headerValue(cols, ["decided_retention_rate"]))
    };
    applyRenewalSummaryToMonth(monthIdx, summary);
    appliedMonths++;
  });
  if (appliedMonths === 0) {
    renewalImportLog.push(`⚠️ ${file.name} did not contain recognizable renewal month rows.`);
  } else {
    renewalImportSourceLabel = file.name;
    renewalImportLog.push(`✅ ${file.name} → imported renewal summaries for ${appliedMonths} month(s).`);
  }
}

async function processRenewalFiles(files) {
  renewalImportLog = [];
  for (const file of files) {
    const lowerName = String(file.name || "").toLowerCase();
    if (lowerName.endsWith(".xlsx") || lowerName.endsWith(".xls") || lowerName.endsWith(".xlsm")) {
      await handleRenewalWorkbook(file);
    } else if (lowerName.endsWith(".csv")) {
      await handleRenewalCsv(file);
    } else {
      renewalImportLog.push(`⚠️ ${file.name} is not a supported renewal upload. Use XLSX or CSV.`);
    }
  }
  saveCommunityData(true);
  renderTab();
}

function updateCommission(field, val) {
  if (field === "totalAgents") {
    const totalAgents = Math.max(1, Number(val));
    const existingAgents = getCommissionAgents().map(agent => ({ ...agent }));
    while (existingAgents.length < totalAgents) existingAgents.push({ name: `Agent ${existingAgents.length + 1}` });
    commissionData.totalAgents = totalAgents;
    commissionData.agents = existingAgents.slice(0, totalAgents);
  }
  else if (field.startsWith("agentName_")) {
    const idx = Number(field.split("_")[1]);
    const agents = getCommissionAgents();
    if (agents[idx]) agents[idx].name = val;
  }
  else if (field === "baseTierCost") commissionData.baseTier.costPerLease = Number(val);
  else if (field === "bonusTierCost") commissionData.bonusTier.costPerLease = Number(val);
  else if (field === "appGoalOverride") commissionData.appGoalOverride = Math.max(0, Number(val));
  else if (field.startsWith("kicker_")) {
    const ki = parseInt(field.split("_")[1]);
    const newVal = Number(val);
    if (ki === 2) {
      // Changing the 100% App Goal payout — scale 50% and 75% proportionally
      const old100 = commissionData.appKickers[2].payout;
      commissionData.appKickers[2].payout = newVal;
      if (old100 > 0 && newVal > 0) {
        const ratio = newVal / old100;
        commissionData.appKickers[0].payout = Math.round(commissionData.appKickers[0].payout * ratio * 100) / 100;
        commissionData.appKickers[1].payout = Math.round(commissionData.appKickers[1].payout * ratio * 100) / 100;
      } else if (newVal > 0) {
        // Default proportions: 25%, 50%, 100%
        commissionData.appKickers[0].payout = Math.round(newVal * 0.25 * 100) / 100;
        commissionData.appKickers[1].payout = Math.round(newVal * 0.50 * 100) / 100;
      }
    } else {
      // Editing 50% or 75% individually — no cascade
      commissionData.appKickers[ki].payout = newVal;
    }
  } else if (field.startsWith("mpay_")) {
    const mi = parseInt(field.split("_")[1]);
    commissionData.monthlyPayouts[mi] = Number(val);
  }
  renderTab();
}

function getCurrentBudgetOccPct() {
  return savedBudgetTargets[currentMonth] > 0
    ? savedBudgetTargets[currentMonth]
    : (monthlyData[currentMonth]?.budgetOcc ?? 0);
}

function getCurrentBudgetLeasedPct() {
  const schedule = computeSchedule();
  const currentRow = schedule[currentMonth] ?? {};
  const nextRow = schedule[Math.min(currentMonth + 1, 11)] ?? {};
  return nextRow.budgetLeased ?? currentRow.budgetLeased ?? 0;
}

function getCurrentMoveInGoal() {
  const totalUnits = getTotalUnits();
  const savedBudgetOccPct = getCurrentBudgetOccPct();
  const savedBudgetOccUnits = totalUnits > 0 && savedBudgetOccPct > 0
    ? Math.ceil(totalUnits * savedBudgetOccPct / 100)
    : 0;
  const moveOutsThisMonth = monthlyData[currentMonth]?.moveOuts ?? 0;
  return savedBudgetOccUnits > 0
    ? Math.max(savedBudgetOccUnits - currentOccupied + moveOutsThisMonth, 0)
    : 0;
}

function getJacsAutoMetrics(role) {
  return getJacRoleScope(role).metrics;
}

function roundJacMetricValue(value, format) {
  const numVal = Number(value) || 0;
  if (format === "currencyDelta") return Math.round(numVal);
  if (format === "decimal") return Math.round(numVal * 100) / 100;
  if (format === "number") return Math.round(numVal * 10) / 10;
  return Math.round(numVal * 10) / 10;
}

function syncJacsTeamMetricsFromDashboard() {
  jacsTeamBonus.forEach(role => {
    const auto = getJacsAutoMetrics(role);
    role.metrics.forEach(metric => {
      if (metric.syncKey && Object.prototype.hasOwnProperty.call(auto, metric.syncKey)) {
        metric.actual = roundJacMetricValue(auto[metric.syncKey], metric.format);
      }
    });
  });
  persistOpsGlobalData();
}

function getMetricStatus(m) {
  const actual = m.actual ?? 0;
  const kThr = m.kickerThreshold;
  const pThr = m.partialThreshold;
  if (m.direction === "down") {
    if (actual <= m.goal)                              return "hit";
    if (m.partial && pThr != null && actual <= pThr)   return "partial";
    return "miss";
  }
  // direction "up" (default)
  if (kThr != null && actual >= kThr)                  return "kicker";
  if (actual >= m.goal)                                return "hit";
  if (m.partial && pThr != null && actual >= pThr)     return "partial";
  if (actual === 0 && m.goal === 0)                    return "miss";
  return "miss";
}

function calcRolePayout(role) {
  const annualBonus = role.salary * (role.bonusRate / 100);
  const quarterlyPotential = annualBonus / 4;
  let earned = 0;
  role.metrics.forEach(m => {
    const metricPayout = quarterlyPotential * (m.weight / 100);
    m.payout = metricPayout;
    const status = getMetricStatus(m);
    if      (status === "kicker")  earned += metricPayout * (m.kickerMultiplier ?? 1.5);
    else if (status === "hit")     earned += metricPayout;
    else if (status === "partial") earned += metricPayout * 0.5;
  });
  return { potential: quarterlyPotential, earned, missed: Math.max(0, quarterlyPotential - earned) };
}

function isMetricHit(m) {
  const s = getMetricStatus(m);
  return s === "hit" || s === "kicker";
}

function getEffectiveAppGoal() {
  // Priority: manual override > computed schedule goal
  if (commissionData.appGoalOverride > 0) return commissionData.appGoalOverride;
  const schedule = computeSchedule();
  const currentRow = schedule[currentMonth] ?? {};
  return currentRow.apps ?? 0;
}

function calcCommissionPayout() {
  const schedule = computeSchedule();
  const currentRow = schedule[currentMonth] ?? {};
  const leaseGoal = currentRow.grossLeases ?? 0;
  const actualLeases = (monthlyData[currentMonth]?.leasesSignedActual ?? 0);

  const appGoal = getEffectiveAppGoal();
  const actualApps = (monthlyData[currentMonth]?.applications ?? 0);

  // Base tier: Lease Goal Hit
  let baseComm = 0;
  if (leaseGoal > 0 && actualLeases >= leaseGoal) {
    baseComm = leaseGoal * commissionData.baseTier.costPerLease;
  }

  // Bonus tier: Additional Leases beyond goal
  let bonusComm = 0;
  if (actualLeases > leaseGoal) {
    bonusComm = (actualLeases - leaseGoal) * commissionData.bonusTier.costPerLease;
  }

  const totalComm = baseComm + bonusComm;
  const agents = getCommissionAgents();
  const perAgent = agents.length > 0 ? totalComm / agents.length : 0;

  // App kickers (cumulative) — each tier is independent payout, tallied when hit
  let kickerPayout = 0;
  const kickers = commissionData.appKickers;
  const kickerHits = [false, false, false];
  if (appGoal > 0) {
    const appPct = (actualApps / appGoal) * 100;
    if (appPct >= 50)  { kickerPayout += kickers[0].payout; kickerHits[0] = true; }
    if (appPct >= 75)  { kickerPayout += kickers[1].payout; kickerHits[1] = true; }
    if (appPct >= 100) { kickerPayout += kickers[2].payout; kickerHits[2] = true; }
  }

  const kickerPerAgent = agents.length > 0 ? kickerPayout / agents.length : 0;
  const agentPayouts = agents.map(agent => ({
    name: agent.name,
    baseComm: perAgent,
    kickerPayout: kickerPerAgent,
    total: perAgent + kickerPerAgent
  }));

  return { baseComm, bonusComm, totalComm, perAgent, kickerPayout, kickerPerAgent, kickerHits, appGoal, actualApps, leaseGoal, totalPerAgent: perAgent + kickerPerAgent, totalPool: totalComm + kickerPayout, agentPayouts };
}

function getEarnedMetricDetails(role) {
  return role.metrics
    .filter(metric => isMetricHit(metric))
    .map(metric => ({
      cat: metric.cat,
      actual: metric.actual,
      goal: metric.goal,
      payout: metric.payout
    }));
}

function getBonusExportData() {
  syncAbsorptionMetricsFromMonthlyData();
  syncPropertyOraMetrics();
  const agents = getCommissionAgents();
  const commission = calcCommissionPayout();
  const quarterTotals = getQuarterlyAbsorptionTotals();
  const qByMonth = ["Q1","Q1","Q1","Q2","Q2","Q2","Q3","Q3","Q3","Q4","Q4","Q4"];
  const leasingAgents = agents.map((agent, idx) => {
    const monthly = MONTHS.map((month, monthIdx) => {
      const teamPayout = Number(commissionData.monthlyPayouts[monthIdx] ?? 0);
      const perAgentMonth = agents.length > 0 ? teamPayout / agents.length : 0;
      return { month, payout: perAgentMonth };
    });
    const quarterly = ["Q1","Q2","Q3","Q4"].map(q => ({
      quarter: q,
      payout: monthly.filter((_, monthIdx) => qByMonth[monthIdx] === q).reduce((sum, item) => sum + item.payout, 0)
    }));
    return {
      type: "leasing_agent",
      name: agent.name || `Agent ${idx + 1}`,
      role: "Leasing Agent",
      monthly,
      quarterly,
      currentMonthProjected: commission.agentPayouts[idx]?.total ?? 0,
      detail: {
        baseCommission: commission.agentPayouts[idx]?.baseComm ?? 0,
        appKicker: commission.agentPayouts[idx]?.kickerPayout ?? 0
      }
    };
  });

  const roleEmployees = [];
  Object.entries(bonusRolesByQ).forEach(([quarter, roles]) => {
    roles.forEach(role => {
      const payout = calcRolePayout(role);
      const earnedMetrics = getEarnedMetricDetails(role);
      roleEmployees.push({
        type: "bonus_role",
        name: role.name || role.title,
        role: role.title,
        quarter,
        quarterlyPayout: payout.earned,
        absorptionActual: quarterTotals[quarter] ?? 0,
        earnedMetrics
      });
    });
  });

  const roleTotals = roleEmployees.reduce((acc, role) => {
    const key = `${role.quarter}::${role.role}`;
    if (!acc[key]) acc[key] = { quarter: role.quarter, role: role.role, total: 0 };
    acc[key].total += role.quarterlyPayout;
    return acc;
  }, {});

  return { property: getProp().name, leasingAgents, roleEmployees, currentMonth: MONTHS[currentMonth], quarterTotals, roleTotals: Object.values(roleTotals) };
}

function exportBonusPayoutCSV() {
  const data = getBonusExportData();
  const lines = [["category","name","role_or_period","period_type","payout"]];
  data.leasingAgents.forEach(agent => {
    agent.monthly.forEach(item => lines.push(["Leasing Agent", agent.name, item.month, "Monthly", item.payout.toFixed(2)]));
    agent.quarterly.forEach(item => lines.push(["Leasing Agent", agent.name, item.quarter, "Quarterly", item.payout.toFixed(2)]));
    lines.push(["Leasing Agent", agent.name, data.currentMonth, "Current Month Projection", agent.currentMonthProjected.toFixed(2)]);
  });
  data.roleEmployees.forEach(role => {
    lines.push(["Bonus Role", role.name, `${role.quarter} (${role.role})`, "Quarterly", role.quarterlyPayout.toFixed(2)]);
  });
  const csv = lines.map(row => row.map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${getProp().name.replace(/\s+/g, "_")}_bonus_payouts.csv`;
  a.click();
}

    <div style="margin-bottom:14px">

    </div>

    <div style="margin-bottom:14px">
      <div class="card-title">Application Kicker Payouts (cumulative · editing 100% scales all tiers)</div>
      ${kickerCardsHTML}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">

            </div>
            <div>
              <div style="font-size:0.62rem;color:var(--muted)">App Kicker Total</div>

            </div>
            <div>
              <div style="font-size:0.62rem;color:var(--muted)">Per Agent Total</div>
              <div style="font-size:1.1rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:#4493f8">$${comm.totalPerAgent.toLocaleString(undefined,{maximumFractionDigits:0})}</div>

          </div>
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(63,185,80,0.2)">

            <tfoot><tr style="border-top:2px solid var(--border)"><td class="l" style="font-weight:700">YTD Total</td><td style="text-align:center;font-weight:700;color:#3fb950;font-family:'JetBrains Mono',monospace">$${ytdTotal.toLocaleString()}</td></tr></tfoot>

  return summaryCard + roleCards + commissionCard;
}

function formatJacMetricDisplay(metric, value) {
  const val = Number(value) || 0;
  if (metric.format === "pct") return `${val.toFixed(1)}%`;
  if (metric.format === "decimal") return `${val.toFixed(2)}`;
  if (metric.format === "delta") return `${val >= 0 ? "+" : ""}${val.toFixed(1)} pts`;
  if (metric.format === "currencyDelta") return `${val >= 0 ? "+" : "-"}$${Math.abs(val).toFixed(0)}`;
  return `${val.toFixed(1).replace(/\.0$/, "")}`;
}

function renderJacsTeamBonusTab() {

  const salaryAccessAllowed = isSalaryAccessAllowed();

  const rolePayoutMap = Object.fromEntries(roles.map(role => [role.id, calcRolePayout(role)]));

  const portfolioScope = getJacRoleScope({ id: "portfolio" });
  const quarterSelector = `<div style="display:flex;gap:6px;flex-wrap:wrap">
    ${["Q1","Q2","Q3","Q4"].map(q => `<button class="btn btn-sm ${q===bonusQuarter?"btn-blue":"btn-gray"}" onclick="setBonusQuarter('${q}')">${q}</button>`).join("")}

  const totalEarned = roles.reduce((sum, role) => sum + rolePayoutMap[role.id].earned, 0);
  const totalMissed = totalPotential - totalEarned;
  const autoMetricCount = roles.reduce((sum, role) => sum + role.metrics.filter(metric => !!metric.syncKey).length, 0);
  const configuredRegionals = regionalRoles.filter(role => (regionalAssignments[role.id] ?? []).length > 0).length;

  const groupedRoles = roles.reduce((acc, role) => {
    acc[role.group] = acc[role.group] || [];

    return acc;
  }, {});
  const groupOrder = ["Leadership", "Regionals", "Specialists", "Operations Support", "Marketing Team", "Marketing Specialists"];
  const summaryStats = [
    { label: "Roles In Framework", value: roles.length, sub: `${autoMetricCount} auto-synced metrics across Jac's team` },
    { label: "Saved Communities", value: portfolioScope.savedNames.length, sub: portfolioScope.savedNames.length > 0 ? `${portfolioScope.metrics.totalUnits.toLocaleString()} units powering portfolio-wide roles` : "Save community data to activate portfolio rollups" },
    { label: "Assigned Scope Coverage", value: `${configuredRegionals}/${regionalRoles.length}`, sub: `${totalRegionalSelections} community selections mapped to assigned-community roles` },
    { label: `${bonusQuarter} Earned`, value: `$${totalEarned.toLocaleString(undefined,{maximumFractionDigits:0})}`, sub: `Potential $${totalPotential.toLocaleString(undefined,{maximumFractionDigits:0})} · Open $${totalMissed.toLocaleString(undefined,{maximumFractionDigits:0})}` }
  ].map(stat => `<div class="bonus-framework-stat"><div class="k">${stat.label}</div><div class="v">${stat.value}</div><div style="font-size:0.68rem;color:var(--muted);margin-top:4px">${stat.sub}</div></div>`).join("");

  const summaryCard = `<div class="bonus-quarterly-summary">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <h2 style="font-size:0.95rem;font-weight:700">👥 Jac's Team Bonus Framework</h2>
        <p style="font-size:0.72rem;color:var(--muted);margin-top:2px">Free-standing from the community selector. Regionals use assigned communities, and all other roles use the saved portfolio as a whole.</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${quarterSelector}
      </div>
    </div>

    ${salarySecurity.enabled ? `<div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:8px;font-size:0.72rem;color:var(--muted)">Compensation visibility is <strong style="color:${salaryAccessAllowed ? "#3fb950" : "#d29922"}">${salaryAccessAllowed ? "unlocked" : "locked"}</strong> for this browser session.</div>` : ""}
  </div>`;

  const frameworkNote = `<div class="bonus-framework-note">
    <strong style="color:#4493f8">Framework note:</strong> this tab now ignores whichever community is selected above. Save each community after updating Overview or Traffic &amp; Funnel data so the portfolio rollups and Regional assignments stay current.
  </div>`;

  const assignmentSection = renderRegionalAssignmentMatrix(regionalRoles, roleScopeMap);

  const groupSections = groupOrder

    .map(group => {
      const cards = groupedRoles[group].map(role => {
        const roleIdx = roles.findIndex(r => r.id === role.id);
        const payout = rolePayoutMap[role.id];
        const scope = roleScopeMap[role.id];
        const isCollapsed = bonusCollapsed[role.id] ?? false;
        const scopeTypeLabel = role.id.startsWith("regional_") ? "Assigned Communities" : "Portfolio Rollup";
        const syncSourceLabel = role.id.startsWith("regional_") ? "assigned community rollup" : "saved portfolio rollup";
        const metricsHTML = role.metrics.map((metric, mi) => {
          const status = getMetricStatus(metric);
          const isVP = role.id === "vp_ops";
          const cellClass = status; // hit | partial | kicker | miss
          const statusColor  = status === "kicker"  ? "#2dd4bf"
                             : status === "hit"     ? "#3fb950"
                             : status === "partial" ? "#d29922"
                             : "#f85149";
          const statusLabel  = status === "kicker"  ? `🚀 KICKER ×${(metric.kickerMultiplier??1.5)} — $${(metric.payout*(metric.kickerMultiplier??1.5)).toFixed(0)}`
                             : status === "hit"     ? `✅ HIT — $${metric.payout.toFixed(0)}`
                             : status === "partial" ? `⚠️ PARTIAL — $${(metric.payout*0.5).toFixed(0)}`
                             : "Open / Below Goal";
          const payoutDisplay = status === "kicker"  ? (metric.payout*(metric.kickerMultiplier??1.5)).toFixed(0)
                              : status === "partial" ? (metric.payout*0.5).toFixed(0)
                              : metric.payout.toFixed(0);
          const actualDisabled = metric.syncKey ? `disabled title="Auto-synced from ${syncSourceLabel}"` : "";

          // VP-specific threshold helper rows
          let thresholdHTML = "";
          if (isVP) {
            const kThr = metric.kickerThreshold, pThr = metric.partialThreshold;
            const fmtV = v => metric.format === "pct" ? `${v}%` : metric.format === "delta" ? `${v>=0?"+":""}${v} pts` : `${v}`;

            if (kThr != null)  rows.push(`<span style="color:#2dd4bf">🚀 Kicker ≥ ${fmtV(kThr)} → ×${metric.kickerMultiplier??1.5} payout</span>`);
            rows.push(`<span style="color:#3fb950">✅ Hit: ${metric.direction==="down"?`≤ ${fmtV(metric.goal)}`:`≥ ${fmtV(metric.goal)}`}</span>`);
            if (metric.partial && pThr != null) {
              rows.push(`<span style="color:#d29922">⚠️ Partial: ${metric.direction==="down"
                ? `${fmtV(metric.goal)}–${fmtV(pThr)}`

            }
            rows.push(`<span style="color:#f85149">❌ Miss: ${metric.direction==="down"
              ? `> ${fmtV(metric.partial&&pThr!=null?pThr:metric.goal)}`
              : `< ${fmtV(metric.partial&&pThr!=null?pThr:metric.goal)}`}</span>`);
            thresholdHTML = `<div class="vp-kpi-threshold">${rows.join("")}</div>`;
          }

          return `<div class="bonus-metric-cell ${cellClass}">

            <div class="bonus-metric-source">${metric.syncKey ? `↔ ${scopeTypeLabel} · ${formatJacMetricDisplay(metric, metric.actual)}` : `Manual · ${metric.sourceLabel}`}</div>

                  : `Salary: <strong style="color:#d29922">${formatSalaryMask()}</strong>`}
              </div>
              <div style="font-size:0.72rem;color:var(--muted)">
                Bonus Rate: <input class="bonus-inp-sm" type="number" value="${role.bonusRate}" min="0" max="100" step="1" onchange="updateJacsTeamRole(${roleIdx},'bonusRate',this.value)" style="width:55px">%
              </div>
              <div style="font-size:0.72rem;color:var(--muted)">
                Annual Bonus: <strong style="color:#4493f8">${salaryAccessAllowed ? `$${(role.salary * role.bonusRate / 100).toLocaleString(undefined,{maximumFractionDigits:0})}` : formatSalaryMask()}</strong>
              </div>
              <div style="font-size:0.72rem;color:var(--muted)">
                Quarterly: <strong style="color:#a371f7">${salaryAccessAllowed ? `$${(role.salary * role.bonusRate / 100 / 4).toLocaleString(undefined,{maximumFractionDigits:0})}` : formatSalaryMask()}</strong>

            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px">
              <span class="bonus-scope-pill">${scopeTypeLabel}</span>
              <span style="font-size:0.7rem;color:var(--muted)">${getJacRoleScopeLabel(role, scope)}</span>
            </div>
            ${role.id === "leaseup_specialist" ? `<div class="bonus-sync-note">Simplified into four portfolio-level metrics that fit this bonus framework cleanly.</div>` : ""}
            <div class="${role.id === "vp_ops" ? "bonus-metrics-grid" : "bonus-metrics-grid"}" style="${role.id === "vp_ops" ? "grid-template-columns:repeat(3,1fr)" : ""}">${metricsHTML}</div>
          </div>
        </div>`;
      }).join("");

      return `<div class="bonus-tab-section">
        <div class="bonus-group-title">${group}<span class="bonus-role-count">${groupedRoles[group].length} role${groupedRoles[group].length===1?"":"s"}</span></div>
        <div class="bonus-jac-role-grid">${cards}</div>
      </div>`;
    }).join("");

  return summaryCard + frameworkNote + assignmentSection + groupSections;
}
