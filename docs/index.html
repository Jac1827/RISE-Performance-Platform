<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISE Performance Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --ink:#023046;
    --sky:#549db8;
    --paper:#ffffff;
    --mist:#eef5f8;
    --sand:#f7f4ef;
    --line:#d6e2e8;
    --text:#18313c;
    --muted:#5e7480;
    --danger:#9f2d2d;
    --warn:#b0761f;
    --ok:#2a6b3b;
    --shadow:0 18px 48px rgba(2,48,70,0.08);
    --radius:18px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(84,157,184,0.12), transparent 32%),
      linear-gradient(180deg, #f8fbfc 0%, #eef5f8 100%);
    color:var(--text);
    min-height:100vh;
  }
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  a{color:var(--ink)}

  .hidden{display:none !important}
  .shell{max-width:1380px;margin:0 auto;padding:0 18px 28px}
  .topbar{
    position:sticky;top:0;z-index:20;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.82);
    border-bottom:1px solid rgba(2,48,70,0.08);
  }
  .topbar-inner{
    max-width:1380px;margin:0 auto;padding:16px 18px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:16px;min-width:280px}
  .brand-mark img{height:44px;width:auto;display:block}
  .brand-copy{line-height:1.2}
  .brand-copy strong{display:block;color:var(--ink);font-size:18px;letter-spacing:.02em}
  .brand-copy span{display:block;color:var(--muted);font-size:12px}

  .nav{display:flex;gap:8px;flex:1;flex-wrap:wrap}
  .nav-btn{
    border:none;background:transparent;color:var(--muted);
    padding:10px 12px;border-radius:999px;font-size:13px;font-weight:600;
    transition:.16s ease;
  }
  .nav-btn:hover{background:rgba(84,157,184,0.12);color:var(--ink)}
  .nav-btn.active{background:var(--ink);color:#fff;box-shadow:0 10px 22px rgba(2,48,70,0.18)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}

  .btn{
    border:1px solid transparent;border-radius:12px;padding:10px 14px;
    background:#fff;color:var(--ink);font-size:13px;font-weight:700;
    transition:.16s ease;box-shadow:0 10px 22px rgba(2,48,70,0.05);
  }
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-accent{background:var(--sky);color:#fff}
  .btn-soft{background:#fff;border-color:rgba(2,48,70,0.12)}
  .btn-danger{background:#fff0f0;border-color:#efc9c9;color:var(--danger)}
  .btn-warn{background:#fff5e6;border-color:#ecd6b1;color:#9a6618}
  .btn-sm{padding:8px 11px;font-size:12px}

  .page{padding-top:26px}
  .hero{
    background:linear-gradient(135deg, rgba(2,48,70,0.98), rgba(84,157,184,0.98));
    color:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow);
    margin-bottom:18px;overflow:hidden;position:relative;
  }
  .hero:after{
    content:"";position:absolute;inset:auto -120px -120px auto;width:260px;height:260px;
    border-radius:50%;background:rgba(255,255,255,0.08)
  }
  .hero h1{font-size:30px;letter-spacing:-.03em;margin-bottom:6px}
  .hero p{font-size:14px;max-width:720px;color:rgba(255,255,255,0.82)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .card{
    background:rgba(255,255,255,0.92);border:1px solid rgba(2,48,70,0.09);
    border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
  }
  .stat-card .label{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
  .stat-card .value{font-size:30px;font-weight:800;color:var(--ink)}
  .stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px}
  .stat-link{
    border:none;
    background:transparent;
    padding:0;
    font:inherit;
    color:var(--ink);
    font-size:30px;
    font-weight:800;
    line-height:1;
    cursor:pointer;
  }
  .stat-link:hover{text-decoration:underline}
  .profile-link{
    border:none;background:transparent;padding:0;margin:0;
    font:inherit;color:var(--ink);font-weight:800;text-align:left;
    cursor:pointer
  }
  .profile-link:hover{text-decoration:underline}

  .grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .grid-2-equal{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

  .section-title{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-bottom:14px;
  }
  .section-title h2{font-size:18px;color:var(--ink);letter-spacing:-.02em}
  .section-title p{font-size:12px;color:var(--muted)}

  .table-wrap{overflow:auto;border-radius:14px;border:1px solid rgba(2,48,70,0.08)}
  table{width:100%;border-collapse:collapse;background:#fff}
  th,td{padding:12px 12px;border-bottom:1px solid #edf2f5;font-size:13px;vertical-align:top}
  th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:left;background:#f7fbfd}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fbfdff}

  .badge{
    display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;
    font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  }
  .badge-pip{background:#fdeeee;color:#8e1d1d}
  .badge-coaching{background:#fff3df;color:#905f11}
  .badge-active{background:#e8f4ec;color:#205432}
  .badge-completed{background:#e8f0f8;color:#25537a}
  .badge-shop{background:#eef5f8;color:#023046}
  .badge-archived{background:#f0eef8;color:#4d4487}
  .badge-admin{background:#f0eef8;color:#4d4487}
  .badge-alert{background:#fff0f0;color:#8e1d1d}
  .badge-soft{background:#f2f7fa;color:#4f6470}

  .alert{
    padding:12px 14px;border-radius:14px;font-size:13px;border:1px solid transparent
  }
  .alert-info{background:#eef7fb;border-color:#d5e8f1;color:#19455d}
  .alert-success{background:#ecf7ef;border-color:#cfe7d6;color:#205432}
  .alert-warn{background:#fff7ea;border-color:#eedbbb;color:#8a5a18}
  .alert-danger{background:#fff0f0;border-color:#f3cdcd;color:#8e1d1d}

  .stack{display:flex;flex-direction:column;gap:12px}
  .inline{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .tiny{font-size:11px}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}

  .form-grid{display:grid;gap:12px}
  .cols-2{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:5px}
  input,select,textarea{
    width:100%;border:1px solid #d5e3ea;background:#fff;border-radius:12px;
    padding:11px 12px;color:var(--text);outline:none;transition:.16s ease;
  }
  input:focus,select:focus,textarea:focus{
    border-color:rgba(84,157,184,0.8);
    box-shadow:0 0 0 3px rgba(84,157,184,0.16);
  }
  textarea{min-height:100px;resize:vertical}
  .checkbox-row{display:flex;align-items:flex-start;gap:10px}
  .checkbox-row input{width:auto;margin-top:3px}

  .pill-row{display:flex;gap:10px;flex-wrap:wrap}
  .pill{
    border:1px solid #d7e4eb;background:#fff;padding:9px 12px;border-radius:999px;
    font-size:12px;font-weight:800;color:var(--muted);cursor:pointer
  }
  .pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .list-row{
    display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;
    padding:12px 0;border-bottom:1px solid #edf2f5
  }
  .list-row:last-child{border-bottom:none}

  .progress-wrap{height:8px;border-radius:999px;background:#edf2f5;overflow:hidden}
  .progress{height:8px;border-radius:999px;background:linear-gradient(90deg,var(--ink),var(--sky))}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(7,24,34,0.48);display:flex;
    align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal{
    width:min(980px,100%);max-height:92vh;overflow:auto;background:#fff;
    border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,0.22);position:relative;
  }
  .modal.narrow{width:min(560px,100%)}
  .close-btn{
    position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;
    border-radius:999px;background:#f2f7fa;color:var(--ink);font-size:18px;font-weight:800
  }
  .modal h3{font-size:22px;color:var(--ink);margin-bottom:6px}
  .modal .sub{font-size:13px;color:var(--muted);margin-bottom:18px}

  .schedule-row{
    display:grid;grid-template-columns:120px 1fr 120px 140px 90px;gap:10px;
    align-items:center;padding:10px 0;border-bottom:1px solid #edf2f5
  }
  .schedule-row:last-child{border-bottom:none}
  .schedule-status{font-size:12px;font-weight:700}
  .status-complete{color:var(--ok)}
  .status-overdue{color:var(--danger)}
  .status-open{color:var(--warn)}

  .file-box{
    border:1.5px dashed #b9d2dd;border-radius:16px;padding:18px;text-align:center;background:#f9fcfd
  }
  .file-box strong{display:block;color:var(--ink);margin-bottom:4px}

  .history-card{background:#f7fbfd;border:1px solid #e1edf2;border-radius:16px;padding:14px}
  .history-card h4{font-size:14px;color:var(--ink);margin-bottom:6px}

  .footer-note{margin-top:16px;font-size:12px;color:var(--muted)}
  .user-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .login-shell{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:26px 18px;
    background:
      radial-gradient(circle at top left, rgba(84,157,184,0.18), transparent 30%),
      linear-gradient(180deg, #f8fbfc 0%, #eaf2f6 100%);
  }
  .login-card{
    width:min(520px, 100%);
    background:rgba(255,255,255,0.96);
    border:1px solid rgba(2,48,70,0.08);
    border-radius:26px;
    padding:28px;
    box-shadow:var(--shadow);
  }
  .login-brand{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
  }
  .login-brand img{height:52px;width:auto;display:block}
  .login-title{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-.03em}
  .login-sub{font-size:13px;color:var(--muted);margin-top:4px}
  .login-note{
    background:#f7fbfd;
    border:1px solid #dce8ee;
    border-radius:16px;
    padding:14px 15px;
    font-size:13px;
    color:var(--text);
    margin-top:14px;
  }
  .brand-mark svg{height:44px;width:auto;display:block}
  .brand-mark{display:flex;align-items:center}

  @media (max-width:1080px){
    .stats,.grid-3,.cols-4{grid-template-columns:repeat(2,1fr)}
    .grid-2,.grid-2-equal,.cols-2,.cols-3{grid-template-columns:1fr}
    .schedule-row{grid-template-columns:1fr}
  }
  @media (max-width:720px){
    .stats{grid-template-columns:1fr}
    .hero h1{font-size:24px}
    .shell{padding:0 14px 22px}
    .topbar-inner{padding:14px}
  }
</style>
</head>

function normalizeComparable(value){
  return String(value || '').trim().toLowerCase();
}

function fallbackId(prefix){
  return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}`;
}

function normalizeUser(user){
  const role = user && user.role === 'admin' ? 'admin' : 'manager';
  let scopeType = user && user.scopeType ? user.scopeType : (role === 'admin' ? 'all' : (user && user.region ? 'region' : 'manager_only'));
  let scopeValue = user && user.scopeValue != null ? String(user.scopeValue) : String(user && user.region || '');

  if(role === 'admin'){
    scopeType = 'all';
    scopeValue = '';
  }else if(scopeType === 'all'){
    scopeType = 'manager_only';
    scopeValue = '';
  }

  if(scopeType === 'region' && !REGIONS[scopeValue]){
    scopeValue = '';
  }

  return {
    id: String(user && user.id || fallbackId('user')),
    name: String(user && user.name || 'Manager'),
    email: String(user && user.email || '').trim(),
    pin: String(user && user.pin || ''),
    role,
    scopeType,
    scopeValue
  };
}

function normalizeEmployee(employee){

function clampNumber(value, fallback, min, max){
  const next = Number(value);
  if(Number.isNaN(next)) return fallback;
  return Math.max(min, Math.min(max, next));
}

function normalizeSettings(settings){
  const raw = settings && settings.benchmarks ? settings.benchmarks : {};
  const benchmarkTarget = clampNumber(raw.benchmarkTarget, DEFAULT_SETTINGS.benchmarks.benchmarkTarget, 0, 100);
  const pipOverallThreshold = clampNumber(raw.pipOverallThreshold, DEFAULT_SETTINGS.benchmarks.pipOverallThreshold, 0, benchmarkTarget);
  const criticalMetricThreshold = clampNumber(raw.criticalMetricThreshold, DEFAULT_SETTINGS.benchmarks.criticalMetricThreshold, 0, benchmarkTarget);
  const severeMetricCount = Math.round(clampNumber(raw.severeMetricCount, DEFAULT_SETTINGS.benchmarks.severeMetricCount, 1, 6));
  const msoeCoachingThreshold = clampNumber(raw.msoeCoachingThreshold, DEFAULT_SETTINGS.benchmarks.msoeCoachingThreshold, 0, 100);
  const msoePipThreshold = clampNumber(raw.msoePipThreshold, DEFAULT_SETTINGS.benchmarks.msoePipThreshold, 0, msoeCoachingThreshold);
  const rawWriteups = settings && settings.writeups ? settings.writeups : {};
  const coachingThreshold = Math.round(clampNumber(rawWriteups.coachingThreshold, DEFAULT_SETTINGS.writeups.coachingThreshold, 1, 20));
  const pipThreshold = Math.round(clampNumber(rawWriteups.pipThreshold, DEFAULT_SETTINGS.writeups.pipThreshold, coachingThreshold, 20));
  const immediatePipLevel = WRITEUP_LEVEL_OPTIONS.some(option => option.value === rawWriteups.immediatePipLevel)
    ? rawWriteups.immediatePipLevel
    : DEFAULT_SETTINGS.writeups.immediatePipLevel;
  return {
    benchmarks: {
      benchmarkTarget,
      pipOverallThreshold,
      criticalMetricThreshold,
      severeMetricCount,
      msoeCoachingThreshold,
      msoePipThreshold
    },
    writeups: {
      coachingThreshold,
      pipThreshold,
      immediatePipLevel
    }
  };
}

function filteredRosterEmployees(){
  const filters = employeeRosterFilters();
  const search = normalizeComparable(filters.search);
  const community = normalizeComparable(filters.community);
  return sortedVisibleEmployees().filter(employee => {
    if(filters.managerId && employee.managerId !== filters.managerId) return false;
    if(filters.regionalManagerId && employee.regionalManagerId !== filters.regionalManagerId) return false;
    if(filters.region && employee.region !== filters.region) return false;
    if(community && !normalizeComparable(employee.community).includes(community)) return false;
    if(filters.status === 'active' && isEmployeeTerminated(employee)) return false;
    if(filters.status === 'terminated' && !isEmployeeTerminated(employee)) return false;
    if(search){
      const haystack = normalizeComparable([
        employee.name,
        employee.email,
        employee.employeeNumber,
        employee.role,
        employee.community,
        employee.department,
        managerDisplayName(employee),
        regionalManagerDisplayName(employee)
      ].join(' '));
      if(!haystack.includes(search)) return false;
    }
    return true;
  });
}

  }

  const byName = normalizeComparable(rawName);
  if(byName){
    const nameMatch = STATE.users.find(user => {
      const name = normalizeComparable(user.name);
      return name === byName || name.replace(/\s+/g, '_') === byName;
    });
    if(nameMatch) return nameMatch.id;
  }

  return '';
}

function generateUserIdFromName(name, excludeId){
  const base = normalizeComparable(name).replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'manager';
  let candidate = base;
  let counter = 2;
  while(STATE.users.some(user => user.id === candidate && user.id !== excludeId)){
    candidate = `${base}_${counter}`;
    counter += 1;
  }
  return candidate;
}

function metricFieldDefinitions(){

function formatMetricLabels(keys){
  const labels = metricFieldDefinitions()
    .filter(field => keys.includes(field.key))
    .map(field => field.label.replace(/\b\w/g, char => char.toUpperCase()));
  return labels.join(', ');
}

function evaluatePlanRecommendation(scores){
  const settings = benchmarkSettings();
  const metrics = metricFieldDefinitions()
    .map(field => ({key: field.key, label: field.label, value: scores[field.key]}))
    .filter(metric => metric.value != null && !Number.isNaN(Number(metric.value)));
  const overall = scores.overallScore;
  const msoe = scores.msoeScore;
  const belowBenchmark = metrics.filter(metric => Number(metric.value) < settings.benchmarkTarget);
  const criticalMetrics = metrics.filter(metric => Number(metric.value) <= settings.criticalMetricThreshold);
  const anyScoreEntered = overall != null || msoe != null || metrics.length > 0;

  if(!anyScoreEntered){
    return {
      recommendation: 'pending',
      tone: 'muted',
      autoType: null,
      message: benchmarkRuleSummary()
    };
  }

  if(overall != null && Number(overall) <= settings.pipOverallThreshold){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. Overall score is at or below ${settings.pipOverallThreshold}%.`
    };
  }

  if(criticalMetrics.length){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. ${formatMetricLabels(criticalMetrics.map(metric => metric.key))} ${criticalMetrics.length === 1 ? 'is' : 'are'} at or below the critical ${settings.criticalMetricThreshold}% threshold.`
    };
  }

  if(belowBenchmark.length >= settings.severeMetricCount){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. ${belowBenchmark.length} metrics are below the ${settings.benchmarkTarget}% benchmark, which meets your severe-trigger setting.`
    };
  }

  if(msoe != null && Number(msoe) < settings.msoePipThreshold){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. MSOE is below the ${settings.msoePipThreshold}% PIP threshold.`
    };
  }

  if(overall != null && Number(overall) < settings.benchmarkTarget){
    return {
      recommendation: 'coaching',
      tone: 'warn',
      autoType: 'coaching',
      message: `Coaching recommended. Overall score is below the ${settings.benchmarkTarget}% benchmark.`
    };
  }

  if(msoe != null && Number(msoe) < settings.msoeCoachingThreshold){
    return {
      recommendation: 'coaching',
      tone: 'warn',
      autoType: 'coaching',
      message: `Coaching recommended. MSOE is below the ${settings.msoeCoachingThreshold}% coaching threshold.`
    };
  }

  if(belowBenchmark.length){
    return {
      recommendation: 'coaching',
      tone: 'warn',
      autoType: 'coaching',
      message: `Coaching recommended. ${formatMetricLabels(belowBenchmark.map(metric => metric.key))} ${belowBenchmark.length === 1 ? 'is' : 'are'} below the ${settings.benchmarkTarget}% benchmark.`
    };
  }

  return {
    recommendation: 'none',
    tone: 'success',
    autoType: null,
    message: `Scores meet the current benchmark criteria. You can still choose coaching or PIP manually if needed.`
  };
}

function writeupLevelMeta(level){

function writeupLevelLabel(level){

function writeupLevelBadgeClass(level){
  const severity = writeupLevelMeta(level).severity;
  if(severity >= 4) return 'badge-pip';
  if(severity >= 3) return 'badge-coaching';
  if(severity >= 2) return 'badge-shop';
  return 'badge-soft';
}

function writeupRuleSummary(){
  const settings = writeupSettings();
  return `Coaching is suggested at ${settings.coachingThreshold}+ write-ups. PIP is suggested at ${settings.pipThreshold}+ write-ups or any ${writeupLevelLabel(settings.immediatePipLevel)}.`;
}

function writeupsForEmployee(employeeId){

    .filter(writeup => writeup.employeeId === employeeId)
    .sort((left, right) => (right.date || '').localeCompare(left.date || ''));

function evaluateWriteupRecommendation(employeeId){
  const settings = writeupSettings();
  const writeups = writeupsForEmployee(employeeId);
  const immediateSeverity = writeupLevelMeta(settings.immediatePipLevel).severity;
  const highest = writeups.reduce((max, writeup) => Math.max(max, writeupLevelMeta(writeup.level).severity), 0);

  if(writeups.some(writeup => writeupLevelMeta(writeup.level).severity >= immediateSeverity)){
    return {
      recommendation: 'pip',
      tone: 'danger',
      message: `PIP suggested. This employee has a ${writeupLevelLabel(settings.immediatePipLevel)} or higher on file.`
    };
  }
  if(writeups.length >= settings.pipThreshold){
    return {
      recommendation: 'pip',
      tone: 'danger',
      message: `PIP suggested. ${writeups.length} write-ups meet the ${settings.pipThreshold}-write-up threshold.`
    };
  }
  if(writeups.length >= settings.coachingThreshold){
    return {
      recommendation: 'coaching',
      tone: 'warn',
      message: `Coaching suggested. ${writeups.length} write-ups meet the ${settings.coachingThreshold}-write-up threshold.`
    };
  }
  return {
    recommendation: 'none',
    tone: 'info',
    message: highest ? 'No escalation is currently triggered by the saved write-up criteria.' : writeupRuleSummary()
  };
}

function userScopeLabel(user){

  if(user.scopeType === 'region') return REGIONS[user.scopeValue] ? `Area: ${REGIONS[user.scopeValue].name}` : 'Area access';
  if(user.scopeType === 'community') return user.scopeValue ? `Community: ${user.scopeValue}` : 'Community access';
  return 'Restricted access';
}

function canUserAccessEmployee(user, employee){
  if(!user || !employee) return false;
  if(user.role === 'admin' || user.scopeType === 'all') return true;
  if(employee.managerId && employee.managerId === user.id) return true;
  if(!employee.managerId && employee.managerName && normalizeComparable(employee.managerName) === normalizeComparable(user.name)) return true;
  if(user.scopeType === 'manager_only') return false;
  if(user.scopeType === 'region') return Boolean(user.scopeValue) && employee.region === user.scopeValue;
  if(user.scopeType === 'community') return Boolean(user.scopeValue) && normalizeComparable(employee.community) === normalizeComparable(user.scopeValue);
  return false;
}

function writeupAreaSummary(){

    const key = employee.region && REGIONS[employee.region] ? REGIONS[employee.region].name : (employee.region || 'Unassigned');
    counts[key] = (counts[key] || 0) + 1;
  });
  return Object.entries(counts)
    .map(([area, count]) => ({area, count}))
    .sort((left, right) => right.count - left.count || left.area.localeCompare(right.area));
}

function shopManagedPlans(){

function planLabel(plan){

function planStatusBadgeClass(plan){
  if(plan.status === 'shop_ordered') return 'badge-shop';
  if(plan.status === 'completed') return 'badge-completed';
  if(plan.status === 'archived') return 'badge-archived';

function typeBadgeClass(type){
  return type === 'pip' ? 'badge-pip' : 'badge-coaching';
}

function scoreClass(score){
  if(score == null || Number.isNaN(Number(score))) return 'badge-soft';
  const value = Number(score);
  if(value >= 84) return 'badge-active';
  if(value >= 65) return 'badge-coaching';
  return 'badge-pip';
}

function daysLeft(plan){
  return Math.ceil((new Date(plan.reviewDate) - new Date()) / 86400000);
}

function pctComplete(plan){
  if(!plan.presentedAt) return 0;
  const start = new Date(plan.presentedAt);
  const end = new Date(plan.reviewDate);
  const now = new Date();
  if(end <= start) return 100;
  return Math.max(0, Math.min(100, Math.round(((now - start) / (end - start)) * 100)));
}

function capitalizeSentence(value){
  const text = collapseWhitespace(value);
  if(!text) return '';
  return text.charAt(0).toUpperCase() + text.slice(1);
}

function ensureSentenceText(value){
  const text = collapseWhitespace(value);
  if(!text) return '';
  return /[.!?]$/.test(text) ? text : `${text}.`;
}

function remedyProfileForContext(area, text){
  const haystack = [area, text].filter(Boolean).join(' ');
  return PERFORMANCE_REMEDY_LIBRARY.find(profile => profile.match.test(haystack)) || PERFORMANCE_REMEDY_LIBRARY[PERFORMANCE_REMEDY_LIBRARY.length - 1];
}

function buildDetailedActionItem(area, text){
  const profile = remedyProfileForContext(area, text);
  const base = collapseWhitespace(text);
  let detail = '';

  if(base && base.split(/\s+/).length >= 5){
    detail = ensureSentenceText(capitalizeSentence(base));
  }else{
    detail = ensureSentenceText(profile.focus);
  }

  if(!/\b(daily|weekly|each|every|per|track|log|document|review|audit|maintain|same-day|immediately|submit|bring)\b/i.test(detail)){
    detail = `${detail} ${profile.accountability}`;
  }

  return {
    area: !area || normalizeComparable(area) === 'general' ? (profile.area || 'General Performance') : area,
    text: collapseWhitespace(detail)
  };
}

function buildWriteupActionRecommendations(writeups){
  const recommendations = [];

  (Array.isArray(writeups) ? writeups : []).forEach(writeup => {
    const context = [
      writeup.category,
      writeup.title,
      writeup.details,
      writeup.expectations,
      writeup.correctiveAction,
      writeup.consequences
    ].filter(Boolean).join(' ');
    const profile = remedyProfileForContext(writeup.category, context);
    const candidates = [];

    if(writeup.correctiveAction) candidates.push({seed: writeup.correctiveAction, label: 'Corrective action'});
    if(writeup.expectations && normalizeComparable(writeup.expectations) !== normalizeComparable(writeup.correctiveAction)) candidates.push({seed: writeup.expectations, label: 'Expectation'});
    if(!candidates.length) candidates.push({seed: '', label: 'Suggested remedy'});

    candidates.slice(0, 2).forEach((candidate, index) => {
      const item = buildDetailedActionItem(profile.area, candidate.seed || '');
      recommendations.push({
        id: `${writeup.id}_${index}_${profile.key}`,
        writeupId: writeup.id,
        area: item.area,
        text: item.text,
        sourceTitle: writeup.title || writeupLevelLabel(writeup.level),
        sourceDate: writeup.date || writeup.createdAt || '',
        sourceCategory: writeup.category || '',
        sourceLabel: candidate.label
      });
    });
  });

  const seen = new Set();
  return recommendations.filter(item => {
    const key = `${normalizeComparable(item.area)}|${normalizeComparable(item.text)}`;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function parseActionItems(text){
  return text
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      const parts = line.split('|');
      if(parts.length > 1){
        return {area: parts[0].trim(), text: parts.slice(1).join('|').trim()};
      }
      return {area:'General', text: line};
    })
    .filter(item => item.text);
}

function formatRosterName(value){
  const raw = String(value || '').trim();
  if(!raw || !raw.includes(',')) return raw;
  const parts = raw.split(',');
  const last = (parts[0] || '').trim();
  const first = parts.slice(1).join(',').trim();
  return `${first} ${last}`.trim();
}

function parseCompanyRosterCommunity(department){
  const value = String(department || '').trim();
  if(!value.includes(' - ')) return '';
  const community = value.split(' - ', 2)[1].trim();
  return community === 'Development JAX' ? '' : community;
}

function inferCompanyRosterRegion(department, community){
  const dept = normalizeComparable(department);
  if(['Beacon Hall','Nicholson Gateway','Maple Hall - NJIT','Prosper on Fayette','Ivy & Elm','RISE 34th','Poplar Hall'].includes(community)) return 'student';
  if(['Nocatee','Glen Kernan Park','The Preserve at Tech','Pilots Pointe','Bartram Park','Baymeadows','RISE St. Augustine'].includes(community)) return 'east';
  if(['Anthem House','Doro','Sereno','Viera','Citrus Ridge','Florence Villa'].includes(community)) return 'west';
  if(dept.includes('vald')) return 'valdosta';
  if(dept.includes('gc jax') || dept.includes('development jax') || dept.endsWith(' jax') || dept.includes('project management')) return 'jax';
  if(['president-development', 'chief operating officer jax', 'regional sales manager jax', 'development coordinator jax', 'svp - development jax', 'vp project management'].some(token => dept.includes(token))) return 'jax';
  return 'corporate';
}

function parseCompanyRosterSheet(rows){
  if(!rows.length) return [];
  const headers = rows[0].map(header => String(header || '').trim());
  const records = rows.slice(1)
    .map(row => {
      const record = {};
      headers.forEach((header, index) => {
        record[header] = row[index] == null ? '' : String(row[index]).trim();
      });
      return record;
    })
    .filter(record => record['Full Name']);

  return records.map(record => {
    const department = record['Department Name'];
    const community = parseCompanyRosterCommunity(department);
    const managerName = formatRosterName(record['Manager']);
    return normalizeEmployee({
      id: fallbackId('emp'),
      name: formatRosterName(record['Full Name']),
      role: record['Job Title'] || 'Employee',
      community,
      region: inferCompanyRosterRegion(department, community),
      managerId: resolveManagerId('', managerName),
      managerName,
      email: record['Work Email'],
      department,
      employeeNumber: record['Employee Number'],
      statusType: record['Status Type'],
      status: record['Status'] || 'Active'
    });
  });
}

async function loadCompanyRosterFromAsset(options){
  const settings = options || {};
  const response = await fetch(COMPANY_ROSTER_ASSET, {cache:'no-store'});
  if(!response.ok) throw new Error(`Could not load ${COMPANY_ROSTER_ASSET}.`);
  const buffer = await response.arrayBuffer();
  const workbook = XLSX.read(buffer, {type:'array'});
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
  const employees = parseCompanyRosterSheet(rows);

  STATE.employees = employees;
  STATE.rosterVersion = COMPANY_ROSTER_VERSION;
  syncEmployeeManagerReferences();
  if(settings.clearRelated){
    STATE.plans = [];
    if(Array.isArray(STATE.writeups)) STATE.writeups = [];
    UI.selectedWeeklyPlanId = null;
  }
  saveState();
  if(settings.render !== false) render();
  return employees;
}

function getSchedule(plan){
  if(!plan.presentedAt) return [];
  const schedule = [{
    schedIdx:0,
    due:plan.presentedAt,
    label:'Initial presentation of PIP/Coaching plan',
    type:'Initial presentation of PIP/Coaching plan'
  }];
  let schedIdx = 1;
  let cursor = addDays(plan.presentedAt, 7);
  while(cursor < plan.reviewDate){
    schedule.push({
      schedIdx,
      due:cursor,
      label:'Weekly Follow Up',
      type:'Weekly Follow Up'
    });
    schedIdx += 1;
    cursor = addDays(cursor, 7);
  }
  if(plan.reviewDate !== plan.presentedAt){
    const last = schedule[schedule.length - 1];
    if(last && last.due === plan.reviewDate && last.schedIdx !== 0){
      last.label = 'Task Completion Review';
      last.type = 'Task Completion Review';
    }else{
      schedule.push({
        schedIdx,
        due:plan.reviewDate,
        label:'Task Completion Review',
        type:'Task Completion Review'
      });
    }
  }
  return schedule;
}

function getMeetingRecord(plan, schedIdx){
  return (plan.meetings || []).find(item => item.schedIdx === schedIdx);
}

function getMeetingStatus(plan, schedItem){
  const record = getMeetingRecord(plan, schedItem.schedIdx);
  if(record) return record.status;
  if(schedItem.due < today()) return 'past_due';
  return 'scheduled';
}

function meetingStatusLabel(status){
  if(status === 'completed') return 'Completed';
  if(status === 'past_due') return 'Past Due';
  return 'Scheduled';
}

function getMissedMeetings(plan){
  return getSchedule(plan).filter(item => item.due < today() && getMeetingStatus(plan, item) !== 'completed').length;
}

function getOverdueActionItems(plan){
  const lastUpdate = (plan.weeklyUpdates || []).slice(-1)[0];
  if(!lastUpdate || !Array.isArray(lastUpdate.items)) return 0;
  return lastUpdate.items.filter(item => item.status === 'incomplete').length;
}

function getPlanAlerts(plan){
  const alerts = [];
  if(plan.status === 'active' && !plan.hrApprovedAt) alerts.push('Awaiting HR approval');
  const dl = daysLeft(plan);
  if(plan.status === 'active' && !plan.presentedAt) alerts.push('Plan not yet presented');
  if(plan.status === 'active' && plan.presentedAt && !plan.signedDocData) alerts.push('Signed plan missing');
  if(plan.status === 'active' && dl < 0) alerts.push('Review date passed');
  const missed = getMissedMeetings(plan);
  if(missed > 0) alerts.push(missed + ' missed meeting' + (missed > 1 ? 's' : ''));
  const overdueItems = getOverdueActionItems(plan);
  if(overdueItems > 0) alerts.push(overdueItems + ' incomplete action item' + (overdueItems > 1 ? 's' : ''));
  return alerts;
}

function getUpcomingMeetings(){
  const meetings = [];
  activePlans().forEach(plan => {
    const employee = getEmployee(plan.employeeId);
    getSchedule(plan).forEach(item => {
      const record = getMeetingRecord(plan, item.schedIdx);
      if(record && record.status === 'completed') return;
      meetings.push({
        plan,
        employee,
        due:item.due,
        label:item.label,
        status:record ? record.status : (item.due < today() ? 'past_due' : 'scheduled')
      });
    });
  });
  return meetings.sort((a,b) => a.due.localeCompare(b.due));
}

function render(){
  const app = document.getElementById('app');
  if(!STATE.currentUser){
    app.innerHTML = renderLogin();
    return;
  }
  if(UI.currentView === 'settings' && STATE.currentUser.role !== 'admin'){
    UI.currentView = 'dashboard';
  }
  app.innerHTML = renderShell();
}

function renderLogin(){
  return `
    <div class="login-shell">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-mark">${riseWordmark(44)}</div>
          <div>
            <div class="login-title">Performance Platform</div>
            <div class="login-sub">Secure coaching, PIP, and roster management</div>
          </div>
        </div>
        <div class="alert alert-info">Enter your assigned passcode to unlock only the employees and plans mapped to your scope.</div>
        <div class="form-grid cols-2" style="margin-top:14px">
          <div style="grid-column:1/-1">
            <label>Passcode</label>
            <input id="li-passcode" type="password" inputmode="numeric" placeholder="Enter passcode" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        </div>
        <div id="li-err" class="alert alert-danger hidden" style="margin-top:14px">Invalid passcode.</div>
        <div class="inline" style="margin-top:18px;justify-content:space-between">
          <div class="small muted">Passcodes and scope assignments are managed by an admin inside Settings.</div>
          <button class="btn btn-primary" onclick="doLogin()">Unlock</button>
        </div>
        <div class="login-note">
          This static-site unlock screen is a privacy gate, not true server-backed security. Use the admin account to create manager passcodes, assign access by employee assignment, area, or community, and keep visibility limited to the right teams on trusted devices.
        </div>
      </div>
    </div>
  `;
}

function doLogin(){
  const passcode = String(document.getElementById('li-passcode').value || '').trim();
  const matches = passcode ? STATE.users.filter(user => user.pin === passcode) : [];
  if(matches.length === 1){
    STATE.currentUser = matches[0];
    UI.currentView = 'dashboard';
    saveState();
    render();
    return;
  }
  const errorBox = document.getElementById('li-err');
  if(errorBox){
    errorBox.textContent = matches.length > 1
      ? 'This passcode is assigned to multiple users. Update it in Settings before using it.'
      : 'Invalid passcode.';
    errorBox.classList.remove('hidden');
  }
}

function renderShell(){
  const user = STATE.currentUser;
  const navItems = [
    ['dashboard','Dashboard'],
    ['plans','Active Plans'],
    ['shop','Shop'],
    ['newplan','+ New Plan'],
    ['weekly','Weekly Updates'],
    ['employees','Employees'],
    ['writeups','Write Ups'],
    ['export','Reporting'],
    ...(user.role === 'admin' ? [['settings','Settings']] : [])
  ];
  return `
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">${riseWordmark(44)}</div>
          <div class="brand-copy">
            <strong>Performance Platform</strong>
            <span>Secure coaching, PIP, and roster management</span>
          </div>
        </div>
        <div class="nav">
          ${navItems.map(([id,label]) => `<button class="nav-btn ${UI.currentView === id ? 'active' : ''}" onclick="switchView('${id}')">${label}</button>`).join('')}
        </div>
        <div class="toolbar">
          ${user.role === 'admin' ? `<button class="btn btn-soft btn-sm" onclick="reloadCompanyRoster()">Reload Company Roster</button><button class="btn btn-danger btn-sm" onclick="resetAllData()">Reset Data</button>` : ''}
          <div class="user-meta">

            <button class="btn btn-soft btn-sm" onclick="logout()">Lock</button>
          </div>
        </div>
      </div>
    </div>
    <div class="shell">

  `;

function switchView(view){
  UI.currentView = view;
  saveState();
  render();
}

function logout(){
  STATE.currentUser = null;
  UI.currentView = 'dashboard';
  render();
}

function renderView(){
  if(UI.currentView === 'profile') return renderEmployeeProfile();
  if(UI.currentView === 'plans') return renderPlans();
  if(UI.currentView === 'shop') return renderShop();
  if(UI.currentView === 'newplan') return renderNewPlan();
  if(UI.currentView === 'weekly') return renderWeekly();
  if(UI.currentView === 'employees') return renderEmployees();
  if(UI.currentView === 'writeups') return renderWriteups();
  if(UI.currentView === 'export') return renderExport();
  if(UI.currentView === 'settings') return renderSettings();
  return renderDashboard();
}

  UI.newPlanDraft.selectedRecommendationIds = UI.newPlanDraft.recommendedActionItems.map(item => item.id);

function formatActionItemsForTextarea(items){
  return (items || [])
    .map(item => `${item.area || 'General'} | ${item.text || ''}`.trim())
    .filter(Boolean)
    .join('\n');
}

function renderSourceStatus(kind){
  const sourceMap = {
    shop: {
      tone: UI.newPlanDraft.shopTone,
      summary: UI.newPlanDraft.shopSummary,
      error: UI.newPlanDraft.shopError,
      defaultMessage: 'Upload a shop report in PDF, DOCX, or TXT format to auto-fill the score fields below.'
    },
    msoe: {
      tone: UI.newPlanDraft.msoeTone,
      summary: UI.newPlanDraft.msoeSummary,
      error: UI.newPlanDraft.msoeError,
      defaultMessage: 'Upload an MSOE PDF, DOCX, or TXT file to auto-fill the MSOE rating used for recommendations.'
    },
    plan: {
      tone: UI.newPlanDraft.planTone,
      summary: UI.newPlanDraft.planSummary,
      error: UI.newPlanDraft.planError,
      defaultMessage: 'Upload an existing coaching or PIP plan in PDF, DOCX, or TXT format to load action items into this plan.'
    }
  };
  const source = sourceMap[kind] || sourceMap.plan;
  const tone = source.tone;
  const summary = source.summary;
  const error = source.error;
  const defaultMessage = source.defaultMessage;
  const alertClass = tone === 'danger'
    ? 'alert-danger'
    : tone === 'warn'
      ? 'alert-warn'
      : tone === 'success'
        ? 'alert-success'
        : 'alert-info';

  if(error){
    return `<div class="alert alert-danger">${escapeHtml(error)}</div>`;
  }
  return `<div class="alert ${alertClass}">${escapeHtml(summary || defaultMessage)}</div>`;
}

      </div>

  `;
}

function syncNewPlanDraftToDom(){
  const shopStatus = document.getElementById('np-shop-source-status');
  const msoeStatus = document.getElementById('np-msoe-source-status');
  const planStatus = document.getElementById('np-plan-source-status');
  const preview = document.getElementById('np-imported-items-preview');
  if(shopStatus) shopStatus.innerHTML = renderSourceStatus('shop');
  if(msoeStatus) msoeStatus.innerHTML = renderSourceStatus('msoe');
  if(planStatus) planStatus.innerHTML = renderSourceStatus('plan');
  if(preview) preview.innerHTML = renderImportedActionPreview();
}

function numberOrNull(id){
  const field = document.getElementById(id);
  if(!field) return null;
  const value = field.value;
  return value === '' ? null : Number(value);
}

function collapseWhitespace(value){
  return String(value || '').replace(/\s+/g, ' ').trim();
}

function safeFileName(value){
  return String(value || 'document').replace(/[^a-z0-9._-]+/gi, '_');
}

function normalizeDocumentText(text){
  return String(text || '')
    .replace(/\r/g, '\n')
    .replace(/\u00a0/g, ' ')
    .replace(/[ \t]+\n/g, '\n')
    .replace(/\n{3,}/g, '\n\n');
}

async function extractTextFromFile(file){
  const extension = (file.name.split('.').pop() || '').toLowerCase();
  if(extension === 'pdf') return extractPdfText(file);
  if(extension === 'docx') return extractDocxText(file);
  if(extension === 'eml') return normalizeDocumentText(await file.text());
  if(extension === 'txt' || extension === 'text') return normalizeDocumentText(await file.text());
  throw new Error('Use a PDF, DOCX, TXT, or EML file for source uploads.');
}

async function extractPdfText(file){
  if(!window.pdfjsLib) throw new Error('PDF parsing support did not load.');
  const buffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data:buffer}).promise;
  const pages = [];
  for(let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1){
    const page = await pdf.getPage(pageNumber);
    const content = await page.getTextContent();
    const lines = [];
    let currentLine = [];
    let lastY = null;
    content.items.forEach(item => {
      const y = item.transform[5];
      if(lastY !== null && Math.abs(y - lastY) > 3 && currentLine.length){
        lines.push(currentLine.join(' '));
        currentLine = [];
      }
      currentLine.push(item.str);
      lastY = y;
    });
    if(currentLine.length) lines.push(currentLine.join(' '));
    pages.push(lines.map(collapseWhitespace).filter(Boolean).join('\n'));
  }
  return normalizeDocumentText(pages.join('\n\n'));
}

async function extractDocxText(file){
  if(!window.mammoth || !window.mammoth.extractRawText) throw new Error('DOCX parsing support did not load.');
  const buffer = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({arrayBuffer:buffer});
  return normalizeDocumentText(result.value);
}

function splitDocumentLines(text){
  return normalizeDocumentText(text)
    .split(/\n+/)
    .map(collapseWhitespace)
    .filter(Boolean);
}

function pickClosestScore(segment, alias){
  const matches = [...String(segment || '').matchAll(/\b(\d{1,3}(?:\.\d+)?)\s*%?\b/g)]
    .map(match => ({value:Number(match[1]), index:match.index || 0}))
    .filter(item => item.value >= 0 && item.value <= 100);
  if(!matches.length) return null;

  const aliasIndex = String(segment || '').toLowerCase().indexOf(alias.toLowerCase());
  if(aliasIndex === -1) return matches[0].value;

  matches.sort((left, right) => Math.abs(left.index - aliasIndex) - Math.abs(right.index - aliasIndex));
  return matches[0].value;
}

function findLabelledScore(text, aliases){
  const lines = splitDocumentLines(text);
  const flat = lines.join(' \n ');
  for(const alias of aliases){
    const aliasWords = alias.toLowerCase().split(/\s+/).filter(Boolean);
    for(let index = 0; index < lines.length; index += 1){
      const segment = [lines[index], lines[index + 1] || ''].join(' ');
      const lower = segment.toLowerCase();
      if(aliasWords.every(word => lower.includes(word))){
        const score = pickClosestScore(segment, alias);
        if(score != null) return score;
      }
    }
    if(flat.toLowerCase().includes(alias.toLowerCase())){
      const score = pickClosestScore(flat, alias);
      if(score != null) return score;
    }
  }
  return null;
}

function toIsoDate(raw){
  const cleaned = String(raw || '').trim().replace(/\./g, '/');
  if(/^\d{1,2}[/-]\d{1,2}[/-]\d{2,4}$/.test(cleaned)){
    const parts = cleaned.split(/[/-]/);
    const month = parts[0].padStart(2, '0');
    const day = parts[1].padStart(2, '0');
    const year = (parts[2].length === 2 ? '20' + parts[2] : parts[2]).padStart(4, '0');
    return `${year}-${month}-${day}`;
  }
  const parsed = new Date(cleaned);
  if(Number.isNaN(parsed.getTime())) return '';
  return parsed.toISOString().slice(0,10);
}

function parseShopDateFromText(text){
  const patterns = [
    /\b\d{1,2}[/-]\d{1,2}[/-]\d{2,4}\b/g,
    /\b(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+\d{1,2},\s+\d{4}\b/ig
  ];
  for(const pattern of patterns){
    const match = String(text || '').match(pattern);
    if(match && match[0]){
      return toIsoDate(match[0]);
    }
  }
  return '';
}

function parseShopScoresFromText(text){
  const scores = {shopDate: parseShopDateFromText(text)};
  SHOP_SCORE_FIELDS.forEach(field => {
    scores[field.key] = findLabelledScore(text, field.aliases);
  });
  return scores;
}

function parseMsoeScoreFromText(text){
  const normalized = normalizeDocumentText(text);
  const explicitPatterns = [
    /\bmsoe(?:\s+(?:rating|score|total|result))?[^\d]{0,20}(\d{1,3}(?:\.\d+)?)\s*%/i,
    /\bmsoe(?:\s+(?:rating|score|total|result))?[^\d]{0,20}(\d{1,3}(?:\.\d+)?)(?:\s*\/\s*100)\b/i
  ];

  for(const pattern of explicitPatterns){
    const match = normalized.match(pattern);
    const value = match ? Number(match[1]) : Number.NaN;
    if(!Number.isNaN(value) && value >= 0 && value <= 100) return value;
  }
  const candidateLines = splitDocumentLines(normalized).filter(line => /msoe/i.test(line));
  for(const line of candidateLines){
    const dateScrubbed = line.replace(/\b\d{1,2}[/-]\d{1,2}[/-]\d{2,4}\b/g, ' ');
    const percentMatch = dateScrubbed.match(/\b(\d{2,3}(?:\.\d+)?)\s*%/);
    if(percentMatch){
      const value = Number(percentMatch[1]);
      if(!Number.isNaN(value) && value >= 0 && value <= 100) return value;
    }
    const fallbackMatch = dateScrubbed.match(/\b(\d{2,3}(?:\.\d+)?)\b/);
    if(fallbackMatch){
      const value = Number(fallbackMatch[1]);
      if(!Number.isNaN(value) && value >= 0 && value <= 100) return value;
    }
  }

  return findLabelledScore(normalized, MSOE_SCORE_ALIASES.filter(alias => alias !== 'msoe'));
}

function applyShopScores(scores){
  SHOP_SCORE_FIELDS.forEach(field => {
    if(scores[field.key] == null) return;
    const input = document.getElementById(field.inputId);
    if(input) input.value = scores[field.key];
  });
  if(scores.shopDate){
    const shopDate = document.getElementById('np-shop-date');
    if(shopDate) shopDate.value = scores.shopDate;

function applyMsoeScore(score){

  const input = document.getElementById('np-msoe');
  if(input) input.value = score;
  updatePlanTypeSuggestion(true);

function detectActionArea(text){
  const lower = normalizeDocumentText(text).toLowerCase();
  let bestArea = 'General';
  let bestIndex = -1;
  ACTION_ITEM_AREA_RULES.forEach(rule => {
    rule.labels.forEach(label => {
      const index = lower.lastIndexOf(label);
      if(index > bestIndex){
        bestIndex = index;
        bestArea = rule.area;
      }
    });
  });
  return bestArea;
}

function dedupeActionItems(items){
  const seen = new Set();
  return items.filter(item => {
    const area = collapseWhitespace(item.area || 'General') || 'General';
    const text = collapseWhitespace(item.text || '');
    if(text.length < 8) return false;
    const key = `${area.toLowerCase()}|${text.toLowerCase()}`;
    if(seen.has(key)) return false;
    seen.add(key);
    item.area = area;
    item.text = text;
    return true;
  });
}

function extractActionItemsFromText(text){
  const normalized = normalizeDocumentText(text);
  const items = [];
  const blockPattern = /(?:^|\n)\s*(?:\(?\d{1,2}\)?[.)]|[-*•])\s+([\s\S]*?)(?=(?:\n\s*(?:\(?\d{1,2}\)?[.)]|[-*•])\s+)|$)/g;
  const blockMatches = [...normalized.matchAll(blockPattern)];

  if(blockMatches.length){
    blockMatches.forEach(match => {
      const rawText = collapseWhitespace(match[1]);
      const prefix = normalized.slice(Math.max(0, (match.index || 0) - 240), match.index || 0);
      if(rawText.length >= 8){
        items.push({
          area: detectActionArea(prefix + '\n' + rawText),
          text: rawText
        });
      }
    });
    const dedupedBlocks = dedupeActionItems(items);
    if(dedupedBlocks.length) return dedupedBlocks.map(item => buildDetailedActionItem(item.area, item.text));
  }

  const lines = splitDocumentLines(normalized);
  let currentArea = 'General';
  let currentItem = null;

  lines.forEach(line => {
    const area = detectActionArea(line);
    if(area !== 'General' && line.length <= 90 && !/^\d/.test(line)){
      currentArea = area;
      return;
    }

    const bulletMatch = line.match(/^(?:\(?\d{1,2}\)?[.)]|[-*•])\s+(.+)/);
    if(bulletMatch){
      if(currentItem) items.push(currentItem);
      currentItem = {area: currentArea, text: collapseWhitespace(bulletMatch[1])};
      return;
    }

    if(currentItem && line.length <= 220){
      currentItem.text = collapseWhitespace(`${currentItem.text} ${line}`);
      return;
    }

    if(line.length > 30 && /(develop|complete|review|demonstrate|offer|capture|send|provide|schedule|maintain|ask|log|audit|follow)/i.test(line)){
      items.push({area: currentArea, text: line});
    }
  });

  if(currentItem) items.push(currentItem);
  return dedupeActionItems(items).map(item => buildDetailedActionItem(item.area, item.text));
}

function downloadEmployeeDocuments(employeeId){
  const docs = collectEmployeeDocuments(employeeId);
  if(!docs.length){
    alert('No uploaded documents were found for this employee.');
    return;
  }
  docs.forEach((entry, index) => {
    setTimeout(() => {
      const link = document.createElement('a');
      link.href = entry.data;
      link.download = entry.name;
      link.click();
    }, index * 180);
  });
}

function addEmployee(){
  const name = document.getElementById('emp-name').value.trim();
  if(!name){
    alert('Enter the employee name.');
    return;
  }

  const managerField = document.getElementById('emp-manager');
  const managerId = (STATE.currentUser && STATE.currentUser.role !== 'admin') ? STATE.currentUser.id : (managerField ? managerField.value : '');
  const managerLabel = managerId ? managerName(managerId) : (STATE.currentUser && STATE.currentUser.role !== 'admin' ? STATE.currentUser.name : '');
  const regionalManagerField = document.getElementById('emp-regional-manager');
  const regionalManagerId = regionalManagerField ? regionalManagerField.value : '';
  const regionalManagerLabel = regionalManagerId ? managerName(regionalManagerId) : '';
  const outcome = upsertEmployeeRecord({
    name,
    role: document.getElementById('emp-role').value.trim() || 'Leasing Professional',
    community: document.getElementById('emp-community').value.trim() || currentDefaultCommunity(),
    region: document.getElementById('emp-region').value || currentDefaultRegion(),
    managerId,
    managerName: managerLabel,
    regionalManagerId,
    regionalManagerName: regionalManagerLabel,
    department: document.getElementById('emp-department').value.trim(),
    email: document.getElementById('emp-email').value.trim(),
    employeeNumber: document.getElementById('emp-number').value.trim(),
    statusType: document.getElementById('emp-status-type').value.trim(),
    status: 'Active'
  });

  saveState();
  render();
  alert(outcome === 'updated' ? 'Employee updated from the manual entry form.' : 'Employee added to the roster.');
}

function findEmployeeMatch(name, community){
  const normalizedName = normalizeComparable(name);
  const normalizedCommunity = normalizeComparable(community);
  return STATE.employees.find(employee => {
    if(normalizeComparable(employee.name) !== normalizedName) return false;
    if(normalizedCommunity) return normalizeComparable(employee.community) === normalizedCommunity;
    return true;
  });
}

function upsertEmployeeRecord(record){
  const normalized = normalizeEmployee(record);
  if(!normalized.managerId && normalized.managerName){
    normalized.managerId = resolveManagerId('', normalized.managerName);
  }
  if(!normalized.regionalManagerId && normalized.regionalManagerName){
    normalized.regionalManagerId = resolveManagerId('', normalized.regionalManagerName);
  }
  const existing = normalized.id ? STATE.employees.find(employee => employee.id === normalized.id) : findEmployeeMatch(normalized.name, normalized.community);
  if(existing){
    const terminated = normalizeComparable(normalized.status) === 'terminated';
    Object.assign(existing, {
      ...existing,
      role: normalized.role || existing.role,
      community: normalized.community || existing.community,
      region: normalized.region || existing.region,
      managerId: normalized.managerId || existing.managerId,
      managerName: normalized.managerName || existing.managerName,
      regionalManagerId: normalized.regionalManagerId || existing.regionalManagerId,
      regionalManagerName: normalized.regionalManagerName || existing.regionalManagerName,
      email: normalized.email || existing.email,
      department: normalized.department || existing.department,
      employeeNumber: normalized.employeeNumber || existing.employeeNumber,
      statusType: normalized.statusType || existing.statusType,
      status: normalized.status || existing.status,
      terminationReason: terminated ? (normalized.terminationReason || existing.terminationReason) : '',
      terminationDate: terminated ? (normalized.terminationDate || existing.terminationDate) : ''
    });
    return 'updated';
  }
  STATE.employees.push(normalized);
  return 'added';
}

function inferRegionFromText(value){
  const raw = normalizeComparable(value);
  if(raw.includes('west') || raw.includes('central')) return 'west';
  if(raw.includes('east')) return 'east';
  if(raw.includes('student')) return 'student';
  if(raw.includes('valdosta')) return 'valdosta';
  if(raw.includes('jax')) return 'jax';
  return '';
}

function updateEmployeeField(id, field, value){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee || !canUserAccessEmployee(STATE.currentUser, employee)) return;
  if(field === 'managerId' && STATE.currentUser.role !== 'admin') return;
  employee[field] = String(value || '').trim();
  saveState();
  render();
}

function saveEmployeePromotion(id){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee) return;
  const nextRole = String(document.getElementById('promote-role').value || '').trim() || employee.role || 'Employee';
  const nextManagerId = String(document.getElementById('promote-manager').value || '').trim();
  const nextRegion = String(document.getElementById('promote-region').value || '').trim();
  const note = String(document.getElementById('promote-note').value || '').trim();

  const previousRole = employee.role || 'Not set';
  const previousManager = managerDisplayName(employee) || 'Unassigned';
  const previousRegion = employee.region && REGIONS[employee.region] ? REGIONS[employee.region].name : (employee.region || 'Unassigned');
  const nextManager = nextManagerId ? managerName(nextManagerId) : 'Unassigned';
  const nextRegionLabel = nextRegion && REGIONS[nextRegion] ? REGIONS[nextRegion].name : (nextRegion || 'Unassigned');
  const noChange = normalizeComparable(previousRole) === normalizeComparable(nextRole)
    && String(employee.managerId || '') === nextManagerId
    && String(employee.region || '') === nextRegion;

  if(noChange && !note){
    alert('Update at least one field or add a change note before saving.');
    return;
  }

  employee.role = nextRole;
  employee.managerId = nextManagerId;
  employee.managerName = nextManagerId ? managerName(nextManagerId) : '';
  employee.region = nextRegion;

  logEmployeeEvent({
    employeeId: employee.id,
    type: 'promotion',
    date: today(),
    title: 'Promotion / assignment update',
    detail: `Role: ${previousRole} -> ${nextRole}. Area: ${previousRegion} -> ${nextRegionLabel}. Manager: ${previousManager} -> ${nextManager}.${note ? ' Note: ' + note : ''}`,
    createdBy: STATE.currentUser ? STATE.currentUser.name : ''
  });

  saveState();
  closeModal();
  render();
}

function applyBulkAssignments(){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  const matchRegion = document.getElementById('bulk-match-region').value;
  const matchCommunity = String(document.getElementById('bulk-match-community').value || '').trim();
  const matchManagerId = document.getElementById('bulk-match-manager').value;
  const setManagerId = document.getElementById('bulk-set-manager').value;
  const setRegionalManagerId = document.getElementById('bulk-set-regional-manager').value;
  const status = document.getElementById('bulk-assign-status');

  if(!setManagerId && !setRegionalManagerId){
    if(status) status.innerHTML = '<span class="alert alert-warn">Choose a primary manager and/or regional alert owner to apply.</span>';
    return;
  }

  const matches = visibleEmployees().filter(employee => {
    if(isEmployeeTerminated(employee)) return false;
    if(matchRegion && employee.region !== matchRegion) return false;
    if(matchCommunity && normalizeComparable(employee.community) !== normalizeComparable(matchCommunity)) return false;
    if(matchManagerId && employee.managerId !== matchManagerId) return false;
    return true;
  });

  matches.forEach(employee => {
    if(setManagerId){
      employee.managerId = setManagerId;
      employee.managerName = managerName(setManagerId);
    }
    if(setRegionalManagerId){
      employee.regionalManagerId = setRegionalManagerId;
      employee.regionalManagerName = managerName(setRegionalManagerId);
    }
  });

  saveState();
  render();
  const nextStatus = document.getElementById('bulk-assign-status');
  if(nextStatus) nextStatus.innerHTML = `<span class="alert alert-success">${matches.length} employee${matches.length === 1 ? '' : 's'} updated.</span>`;
}

function handleRosterUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const status = document.getElementById('roster-status');
  if(status) status.innerHTML = '<div class="alert alert-info">Importing roster file...</div>';

  const reader = new FileReader();
  reader.onload = function(loadEvent){
    try{
      const workbook = XLSX.read(loadEvent.target.result, {type:'binary'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
      if(!rows.length){
        throw new Error('The uploaded file did not contain any rows.');
      }

      const headers = rows[0].map(header => normalizeComparable(header));
      const nameIndex = headers.findIndex(header => header.includes('name'));
      const communityIndex = headers.findIndex(header => header.includes('community'));
      const roleIndex = headers.findIndex(header => header.includes('role') || header.includes('title'));
      const regionIndex = headers.findIndex(header => header.includes('region') || header.includes('area'));
      const departmentIndex = headers.findIndex(header => header.includes('department'));
      const emailIndex = headers.findIndex(header => header.includes('email'));
      const numberIndex = headers.findIndex(header => header.includes('employee number') || header.includes('employee #') || header.includes('number'));
      const statusIndex = headers.findIndex(header => header === 'status' || header.includes('employment status'));
      const statusTypeIndex = headers.findIndex(header => header.includes('status type'));
      const managerIdIndex = headers.findIndex(header => header.includes('manager id'));
      const managerNameIndex = headers.findIndex(header => header === 'manager' || header === 'manager name' || header.includes('assigned manager'));
      const regionalManagerIdIndex = headers.findIndex(header => header.includes('regional manager id') || header.includes('alert manager id'));
      const regionalManagerNameIndex = headers.findIndex(header => header === 'regional manager' || header.includes('regional alert owner') || header.includes('alert manager'));

      if(nameIndex < 0){
        throw new Error('A Name column is required.');
      }

      let added = 0;
      let updated = 0;

      rows.slice(1).forEach(row => {
        const name = String(row[nameIndex] || '').trim();
        if(!name) return;

        const community = communityIndex >= 0 ? String(row[communityIndex] || '').trim() : currentDefaultCommunity();
        const role = roleIndex >= 0 ? String(row[roleIndex] || '').trim() : 'Leasing Professional';
        const region = regionIndex >= 0 ? inferRegionFromText(row[regionIndex]) : currentDefaultRegion();
        const managerName = managerNameIndex >= 0 ? String(row[managerNameIndex] || '').trim() : '';
        const managerId = STATE.currentUser.role === 'admin'
          ? resolveManagerId(managerIdIndex >= 0 ? row[managerIdIndex] : '', managerName)
          : STATE.currentUser.id;
        const regionalManagerName = regionalManagerNameIndex >= 0 ? String(row[regionalManagerNameIndex] || '').trim() : '';
        const regionalManagerId = STATE.currentUser.role === 'admin'
          ? resolveManagerId(regionalManagerIdIndex >= 0 ? row[regionalManagerIdIndex] : '', regionalManagerName)
          : '';

        const outcome = upsertEmployeeRecord({
          name,
          community,
          role,
          region,
          managerId,
          managerName,
          regionalManagerId,
          regionalManagerName,
          department: departmentIndex >= 0 ? String(row[departmentIndex] || '').trim() : '',
          email: emailIndex >= 0 ? String(row[emailIndex] || '').trim() : '',
          employeeNumber: numberIndex >= 0 ? String(row[numberIndex] || '').trim() : '',
          status: statusIndex >= 0 ? String(row[statusIndex] || '').trim() || 'Active' : 'Active',
          statusType: statusTypeIndex >= 0 ? String(row[statusTypeIndex] || '').trim() : ''
        });
        if(outcome === 'added') added += 1;
        else updated += 1;
      });

      saveState();
      render();
      const nextStatus = document.getElementById('roster-status');
      if(nextStatus) nextStatus.innerHTML = `<div class="alert alert-success">${added} employee${added === 1 ? '' : 's'} added and ${updated} updated from ${escapeHtml(file.name)}.</div>`;
    }catch(error){
      if(status) status.innerHTML = `<div class="alert alert-danger">Upload error: ${escapeHtml(error.message)}</div>`;
    }
  };
  reader.readAsBinaryString(file);
}

function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(loadEvent){ resolve(loadEvent.target.result); };
    reader.onerror = function(){ reject(new Error('Could not read the file data.')); };
    reader.readAsDataURL(file);
  });
}

async function handleUpdatedShopUpload(planId, event){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const plan = getPlan(planId);
  if(!plan) return;
  const status = document.getElementById('updated-shop-status');
  if(status) status.innerHTML = '<div class="alert alert-info">Uploading and parsing the updated Ellis report...</div>';

  try{
    const [dataUrl, text] = await Promise.all([readFileAsDataUrl(file), extractTextFromFile(file)]);
    plan.updatedShopReportData = dataUrl;
    plan.updatedShopReportName = file.name;
    plan.updatedShopReportDate = today();
    plan.updatedShopScores = parseShopScoresFromText(text);
    plan.shopResolvedAt = today();
    if(!plan.shopRequestedAt) plan.shopRequestedAt = today();
    if(!plan.shopRequestedBy) plan.shopRequestedBy = STATE.currentUser.name;
    if(plan.status === 'shop_ordered') plan.status = 'completed';
    saveState();
    if(status) status.innerHTML = `<div class="alert alert-success">${escapeHtml(file.name)} uploaded. The shop queue item has been moved into history.</div>`;
    setTimeout(() => {
      closeModal();
      render();
    }, 700);
  }catch(error){
    if(status) status.innerHTML = `<div class="alert alert-danger">Upload error: ${escapeHtml(error.message)}</div>`;
  }
}

  const tone = UI.writeupDraft.acknowledgementTone;
  const summary = UI.writeupDraft.acknowledgementSummary;
  const error = UI.writeupDraft.acknowledgementError;
  const alertClass = tone === 'danger'
    ? 'alert-danger'
    : tone === 'warn'
      ? 'alert-warn'
      : tone === 'success'
        ? 'alert-success'
        : 'alert-info';
  if(error) return `<div class="alert alert-danger">${escapeHtml(error)}</div>`;
  return `<div class="alert ${alertClass}">${escapeHtml(summary || 'Upload a signed acknowledgement or employee email response to keep with the write-up history.')}</div>`;
}

  const status = document.getElementById('wu-source-status');

async function handleWriteupSourceUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  UI.writeupDraft.sourceFileName = file.name;
  UI.writeupDraft.sourceSummary = 'Reading uploaded support detail...';
  UI.writeupDraft.sourceError = '';
  UI.writeupDraft.sourceTone = 'info';
  syncWriteupDraftToDom();

  try{
    const [text, dataUrl] = await Promise.all([extractTextFromFile(file), readFileAsDataUrl(file)]);
    UI.writeupDraft.sourceDocData = dataUrl;
    UI.writeupDraft.extractedDetailText = collapseWhitespace(text).slice(0, 6000);
    const details = document.getElementById('wu-details');
    if(details){
      const current = details.value.trim();
      if(!current || confirm('Replace the current write-up details with the uploaded support detail?')){
        details.value = UI.writeupDraft.extractedDetailText;
      }
    }
    UI.writeupDraft.sourceSummary = `${file.name} loaded into the write-up detail field.`;
    UI.writeupDraft.sourceTone = 'success';
  }catch(error){
    UI.writeupDraft.sourceError = `Could not read ${file.name}. ${error.message}`;
    UI.writeupDraft.sourceSummary = '';
    UI.writeupDraft.sourceTone = 'danger';
  }

  syncWriteupDraftToDom();
  event.target.value = '';
}

async function handleWriteupAcknowledgementUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  UI.writeupDraft.acknowledgementName = file.name;
  UI.writeupDraft.acknowledgementSummary = 'Saving acknowledgement document...';
  UI.writeupDraft.acknowledgementError = '';
  UI.writeupDraft.acknowledgementTone = 'info';
  syncWriteupDraftToDom();

  try{
    UI.writeupDraft.acknowledgementData = await readFileAsDataUrl(file);
    UI.writeupDraft.acknowledgementSummary = `${file.name} will be saved with the write-up history.`;
    UI.writeupDraft.acknowledgementTone = 'success';
  }catch(error){
    UI.writeupDraft.acknowledgementError = `Could not read ${file.name}. ${error.message}`;
    UI.writeupDraft.acknowledgementSummary = '';
    UI.writeupDraft.acknowledgementTone = 'danger';

  syncWriteupDraftToDom();
  event.target.value = '';
}

function buildWriteupFromForm(){
  const employeeId = document.getElementById('wu-employee').value;

  if(!employeeId || !employee){
    alert('Select an employee for the write-up.');
    return null;
  }
  if(isEmployeeTerminated(employee)){
    alert('You cannot add a new write-up for an employee marked as terminated.');

  }
  const title = String(document.getElementById('wu-title').value || '').trim();
  const details = String(document.getElementById('wu-details').value || '').trim();
  if(!details){

  return normalizeWriteup({
    id: genId(),

    createdAt: today(),
    date: document.getElementById('wu-date').value || today(),

function maybeTriggerWriteupAlert(writeup){
  const employee = STATE.employees.find(item => item.id === writeup.employeeId);
  if(!employee) return;
  const recommendation = evaluateWriteupRecommendation(writeup.employeeId);
  if(recommendation.recommendation === 'none') return;

  const regionalEmail = regionalManagerEmail(employee);
  const regionalLabel = regionalManagerDisplayName(employee) || 'Regional alert owner not assigned';
  const recipients = [HR_ALERT_EMAIL, regionalEmail].filter(Boolean);
  const primary = recipients[0];
  const cc = recipients.slice(1);
  const subject = encodeURIComponent(`RISE write-up alert: ${employee.name} · ${recommendation.recommendation.toUpperCase()} suggested`);
  const body = encodeURIComponent(
    'HR team,\n\n' +
    'A new write-up was issued and the platform recommends additional action.\n\n' +
    `Employee: ${employee.name}\n` +
    `Community: ${employee.community || 'Not set'}\n` +
    `Area: ${employee.region && REGIONS[employee.region] ? REGIONS[employee.region].name : (employee.region || 'Not set')}\n` +
    `Manager: ${managerDisplayName(employee) || 'Not set'}\n` +
    `Regional alert owner: ${regionalLabel}\n` +
    `Write-up level: ${writeupLevelLabel(writeup.level)}\n` +
    `Category: ${writeup.category}\n` +
    `Recommendation: ${recommendation.message}\n` +
    `Issued: ${formatDate(writeup.date)}\n\n` +
    `${writeup.title || 'Write-up summary'}\n${writeup.details}\n\n` +
    `${regionalEmail ? '' : 'Note: no regional alert-owner email is currently saved in Settings for this employee assignment.\n'}`
  );

  const query = [`subject=${subject}`, `body=${body}`];
  if(cc.length) query.splice(1, 0, `cc=${encodeURIComponent(cc.join(','))}`);
  window.location.href = `mailto:${primary}?${query.join('&')}`;
}

function downloadWriteupAttachment(writeupId, kind){
  const writeup = getWriteup(writeupId);
  if(!writeup) return;
  const data = kind === 'ack' ? writeup.acknowledgementData : writeup.sourceDocData;
  const name = kind === 'ack' ? writeup.acknowledgementName : writeup.sourceFileName;
  if(!data) return;
  const link = document.createElement('a');
  link.href = data;
  link.download = name || (kind === 'ack' ? 'writeup-acknowledgement' : 'writeup-support-doc');
  link.click();
}

  try{

function saveWeeklyLog(planId, schedIdx){
  const plan = getPlan(planId);
  if(!plan) return;
  if(!plan.weeklyUpdates) plan.weeklyUpdates = [];
  if(!plan.meetings) plan.meetings = [];

  const selectedType = document.getElementById('log-type').value;
  const custom = document.getElementById('log-custom') ? document.getElementById('log-custom').value.trim() : '';
  const finalType = selectedType === '__custom__' ? custom : selectedType;
  if(!finalType){
    alert('Enter a custom meeting label.');
    return;
  }

  const items = (plan.actionItems || []).map((item, idx) => ({
    idx,
    status: document.getElementById('item-status-' + idx).value,
    note: document.getElementById('item-note-' + idx).value.trim()
  }));

  plan.weeklyUpdates.push({
    id: genId(),
    date: document.getElementById('log-date').value,
    overallStatus: document.getElementById('log-overall').value,
    notes: document.getElementById('log-notes').value.trim(),
    meetingType: finalType,
    schedIdx,
    items
  });

  const meetingRecord = {
    schedIdx,
    label: finalType,
    type: finalType,
    dueDate: schedIdx == null ? null : ((getSchedule(plan).find(item => item.schedIdx === schedIdx) || {}).due || null),
    heldDate: document.getElementById('log-date').value,
    status: 'completed',
    notes: document.getElementById('log-notes').value.trim()
  };

  if(schedIdx == null){
    plan.meetings.push(meetingRecord);
  }else{
    const existingIndex = plan.meetings.findIndex(item => item.schedIdx === schedIdx);
    if(existingIndex >= 0) plan.meetings[existingIndex] = meetingRecord;
    else plan.meetings.push(meetingRecord);
  }

  saveState();
  closeModal();
  render();
}
