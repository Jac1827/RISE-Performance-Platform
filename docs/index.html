function addEmployee(){
  const name = document.getElementById('emp-name').value.trim();
  if(!name){
    alert('Enter the employee name.');
    return;
  }

  const managerField = document.getElementById('emp-manager');
  const managerId = (STATE.currentUser && STATE.currentUser.role !== 'admin') ? STATE.currentUser.id : (managerField ? managerField.value : '');
  const managerLabel = managerId ? managerName(managerId) : (STATE.currentUser && STATE.currentUser.role !== 'admin' ? STATE.currentUser.name : '');
  const regionalManagerField = document.getElementById('emp-regional-manager');
  const regionalManagerId = regionalManagerField ? regionalManagerField.value : '';
  const regionalManagerLabel = regionalManagerId ? managerName(regionalManagerId) : '';
  const outcome = upsertEmployeeRecord({
    name,
    role: document.getElementById('emp-role').value.trim() || 'Leasing Professional',
    community: document.getElementById('emp-community').value.trim() || currentDefaultCommunity(),
    region: document.getElementById('emp-region').value || currentDefaultRegion(),
    managerId,
    managerName: managerLabel,
    regionalManagerId,
    regionalManagerName: regionalManagerLabel,
    department: document.getElementById('emp-department').value.trim(),
    email: document.getElementById('emp-email').value.trim(),
    employeeNumber: document.getElementById('emp-number').value.trim(),
    statusType: document.getElementById('emp-status-type').value.trim(),
    status: 'Active'
  });

  saveState();
  render();
  alert(outcome === 'updated' ? 'Employee updated from the manual entry form.' : 'Employee added to the roster.');
}

function findEmployeeMatch(name, community){
  const normalizedName = normalizeComparable(name);
  const normalizedCommunity = normalizeComparable(community);
  return STATE.employees.find(employee => {
    if(normalizeComparable(employee.name) !== normalizedName) return false;
    if(normalizedCommunity) return normalizeComparable(employee.community) === normalizedCommunity;
    return true;
  });
}

function upsertEmployeeRecord(record){
  const normalized = normalizeEmployee(record);
  if(!normalized.managerId && normalized.managerName){
    normalized.managerId = resolveManagerId('', normalized.managerName);
  }
  if(!normalized.regionalManagerId && normalized.regionalManagerName){
    normalized.regionalManagerId = resolveManagerId('', normalized.regionalManagerName);
  }
  const existing = normalized.id ? STATE.employees.find(employee => employee.id === normalized.id) : findEmployeeMatch(normalized.name, normalized.community);
  if(existing){
    const terminated = normalizeComparable(normalized.status) === 'terminated';
    Object.assign(existing, {
      ...existing,
      role: normalized.role || existing.role,
      community: normalized.community || existing.community,
      region: normalized.region || existing.region,
      managerId: normalized.managerId || existing.managerId,
      managerName: normalized.managerName || existing.managerName,
      regionalManagerId: normalized.regionalManagerId || existing.regionalManagerId,
      regionalManagerName: normalized.regionalManagerName || existing.regionalManagerName,
      email: normalized.email || existing.email,
      department: normalized.department || existing.department,
      employeeNumber: normalized.employeeNumber || existing.employeeNumber,
      statusType: normalized.statusType || existing.statusType,
      status: normalized.status || existing.status,
      terminationReason: terminated ? (normalized.terminationReason || existing.terminationReason) : '',
      terminationDate: terminated ? (normalized.terminationDate || existing.terminationDate) : ''
    });
    return 'updated';
  }
  STATE.employees.push(normalized);
  return 'added';
}

function inferRegionFromText(value){
  const raw = normalizeComparable(value);
  if(raw.includes('west') || raw.includes('central')) return 'west';
  if(raw.includes('east')) return 'east';
  if(raw.includes('student')) return 'student';
  if(raw.includes('valdosta')) return 'valdosta';
  if(raw.includes('jax')) return 'jax';
  return '';
}

function updateEmployeeField(id, field, value){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee || !canUserAccessEmployee(STATE.currentUser, employee)) return;
  if(field === 'managerId' && STATE.currentUser.role !== 'admin') return;
  employee[field] = String(value || '').trim();
  saveState();
  render();
}

function updateEmployeeManager(id, managerId){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee || !canUserAccessEmployee(STATE.currentUser, employee)) return;
  if(STATE.currentUser.role !== 'admin') return;
  const selected = String(managerId || '').trim();
  if(selected.startsWith('emp:')){
    const empId = selected.slice(4);
    const managerEmployee = (STATE.employees || []).find(item => item && item.id === empId);
    employee.managerId = '';
    employee.managerName = managerEmployee ? managerEmployee.name : '';
  }else{
    employee.managerId = selected;
    employee.managerName = employee.managerId ? managerName(employee.managerId) : '';
  }
  saveState();
  render();
}

function updateEmployeeRegionalManager(id, managerId){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee || !canUserAccessEmployee(STATE.currentUser, employee)) return;
  if(STATE.currentUser.role !== 'admin') return;
  employee.regionalManagerId = String(managerId || '').trim();
  employee.regionalManagerName = employee.regionalManagerId ? managerName(employee.regionalManagerId) : '';
  saveState();
  render();
}

function updateEmployeeRegion(id, region){

}

function saveEmployeePromotion(id){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee) return;
  const nextRole = String(document.getElementById('promote-role').value || '').trim() || employee.role || 'Employee';
  const nextManagerId = String(document.getElementById('promote-manager').value || '').trim();
  const nextRegion = String(document.getElementById('promote-region').value || '').trim();
  const note = String(document.getElementById('promote-note').value || '').trim();

  const previousRole = employee.role || 'Not set';
  const previousManager = managerDisplayName(employee) || 'Unassigned';
  const previousRegion = employee.region && REGIONS[employee.region] ? REGIONS[employee.region].name : (employee.region || 'Unassigned');
  const nextManager = nextManagerId ? managerName(nextManagerId) : 'Unassigned';
  const nextRegionLabel = nextRegion && REGIONS[nextRegion] ? REGIONS[nextRegion].name : (nextRegion || 'Unassigned');
  const noChange = normalizeComparable(previousRole) === normalizeComparable(nextRole)
    && String(employee.managerId || '') === nextManagerId
    && String(employee.region || '') === nextRegion;

  if(noChange && !note){
    alert('Update at least one field or add a change note before saving.');
    return;
  }

  employee.role = nextRole;
  employee.managerId = nextManagerId;
  employee.managerName = nextManagerId ? managerName(nextManagerId) : '';
  employee.region = nextRegion;

  logEmployeeEvent({
    employeeId: employee.id,
    type: 'promotion',
    date: today(),
    title: 'Promotion / assignment update',
    detail: `Role: ${previousRole} -> ${nextRole}. Area: ${previousRegion} -> ${nextRegionLabel}. Manager: ${previousManager} -> ${nextManager}.${note ? ' Note: ' + note : ''}`,
    createdBy: STATE.currentUser ? STATE.currentUser.name : ''
  });

  saveState();
  closeModal();
  render();
}

function reactivateEmployee(id){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;

    employeeId: employee.id,
    type: 'status_change',
    date: today(),
    title: 'Employee reactivated',
    detail: 'Employee was returned to active status in the roster.',
    createdBy: STATE.currentUser ? STATE.currentUser.name : ''
  });

function applyBulkAssignments(){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  const matchRegion = document.getElementById('bulk-match-region').value;
  const matchCommunity = String(document.getElementById('bulk-match-community').value || '').trim();
  const matchManagerId = document.getElementById('bulk-match-manager').value;
  const setManagerId = document.getElementById('bulk-set-manager').value;
  const setRegionalManagerId = document.getElementById('bulk-set-regional-manager').value;
  const status = document.getElementById('bulk-assign-status');

  if(!setManagerId && !setRegionalManagerId){
    if(status) status.innerHTML = '<span class="alert alert-warn">Choose a primary manager and/or regional alert owner to apply.</span>';
    return;
  }

  const matches = visibleEmployees().filter(employee => {
    if(isEmployeeTerminated(employee)) return false;
    if(matchRegion && employee.region !== matchRegion) return false;
    if(matchCommunity && normalizeComparable(employee.community) !== normalizeComparable(matchCommunity)) return false;
    if(matchManagerId){
      if(matchManagerId.startsWith('emp:')){
        const empId = matchManagerId.slice(4);
        const managerEmployee = (STATE.employees || []).find(item => item && item.id === empId);
        if(!managerEmployee || normalizeComparable(employee.managerName) !== normalizeComparable(managerEmployee.name)) return false;
      }else if(employee.managerId !== matchManagerId){
        return false;
      }
    }
    return true;
  });

  matches.forEach(employee => {
    if(setManagerId){
      const selected = String(setManagerId || '').trim();
      if(selected.startsWith('emp:')){
        const empId = selected.slice(4);
        const managerEmployee = (STATE.employees || []).find(item => item && item.id === empId);
        employee.managerId = '';
        employee.managerName = managerEmployee ? managerEmployee.name : '';
      }else{
        employee.managerId = selected;
        employee.managerName = managerName(selected);
      }
    }
    if(setRegionalManagerId){
      employee.regionalManagerId = setRegionalManagerId;
      employee.regionalManagerName = managerName(setRegionalManagerId);
    }
  });

  saveState();
  render();
  const nextStatus = document.getElementById('bulk-assign-status');
  if(nextStatus) nextStatus.innerHTML = `<span class="alert alert-success">${matches.length} employee${matches.length === 1 ? '' : 's'} updated.</span>`;
}

function handleRosterUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const status = document.getElementById('roster-status');
  if(status) status.innerHTML = '<div class="alert alert-info">Importing roster file...</div>';

  const reader = new FileReader();
  reader.onload = function(loadEvent){
    try{
      const workbook = XLSX.read(loadEvent.target.result, {type:'binary'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
      if(!rows.length){
        throw new Error('The uploaded file did not contain any rows.');
      }

      const headers = rows[0].map(header => normalizeComparable(header));
      const nameIndex = headers.findIndex(header => header.includes('name'));
      const communityIndex = headers.findIndex(header => header.includes('community'));
      const roleIndex = headers.findIndex(header => header.includes('role') || header.includes('title'));
      const regionIndex = headers.findIndex(header => header.includes('region') || header.includes('area'));
      const departmentIndex = headers.findIndex(header => header.includes('department'));
      const emailIndex = headers.findIndex(header => header.includes('email'));
      const numberIndex = headers.findIndex(header => header.includes('employee number') || header.includes('employee #') || header.includes('number'));
      const statusIndex = headers.findIndex(header => header === 'status' || header.includes('employment status'));
      const statusTypeIndex = headers.findIndex(header => header.includes('status type'));
      const managerIdIndex = headers.findIndex(header => header.includes('manager id'));
      const managerNameIndex = headers.findIndex(header => header === 'manager' || header === 'manager name' || header.includes('assigned manager'));
      const regionalManagerIdIndex = headers.findIndex(header => header.includes('regional manager id') || header.includes('alert manager id'));
      const regionalManagerNameIndex = headers.findIndex(header => header === 'regional manager' || header.includes('regional alert owner') || header.includes('alert manager'));

      if(nameIndex < 0){
        throw new Error('A Name column is required.');
      }

      let added = 0;
      let updated = 0;

      rows.slice(1).forEach(row => {
        const name = String(row[nameIndex] || '').trim();
        if(!name) return;

        const community = communityIndex >= 0 ? String(row[communityIndex] || '').trim() : currentDefaultCommunity();
        const role = roleIndex >= 0 ? String(row[roleIndex] || '').trim() : 'Leasing Professional';
        const region = regionIndex >= 0 ? inferRegionFromText(row[regionIndex]) : currentDefaultRegion();
        const managerName = managerNameIndex >= 0 ? String(row[managerNameIndex] || '').trim() : '';
        const managerId = STATE.currentUser.role === 'admin'
          ? resolveManagerId(managerIdIndex >= 0 ? row[managerIdIndex] : '', managerName)
          : STATE.currentUser.id;
        const regionalManagerName = regionalManagerNameIndex >= 0 ? String(row[regionalManagerNameIndex] || '').trim() : '';
        const regionalManagerId = STATE.currentUser.role === 'admin'
          ? resolveManagerId(regionalManagerIdIndex >= 0 ? row[regionalManagerIdIndex] : '', regionalManagerName)
          : '';

        const outcome = upsertEmployeeRecord({
          name,
          community,
          role,
          region,
          managerId,
          managerName,
          regionalManagerId,
          regionalManagerName,
          department: departmentIndex >= 0 ? String(row[departmentIndex] || '').trim() : '',
          email: emailIndex >= 0 ? String(row[emailIndex] || '').trim() : '',
          employeeNumber: numberIndex >= 0 ? String(row[numberIndex] || '').trim() : '',
          status: statusIndex >= 0 ? String(row[statusIndex] || '').trim() || 'Active' : 'Active',
          statusType: statusTypeIndex >= 0 ? String(row[statusTypeIndex] || '').trim() : ''
        });
        if(outcome === 'added') added += 1;
        else updated += 1;
      });

      saveState();
      render();
      const nextStatus = document.getElementById('roster-status');
      if(nextStatus) nextStatus.innerHTML = `<div class="alert alert-success">${added} employee${added === 1 ? '' : 's'} added and ${updated} updated from ${escapeHtml(file.name)}.</div>`;
    }catch(error){
      if(status) status.innerHTML = `<div class="alert alert-danger">Upload error: ${escapeHtml(error.message)}</div>`;
    }
  };
  reader.readAsBinaryString(file);
}

function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(loadEvent){ resolve(loadEvent.target.result); };
    reader.onerror = function(){ reject(new Error('Could not read the file data.')); };
    reader.readAsDataURL(file);
  });
}

async function handleUpdatedShopUpload(planId, event){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const plan = getPlan(planId);
  if(!plan) return;
  const status = document.getElementById('updated-shop-status');
  if(status) status.innerHTML = '<div class="alert alert-info">Uploading and parsing the updated Ellis report...</div>';

  try{
    const [dataUrl, text] = await Promise.all([readFileAsDataUrl(file), extractTextFromFile(file)]);
    plan.updatedShopReportData = dataUrl;
    plan.updatedShopReportName = file.name;
    plan.updatedShopReportDate = today();
    plan.updatedShopScores = parseShopScoresFromText(text);
    plan.shopResolvedAt = today();
    if(!plan.shopRequestedAt) plan.shopRequestedAt = today();
    if(!plan.shopRequestedBy) plan.shopRequestedBy = STATE.currentUser.name;
    if(plan.status === 'shop_ordered') plan.status = 'completed';
    saveState();
    if(status) status.innerHTML = `<div class="alert alert-success">${escapeHtml(file.name)} uploaded. The shop queue item has been moved into history.</div>`;
    setTimeout(() => {
      closeModal();
      render();
    }, 700);
  }catch(error){
    if(status) status.innerHTML = `<div class="alert alert-danger">Upload error: ${escapeHtml(error.message)}</div>`;
  }
}

async function handleWriteupSourceUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  UI.writeupDraft.sourceFileName = file.name;
  UI.writeupDraft.sourceSummary = 'Reading uploaded support detail...';
  UI.writeupDraft.sourceError = '';
  UI.writeupDraft.sourceTone = 'info';
  syncWriteupDraftToDom();

  try{
    const [text, dataUrl] = await Promise.all([extractTextFromFile(file), readFileAsDataUrl(file)]);
    UI.writeupDraft.sourceDocData = dataUrl;
    UI.writeupDraft.extractedDetailText = collapseWhitespace(text).slice(0, 6000);
    const details = document.getElementById('wu-details');
    if(details){
      const current = details.value.trim();
      if(!current || confirm('Replace the current write-up details with the uploaded support detail?')){
        details.value = UI.writeupDraft.extractedDetailText;
      }
    }
    UI.writeupDraft.sourceSummary = `${file.name} loaded into the write-up detail field.`;
    UI.writeupDraft.sourceTone = 'success';
  }catch(error){
    UI.writeupDraft.sourceError = `Could not read ${file.name}. ${error.message}`;
    UI.writeupDraft.sourceSummary = '';
    UI.writeupDraft.sourceTone = 'danger';
  }

  syncWriteupDraftToDom();
  event.target.value = '';
}

async function handleWriteupAcknowledgementUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  UI.writeupDraft.acknowledgementName = file.name;
  UI.writeupDraft.acknowledgementSummary = 'Saving acknowledgement document...';
  UI.writeupDraft.acknowledgementError = '';
  UI.writeupDraft.acknowledgementTone = 'info';
  syncWriteupDraftToDom();

  try{
    UI.writeupDraft.acknowledgementData = await readFileAsDataUrl(file);
    UI.writeupDraft.acknowledgementSummary = `${file.name} will be saved with the write-up history.`;
    UI.writeupDraft.acknowledgementTone = 'success';
  }catch(error){
    UI.writeupDraft.acknowledgementError = `Could not read ${file.name}. ${error.message}`;
    UI.writeupDraft.acknowledgementSummary = '';
    UI.writeupDraft.acknowledgementTone = 'danger';
  }

  syncWriteupDraftToDom();
  event.target.value = '';
}

function buildWriteupFromForm(){
  const employeeId = document.getElementById('wu-employee').value;
  const employee = getEmployee(employeeId);
  if(!employeeId || !employee){
    alert('Select an employee for the write-up.');
    return null;
  }

    alert('You cannot add a new write-up for an employee marked as terminated.');
    return null;
  }
  const title = String(document.getElementById('wu-title').value || '').trim();
  const details = String(document.getElementById('wu-details').value || '').trim();
  if(!details){
    alert('Enter the incident details for the write-up.');
    return null;

  return normalizeWriteup({
    id: genId(),
    employeeId,
    createdAt: today(),
    date: document.getElementById('wu-date').value || today(),

    level: document.getElementById('wu-level').value,

    consequences: String(document.getElementById('wu-consequences').value || '').trim(),

    linkedCallReviewIds: [...(UI.writeupDraft.selectedCallReviewIds || [])],

    sourceSummary: UI.writeupDraft.sourceSummary || '',
    sourceDocData: UI.writeupDraft.sourceDocData || '',
    acknowledgementName: UI.writeupDraft.acknowledgementName || '',

function maybeTriggerWriteupAlert(writeup){
  const employee = STATE.employees.find(item => item.id === writeup.employeeId);
  if(!employee) return;
  const recommendation = evaluateWriteupRecommendation(writeup.employeeId);
  if(recommendation.recommendation === 'none') return;

  const regionalEmail = regionalManagerEmail(employee);
  const regionalLabel = regionalManagerDisplayName(employee) || 'Regional alert owner not assigned';
  const recipients = [HR_ALERT_EMAIL, regionalEmail].filter(Boolean);
  const primary = recipients[0];
  const cc = recipients.slice(1);
  const subject = encodeURIComponent(`RISE write-up alert: ${employee.name} · ${recommendation.recommendation.toUpperCase()} suggested`);
  const body = encodeURIComponent(
    'HR team,\n\n' +
    'A new write-up was issued and the platform recommends additional action.\n\n' +
    `Employee: ${employee.name}\n` +
    `Community: ${employee.community || 'Not set'}\n` +
    `Area: ${employee.region && REGIONS[employee.region] ? REGIONS[employee.region].name : (employee.region || 'Not set')}\n` +
    `Manager: ${managerDisplayName(employee) || 'Not set'}\n` +
    `Regional alert owner: ${regionalLabel}\n` +
    `Write-up level: ${writeupLevelLabel(writeup.level)}\n` +
    `Category: ${writeup.category}\n` +
    `Recommendation: ${recommendation.message}\n` +
    `Issued: ${formatDate(writeup.date)}\n\n` +
    `${writeup.title || 'Write-up summary'}\n${writeup.details}\n\n` +
    `${regionalEmail ? '' : 'Note: no regional alert-owner email is currently saved in Settings for this employee assignment.\n'}`
  );

  const query = [`subject=${subject}`, `body=${body}`];
  if(cc.length) query.splice(1, 0, `cc=${encodeURIComponent(cc.join(','))}`);
  window.location.href = `mailto:${primary}?${query.join('&')}`;
}

  const status = document.getElementById('saved-writeup-ack-status');
  if(status) status.innerHTML = `<div class="alert alert-info">Saving ${escapeHtml(file.name)} to the write-up record...</div>`;

  try{

    writeup.acknowledgementDate = today();
    saveState();
    if(status) status.innerHTML = `<div class="alert alert-success">${escapeHtml(file.name)} saved to the write-up record.</div>`;

  }

  event.target.value = '';
}

function renderCallReviews(){
  const employees = sortedVisibleEmployees();
  const selectedEmployee = selectedCallReviewEmployee();
  const selectedEmployeeCallReviews = selectedEmployee ? callReviewsForEmployee(selectedEmployee.id) : [];
  const employeeSummary = employees.map(employee => {
    const reviews = callReviewsForEmployee(employee.id);
    const latest = reviews[0] || null;
    const managerScores = reviews.filter(review => review.callReviewManagerScore != null).map(review => Number(review.callReviewManagerScore));
    const averageManagerScore = managerScores.length
      ? Math.round((managerScores.reduce((sum, score) => sum + score, 0) / managerScores.length) * 10) / 10
      : null;
    return {
      employee,
      count: reviews.length,
      latest,
      averageManagerScore
    };

function saveWeeklyLog(planId, schedIdx){
  const plan = getPlan(planId);
  if(!plan) return;
  if(!plan.weeklyUpdates) plan.weeklyUpdates = [];
  if(!plan.meetings) plan.meetings = [];

  const selectedType = document.getElementById('log-type').value;
  const custom = document.getElementById('log-custom') ? document.getElementById('log-custom').value.trim() : '';
  const finalType = selectedType === '__custom__' ? custom : selectedType;
  if(!finalType){
    alert('Enter a custom meeting label.');
    return;
  }

  const items = (plan.actionItems || []).map((item, idx) => ({
    idx,
    status: document.getElementById('item-status-' + idx).value,
    note: document.getElementById('item-note-' + idx).value.trim()
  }));

  plan.weeklyUpdates.push({
    id: genId(),
    date: document.getElementById('log-date').value,
    overallStatus: document.getElementById('log-overall').value,
    notes: document.getElementById('log-notes').value.trim(),
    meetingType: finalType,
    schedIdx,
    items
  });

  const meetingRecord = {
    schedIdx,
    label: finalType,
    type: finalType,
    dueDate: schedIdx == null ? null : ((getSchedule(plan).find(item => item.schedIdx === schedIdx) || {}).due || null),
    heldDate: document.getElementById('log-date').value,
    status: 'completed',
    notes: document.getElementById('log-notes').value.trim()
  };

  if(schedIdx == null){
    plan.meetings.push(meetingRecord);
  }else{
    const existingIndex = plan.meetings.findIndex(item => item.schedIdx === schedIdx);
    if(existingIndex >= 0) plan.meetings[existingIndex] = meetingRecord;
    else plan.meetings.push(meetingRecord);
  }

  saveState();
  closeModal();
  render();
}

];

function reportDateLabel(){
  const option = REPORT_DATE_OPTIONS.find(item => item.value === UI.reportFilters.dateType);
  return option ? option.label : 'Key date';
}

function dateInRange(dateValue, from, to){
  if(!dateValue) return false;
  if(from && dateValue < from) return false;
  if(to && dateValue > to) return false;
  return true;
}

function planMatchesReportDate(plan){
  const {dateType, dateFrom, dateTo} = UI.reportFilters;
  if(dateType === 'none' || (!dateFrom && !dateTo)) return true;
  if(dateType === 'meetings'){
    const meetingDates = [
      ...getSchedule(plan).map(item => item.due).filter(Boolean),
      ...(plan.meetings || []).map(item => item.heldDate).filter(Boolean)
    ];
    return meetingDates.some(dateValue => dateInRange(dateValue, dateFrom, dateTo));
  }
  const lastUpdate = ((plan.weeklyUpdates || []).slice(-1)[0] || {}).date || '';
  const dateMap = {
    presented: plan.presentedAt || '',
    review: plan.reviewDate || '',
    signed_plan: plan.signedDocDate || '',
    last_update: lastUpdate,
    call_date: plan.callReviewDate || '',
    writeup_date: plan.createdAt || ''
  };
  return dateInRange(dateMap[dateType] || '', dateFrom, dateTo);
}

function writeupMatchesReportDate(writeup){
  const {dateType, dateFrom, dateTo} = UI.reportFilters;
  if(dateType === 'none' || (!dateFrom && !dateTo)) return true;
  if(dateType === 'call_date') return false;
  return dateInRange(writeup.date || writeup.createdAt || '', dateFrom, dateTo);
}

function employeeMatchesReportFilters(employee){
  if(!employee) return false;
  const filters = UI.reportFilters;
  if(filters.employeeId && employee.id !== filters.employeeId) return false;
  if(filters.managerId && employee.managerId !== filters.managerId) return false;
  if(filters.regionalManagerId && employee.regionalManagerId !== filters.regionalManagerId) return false;
  if(filters.region && employee.region !== filters.region) return false;
  if(filters.community && normalizeComparable(employee.community) !== normalizeComparable(filters.community)) return false;
  return true;
}

function filteredReportingPlans(){
  const selectedTypes = new Set(UI.reportFilters.recordTypes);
  return trackedPlans().filter(plan => {
    const employee = getEmployee(plan.employeeId);
    if(!employee || !employeeMatchesReportFilters(employee)) return false;
    if(!selectedTypes.has(plan.type)) return false;
    return planMatchesReportDate(plan);
  });
}

function filteredReportingWriteups(){
  const selectedTypes = new Set(UI.reportFilters.recordTypes);
  if(!selectedTypes.has('writeup')) return [];
  return visibleWriteups().filter(writeup => {
    const employee = STATE.employees.find(item => item.id === writeup.employeeId);
    if(!employee || !employeeMatchesReportFilters(employee)) return false;
    return writeupMatchesReportDate(writeup);
  });
}

function reportKeyDateForPlan(plan){
  const dateType = UI.reportFilters.dateType;
  if(dateType === 'presented') return plan.presentedAt || '';
  if(dateType === 'signed_plan') return plan.signedDocDate || '';
  if(dateType === 'call_date') return plan.callReviewDate || '';
  if(dateType === 'meetings'){
    const lastMeeting = (plan.meetings || []).filter(item => item.heldDate).slice(-1)[0];
    return (lastMeeting && lastMeeting.heldDate) || ((getSchedule(plan).slice(-1)[0] || {}).due || '');
  }
  if(dateType === 'last_update'){
    const lastUpdate = (plan.weeklyUpdates || []).slice(-1)[0];
    return lastUpdate ? lastUpdate.date : '';
  }
  if(plan.type === 'call_review') return plan.callReviewDate || plan.reviewDate || plan.createdAt || '';
  return plan.reviewDate || plan.createdAt || '';
}

function reportKeyDateForWriteup(writeup){
  return writeup.date || writeup.createdAt || '';
}

function callReviewSummaryText(plan){
  if(!plan || plan.type !== 'call_review') return plan && plan.notes ? plan.notes : '';
  const parts = [];
  if(plan.callReviewCallType) parts.push(planTypeLabel('call_review') + ': ' + capitalizeSentence(plan.callReviewCallType));
  if(plan.callReviewContact) parts.push(plan.callReviewContact);
  if(plan.callReviewSentiment) parts.push('Sentiment ' + capitalizeSentence(plan.callReviewSentiment));
  if(plan.callReviewEmployeeScore != null) parts.push('Employee ' + plan.callReviewEmployeeScore + '%');
  if(plan.callReviewManagerScore != null) parts.push('Manager ' + plan.callReviewManagerScore + '%');
  if(plan.callReviewTime) parts.push(plan.callReviewTime);
  if(plan.callReviewManagerFeedback) parts.push(plan.callReviewManagerFeedback);
  if(plan.callReviewDetails) parts.push(plan.callReviewDetails);
  return parts.filter(Boolean).join(' · ') || (plan.notes || 'Call review saved.');
}

function reportingRecords(){
  const planRows = filteredReportingPlans().map(plan => {
    const employee = getEmployee(plan.employeeId);
    const lastUpdate = (plan.weeklyUpdates || []).slice(-1)[0];
    return {
      kind: 'plan',
      recordType: plan.type,
      employee,
      title: `${planTypeLabel(plan.type)} plan`,
      summary: callReviewSummaryText(plan),
      keyDate: reportKeyDateForPlan(plan),
      status: planLabel(plan),
      recommendation: '',
      overallScore: plan.type === 'call_review'
        ? (plan.callReviewManagerScore != null ? plan.callReviewManagerScore : plan.callReviewEmployeeScore)
        : plan.overallScore,
      level: '',
      plan,
      writeup: null
    };
  });

  const writeupRows = filteredReportingWriteups().map(writeup => {
    const employee = STATE.employees.find(item => item.id === writeup.employeeId);
    return {
      kind: 'writeup',
      recordType: 'writeup',
      employee,
      title: writeup.title || writeupLevelLabel(writeup.level),
      summary: writeup.details || '',
      keyDate: reportKeyDateForWriteup(writeup),
      status: writeup.category,
      recommendation: evaluateWriteupRecommendation(writeup.employeeId).message,
      overallScore: null,
      level: writeup.level,
      plan: null,
      writeup
    };
  });

  return [...planRows, ...writeupRows].sort((left, right) => (right.keyDate || '').localeCompare(left.keyDate || '') || left.employee.name.localeCompare(right.employee.name));
}

function buildReportingSummary(records, mode){
  const grouped = {};
  records.forEach(record => {
    const employee = record.employee;
    const key = mode === 'manager'
      ? (managerDisplayName(employee) || 'Unassigned manager')
      : (employee.community || 'Unassigned community');
    if(!grouped[key]){
      grouped[key] = {
        label: key,
        employees: new Set(),
        pip: 0,
        coaching: 0,
        callReview: 0,
        writeups: 0,
        finalWarnings: 0,
        scoreSum: 0,
        scoreCount: 0
      };
    }
    const entry = grouped[key];
    entry.employees.add(employee.id);
    if(record.recordType === 'pip') entry.pip += 1;
    if(record.recordType === 'coaching') entry.coaching += 1;
    if(record.recordType === 'call_review') entry.callReview += 1;
    if(record.recordType === 'writeup'){
      entry.writeups += 1;
      if(writeupLevelMeta(record.level).severity >= 4) entry.finalWarnings += 1;
    }
    if(record.overallScore != null){
      entry.scoreSum += Number(record.overallScore);
      entry.scoreCount += 1;
    }
  });

  return Object.values(grouped)
    .map(entry => ({
      label: entry.label,
      employees: entry.employees.size,
      pip: entry.pip,
      coaching: entry.coaching,
      callReview: entry.callReview,
      writeups: entry.writeups,
      finalWarnings: entry.finalWarnings,
      avgScore: entry.scoreCount ? (entry.scoreSum / entry.scoreCount).toFixed(1) : ''
    }))
    .sort((left, right) => (right.pip + right.coaching + right.callReview + right.writeups) - (left.pip + left.coaching + left.callReview + left.writeups) || left.label.localeCompare(right.label));
}

function collectEmployeeDocuments(employeeId){
  const employee = getEmployee(employeeId);
  if(!employee) return [];
  const docs = [];

  trackedPlans().filter(plan => plan.employeeId === employeeId).forEach(plan => {
    if(plan.signedDocData){
      docs.push({name: safeFileName(`${employee.name}_signed-plan_${plan.type}_${plan.signedDocName || today()}`), data: plan.signedDocData});
    }
    if(plan.updatedShopReportData){
      docs.push({name: safeFileName(`${employee.name}_updated-shop_${plan.updatedShopReportName || today()}`), data: plan.updatedShopReportData});
    }
    if(plan.callReviewSourceData){
      docs.push({name: safeFileName(`${employee.name}_call-review_${plan.callReviewSourceName || plan.id}`), data: plan.callReviewSourceData});
    }
  });

  visibleWriteups().filter(writeup => writeup.employeeId === employeeId).forEach(writeup => {
    if(writeup.sourceDocData){
      docs.push({name: safeFileName(`${employee.name}_writeup-support_${writeup.sourceFileName || writeup.id}`), data: writeup.sourceDocData});
    }
    if(writeup.acknowledgementData){
      docs.push({name: safeFileName(`${employee.name}_writeup-ack_${writeup.acknowledgementName || writeup.id}`), data: writeup.acknowledgementData});
    }
  });

  return docs;
}

function downloadReportingEmployeeDocs(){
  const employeeId = UI.reportFilters.employeeId;
  if(!employeeId){
    alert('Select an employee in Reporting before downloading bulk documents.');
    return;
  }
  const docs = collectEmployeeDocuments(employeeId);
  if(!docs.length){
    alert('No uploaded documents were found for the selected employee.');
    return;
  }
  docs.forEach((entry, index) => {
    setTimeout(() => {
      const link = document.createElement('a');
      link.href = entry.data;
      link.download = entry.name;
      link.click();
    }, index * 180);
  });
}

function buildPlanApprovalDraft(plan){
  const employee = getEmployee(plan.employeeId);
  const regionalName = employee ? regionalManagerDisplayName(employee) : '';
  const recipient = employee ? regionalManagerEmail(employee) : '';
  const subject = `RISE ${planTypeUpperLabel(plan.type)} approved for ${employee ? employee.name : 'employee'}`;
  const body =
    `Hello ${regionalName || 'Regional Leader'},\n\n` +
    `The requested ${planTypeUpperLabel(plan.type)} plan for ${employee ? employee.name : 'this employee'} has been approved by HR and can now be issued to the appropriate direct report for presentation.\n\n` +
    `Employee: ${employee ? employee.name : 'Unknown employee'}\n` +
    `Community: ${employee ? (employee.community || 'Not set') : 'Not set'}\n` +
    `Direct manager: ${employee ? (managerDisplayName(employee) || 'Not set') : 'Not set'}\n` +
    `Review date: ${formatDate(plan.reviewDate)}\n\n` +
    `The branded plan document has been opened from the platform so the PDF can be attached before sending.\n\n` +
    `Approved by: ${STATE.currentUser ? STATE.currentUser.name : 'HR'}\n`;
  return {
    recipient,
    subject,
    body,
    attachmentName: `${employee ? employee.name : 'Employee'}_${safeFileName(planTypeLabel(plan.type))}_Plan.pdf`
  };
}

function buildHrApprovalRequestDraft(plan){
  const employee = getEmployee(plan.employeeId);
  const subject = `HR approval needed: ${employee ? employee.name : 'Employee'} · ${planTypeUpperLabel(plan.type)} plan`;
  const body =
    'HR team,\n\n' +
    'A new plan is awaiting HR approval in the RISE Performance Platform.\n\n' +
    `Employee: ${employee ? employee.name : 'Unknown employee'}\n` +
    `Community: ${employee ? (employee.community || 'Not set') : 'Not set'}\n` +
    `Area: ${employee && employee.region && REGIONS[employee.region] ? REGIONS[employee.region].name : (employee ? (employee.region || 'Not set') : 'Not set')}\n` +
    `Direct manager: ${employee ? (managerDisplayName(employee) || 'Not set') : 'Not set'}\n` +
    `Regional alert owner: ${employee ? (regionalManagerDisplayName(employee) || 'Not set') : 'Not set'}\n` +
    `Plan type: ${planTypeUpperLabel(plan.type)}\n` +
    `Issued: ${formatDate(plan.createdAt)}\n` +
    `Review date: ${formatDate(plan.reviewDate)}\n\n` +
    `Notes:\n${plan.notes ? plan.notes : 'No notes entered.'}\n\n` +
    'Please review and approve inside the platform.\n';
  return {recipient: HR_ALERT_EMAIL, subject, body};
}

function maybeTriggerHrApprovalRequest(plan){
  if(!plan || plan.hrApprovedAt) return;
  if(plan.hrApprovalRequestedAt) return;
  const employee = getEmployee(plan.employeeId);
  if(employee && isEmployeeTerminated(employee)) return;

  const draft = buildHrApprovalRequestDraft(plan);
  plan.hrApprovalRequestedAt = today();
  const correspondence = logCorrespondence({
    employeeId: employee ? employee.id : '',
    planId: plan.id,
    type: 'hr_approval_request',
    date: today(),
    subject: draft.subject,
    recipient: draft.recipient,
    status: 'HR approval email draft opened',
    summary: 'Plan saved and an HR approval request email draft was opened (static-site mailto).',
    body: draft.body,
    createdBy: STATE.currentUser ? STATE.currentUser.name : ''
  });
  plan.hrApprovalRequestCorrespondenceId = correspondence.id;
  saveState();
  window.location.href = `mailto:${draft.recipient}?subject=${encodeURIComponent(draft.subject)}&body=${encodeURIComponent(draft.body)}`;
}

function openHrApprovalModal(planId){
  const plan = getPlan(planId);
  if(!plan || !(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  if(plan.hrApprovedAt){
    alert('This plan is already approved by HR.');
    return;
  }
  const employee = getEmployee(plan.employeeId);
  const draft = buildPlanApprovalDraft(plan);
  openModal(`
    <div class="modal narrow">
      <button class="close-btn" onclick="closeModal()">x</button>
      <h3>Approve plan by HR</h3>

      <div class="alert alert-info" style="margin-bottom:12px">

function approvePlanByHr(planId){
  const plan = getPlan(planId);
  if(!plan || !(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  if(plan.hrApprovedAt){
    alert('This plan is already approved by HR.');
    return;
  }
  const employee = getEmployee(plan.employeeId);
  const draft = buildPlanApprovalDraft(plan);
  const approvalDateField = document.getElementById('hr-approve-date');
  plan.hrApprovedAt = approvalDateField ? (approvalDateField.value || today()) : today();
  plan.hrApprovedBy = STATE.currentUser.name;

  const correspondence = logCorrespondence({
    employeeId: employee ? employee.id : '',
    planId: plan.id,
    type: 'plan_approval',
    date: plan.hrApprovedAt,
    subject: draft.subject,
    recipient: draft.recipient,
    status: draft.recipient ? 'Approval email draft opened' : 'Approval recorded - regional email missing',
    summary: draft.recipient
      ? `HR approved the ${planTypeUpperLabel(plan.type)} plan and opened the regional notification draft. Attach the branded PDF manually before sending.`
      : `HR approved the ${planTypeUpperLabel(plan.type)} plan, but no regional alert-owner email is saved in Settings for this employee.`,
    body: draft.body,
    attachmentName: draft.attachmentName,
    createdBy: STATE.currentUser.name
  });
  plan.hrApprovalCorrespondenceId = correspondence.id;
  saveState();
  closeModal();
  render();
  exportPlanDocument(plan.id);
  if(draft.recipient){
    window.location.href = `mailto:${draft.recipient}?subject=${encodeURIComponent(draft.subject)}&body=${encodeURIComponent(draft.body)}`;
  }else{
    alert('Plan approved and correspondence logged, but no regional alert-owner email is saved in Settings for this employee.');
  }
}

function saveEditedPlan(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  if(!canUserEditPlanCore(STATE.currentUser, plan)){
    alert('Only admins can edit this plan after HR approval or employee presentation.');
    return;
  }
  const reviewDate = String(document.getElementById('edit-plan-review').value || '').trim();
  if(!reviewDate){
    alert('Review date is required.');
    return;
  }
  plan.reviewDate = reviewDate;
  plan.shopDate = String(document.getElementById('edit-plan-shop-date').value || '').trim();
  plan.requiresUpdatedShop = (document.getElementById('edit-plan-requires-shop').value === 'yes');
  plan.manager = String(document.getElementById('edit-plan-manager').value || '').trim() || plan.manager || '';
  plan.notes = String(document.getElementById('edit-plan-notes').value || '').trim();
  plan.actionItems = dedupeActionItems(parseActionItems(String(document.getElementById('edit-plan-items').value || '')));

  plan.overallScore = (() => {
    const value = String(document.getElementById('edit-plan-overall').value || '').trim();
    return value === '' ? null : Number(value);
  })();
  plan.msoeScore = (() => {
    const value = String(document.getElementById('edit-plan-msoe').value || '').trim();
    return value === '' ? null : Number(value);
  })();
  plan.telScore = (() => {
    const value = String(document.getElementById('edit-plan-telephone').value || '').trim();
    return value === '' ? null : Number(value);
  })();
  plan.onsiteScore = (() => {
    const value = String(document.getElementById('edit-plan-onsite').value || '').trim();
    return value === '' ? null : Number(value);
  })();

  plan.followupScore = (() => {
    const value = String(document.getElementById('edit-plan-followup').value || '').trim();
    return value === '' ? null : Number(value);
  })();
  plan.greetScore = (() => {
    const value = String(document.getElementById('edit-plan-greeting').value || '').trim();
    return value === '' ? null : Number(value);
  })();
  plan.needsScore = (() => {
    const value = String(document.getElementById('edit-plan-needs').value || '').trim();
    return value === '' ? null : Number(value);
  })();
  plan.demoScore = (() => {
    const value = String(document.getElementById('edit-plan-demo').value || '').trim();

function deletePlan(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  if(!canUserDeletePlan(STATE.currentUser, plan)){
    alert('Only admins can delete this plan after HR approval or employee presentation.');
    return;
  }
  const employee = getEmployee(plan.employeeId);
  const label = employee ? `${employee.name} · ${plan.type.toUpperCase()} · ${formatDate(plan.createdAt)}` : plan.type.toUpperCase();
  if(!confirm(`Delete this plan?\\n\\n${label}`)) return;
  STATE.plans = STATE.plans.filter(item => item.id !== planId);
  saveState();
  closeModal();
  render();
}

function markPlanPresented(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  if(!canUserMarkPlanPresented(STATE.currentUser, plan) && !(STATE.currentUser && STATE.currentUser.role === 'admin')){
    alert('Only admins can change presentation details after the plan is presented.');
    return;
  }
  if(plan.type === 'call_review'){
    alert('Call reviews do not use the presentation workflow.');
    return;
  }
  if(!isPlanHrApproved(plan)){
    alert('Record HR approval before presenting this plan to the employee.');
    return;
  }
  if(isPlanLocked(plan)){
    alert('This plan is locked after the signed document upload.');
    return;
  }
  openModal(`
    <div class="modal narrow">
      <button class="close-btn" onclick="closeModal()">x</button>
      <h3>Mark plan as presented</h3>
      <div class="sub">This presentation date starts the required weekly follow-up cadence and dashboard due dates.</div>
      <label>Presentation date</label>
      <input type="date" id="presented-date" value="${plan.presentedAt || today()}">
      <div class="inline" style="justify-content:flex-end;margin-top:18px">
        <button class="btn btn-soft" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmPresentation('${planId}')">Save presentation date</button>
      </div>
    </div>
  `);
}

function confirmPresentation(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  // Managers can only set the date once; admins can update.
  if(plan.presentedAt && !(STATE.currentUser && STATE.currentUser.role === 'admin')){
    alert('Only admins can update the presentation date after it has been set.');
    return;
  }
  const value = document.getElementById('presented-date').value;
  if(!value){
    alert('Choose a presentation date.');
    return;
  }
  plan.presentedAt = value;
  if(!plan.meetings) plan.meetings = [];
  const initialMeeting = {
    schedIdx: 0,
    label: `Initial presentation of ${planTypeLabel(plan.type)} plan`,
    type: `Initial presentation of ${planTypeLabel(plan.type)} plan`,
    dueDate: value,
    heldDate: value,
    status: 'completed',
    notes: 'Plan presented to employee.'
  };
  const existingIndex = plan.meetings.findIndex(item => item.schedIdx === 0);
  if(existingIndex >= 0) plan.meetings[existingIndex] = initialMeeting;
  else plan.meetings.push(initialMeeting);
  saveState();
  closeModal();
  openSignedUpload(planId);
  render();
}

function openSignedUpload(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  if(plan.type === 'call_review'){
    alert('Call reviews do not require a signed plan upload.');
    return;
  }
  if(isPlanLocked(plan)){
    alert('This plan is locked after the signed document upload.');
    return;
  }
  if(!(canUserUploadSignedPlan(STATE.currentUser, plan) || (STATE.currentUser && STATE.currentUser.role === 'admin'))){
    alert('Only admins can upload or replace signed plans after the plan is presented.');
    return;
  }
  openModal(`
    <div class="modal narrow">
      <button class="close-btn" onclick="closeModal()">x</button>
      <h3>Upload signed plan</h3>
      <div class="sub">Store the signed presented coaching or PIP plan in the browser for this employee's record.</div>
      <div class="file-box">
        <strong>Choose signed document</strong>
        <div class="small muted">PDF, JPG, PNG, or DOCX</div>
        <div style="margin-top:12px">
          <input id="signed-plan-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.docx" onchange="handleSignedUpload('${planId}', event)">
        </div>
      </div>
      <div id="signed-upload-status" style="margin-top:12px"></div>
    </div>
  `);
}

function handleSignedUpload(planId, event){
  const file = event.target.files[0];
  if(!file) return;
  const plan = getPlan(planId);
  if(!plan) return;
  if(isPlanLocked(plan)){
    alert('This plan is locked after the signed document upload.');
    return;
  }
  if(plan.signedDocData && !(STATE.currentUser && STATE.currentUser.role === 'admin')){
    alert('Only admins can replace a signed plan upload.');
    return;
  }
  if(!plan.signedDocData && !(canUserUploadSignedPlan(STATE.currentUser, plan) || (STATE.currentUser && STATE.currentUser.role === 'admin'))){
    alert('Only admins can upload signed plans after the plan is presented.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(loadEvent){
    plan.signedDocData = loadEvent.target.result;
    plan.signedDocName = file.name;
    plan.signedDocDate = today();
    saveState();
    const status = document.getElementById('signed-upload-status');
    if(status) status.innerHTML = '<div class="alert alert-success">Signed document saved: <strong>' + escapeHtml(file.name) + '</strong></div>';
    setTimeout(() => {
      closeModal();
      render();
    }, 700);
  };
  reader.readAsDataURL(file);
}

function downloadSignedDoc(planId){
  const plan = getPlan(planId);
  if(!plan || !plan.signedDocData) return;
  const link = document.createElement('a');
  link.href = plan.signedDocData;
  link.download = plan.signedDocName || 'signed-plan';
  link.click();
}

function markComplete(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  if(plan.requiresUpdatedShop){
    if(!confirm('Completing this plan will change the status to Shop Ordered and open an email to Tea Jihad. Continue?')) return;
    plan.status = 'shop_ordered';
    plan.completedAt = today();
    plan.shopOrderedAt = today();
    saveState();
    openTeaShopOrderEmail(plan);
  }else{
    if(!confirm('Mark this plan as completed?')) return;
    plan.status = 'completed';
    plan.completedAt = today();
    saveState();
  }
  render();
}

function exportReportingExcel(){
  const records = reportingRecords();
  const managerSummary = buildReportingSummary(records, 'manager');
  const communitySummary = buildReportingSummary(records, 'community');
  const wb = XLSX.utils.book_new();
  const recordRows = [[
    'Type','Employee','Manager','Regional Alert Owner','Community','Area','Key Date','Status / Level','Recommendation / Summary'
  ]];
  records.forEach(record => {
    recordRows.push([
      record.recordType === 'writeup' ? 'Write-up' : recordTypeLabel(record.recordType),
      record.employee.name,
      managerDisplayName(record.employee),
      regionalManagerDisplayName(record.employee),
      record.employee.community || '',
      record.employee.region && REGIONS[record.employee.region] ? REGIONS[record.employee.region].name : (record.employee.region || ''),
      record.keyDate || '',
      record.recordType === 'writeup' ? writeupLevelLabel(record.level) : record.status,
      record.recordType === 'writeup' ? record.recommendation : record.summary
    ]);
  });

  const managerRows = [['Manager','Employees','PIPs','Coaching','Call Reviews','Write-ups','Final Warnings','Avg Score']];
  managerSummary.forEach(row => managerRows.push([row.label, row.employees, row.pip, row.coaching, row.callReview, row.writeups, row.finalWarnings, row.avgScore]));

  const communityRows = [['Community','Employees','PIPs','Coaching','Call Reviews','Write-ups','Final Warnings','Avg Score']];
  communitySummary.forEach(row => communityRows.push([row.label, row.employees, row.pip, row.coaching, row.callReview, row.writeups, row.finalWarnings, row.avgScore]));

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(recordRows), 'Records');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(managerRows), 'Manager Summary');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(communityRows), 'Community Summary');
  XLSX.writeFile(wb, 'RISE_Reporting_' + today() + '.xlsx');
}

function saveBenchmarkSettings(){
  const benchmarkTarget = clampNumber(document.getElementById('st-benchmark-target').value, DEFAULT_SETTINGS.benchmarks.benchmarkTarget, 0, 100);
  const pipOverallThreshold = clampNumber(document.getElementById('st-pip-overall').value, DEFAULT_SETTINGS.benchmarks.pipOverallThreshold, 0, 100);
  const criticalMetricThreshold = clampNumber(document.getElementById('st-critical-metric').value, DEFAULT_SETTINGS.benchmarks.criticalMetricThreshold, 0, 100);
  const severeMetricCount = Math.round(clampNumber(document.getElementById('st-severe-count').value, DEFAULT_SETTINGS.benchmarks.severeMetricCount, 1, 6));
  const msoeCoachingThreshold = clampNumber(document.getElementById('st-msoe-coaching').value, DEFAULT_SETTINGS.benchmarks.msoeCoachingThreshold, 0, 100);
  const msoePipThreshold = clampNumber(document.getElementById('st-msoe-pip').value, DEFAULT_SETTINGS.benchmarks.msoePipThreshold, 0, 100);

  if(pipOverallThreshold > benchmarkTarget){
    alert('The PIP overall floor cannot be higher than the benchmark target.');
    return;
  }
  if(criticalMetricThreshold > benchmarkTarget){
    alert('The critical metric floor cannot be higher than the benchmark target.');
    return;
  }
  if(msoePipThreshold > msoeCoachingThreshold){
    alert('The MSOE PIP floor cannot be higher than the MSOE coaching floor.');
    return;
  }

  STATE.settings = normalizeSettings({
    ...STATE.settings,
    benchmarks: {
      benchmarkTarget,
      pipOverallThreshold,
      criticalMetricThreshold,
      severeMetricCount,
      msoeCoachingThreshold,
      msoePipThreshold
    }
  });
  saveState();
  render();
  alert('Benchmark criteria saved.');
}

function saveWriteupSettings(){
  const coachingThreshold = Math.round(clampNumber(document.getElementById('st-writeup-coaching').value, DEFAULT_SETTINGS.writeups.coachingThreshold, 1, 20));
  const pipThreshold = Math.round(clampNumber(document.getElementById('st-writeup-pip').value, DEFAULT_SETTINGS.writeups.pipThreshold, 1, 20));
  const immediatePipLevel = document.getElementById('st-writeup-level').value;

  if(pipThreshold < coachingThreshold){
    alert('The PIP threshold should be greater than or equal to the coaching threshold.');
    return;
  }

  STATE.settings = normalizeSettings({
    ...STATE.settings,
    writeups: {
      coachingThreshold,
      pipThreshold,
      immediatePipLevel
    }
  });
  saveState();
  render();
  alert('Write-up criteria saved.');
}

function toggleUserScopeFields(prefix){
  const roleField = document.getElementById(`${prefix}-role`);
  const scopeTypeField = document.getElementById(`${prefix}-scope-type`);
  const regionWrap = document.getElementById(`${prefix}-region-wrap`);
  const communityWrap = document.getElementById(`${prefix}-community-wrap`);
  if(!roleField || !scopeTypeField || !regionWrap || !communityWrap) return;

  if(roleField.value === 'admin'){
    scopeTypeField.value = 'all';
    scopeTypeField.disabled = true;
  }else{
    scopeTypeField.disabled = false;
    if(scopeTypeField.value === 'all') scopeTypeField.value = 'manager_only';
  }

  regionWrap.classList.toggle('hidden', scopeTypeField.value !== 'region');
  communityWrap.classList.toggle('hidden', scopeTypeField.value !== 'community');
}

        <select id="nu-scope-type" onchange="toggleUserScopeFields('nu')">${renderScopeTypeOptions('manager_only','manager')}</select>
      </div>
      <div id="nu-region-wrap" class="hidden" style="margin-top:12px">
        <label>Allowed area / region</label>
        <select id="nu-scope-region">
          <option value="">Select area</option>
          ${Object.entries(REGIONS).map(([key,value]) => `<option value="${key}">${value.name}</option>`).join('')}
        </select>
      </div>
      <div id="nu-community-wrap" class="hidden" style="margin-top:12px">
        <label>Allowed community</label>
        <input id="nu-scope-community" list="user-community-options" placeholder="Select or type community">
      </div>
      <datalist id="user-community-options">${communityChoices().map(community => `<option value="${escapeHtml(community)}">`).join('')}</datalist>
      <div class="inline" style="justify-content:flex-end;margin-top:18px">
        <button class="btn btn-soft" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveNewUser()">Add access code</button>
      </div>
    </div>
  `);
  toggleUserScopeFields('nu');
}

function saveNewUser(){
  const name = String(document.getElementById('nu-name').value || '').trim();
  const email = String(document.getElementById('nu-email').value || '').trim();
  const pin = String(document.getElementById('nu-pin').value || '').trim();
  const role = document.getElementById('nu-role').value;
  const scopeType = role === 'admin' ? 'all' : document.getElementById('nu-scope-type').value;
  const scopeValue = scopeType === 'region'
    ? document.getElementById('nu-scope-region').value
    : scopeType === 'community'
      ? String(document.getElementById('nu-scope-community').value || '').trim()
      : '';
  const id = generateUserIdFromName(name);

  if(!name || !pin){
    alert('Name and passcode are required.');
    return;
  }
  if(isPasscodeTaken(pin)){
    alert('That passcode is already assigned to another user. Use a unique passcode.');
    return;
  }
  if(scopeType === 'region' && !scopeValue){
    alert('Select an area / region for this user.');
    return;
  }
  if(scopeType === 'community' && !scopeValue){
    alert('Enter a community for this user.');
    return;
  }

  STATE.users.push(normalizeUser({id, name, email, pin, role, scopeType, scopeValue}));
  syncEmployeeManagerReferences(STATE.users[STATE.users.length - 1]);
  saveState();
  closeModal();
  render();
}

function openEditUser(userId){
  const user = STATE.users.find(item => item.id === userId);
  if(!user) return;

  openModal(`
    <div class="modal narrow">
      <button class="close-btn" onclick="closeModal()">x</button>
      <h3>Edit access code</h3>
      <div class="sub">Adjust the passcode, role, or scope for ${escapeHtml(user.name)}.</div>
      <div class="form-grid cols-2">
        <div><label>Full name</label><input id="eu-name" value="${escapeHtml(user.name)}"></div>
        <div><label>System ID</label><input value="${escapeHtml(user.id)}" disabled></div>
      </div>
      <div style="margin-top:12px">
        <label>Email for alerts</label>
        <input id="eu-email" type="email" value="${escapeHtml(user.email || '')}" placeholder="leader@risere.com">
      </div>
      <div class="form-grid cols-2" style="margin-top:12px">
        <div><label>New passcode</label><input id="eu-pin" type="password" maxlength="12" inputmode="numeric" placeholder="Leave blank to keep current"></div>
        <div><label>Role</label><select id="eu-role" onchange="toggleUserScopeFields('eu')"><option value="manager" ${user.role === 'manager' ? 'selected' : ''}>Manager</option><option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option></select></div>
      </div>
      <div style="margin-top:12px">
        <label>Access filter</label>
        <select id="eu-scope-type" onchange="toggleUserScopeFields('eu')">${renderScopeTypeOptions(user.scopeType, user.role)}</select>
      </div>
      <div id="eu-region-wrap" class="hidden" style="margin-top:12px">
        <label>Allowed area / region</label>
        <select id="eu-scope-region">
          <option value="">Select area</option>
          ${Object.entries(REGIONS).map(([key,value]) => `<option value="${key}" ${user.scopeType === 'region' && user.scopeValue === key ? 'selected' : ''}>${value.name}</option>`).join('')}
        </select>
      </div>
      <div id="eu-community-wrap" class="hidden" style="margin-top:12px">
        <label>Allowed community</label>
        <input id="eu-scope-community" list="user-community-options-edit" value="${user.scopeType === 'community' ? escapeHtml(user.scopeValue) : ''}" placeholder="Select or type community">
      </div>
      <datalist id="user-community-options-edit">${communityChoices().map(community => `<option value="${escapeHtml(community)}">`).join('')}</datalist>
      <div class="inline" style="justify-content:flex-end;margin-top:18px">
        <button class="btn btn-soft" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditUser('${user.id}')">Save changes</button>
      </div>
    </div>
  `);
  toggleUserScopeFields('eu');
}

function saveEditUser(userId){
  const user = STATE.users.find(item => item.id === userId);
  if(!user) return;

  if(user.id === 'admin'){
    alert('The Admin access code is fixed to passcode 0000 for recovery. Create a second admin if you need a different admin passcode.');
  }

  const nextRole = document.getElementById('eu-role').value;
  if(user.role === 'admin' && nextRole !== 'admin' && countAdmins() === 1){
    alert('At least one admin account must remain.');
    return;
  }

  const scopeType = nextRole === 'admin' ? 'all' : document.getElementById('eu-scope-type').value;
  const scopeValue = scopeType === 'region'
    ? document.getElementById('eu-scope-region').value
    : scopeType === 'community'
      ? String(document.getElementById('eu-scope-community').value || '').trim()
      : '';

  if(scopeType === 'region' && !scopeValue){
    alert('Select an area / region for this user.');
    return;
  }
  if(scopeType === 'community' && !scopeValue){
    alert('Enter a community for this user.');
    return;
  }

  user.name = String(document.getElementById('eu-name').value || '').trim() || user.name;
  user.email = String(document.getElementById('eu-email').value || '').trim();
  user.role = nextRole;
  user.scopeType = scopeType;
  user.scopeValue = scopeValue;
  const nextPin = String(document.getElementById('eu-pin').value || '').trim();
  if(nextPin && user.id !== 'admin'){
    if(isPasscodeTaken(nextPin, user.id)){
      alert('That passcode is already assigned to another user. Use a unique passcode.');
      return;
    }
    user.pin = nextPin;
  }
  if(user.role === 'admin'){
    user.scopeType = 'all';
    user.scopeValue = '';
  }
  if(user.id === 'admin'){
    user.role = 'admin';
    user.pin = '0000';
    user.scopeType = 'all';
    user.scopeValue = '';
  }

  syncEmployeeManagerReferences(user);
  STATE.users = ensureAdminAccess(STATE.users);
  saveState();
  closeModal();
  render();
}

function removeUser(userId){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  const user = STATE.users.find(item => item.id === userId);
  if(!user) return;
  if(user.id === STATE.currentUser.id){
    alert('Remove a different account or unlock as another admin first.');
    return;
  }
  if(user.role === 'admin' && countAdmins() === 1){
    alert('At least one admin account must remain.');
    return;
  }
  if(!confirm(`Remove ${user.name}?`)) return;
  STATE.employees.forEach(employee => {
    if(employee.managerId === user.id) employee.managerId = '';
    if(employee.regionalManagerId === user.id) employee.regionalManagerId = '';
  });
  STATE.users = STATE.users.filter(item => item.id !== userId);
  saveState();
  render();
}

function openModal(html){
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}

function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function resetAllData(){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')){
    alert('Only admins can reset saved platform data.');
    return;
  }
  if(!confirm('Clear all saved users, settings, employees, plans, and write-ups from this browser, then reload the published company roster?')) return;
  STATE = {
    users: makeDefaultUsers(),
    settings: makeDefaultSettings(),
    employees: [],
    plans: [],
    writeups: [],
    correspondence: makeCorrespondenceLog(),
    employeeEvents: makeEmployeeEventLog(),
    rosterVersion: '',
    currentView: 'dashboard',
    currentUser: null
  };
  UI = {
    currentView: 'dashboard',
    planFilter: 'active',
    selectedWeeklyPlanId: null,
    selectedWriteupEmployeeId: null,
    selectedCallReviewEmployeeId: null,
    selectedEmployeeProfileId: null,
    profileReturnView: 'employees',
    newPlanType: 'coaching',
    newPlanDraft: makeNewPlanDraft(),
    writeupDraft: makeWriteupDraft(),
    reportFilters: makeReportFilters(),
    employeeRosterFilters: makeEmployeeRosterFilters()
  };
  localStorage.removeItem(STORAGE_KEY);
  render();
  bootstrapCompanyRoster();
}

render();
bootstrapCompanyRoster();
</script>
</body>
</html>
