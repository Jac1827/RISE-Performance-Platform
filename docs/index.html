<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISE Performance Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --ink:#023046;
    --sky:#549db8;
    --paper:#ffffff;
    --mist:#eef5f8;
    --sand:#f7f4ef;
    --line:#d6e2e8;
    --text:#18313c;
    --muted:#5e7480;
    --danger:#9f2d2d;
    --warn:#b0761f;
    --ok:#2a6b3b;
    --shadow:0 18px 48px rgba(2,48,70,0.08);
    --radius:18px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
    background:
      radial-gradient(circle at top left, rgba(84,157,184,0.12), transparent 32%),
      linear-gradient(180deg, #f8fbfc 0%, #eef5f8 100%);
    color:var(--text);
    min-height:100vh;
  }
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  a{color:var(--ink)}

  .hidden{display:none !important}
  .shell{max-width:1380px;margin:0 auto;padding:0 18px 28px}
  .topbar{
    position:sticky;top:0;z-index:20;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.82);
    border-bottom:1px solid rgba(2,48,70,0.08);
  }
  .topbar-inner{
    max-width:1380px;margin:0 auto;padding:16px 18px;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:16px;min-width:280px}
  .brand svg{height:42px;width:auto;display:block}
  .brand-copy{line-height:1.2}
  .brand-copy strong{display:block;color:var(--ink);font-size:18px;letter-spacing:.02em}
  .brand-copy span{display:block;color:var(--muted);font-size:12px}

  .nav{display:flex;gap:8px;flex:1;flex-wrap:wrap}
  .nav-btn{
    border:none;background:transparent;color:var(--muted);
    padding:10px 12px;border-radius:999px;font-size:13px;font-weight:600;
    transition:.16s ease;
  }
  .nav-btn:hover{background:rgba(84,157,184,0.12);color:var(--ink)}
  .nav-btn.active{background:var(--ink);color:#fff;box-shadow:0 10px 22px rgba(2,48,70,0.18)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}

  .btn{
    border:1px solid transparent;border-radius:12px;padding:10px 14px;
    background:#fff;color:var(--ink);font-size:13px;font-weight:700;
    transition:.16s ease;box-shadow:0 10px 22px rgba(2,48,70,0.05);
  }
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-accent{background:var(--sky);color:#fff}
  .btn-soft{background:#fff;border-color:rgba(2,48,70,0.12)}
  .btn-danger{background:#fff0f0;border-color:#efc9c9;color:var(--danger)}
  .btn-warn{background:#fff5e6;border-color:#ecd6b1;color:#9a6618}
  .btn-sm{padding:8px 11px;font-size:12px}

  .page{padding-top:26px}
  .hero{
    background:linear-gradient(135deg, rgba(2,48,70,0.98), rgba(84,157,184,0.98));
    color:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow);
    margin-bottom:18px;overflow:hidden;position:relative;
  }
  .hero:after{
    content:"";position:absolute;inset:auto -120px -120px auto;width:260px;height:260px;
    border-radius:50%;background:rgba(255,255,255,0.08)
  }
  .hero h1{font-size:30px;letter-spacing:-.03em;margin-bottom:6px}
  .hero p{font-size:14px;max-width:720px;color:rgba(255,255,255,0.82)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .card{
    background:rgba(255,255,255,0.92);border:1px solid rgba(2,48,70,0.09);
    border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
  }
  .stat-card .label{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
  .stat-card .value{font-size:30px;font-weight:800;color:var(--ink)}
  .stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px}
  .stat-link{
    border:none;
    background:transparent;
    padding:0;
    font:inherit;
    color:var(--ink);
    font-size:30px;
    font-weight:800;
    line-height:1;
  }
  .stat-link:hover{text-decoration:underline}

  .grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .grid-2-equal{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}

  .section-title{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-bottom:14px;
  }
  .section-title h2{font-size:18px;color:var(--ink);letter-spacing:-.02em}
  .section-title p{font-size:12px;color:var(--muted)}

  .table-wrap{overflow:auto;border-radius:14px;border:1px solid rgba(2,48,70,0.08)}
  table{width:100%;border-collapse:collapse;background:#fff}
  th,td{padding:12px 12px;border-bottom:1px solid #edf2f5;font-size:13px;vertical-align:top}
  th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:left;background:#f7fbfd}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fbfdff}

  .badge{
    display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;
    font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  }
  .badge-pip{background:#fdeeee;color:#8e1d1d}
  .badge-coaching{background:#fff3df;color:#905f11}
  .badge-active{background:#e8f4ec;color:#205432}
  .badge-completed{background:#e8f0f8;color:#25537a}
  .badge-shop{background:#eef5f8;color:#023046}
  .badge-archived{background:#f0eef8;color:#4d4487}
  .badge-admin{background:#f0eef8;color:#4d4487}
  .badge-alert{background:#fff0f0;color:#8e1d1d}
  .badge-soft{background:#f2f7fa;color:#4f6470}

  .alert{
    padding:12px 14px;border-radius:14px;font-size:13px;border:1px solid transparent
  }
  .alert-info{background:#eef7fb;border-color:#d5e8f1;color:#19455d}
  .alert-success{background:#ecf7ef;border-color:#cfe7d6;color:#205432}
  .alert-warn{background:#fff7ea;border-color:#eedbbb;color:#8a5a18}
  .alert-danger{background:#fff0f0;border-color:#f3cdcd;color:#8e1d1d}

  .stack{display:flex;flex-direction:column;gap:12px}
  .inline{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .tiny{font-size:11px}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}

  .form-grid{display:grid;gap:12px}
  .cols-2{grid-template-columns:repeat(2,1fr)}
  .cols-3{grid-template-columns:repeat(3,1fr)}
  .cols-4{grid-template-columns:repeat(4,1fr)}
  label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:5px}
  input,select,textarea{
    width:100%;border:1px solid #d5e3ea;background:#fff;border-radius:12px;
    padding:11px 12px;color:var(--text);outline:none;transition:.16s ease;
  }
  input:focus,select:focus,textarea:focus{
    border-color:rgba(84,157,184,0.8);
    box-shadow:0 0 0 3px rgba(84,157,184,0.16);
  }
  textarea{min-height:100px;resize:vertical}
  .checkbox-row{display:flex;align-items:flex-start;gap:10px}
  .checkbox-row input{width:auto;margin-top:3px}

  .pill-row{display:flex;gap:10px;flex-wrap:wrap}
  .pill{
    border:1px solid #d7e4eb;background:#fff;padding:9px 12px;border-radius:999px;
    font-size:12px;font-weight:800;color:var(--muted);cursor:pointer
  }
  .pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .list-row{
    display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;
    padding:12px 0;border-bottom:1px solid #edf2f5
  }
  .list-row:last-child{border-bottom:none}

  .progress-wrap{height:8px;border-radius:999px;background:#edf2f5;overflow:hidden}
  .progress{height:8px;border-radius:999px;background:linear-gradient(90deg,var(--ink),var(--sky))}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(7,24,34,0.48);display:flex;
    align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal{
    width:min(980px,100%);max-height:92vh;overflow:auto;background:#fff;
    border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,0.22);position:relative;
  }
  .modal.narrow{width:min(560px,100%)}
  .close-btn{
    position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;
    border-radius:999px;background:#f2f7fa;color:var(--ink);font-size:18px;font-weight:800
  }
  .modal h3{font-size:22px;color:var(--ink);margin-bottom:6px}
  .modal .sub{font-size:13px;color:var(--muted);margin-bottom:18px}

  .schedule-row{
    display:grid;grid-template-columns:120px 1fr 120px 140px 90px;gap:10px;
    align-items:center;padding:10px 0;border-bottom:1px solid #edf2f5
  }
  .schedule-row:last-child{border-bottom:none}
  .schedule-status{font-size:12px;font-weight:700}
  .status-complete{color:var(--ok)}
  .status-overdue{color:var(--danger)}
  .status-open{color:var(--warn)}

  .file-box{
    border:1.5px dashed #b9d2dd;border-radius:16px;padding:18px;text-align:center;background:#f9fcfd
  }
  .file-box strong{display:block;color:var(--ink);margin-bottom:4px}

  .history-card{background:#f7fbfd;border:1px solid #e1edf2;border-radius:16px;padding:14px}
  .history-card h4{font-size:14px;color:var(--ink);margin-bottom:6px}

  .footer-note{margin-top:16px;font-size:12px;color:var(--muted)}
  .user-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .login-shell{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:26px 18px;
    background:
      radial-gradient(circle at top left, rgba(84,157,184,0.18), transparent 30%),
      linear-gradient(180deg, #f8fbfc 0%, #eaf2f6 100%);
  }
  .login-card{
    width:min(520px, 100%);
    background:rgba(255,255,255,0.96);
    border:1px solid rgba(2,48,70,0.08);
    border-radius:26px;
    padding:28px;
    box-shadow:var(--shadow);
  }
  .login-brand{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
  }
  .login-brand svg{height:52px;width:auto;display:block}
  .login-title{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-.03em}
  .login-sub{font-size:13px;color:var(--muted);margin-top:4px}
  .login-note{
    background:#f7fbfd;
    border:1px solid #dce8ee;
    border-radius:16px;
    padding:14px 15px;
    font-size:13px;
    color:var(--text);
    margin-top:14px;
  }
  .brand-mark svg{height:44px;width:auto;display:block}
  .brand-mark{display:flex;align-items:center}

  @media (max-width:1080px){
    .stats,.grid-3,.cols-4{grid-template-columns:repeat(2,1fr)}
    .grid-2,.grid-2-equal,.cols-2,.cols-3{grid-template-columns:1fr}
    .schedule-row{grid-template-columns:1fr}
  }
  @media (max-width:720px){
    .stats{grid-template-columns:1fr}
    .hero h1{font-size:24px}
    .shell{padding:0 14px 22px}
    .topbar-inner{padding:14px}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<script>
const STORAGE_KEY = 'rise_performance_platform_github_v1';
const ROLE_OPTIONS = ['Leasing Professional','Leasing Manager','Assistant Manager','Community Manager','Maintenance Technician','Maintenance Supervisor','Regional Manager','Administrative Assistant','Leasing Consultant','Property Manager'];
const COMMUNITY_OPTIONS = ['RISE at Nocatee','RISE at Glen Kernan Park','RISE Viera','Pilots Pointe','The Preserve at Tech'];
const REGIONS = {
  west:{name:'West Coast / Central FL',short:'West / Central'},
  east:{name:'East Coast FL',short:'East Coast'},
  student:{name:'Student Housing',short:'Student'},
  valdosta:{name:'Valdosta',short:'Valdosta'},
  jax:{name:'JAX Corporate',short:'JAX'}
};
const MEETING_LABEL_OPTIONS = [
  {value:'1:1',label:'1:1'},
  {value:'Initial presentation of PIP/Coaching plan',label:'Initial presentation of PIP/Coaching plan'},
  {value:'Weekly Follow Up',label:'Weekly Follow Up'},
  {value:'Task Completion Review',label:'Task Completion Review'},
  {value:'__custom__',label:'Blank / custom meeting type'}
];
const ACCESS_SCOPE_OPTIONS = [
  {value:'manager_only', label:'Assigned employees only'},
  {value:'region', label:'Area / region'},
  {value:'community', label:'Community'},
  {value:'all', label:'All employees'}
];
const DEFAULT_USERS = [
  {id:'admin',name:'Admin',pin:'0000',role:'admin',scopeType:'all',scopeValue:''},
  {id:'mgr_west',name:'West Manager',pin:'1111',role:'manager',scopeType:'region',scopeValue:'west'},
  {id:'mgr_east',name:'East Manager',pin:'2222',role:'manager',scopeType:'region',scopeValue:'east'},
  {id:'mgr_student1',name:'Student Manager 1',pin:'3333',role:'manager',scopeType:'region',scopeValue:'student'},
  {id:'mgr_student2',name:'Student Manager 2',pin:'4444',role:'manager',scopeType:'region',scopeValue:'student'},
  {id:'mgr_valdosta',name:'Valdosta Manager',pin:'5555',role:'manager',scopeType:'region',scopeValue:'valdosta'},
  {id:'mgr_jax',name:'JAX Manager',pin:'6666',role:'manager',scopeType:'region',scopeValue:'jax'}
];
const DEFAULT_SETTINGS = {
  benchmarks: {
    benchmarkTarget: 84,
    pipOverallThreshold: 60,
    criticalMetricThreshold: 60,
    severeMetricCount: 3
  }
};
const PDF_WORKER_SRC = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const ACTION_ITEM_AREA_RULES = [
  {area:'Telephone — Needs Assessment', labels:['telephone needs assessment','needs assessment','identifying needs','telephone assessment']},
  {area:'Telephone — Contact Capture', labels:['contact capture','contact information','guest card completeness']},
  {area:'Telephone — Appointment Setting', labels:['appointment setting','appointment times','scheduled appointment']},
  {area:'On-Site — Greeting & Introduction', labels:['greeting introduction','greeting and introduction','on-site greeting','greeting']},
  {area:'On-Site — Closing & Commitment', labels:['closing commitment','closing and commitment','direct ask','deposit application']},
  {area:'On-Site — Tour Content', labels:['tour content','tour flow','tour structure','neighborhood context']},
  {area:'Closing', labels:['closing']},
  {area:'Greeting', labels:['greeting']},
  {area:'Demonstrating', labels:['demonstrating','demonstration']},
  {area:'Follow-Up', labels:['follow-up','follow up','followup']}
];
const SHOP_SCORE_FIELDS = [
  {key:'overallScore', inputId:'np-overall', label:'overall score', aliases:['overall score','overall total','overall']},
  {key:'telScore', inputId:'np-telephone', label:'telephone', aliases:['telephone total','telephone score','telephone']},
  {key:'onsiteScore', inputId:'np-onsite', label:'on-site', aliases:['on-site total','onsite total','on site total','on-site score','onsite score','on-site']},
  {key:'followupScore', inputId:'np-followup', label:'follow-up', aliases:['follow-up','follow up','followup']},
  {key:'greetScore', inputId:'np-greeting', label:'greeting', aliases:['greeting']},
  {key:'needsScore', inputId:'np-needs', label:'identifying needs', aliases:['identifying needs','needs assessment','needs']},
  {key:'demoScore', inputId:'np-demo-closing', label:'demonstrating / closing', aliases:['demonstrating / closing','demonstrating and closing','demonstrating','closing']}
];

if(window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions){
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER_SRC;
}

function makeNewPlanDraft(){
  return {
    extractedActionItems: [],
    shopSourceFileName: '',
    shopSummary: '',
    shopError: '',
    shopTone: 'info',
    planSourceFileName: '',
    planSummary: '',
    planError: '',
    planTone: 'info'
  };
}

function normalizeComparable(value){
  return String(value || '').trim().toLowerCase();
}

function fallbackId(prefix){
  return `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}`;
}

function normalizeUser(user){
  const role = user && user.role === 'admin' ? 'admin' : 'manager';
  let scopeType = user && user.scopeType ? user.scopeType : (role === 'admin' ? 'all' : (user && user.region ? 'region' : 'manager_only'));
  let scopeValue = user && user.scopeValue != null ? String(user.scopeValue) : String(user && user.region || '');

  if(role === 'admin'){
    scopeType = 'all';
    scopeValue = '';
  }else if(scopeType === 'all'){
    scopeType = 'manager_only';
    scopeValue = '';
  }

  if(scopeType === 'region' && !REGIONS[scopeValue]){
    scopeValue = '';
  }

  return {
    id: String(user && user.id || fallbackId('user')),
    name: String(user && user.name || 'Manager'),
    pin: String(user && user.pin || ''),
    role,
    scopeType,
    scopeValue
  };
}

function normalizeEmployee(employee){
  return {
    id: String(employee && employee.id || fallbackId('emp')),
    name: String(employee && employee.name || '').trim(),
    role: String(employee && employee.role || 'Leasing Professional').trim(),
    community: String(employee && employee.community || '').trim(),
    region: String(employee && employee.region || '').trim(),
    managerId: String(employee && employee.managerId || '').trim()
  };
}

function normalizePlan(plan){
  return {
    ...plan,
    actionItems: Array.isArray(plan && plan.actionItems) ? plan.actionItems : [],
    weeklyUpdates: Array.isArray(plan && plan.weeklyUpdates) ? plan.weeklyUpdates : [],
    meetings: Array.isArray(plan && plan.meetings) ? plan.meetings : [],
    consequences: plan && plan.consequences != null ? Boolean(plan.consequences) : plan && plan.type === 'pip',
    requiresUpdatedShop: Boolean(plan && plan.requiresUpdatedShop),
    shopRequestNotes: String(plan && plan.shopRequestNotes || ''),
    shopRequestedBy: String(plan && plan.shopRequestedBy || ''),
    updatedShopScores: plan && typeof plan.updatedShopScores === 'object' && plan.updatedShopScores ? plan.updatedShopScores : null
  };
}

function makeDefaultUsers(){
  return DEFAULT_USERS.map(normalizeUser);
}

function clampNumber(value, fallback, min, max){
  const next = Number(value);
  if(Number.isNaN(next)) return fallback;
  return Math.max(min, Math.min(max, next));
}

function normalizeSettings(settings){
  const raw = settings && settings.benchmarks ? settings.benchmarks : {};
  const benchmarkTarget = clampNumber(raw.benchmarkTarget, DEFAULT_SETTINGS.benchmarks.benchmarkTarget, 0, 100);
  const pipOverallThreshold = clampNumber(raw.pipOverallThreshold, DEFAULT_SETTINGS.benchmarks.pipOverallThreshold, 0, benchmarkTarget);
  const criticalMetricThreshold = clampNumber(raw.criticalMetricThreshold, DEFAULT_SETTINGS.benchmarks.criticalMetricThreshold, 0, benchmarkTarget);
  const severeMetricCount = Math.round(clampNumber(raw.severeMetricCount, DEFAULT_SETTINGS.benchmarks.severeMetricCount, 1, 6));
  return {
    benchmarks: {
      benchmarkTarget,
      pipOverallThreshold,
      criticalMetricThreshold,
      severeMetricCount
    }
  };
}

function makeDefaultSettings(){
  return normalizeSettings(DEFAULT_SETTINGS);
}

let STATE = loadState();
let UI = {
  currentView: STATE.currentView || 'dashboard',
  planFilter: 'active',
  selectedWeeklyPlanId: null,
  newPlanType: 'coaching',
  newPlanDraft: makeNewPlanDraft()
};

function loadState(){
  try{
    const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const users = Array.isArray(stored.users) && stored.users.length ? stored.users.map(normalizeUser) : makeDefaultUsers();
    if(!users.some(user => user.role === 'admin')){
      users.unshift(normalizeUser(DEFAULT_USERS[0]));
    }
    return {
      users,
      settings: normalizeSettings(stored.settings),
      employees: Array.isArray(stored.employees) ? stored.employees.map(normalizeEmployee).filter(employee => employee.name) : [],
      plans: Array.isArray(stored.plans) ? stored.plans.map(normalizePlan) : [],
      currentView: stored.currentView || 'dashboard',
      currentUser: null
    };
  }catch(err){
    return {users:makeDefaultUsers(),settings:makeDefaultSettings(),employees:[],plans:[],currentView:'dashboard',currentUser:null};
  }
}

function saveState(){
  STATE.currentView = UI.currentView;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    users: STATE.users,
    settings: STATE.settings,
    employees: STATE.employees,
    plans: STATE.plans,
    currentView: STATE.currentView
  }));
}

function genId(){
  return 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function today(){
  return new Date().toISOString().slice(0,10);
}

function formatDate(date){
  if(!date) return 'Not set';
  const d = new Date(date + 'T00:00:00');
  if(Number.isNaN(d.getTime())) return date;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function addDays(base, days){
  const d = new Date(base + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

function riseWordmark(){
  return `
    <svg viewBox="0 0 520 122" aria-label="RISE logo" role="img">
      <rect width="520" height="122" fill="none"></rect>
      <g fill="#023046">
        <path d="M8 84V20h56c23 0 37 12 37 31 0 14-8 24-21 28l25 39H72L52 84H39v34H8zm31-26h22c11 0 18-6 18-16 0-11-7-16-18-16H39v32z"></path>

function resolveManagerId(rawId, rawName){
  const byId = normalizeComparable(rawId);
  if(byId){
    const idMatch = STATE.users.find(user => normalizeComparable(user.id) === byId);
    if(idMatch) return idMatch.id;
  }

  const byName = normalizeComparable(rawName);
  if(byName){
    const nameMatch = STATE.users.find(user => {
      const name = normalizeComparable(user.name);
      return name === byName || name.replace(/\s+/g, '_') === byName;

    if(nameMatch) return nameMatch.id;
  }

  return '';
}

function generateUserIdFromName(name, excludeId){
  const base = normalizeComparable(name).replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'manager';
  let candidate = base;
  let counter = 2;
  while(STATE.users.some(user => user.id === candidate && user.id !== excludeId)){
    candidate = `${base}_${counter}`;
    counter += 1;
  }
  return candidate;
}

function benchmarkRuleSummary(){

  return `Benchmark target ${settings.benchmarkTarget}%. Coaching starts below target. PIP starts at ${settings.pipOverallThreshold}% overall, any metric at or below ${settings.criticalMetricThreshold}%, or ${settings.severeMetricCount}+ metrics below benchmark.`;

function metricFieldDefinitions(){
  return SHOP_SCORE_FIELDS.filter(field => field.key !== 'overallScore');
}

function formatMetricLabels(keys){
  const labels = metricFieldDefinitions()
    .filter(field => keys.includes(field.key))
    .map(field => field.label.replace(/\b\w/g, char => char.toUpperCase()));
  return labels.join(', ');
}

function evaluatePlanRecommendation(scores){
  const settings = benchmarkSettings();
  const metrics = metricFieldDefinitions()
    .map(field => ({key: field.key, label: field.label, value: scores[field.key]}))
    .filter(metric => metric.value != null && !Number.isNaN(Number(metric.value)));
  const overall = scores.overallScore;
  const belowBenchmark = metrics.filter(metric => Number(metric.value) < settings.benchmarkTarget);
  const criticalMetrics = metrics.filter(metric => Number(metric.value) <= settings.criticalMetricThreshold);
  const anyScoreEntered = overall != null || metrics.length > 0;

  if(!anyScoreEntered){
    return {
      recommendation: 'pending',
      tone: 'muted',
      autoType: null,
      message: benchmarkRuleSummary()
    };
  }

  if(overall != null && Number(overall) <= settings.pipOverallThreshold){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. Overall score is at or below ${settings.pipOverallThreshold}%.`
    };
  }

  if(criticalMetrics.length){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. ${formatMetricLabels(criticalMetrics.map(metric => metric.key))} ${criticalMetrics.length === 1 ? 'is' : 'are'} at or below the critical ${settings.criticalMetricThreshold}% threshold.`
    };
  }

  if(belowBenchmark.length >= settings.severeMetricCount){
    return {
      recommendation: 'pip',
      tone: 'danger',
      autoType: 'pip',
      message: `PIP recommended. ${belowBenchmark.length} metrics are below the ${settings.benchmarkTarget}% benchmark, which meets your severe-trigger setting.`
    };
  }

  if(overall != null && Number(overall) < settings.benchmarkTarget){
    return {
      recommendation: 'coaching',
      tone: 'warn',
      autoType: 'coaching',
      message: `Coaching recommended. Overall score is below the ${settings.benchmarkTarget}% benchmark.`
    };
  }

  if(belowBenchmark.length){
    return {
      recommendation: 'coaching',
      tone: 'warn',
      autoType: 'coaching',
      message: `Coaching recommended. ${formatMetricLabels(belowBenchmark.map(metric => metric.key))} ${belowBenchmark.length === 1 ? 'is' : 'are'} below the ${settings.benchmarkTarget}% benchmark.`
    };
  }

  return {
    recommendation: 'none',
    tone: 'success',
    autoType: null,
    message: `Scores meet the current benchmark criteria. You can still choose coaching or PIP manually if needed.`
  };
}

function userScopeLabel(user){
  if(!user) return 'No access';
  if(user.role === 'admin' || user.scopeType === 'all') return 'All employees';
  if(user.scopeType === 'manager_only') return 'Assigned employees only';
  if(user.scopeType === 'region') return REGIONS[user.scopeValue] ? `Area: ${REGIONS[user.scopeValue].name}` : 'Area access';
  if(user.scopeType === 'community') return user.scopeValue ? `Community: ${user.scopeValue}` : 'Community access';
  return 'Restricted access';
}

function canUserAccessEmployee(user, employee){
  if(!user || !employee) return false;
  if(user.role === 'admin' || user.scopeType === 'all') return true;
  if(employee.managerId && employee.managerId === user.id) return true;
  if(user.scopeType === 'manager_only') return false;
  if(user.scopeType === 'region') return Boolean(user.scopeValue) && employee.region === user.scopeValue;
  if(user.scopeType === 'community') return Boolean(user.scopeValue) && normalizeComparable(employee.community) === normalizeComparable(user.scopeValue);
  return false;
}

function canUserAccessPlan(user, plan){

function visibleEmployees(){

function visiblePlans(){

function getEmployee(id){

function scoreClass(score){

  const value = Number(score);
  if(value >= 84) return 'badge-active';
  if(value >= 65) return 'badge-coaching';

function daysLeft(plan){
  return Math.ceil((new Date(plan.reviewDate) - new Date()) / 86400000);
}

function pctComplete(plan){
  if(!plan.presentedAt) return 0;
  const start = new Date(plan.presentedAt);
  const end = new Date(plan.reviewDate);
  const now = new Date();
  if(end <= start) return 100;
  return Math.max(0, Math.min(100, Math.round(((now - start) / (end - start)) * 100)));
}

function parseActionItems(text){
  return text
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      const parts = line.split('|');
      if(parts.length > 1){
        return {area: parts[0].trim(), text: parts.slice(1).join('|').trim()};
      }
      return {area:'General', text: line};
    })
    .filter(item => item.text);
}

function getSchedule(plan){
  if(!plan.presentedAt) return [];
  const schedule = [{
    schedIdx:0,
    due:plan.presentedAt,
    label:'Initial presentation of PIP/Coaching plan',
    type:'Initial presentation of PIP/Coaching plan'
  }];
  let schedIdx = 1;
  let cursor = addDays(plan.presentedAt, 7);
  while(cursor < plan.reviewDate){
    schedule.push({
      schedIdx,
      due:cursor,
      label:'Weekly Follow Up',
      type:'Weekly Follow Up'
    });
    schedIdx += 1;
    cursor = addDays(cursor, 7);
  }
  if(plan.reviewDate !== plan.presentedAt){
    const last = schedule[schedule.length - 1];
    if(last && last.due === plan.reviewDate && last.schedIdx !== 0){
      last.label = 'Task Completion Review';
      last.type = 'Task Completion Review';
    }else{
      schedule.push({
        schedIdx,
        due:plan.reviewDate,
        label:'Task Completion Review',
        type:'Task Completion Review'
      });
    }
  }
  return schedule;
}

function getMeetingRecord(plan, schedIdx){
  return (plan.meetings || []).find(item => item.schedIdx === schedIdx);
}

function getMeetingStatus(plan, schedItem){
  const record = getMeetingRecord(plan, schedItem.schedIdx);
  if(record) return record.status;
  if(schedItem.due < today()) return 'past_due';
  return 'scheduled';
}

function meetingStatusLabel(status){
  if(status === 'completed') return 'Completed';
  if(status === 'past_due') return 'Past Due';
  return 'Scheduled';
}

function getMissedMeetings(plan){
  return getSchedule(plan).filter(item => item.due < today() && getMeetingStatus(plan, item) !== 'completed').length;
}

function getOverdueActionItems(plan){
  const lastUpdate = (plan.weeklyUpdates || []).slice(-1)[0];
  if(!lastUpdate || !Array.isArray(lastUpdate.items)) return 0;
  return lastUpdate.items.filter(item => item.status === 'incomplete').length;
}

function getPlanAlerts(plan){
  const alerts = [];
  const dl = daysLeft(plan);
  if(plan.status === 'active' && !plan.presentedAt) alerts.push('Plan not yet presented');
  if(plan.status === 'active' && plan.presentedAt && !plan.signedDocData) alerts.push('Signed plan missing');
  if(plan.status === 'active' && dl < 0) alerts.push('Review date passed');
  const missed = getMissedMeetings(plan);
  if(missed > 0) alerts.push(missed + ' missed meeting' + (missed > 1 ? 's' : ''));
  const overdueItems = getOverdueActionItems(plan);
  if(overdueItems > 0) alerts.push(overdueItems + ' incomplete action item' + (overdueItems > 1 ? 's' : ''));
  return alerts;
}

function getUpcomingMeetings(){
  const meetings = [];
  activePlans().forEach(plan => {
    const employee = getEmployee(plan.employeeId);
    getSchedule(plan).forEach(item => {
      const record = getMeetingRecord(plan, item.schedIdx);
      if(record && record.status === 'completed') return;
      meetings.push({
        plan,
        employee,
        due:item.due,
        label:item.label,
        status:record ? record.status : (item.due < today() ? 'past_due' : 'scheduled')
      });
    });
  });
  return meetings.sort((a,b) => a.due.localeCompare(b.due));
}

function numberOrNull(id){
  const field = document.getElementById(id);
  if(!field) return null;
  const value = field.value;
  return value === '' ? null : Number(value);
}

function collapseWhitespace(value){
  return String(value || '').replace(/\s+/g, ' ').trim();
}

function normalizeDocumentText(text){
  return String(text || '')
    .replace(/\r/g, '\n')
    .replace(/\u00a0/g, ' ')
    .replace(/[ \t]+\n/g, '\n')
    .replace(/\n{3,}/g, '\n\n');
}

async function extractTextFromFile(file){
  const extension = (file.name.split('.').pop() || '').toLowerCase();
  if(extension === 'pdf') return extractPdfText(file);
  if(extension === 'docx') return extractDocxText(file);
  if(extension === 'txt' || extension === 'text') return normalizeDocumentText(await file.text());
  throw new Error('Use a PDF, DOCX, or TXT file for source uploads.');
}

async function extractPdfText(file){
  if(!window.pdfjsLib) throw new Error('PDF parsing support did not load.');
  const buffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data:buffer}).promise;
  const pages = [];
  for(let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1){
    const page = await pdf.getPage(pageNumber);
    const content = await page.getTextContent();
    const lines = [];
    let currentLine = [];
    let lastY = null;
    content.items.forEach(item => {
      const y = item.transform[5];
      if(lastY !== null && Math.abs(y - lastY) > 3 && currentLine.length){
        lines.push(currentLine.join(' '));
        currentLine = [];
      }
      currentLine.push(item.str);
      lastY = y;
    });
    if(currentLine.length) lines.push(currentLine.join(' '));
    pages.push(lines.map(collapseWhitespace).filter(Boolean).join('\n'));
  }
  return normalizeDocumentText(pages.join('\n\n'));
}

async function extractDocxText(file){
  if(!window.mammoth || !window.mammoth.extractRawText) throw new Error('DOCX parsing support did not load.');
  const buffer = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({arrayBuffer:buffer});
  return normalizeDocumentText(result.value);
}

function splitDocumentLines(text){
  return normalizeDocumentText(text)
    .split(/\n+/)
    .map(collapseWhitespace)
    .filter(Boolean);
}

function pickClosestScore(segment, alias){
  const matches = [...String(segment || '').matchAll(/\b(\d{1,3}(?:\.\d+)?)\s*%?\b/g)]
    .map(match => ({value:Number(match[1]), index:match.index || 0}))
    .filter(item => item.value >= 0 && item.value <= 100);
  if(!matches.length) return null;

  const aliasIndex = String(segment || '').toLowerCase().indexOf(alias.toLowerCase());
  if(aliasIndex === -1) return matches[0].value;

  matches.sort((left, right) => Math.abs(left.index - aliasIndex) - Math.abs(right.index - aliasIndex));
  return matches[0].value;
}

function findLabelledScore(text, aliases){
  const lines = splitDocumentLines(text);
  const flat = lines.join(' \n ');
  for(const alias of aliases){
    const aliasWords = alias.toLowerCase().split(/\s+/).filter(Boolean);
    for(let index = 0; index < lines.length; index += 1){
      const segment = [lines[index], lines[index + 1] || ''].join(' ');
      const lower = segment.toLowerCase();
      if(aliasWords.every(word => lower.includes(word))){
        const score = pickClosestScore(segment, alias);
        if(score != null) return score;
      }
    }
    if(flat.toLowerCase().includes(alias.toLowerCase())){
      const score = pickClosestScore(flat, alias);
      if(score != null) return score;
    }
  }
  return null;
}

function toIsoDate(raw){
  const cleaned = String(raw || '').trim().replace(/\./g, '/');
  if(/^\d{1,2}[/-]\d{1,2}[/-]\d{2,4}$/.test(cleaned)){
    const parts = cleaned.split(/[/-]/);
    const month = parts[0].padStart(2, '0');
    const day = parts[1].padStart(2, '0');
    const year = (parts[2].length === 2 ? '20' + parts[2] : parts[2]).padStart(4, '0');
    return `${year}-${month}-${day}`;
  }
  const parsed = new Date(cleaned);
  if(Number.isNaN(parsed.getTime())) return '';
  return parsed.toISOString().slice(0,10);
}

function parseShopDateFromText(text){
  const patterns = [
    /\b\d{1,2}[/-]\d{1,2}[/-]\d{2,4}\b/g,
    /\b(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+\d{1,2},\s+\d{4}\b/ig
  ];
  for(const pattern of patterns){
    const match = String(text || '').match(pattern);
    if(match && match[0]){
      return toIsoDate(match[0]);
    }
  }
  return '';
}

function parseShopScoresFromText(text){
  const scores = {shopDate: parseShopDateFromText(text)};
  SHOP_SCORE_FIELDS.forEach(field => {
    scores[field.key] = findLabelledScore(text, field.aliases);
  });
  return scores;
}

function applyShopScores(scores){
  SHOP_SCORE_FIELDS.forEach(field => {
    if(scores[field.key] == null) return;
    const input = document.getElementById(field.inputId);
    if(input) input.value = scores[field.key];
  });
  if(scores.shopDate){
    const shopDate = document.getElementById('np-shop-date');
    if(shopDate) shopDate.value = scores.shopDate;
  }
  updatePlanTypeSuggestion(true);
}

async function handleShopSourceUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  UI.newPlanDraft.shopSourceFileName = file.name;

  UI.newPlanDraft.shopTone = 'info';
  syncNewPlanDraftToDom();

  try{
    const text = await extractTextFromFile(file);
    const scores = parseShopScoresFromText(text);
    applyShopScores(scores);
    const filled = SHOP_SCORE_FIELDS.filter(field => scores[field.key] != null);
    if(filled.length){
      UI.newPlanDraft.shopSummary = `${file.name} filled ${filled.length} score field${filled.length === 1 ? '' : 's'}${scores.shopDate ? ' and the shop date' : ''}.`;
      UI.newPlanDraft.shopTone = 'success';
    }else{
      UI.newPlanDraft.shopSummary = `${file.name} uploaded, but no shop scores were confidently detected. You can still finish the scorecard manually.`;
      UI.newPlanDraft.shopTone = 'warn';
    }

    UI.newPlanDraft.shopError = `Could not read ${file.name}. ${error.message}`;
    UI.newPlanDraft.shopSummary = '';
    UI.newPlanDraft.shopTone = 'danger';
  }

  syncNewPlanDraftToDom();
  event.target.value = '';
}

function detectActionArea(text){
  const lower = normalizeDocumentText(text).toLowerCase();
  let bestArea = 'General';
  let bestIndex = -1;
  ACTION_ITEM_AREA_RULES.forEach(rule => {
    rule.labels.forEach(label => {
      const index = lower.lastIndexOf(label);
      if(index > bestIndex){
        bestIndex = index;
        bestArea = rule.area;
      }
    });
  });
  return bestArea;
}

function dedupeActionItems(items){
  const seen = new Set();
  return items.filter(item => {
    const area = collapseWhitespace(item.area || 'General') || 'General';
    const text = collapseWhitespace(item.text || '');
    if(text.length < 8) return false;
    const key = `${area.toLowerCase()}|${text.toLowerCase()}`;
    if(seen.has(key)) return false;
    seen.add(key);
    item.area = area;
    item.text = text;
    return true;
  });
}

function extractActionItemsFromText(text){
  const normalized = normalizeDocumentText(text);
  const items = [];
  const blockPattern = /(?:^|\n)\s*(?:\(?\d{1,2}\)?[.)]|[-*•])\s+([\s\S]*?)(?=(?:\n\s*(?:\(?\d{1,2}\)?[.)]|[-*•])\s+)|$)/g;
  const blockMatches = [...normalized.matchAll(blockPattern)];

  if(blockMatches.length){
    blockMatches.forEach(match => {
      const rawText = collapseWhitespace(match[1]);
      const prefix = normalized.slice(Math.max(0, (match.index || 0) - 240), match.index || 0);
      if(rawText.length >= 8){
        items.push({
          area: detectActionArea(prefix + '\n' + rawText),
          text: rawText
        });
      }
    });
    const dedupedBlocks = dedupeActionItems(items);
    if(dedupedBlocks.length) return dedupedBlocks;
  }

  const lines = splitDocumentLines(normalized);
  let currentArea = 'General';
  let currentItem = null;

  lines.forEach(line => {
    const area = detectActionArea(line);
    if(area !== 'General' && line.length <= 90 && !/^\d/.test(line)){
      currentArea = area;
      return;
    }

    const bulletMatch = line.match(/^(?:\(?\d{1,2}\)?[.)]|[-*•])\s+(.+)/);
    if(bulletMatch){
      if(currentItem) items.push(currentItem);
      currentItem = {area: currentArea, text: collapseWhitespace(bulletMatch[1])};
      return;
    }

    if(currentItem && line.length <= 220){
      currentItem.text = collapseWhitespace(`${currentItem.text} ${line}`);
      return;
    }

    if(line.length > 30 && /(develop|complete|review|demonstrate|offer|capture|send|provide|schedule|maintain|ask|log|audit|follow)/i.test(line)){
      items.push({area: currentArea, text: line});
    }
  });

  if(currentItem) items.push(currentItem);
  return dedupeActionItems(items);
}

async function handlePlanSourceUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  UI.newPlanDraft.planSourceFileName = file.name;
  UI.newPlanDraft.planSummary = 'Reading uploaded coaching / PIP document...';
  UI.newPlanDraft.planError = '';
  UI.newPlanDraft.planTone = 'info';
  syncNewPlanDraftToDom();

  try{
    const text = await extractTextFromFile(file);
    const extractedItems = extractActionItemsFromText(text);
    const previousImportedText = formatActionItemsForTextarea(UI.newPlanDraft.extractedActionItems);
    UI.newPlanDraft.extractedActionItems = extractedItems;

    if(extractedItems.length){
      const nextImportedText = formatActionItemsForTextarea(extractedItems);
      const textarea = document.getElementById('np-items');
      if(textarea){
        const currentValue = textarea.value.trim();
        if(!currentValue || currentValue === previousImportedText || confirm('Replace the current action items with the ones extracted from the uploaded plan?')){
          textarea.value = nextImportedText;
        }
      }
      UI.newPlanDraft.planSummary = `${file.name} loaded ${extractedItems.length} action item${extractedItems.length === 1 ? '' : 's'} for the plan generator.`;
      UI.newPlanDraft.planTone = 'success';
    }else{
      UI.newPlanDraft.planSummary = `${file.name} uploaded, but no clear action items were detected. You can still paste or type items manually below.`;
      UI.newPlanDraft.planTone = 'warn';
    }
  }catch(error){
    UI.newPlanDraft.planError = `Could not read ${file.name}. ${error.message}`;
    UI.newPlanDraft.planSummary = '';
    UI.newPlanDraft.planTone = 'danger';
  }

  syncNewPlanDraftToDom();
  event.target.value = '';
}

    region: document.getElementById('emp-region').value || currentDefaultRegion(),

function findEmployeeMatch(name, community){
  const normalizedName = normalizeComparable(name);
  const normalizedCommunity = normalizeComparable(community);
  return STATE.employees.find(employee => {
    if(normalizeComparable(employee.name) !== normalizedName) return false;
    if(normalizedCommunity) return normalizeComparable(employee.community) === normalizedCommunity;
    return true;
  });
}

function upsertEmployeeRecord(record){
  const normalized = normalizeEmployee(record);
  const existing = normalized.id ? STATE.employees.find(employee => employee.id === normalized.id) : findEmployeeMatch(normalized.name, normalized.community);
  if(existing){
    Object.assign(existing, {
      ...existing,
      role: normalized.role || existing.role,
      community: normalized.community || existing.community,
      region: normalized.region || existing.region,
      managerId: normalized.managerId || existing.managerId
    });
    return 'updated';
  }
  STATE.employees.push(normalized);
  return 'added';
}

function inferRegionFromText(value){
  const raw = normalizeComparable(value);
  if(raw.includes('west') || raw.includes('central')) return 'west';
  if(raw.includes('east')) return 'east';
  if(raw.includes('student')) return 'student';
  if(raw.includes('valdosta')) return 'valdosta';
  if(raw.includes('jax')) return 'jax';
  return '';
}

function updateEmployeeField(id, field, value){
  const employee = STATE.employees.find(item => item.id === id);
  if(!employee || !canUserAccessEmployee(STATE.currentUser, employee)) return;
  if(field === 'managerId' && STATE.currentUser.role !== 'admin') return;
  employee[field] = String(value || '').trim();
  saveState();
  render();
}

function updateEmployeeManager(id, managerId){
  updateEmployeeField(id, 'managerId', managerId);
}

function updateEmployeeRegion(id, region){
  updateEmployeeField(id, 'region', region);
}

function removeEmployee(id){

function handleRosterUpload(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const status = document.getElementById('roster-status');
  if(status) status.innerHTML = '<div class="alert alert-info">Importing roster file...</div>';

  const reader = new FileReader();
  reader.onload = function(loadEvent){
    try{
      const workbook = XLSX.read(loadEvent.target.result, {type:'binary'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
      if(!rows.length){
        throw new Error('The uploaded file did not contain any rows.');
      }

      const headers = rows[0].map(header => normalizeComparable(header));
      const nameIndex = headers.findIndex(header => header.includes('name'));
      const communityIndex = headers.findIndex(header => header.includes('community'));
      const roleIndex = headers.findIndex(header => header.includes('role') || header.includes('title'));
      const regionIndex = headers.findIndex(header => header.includes('region') || header.includes('area'));
      const managerIdIndex = headers.findIndex(header => header.includes('manager id'));
      const managerNameIndex = headers.findIndex(header => header === 'manager' || header === 'manager name' || header.includes('assigned manager'));

      if(nameIndex < 0){
        throw new Error('A Name column is required.');
      }

      let added = 0;
      let updated = 0;

      rows.slice(1).forEach(row => {
        const name = String(row[nameIndex] || '').trim();
        if(!name) return;

        const community = communityIndex >= 0 ? String(row[communityIndex] || '').trim() : currentDefaultCommunity();
        const role = roleIndex >= 0 ? String(row[roleIndex] || '').trim() : 'Leasing Professional';
        const region = regionIndex >= 0 ? inferRegionFromText(row[regionIndex]) : currentDefaultRegion();
        const managerId = STATE.currentUser.role === 'admin'
          ? resolveManagerId(managerIdIndex >= 0 ? row[managerIdIndex] : '', managerNameIndex >= 0 ? row[managerNameIndex] : '')
          : STATE.currentUser.id;

        const outcome = upsertEmployeeRecord({
          name,
          community,
          role,
          region,
          managerId
        });
        if(outcome === 'added') added += 1;
        else updated += 1;
      });

      saveState();
      render();
      const nextStatus = document.getElementById('roster-status');
      if(nextStatus) nextStatus.innerHTML = `<div class="alert alert-success">${added} employee${added === 1 ? '' : 's'} added and ${updated} updated from ${escapeHtml(file.name)}.</div>`;
    }catch(error){
      if(status) status.innerHTML = `<div class="alert alert-danger">Upload error: ${escapeHtml(error.message)}</div>`;
    }
  };
  reader.readAsBinaryString(file);
}

function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = function(loadEvent){ resolve(loadEvent.target.result); };
    reader.onerror = function(){ reject(new Error('Could not read the file data.')); };
    reader.readAsDataURL(file);
  });
}

async function handleUpdatedShopUpload(planId, event){
  if(!(STATE.currentUser && STATE.currentUser.role === 'admin')) return;
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const plan = getPlan(planId);
  if(!plan) return;
  const status = document.getElementById('updated-shop-status');
  if(status) status.innerHTML = '<div class="alert alert-info">Uploading and parsing the updated Ellis report...</div>';

  try{
    const [dataUrl, text] = await Promise.all([readFileAsDataUrl(file), extractTextFromFile(file)]);
    plan.updatedShopReportData = dataUrl;
    plan.updatedShopReportName = file.name;
    plan.updatedShopReportDate = today();
    plan.updatedShopScores = parseShopScoresFromText(text);
    plan.shopResolvedAt = today();
    if(!plan.shopRequestedAt) plan.shopRequestedAt = today();
    if(!plan.shopRequestedBy) plan.shopRequestedBy = STATE.currentUser.name;
    if(plan.status === 'shop_ordered') plan.status = 'completed';
    saveState();
    if(status) status.innerHTML = `<div class="alert alert-success">${escapeHtml(file.name)} uploaded. The shop queue item has been moved into history.</div>`;
    setTimeout(() => {
      closeModal();
      render();
    }, 700);
  }catch(error){
    if(status) status.innerHTML = `<div class="alert alert-danger">Upload error: ${escapeHtml(error.message)}</div>`;
  }
}

function saveWeeklyLog(planId, schedIdx){
  const plan = getPlan(planId);
  if(!plan) return;
  if(!plan.weeklyUpdates) plan.weeklyUpdates = [];
  if(!plan.meetings) plan.meetings = [];

  const selectedType = document.getElementById('log-type').value;
  const custom = document.getElementById('log-custom') ? document.getElementById('log-custom').value.trim() : '';
  const finalType = selectedType === '__custom__' ? custom : selectedType;
  if(!finalType){
    alert('Enter a custom meeting label.');
    return;
  }

  const items = (plan.actionItems || []).map((item, idx) => ({
    idx,
    status: document.getElementById('item-status-' + idx).value,
    note: document.getElementById('item-note-' + idx).value.trim()
  }));

  plan.weeklyUpdates.push({
    id: genId(),
    date: document.getElementById('log-date').value,
    overallStatus: document.getElementById('log-overall').value,
    notes: document.getElementById('log-notes').value.trim(),
    meetingType: finalType,
    schedIdx,
    items
  });

  const meetingRecord = {
    schedIdx,
    label: finalType,
    type: finalType,
    dueDate: schedIdx == null ? null : ((getSchedule(plan).find(item => item.schedIdx === schedIdx) || {}).due || null),
    heldDate: document.getElementById('log-date').value,
    status: 'completed',
    notes: document.getElementById('log-notes').value.trim()
  };

  if(schedIdx == null){
    plan.meetings.push(meetingRecord);
  }else{
    const existingIndex = plan.meetings.findIndex(item => item.schedIdx === schedIdx);
    if(existingIndex >= 0) plan.meetings[existingIndex] = meetingRecord;
    else plan.meetings.push(meetingRecord);
  }

  saveState();
  closeModal();
  render();
}

function confirmPresentation(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  const value = document.getElementById('presented-date').value;
  if(!value){
    alert('Choose a presentation date.');
    return;
  }
  plan.presentedAt = value;
  if(!plan.meetings) plan.meetings = [];
  const initialMeeting = {
    schedIdx: 0,
    label: 'Initial presentation of PIP/Coaching plan',
    type: 'Initial presentation of PIP/Coaching plan',
    dueDate: value,
    heldDate: value,
    status: 'completed',
    notes: 'Plan presented to employee.'
  };
  const existingIndex = plan.meetings.findIndex(item => item.schedIdx === 0);
  if(existingIndex >= 0) plan.meetings[existingIndex] = initialMeeting;
  else plan.meetings.push(initialMeeting);
  saveState();
  closeModal();
  openSignedUpload(planId);
  render();
}

function openSignedUpload(planId){
  openModal(`
    <div class="modal narrow">
      <button class="close-btn" onclick="closeModal()">x</button>
      <h3>Upload signed plan</h3>
      <div class="sub">Store the signed presented coaching or PIP plan in the browser for this employee's record.</div>
      <div class="file-box">
        <strong>Choose signed document</strong>
        <div class="small muted">PDF, JPG, PNG, or DOCX</div>
        <div style="margin-top:12px">
          <input id="signed-plan-file" type="file" accept=".pdf,.jpg,.jpeg,.png,.docx" onchange="handleSignedUpload('${planId}', event)">
        </div>
      </div>
      <div id="signed-upload-status" style="margin-top:12px"></div>
    </div>
  `);
}

function handleSignedUpload(planId, event){
  const file = event.target.files[0];
  if(!file) return;
  const plan = getPlan(planId);
  if(!plan) return;
  const reader = new FileReader();
  reader.onload = function(loadEvent){
    plan.signedDocData = loadEvent.target.result;
    plan.signedDocName = file.name;
    plan.signedDocDate = today();
    saveState();
    const status = document.getElementById('signed-upload-status');
    if(status) status.innerHTML = '<div class="alert alert-success">Signed document saved: <strong>' + escapeHtml(file.name) + '</strong></div>';
    setTimeout(() => {
      closeModal();
      render();
    }, 700);
  };
  reader.readAsDataURL(file);
}

function downloadSignedDoc(planId){
  const plan = getPlan(planId);
  if(!plan || !plan.signedDocData) return;
  const link = document.createElement('a');
  link.href = plan.signedDocData;
  link.download = plan.signedDocName || 'signed-plan';
  link.click();
}

function openTeaShopOrderEmail(plan){
  const employee = getEmployee(plan.employeeId);
  const subject = encodeURIComponent('Targeted shop requested: ' + (employee ? employee.name : 'Employee'));
  const body = encodeURIComponent(
    'Tea,\n\n' +
    'A targeted shop needs to be ordered for the following employee after plan completion:\n\n' +
    'Employee: ' + (employee ? employee.name : 'Unknown employee') + '\n' +
    'Community: ' + (employee ? (employee.community || 'Community not set') : 'Community not set') + '\n' +
    'Plan type: ' + plan.type.toUpperCase() + '\n' +
    'Plan completion date: ' + today() + '\n\n' +
    'Please order the updated shop.\n'
  );
  window.location.href = 'mailto:tea.jihad@risere.com?subject=' + subject + '&body=' + body;
}

function markComplete(planId){
  const plan = getPlan(planId);
  if(!plan) return;
  if(plan.requiresUpdatedShop){
    if(!confirm('Completing this plan will change the status to Shop Ordered and open an email to Tea Jihad. Continue?')) return;
    plan.status = 'shop_ordered';
    plan.completedAt = today();
    plan.shopOrderedAt = today();
    saveState();
    openTeaShopOrderEmail(plan);
  }else{
    if(!confirm('Mark this plan as completed?')) return;
    plan.status = 'completed';
    plan.completedAt = today();
    saveState();
  }
  render();
}

function exportWeeklyExcel(){
  const plans = trackedPlans();
  const wb = XLSX.utils.book_new();
  const overviewRows = [[
    'Employee','Community','Region','Plan Type','Status','Plan Start','Review Date','Presented?','Signed Plan','Signed File Name','Updated Shop Required','Meetings Scheduled','Meetings Completed','Missed Meetings','Last Update','Last Meeting Type','Overall Status'
  ]];

  plans.forEach(plan => {
    const employee = getEmployee(plan.employeeId);
    const last = (plan.weeklyUpdates || []).slice(-1)[0];
    const schedule = getSchedule(plan);
    overviewRows.push([
      employee ? employee.name : '',
      employee ? employee.community || '' : '',
      employee && employee.region ? (REGIONS[employee.region] ? REGIONS[employee.region].name : employee.region) : '',
      plan.type.toUpperCase(),
      planLabel(plan),
      plan.presentedAt || '',
      plan.reviewDate || '',
      plan.presentedAt ? 'Yes' : 'No',
      plan.signedDocData ? 'Yes' : 'No',
      plan.signedDocName || '',
      plan.requiresUpdatedShop ? 'Yes' : 'No',
      schedule.length,
      (plan.meetings || []).filter(item => item.status === 'completed').length,
      getMissedMeetings(plan),
      last ? last.date : '',
      last ? last.meetingType : '',
      last ? last.overallStatus : ''
    ]);
  });

  const scheduleRows = [[
    'Employee','Plan Type','Meeting Label','Due Date','Held Date','Status','Notes'
  ]];
  plans.forEach(plan => {
    const employee = getEmployee(plan.employeeId);
    getSchedule(plan).forEach(item => {
      const record = getMeetingRecord(plan, item.schedIdx);
      scheduleRows.push([
        employee ? employee.name : '',
        plan.type.toUpperCase(),
        item.label,
        item.due,
        record ? record.heldDate || '' : '',
        record ? meetingStatusLabel(record.status) : meetingStatusLabel(getMeetingStatus(plan, item)),
        record ? record.notes || '' : ''
      ]);
    });
  });

  const itemRows = [[
    'Employee','Plan Type','Item #','Area','Action Item','Latest Status','Latest Note'
  ]];
  plans.forEach(plan => {
    const employee = getEmployee(plan.employeeId);
    const latest = (plan.weeklyUpdates || []).slice(-1)[0];
    (plan.actionItems || []).forEach((item, index) => {
      const status = latest && latest.items ? latest.items.find(entry => entry.idx === index) : null;
      itemRows.push([
        employee ? employee.name : '',
        plan.type.toUpperCase(),
        index + 1,
        item.area || '',
        item.text,
        status ? status.status : 'pending',
        status ? status.note : ''
      ]);
    });
  });

  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(overviewRows), 'Overview');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(scheduleRows), 'Meeting Schedule');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(itemRows), 'Action Items');
  XLSX.writeFile(wb, 'RISE_Weekly_Export_' + today() + '.xlsx');
}

function saveBenchmarkSettings(){
  const benchmarkTarget = clampNumber(document.getElementById('st-benchmark-target').value, DEFAULT_SETTINGS.benchmarks.benchmarkTarget, 0, 100);
  const pipOverallThreshold = clampNumber(document.getElementById('st-pip-overall').value, DEFAULT_SETTINGS.benchmarks.pipOverallThreshold, 0, 100);
  const criticalMetricThreshold = clampNumber(document.getElementById('st-critical-metric').value, DEFAULT_SETTINGS.benchmarks.criticalMetricThreshold, 0, 100);
  const severeMetricCount = Math.round(clampNumber(document.getElementById('st-severe-count').value, DEFAULT_SETTINGS.benchmarks.severeMetricCount, 1, 6));

  if(pipOverallThreshold > benchmarkTarget){
    alert('The PIP overall floor cannot be higher than the benchmark target.');
    return;
  }
  if(criticalMetricThreshold > benchmarkTarget){
    alert('The critical metric floor cannot be higher than the benchmark target.');
    return;
  }

  STATE.settings = normalizeSettings({
    benchmarks: {
      benchmarkTarget,
      pipOverallThreshold,
      criticalMetricThreshold,
      severeMetricCount
    }
  });
  saveState();
  render();
  alert('Benchmark criteria saved.');
}

function renderScopeTypeOptions(selected, role){
  return ACCESS_SCOPE_OPTIONS.map(option => `<option value="${option.value}" ${option.value === selected ? 'selected' : ''}>${option.label}</option>`).join('');
}

function toggleUserScopeFields(prefix){
  const roleField = document.getElementById(`${prefix}-role`);
  const scopeTypeField = document.getElementById(`${prefix}-scope-type`);
  const regionWrap = document.getElementById(`${prefix}-region-wrap`);
  const communityWrap = document.getElementById(`${prefix}-community-wrap`);
  if(!roleField || !scopeTypeField || !regionWrap || !communityWrap) return;

  if(roleField.value === 'admin'){
    scopeTypeField.value = 'all';
    scopeTypeField.disabled = true;
  }else{
    scopeTypeField.disabled = false;
    if(scopeTypeField.value === 'all') scopeTypeField.value = 'manager_only';
  }

  regionWrap.classList.toggle('hidden', scopeTypeField.value !== 'region');
  communityWrap.classList.toggle('hidden', scopeTypeField.value !== 'community');
}

    <div class="modal narrow">
      <button class="close-btn" onclick="closeModal()">x</button>
      <h3>Add access code</h3>

      <div class="form-grid cols-2">
        <div style="grid-column:1/-1"><label>Full name</label><input id="nu-name"></div>
      </div>

        <div><label>Role</label><select id="nu-role" onchange="toggleUserScopeFields('nu')"><option value="manager">Manager</option><option value="admin">Admin</option></select></div>
      </div>
      <div style="margin-top:12px">

function saveNewUser(){
  const name = String(document.getElementById('nu-name').value || '').trim();
  const pin = String(document.getElementById('nu-pin').value || '').trim();
  const role = document.getElementById('nu-role').value;
  const scopeType = role === 'admin' ? 'all' : document.getElementById('nu-scope-type').value;
  const scopeValue = scopeType === 'region'
    ? document.getElementById('nu-scope-region').value
    : scopeType === 'community'
      ? String(document.getElementById('nu-scope-community').value || '').trim()
      : '';
  const id = generateUserIdFromName(name);

  if(!name || !pin){
    alert('Name and passcode are required.');
    return;
  }
  if(isPasscodeTaken(pin)){
    alert('That passcode is already assigned to another user. Use a unique passcode.');
    return;
  }
  if(scopeType === 'region' && !scopeValue){
    alert('Select an area / region for this user.');
    return;
  }
  if(scopeType === 'community' && !scopeValue){
    alert('Enter a community for this user.');
    return;
  }

  STATE.users.push(normalizeUser({id, name, pin, role, scopeType, scopeValue}));
  saveState();
  closeModal();
  render();
}

  const user = STATE.users.find(item => item.id === userId);
  if(!user) return;

  openModal(`

      <div class="sub">Adjust the passcode, role, or scope for ${escapeHtml(user.name)}.</div>
      <div class="form-grid cols-2">
        <div><label>Full name</label><input id="eu-name" value="${escapeHtml(user.name)}"></div>

        <div><label>Role</label><select id="eu-role" onchange="toggleUserScopeFields('eu')"><option value="manager" ${user.role === 'manager' ? 'selected' : ''}>Manager</option><option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option></select></div>
      </div>

      </div>
      <div id="eu-region-wrap" class="hidden" style="margin-top:12px">
        <label>Allowed area / region</label>
        <select id="eu-scope-region">
          <option value="">Select area</option>
          ${Object.entries(REGIONS).map(([key,value]) => `<option value="${key}" ${user.scopeType === 'region' && user.scopeValue === key ? 'selected' : ''}>${value.name}</option>`).join('')}
        </select>
      </div>
      <div id="eu-community-wrap" class="hidden" style="margin-top:12px">
        <label>Allowed community</label>
        <input id="eu-scope-community" list="user-community-options-edit" value="${user.scopeType === 'community' ? escapeHtml(user.scopeValue) : ''}" placeholder="Select or type community">
      </div>
      <datalist id="user-community-options-edit">${communityChoices().map(community => `<option value="${escapeHtml(community)}">`).join('')}</datalist>
      <div class="inline" style="justify-content:flex-end;margin-top:18px">
        <button class="btn btn-soft" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEditUser('${user.id}')">Save changes</button>
      </div>
    </div>
  `);
  toggleUserScopeFields('eu');
}

function saveEditUser(userId){
  const user = STATE.users.find(item => item.id === userId);
  if(!user) return;

  const nextRole = document.getElementById('eu-role').value;
  if(user.role === 'admin' && nextRole !== 'admin' && countAdmins() === 1){
    alert('At least one admin account must remain.');
    return;
  }

  const scopeType = nextRole === 'admin' ? 'all' : document.getElementById('eu-scope-type').value;
  const scopeValue = scopeType === 'region'
    ? document.getElementById('eu-scope-region').value
    : scopeType === 'community'
      ? String(document.getElementById('eu-scope-community').value || '').trim()
      : '';

  if(scopeType === 'region' && !scopeValue){
    alert('Select an area / region for this user.');
    return;
  }
  if(scopeType === 'community' && !scopeValue){
    alert('Enter a community for this user.');
    return;
  }

  user.name = String(document.getElementById('eu-name').value || '').trim() || user.name;
  user.role = nextRole;
  user.scopeType = scopeType;
  user.scopeValue = scopeValue;
  const nextPin = String(document.getElementById('eu-pin').value || '').trim();
  if(nextPin){
    if(isPasscodeTaken(nextPin, user.id)){
      alert('That passcode is already assigned to another user. Use a unique passcode.');
      return;
    }
    user.pin = nextPin;
  }
  if(user.role === 'admin'){
    user.scopeType = 'all';
    user.scopeValue = '';
  }

  saveState();
  closeModal();
  render();
}

function removeUser(userId){
  const user = STATE.users.find(item => item.id === userId);
  if(!user) return;
  if(user.id === STATE.currentUser.id){
    alert('Remove a different account or unlock as another admin first.');
    return;
  }
  if(user.role === 'admin' && countAdmins() === 1){
    alert('At least one admin account must remain.');
    return;
  }
  if(!confirm(`Remove ${user.name}?`)) return;
  STATE.users = STATE.users.filter(item => item.id !== userId);
  saveState();
  render();
}

function openModal(html){
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}

function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
}

function escapeHtml(value){
  return String(value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
