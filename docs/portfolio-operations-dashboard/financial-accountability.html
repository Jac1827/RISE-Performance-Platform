const COMMUNITY_STORAGE_KEY="rise_ops_dashboard_data_v1";
const LEGACY_COMMUNITY_STORAGE_KEY="rise_leasing_v5";
const OPS_PROPERTY_CATALOG_KEY="rise_ops_property_catalog_v1";
const ATLAS_STATE_DB_NAME="atlas_rise_state_v1";
const ATLAS_STATE_STORE_NAME="records";
const ATLAS_STATE_COMMUNITY_KEY="community_data";
const ATLAS_STATE_APPROVED_BUDGET_KEY="approved_budget_data";
const APPROVED_BUDGET_STORAGE_KEY="rise_financial_accountability_approved_budgets_v1";
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const FULL_MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const LEGACY_ENTITY_ID_MAP={
  "rise company budget":"rise_corp",
  "rise residential corporate":"rise_corp",
  "nocatee":"nocatee",
  "glen kernan park":"gkp",
  "viera":"viera",
  "florence villa":"florence",
  "sereno":"sereno",
  "doro":"doro",
  "doro high rise":"doro",
  "bartram park":"bartram_park",
  "baymeadows":"baymeadows",
  "st augustine":"st_augustine",
  "sutton house":"sutton_house",
  "citrus ridge":"citrus_ridge"
};
const FALLBACK_COMMUNITIES=["Bartram Park","Baymeadows","Nocatee","Doro","St Augustine","Sutton House","Viera","Florence Villa","Citrus Ridge","Sereno","Glen Kernan Park"];
const f$=v=>{if(v==null||isNaN(v))return"\u2014";const n=v<0,a=Math.abs(v);return(n?"(":"")+"$"+a.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})+(n?")":"");};
const fp=v=>v==null||isNaN(v)?"\u2014":(v>=0?"+":"")+v.toFixed(1)+"%";
const ATLAS_DASHBOARD_HREF="./index.html";
let atlasStateDbPromise=null;

const slugifyEntityId=v=>String(v||"").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")||"other";
const normalizeCommunityLookupName=v=>String(v||"").toLowerCase().replace(/rise:\s*a\s+real\s+estate\s+company/gi,"").replace(/\brise\s+real\s+estate\b/gi,"").replace(/^rise\s+at\s+/gi,"").replace(/^rise\s+/gi,"").replace(/[^\w\s]/g," ").replace(/\s+/g," ").trim();
const prettyEntityLabel=id=>String(id||"").split("_").filter(Boolean).map(part=>part.charAt(0).toUpperCase()+part.slice(1)).join(" ");

function loadAtlasCommunityNames(){
  const names=new Map();
  const collectName=value=>{
    const name=String(value||"").trim();
    if(!name)return;
    const normalized=normalizeCommunityLookupName(name);
    if(!normalized)return;
    if(normalized==="atlas rise portfolio")return;
    if(!names.has(normalized))names.set(normalized,name);
  };
  try{
    const raw=window.localStorage.getItem(OPS_PROPERTY_CATALOG_KEY);
    const parsed=raw?JSON.parse(raw):null;
    const properties=Array.isArray(parsed&&parsed.properties)?parsed.properties:[];
    properties.forEach(entry=>collectName(entry&&entry.name));
  }catch(e){}
  [COMMUNITY_STORAGE_KEY,LEGACY_COMMUNITY_STORAGE_KEY].forEach(key=>{
    try{
      const raw=window.localStorage.getItem(key);
      const parsed=raw?JSON.parse(raw):null;
      Object.keys(parsed||{}).forEach(collectName);
    }catch(e){}
  });
  FALLBACK_COMMUNITIES.forEach(collectName);
  return Array.from(names.values()).sort((a,b)=>a.localeCompare(b));
}

function getEntities(){
  const entities=[{id:"rise_corp",label:"RISE Company Budget",kind:"corporate"}];
  const seen=new Set(entities.map(e=>e.id));
  loadAtlasCommunityNames().forEach(name=>{
    const normalized=normalizeCommunityLookupName(name);
    const id=LEGACY_ENTITY_ID_MAP[normalized]||slugifyEntityId(name);
    if(seen.has(id))return;
    entities.push({id,label:name,kind:"community"});
    seen.add(id);
  });
  Object.keys(state&&state.store||{}).forEach(id=>{
    if(seen.has(id))return;
    const first=(state.store[id]||[])[0];
    entities.push({id,label:first&&first.entityLabel?String(first.entityLabel):prettyEntityLabel(id),kind:id==="rise_corp"?"corporate":"community"});
    seen.add(id);
  });
  const approvedBudgetProperties=new Map();
  const registerBudgetProperty=value=>{
    const label=String(value||"").trim();
    if(!label)return;
    const normalized=normalizeCommunityLookupName(label);
    if(!normalized)return;
    if(!approvedBudgetProperties.has(normalized))approvedBudgetProperties.set(normalized,label);
  };
  (state&&state.approvedBudgets&&Array.isArray(state.approvedBudgets.records)?state.approvedBudgets.records:[]).forEach(record=>registerBudgetProperty(record&&record.property));
  (state&&state.approvedBudgets&&Array.isArray(state.approvedBudgets.batches)?state.approvedBudgets.batches:[]).forEach(batch=>registerBudgetProperty(batch&&batch.property));
  (state&&state.approvedBudgets&&Array.isArray(state.approvedBudgets.archivedBatches)?state.approvedBudgets.archivedBatches:[]).forEach(batch=>registerBudgetProperty(batch&&batch.property));
  approvedBudgetProperties.forEach((label,normalized)=>{
    const id=LEGACY_ENTITY_ID_MAP[normalized]||slugifyEntityId(label);
    if(seen.has(id))return;
    entities.push({id,label,kind:"community"});
    seen.add(id);
  });
  return entities;
}

function getEntityById(id){
  const entities=getEntities();
  return entities.find(e=>e.id===id)||entities[0];
}

function getEntityByLabel(label){
  const normalized=normalizeCommunityLookupName(label||"");
  if(!normalized)return null;
  const entities=getEntities();
  return entities.find(entity=>normalizeCommunityLookupName(entity&&entity.label||"")===normalized)
    || entities.find(entity=>normalized.includes(normalizeCommunityLookupName(entity&&entity.label||"")) || normalizeCommunityLookupName(entity&&entity.label||"").includes(normalized))
    || null;
}

async function loadAtlasApprovedBudgetState(){
  try{
    const stored=await atlasStateGetValue(ATLAS_STATE_APPROVED_BUDGET_KEY);
    if(stored&&typeof stored==="object")return normalizeApprovedBudgetState(stored);

async function persistApprovedBudgetState(){
  try{
    state.approvedBudgets=normalizeApprovedBudgetState(state.approvedBudgets);
    window.localStorage.setItem(APPROVED_BUDGET_STORAGE_KEY,JSON.stringify(state.approvedBudgets));
  }catch(_error){}
  try{
    await atlasStateSetValue(ATLAS_STATE_APPROVED_BUDGET_KEY,state.approvedBudgets);
  }catch(_error){}
}

function openAtlasStateDb(){
  if(atlasStateDbPromise)return atlasStateDbPromise;
  if(typeof indexedDB==="undefined"){
    atlasStateDbPromise=Promise.resolve(null);
    return atlasStateDbPromise;
  }
  atlasStateDbPromise=new Promise((resolve,reject)=>{
    const request=indexedDB.open(ATLAS_STATE_DB_NAME,1);
    request.onupgradeneeded=()=>{
      const db=request.result;
      if(!db.objectStoreNames.contains(ATLAS_STATE_STORE_NAME)){
        db.createObjectStore(ATLAS_STATE_STORE_NAME,{keyPath:"key"});
      }
    };
    request.onsuccess=()=>resolve(request.result);
    request.onerror=()=>reject(request.error||new Error("Could not open ATLAS browser data storage."));
  });
  return atlasStateDbPromise;
}

async function withAtlasStateStore(mode,action){
  const db=await openAtlasStateDb();
  if(!db)return null;
  return await new Promise((resolve,reject)=>{
    const tx=db.transaction(ATLAS_STATE_STORE_NAME,mode);
    const store=tx.objectStore(ATLAS_STATE_STORE_NAME);
    let request=null;
    try{
      request=action(store);
    }catch(error){
      reject(error);
      return;
    }
    tx.oncomplete=()=>resolve(request&&request.result!==undefined?request.result:null);
    tx.onerror=()=>reject(tx.error||request&&request.error||new Error("ATLAS data storage transaction failed."));
    tx.onabort=()=>reject(tx.error||request&&request.error||new Error("ATLAS data storage transaction aborted."));
  });
}

async function atlasStateGetValue(key){
  const record=await withAtlasStateStore("readonly",store=>store.get(String(key)));
  return record&&record.value!==undefined?record.value:null;
}

async function atlasStateSetValue(key,value){
  await withAtlasStateStore("readwrite",store=>store.put({key:String(key),value,updatedAt:new Date().toISOString()}));
}

function loadLegacyAtlasCommunityStore(){
  for(const key of [COMMUNITY_STORAGE_KEY,LEGACY_COMMUNITY_STORAGE_KEY]){
    try{
      const raw=window.localStorage.getItem(key);
      if(raw){
        const parsed=JSON.parse(raw);
        if(parsed&&typeof parsed==="object")return parsed;
      }
    }catch(_error){}
  }
  return {};
}

async function loadAtlasCommunityStore(){
  try{
    const stored=await atlasStateGetValue(ATLAS_STATE_COMMUNITY_KEY);
    if(stored&&typeof stored==="object")return stored;
  }catch(_error){}
  return loadLegacyAtlasCommunityStore();
}

async function persistAtlasCommunityStore(store){
  const serialized=store&&typeof store==="object"?store:{};
  try{window.localStorage.setItem(COMMUNITY_STORAGE_KEY,JSON.stringify(serialized));}catch(_error){}
  try{window.localStorage.setItem(LEGACY_COMMUNITY_STORAGE_KEY,JSON.stringify(serialized));}catch(_error){}
  await atlasStateSetValue(ATLAS_STATE_COMMUNITY_KEY,serialized);
}

function normalizeApprovedBudgetRecord(row,batchId,propertyOverride){
  const property=String((propertyOverride ?? (row&&row.property)) || "").trim();
  return{
    property,
    period:String(row&&row.period||""),
    glCode:String(row&&row.glCode||row&&row.gl||""),
    lineItem:String(row&&row.lineItem||row&&row.name||""),
    section:String(row&&row.section||""),
    budget:Number(row&&row.budget||row&&row.yBud||0)||0,
    annualBudget:Number(row&&row.annualBudget||row&&row.annBud||0)||0,
    updatedAt:String(row&&row.updatedAt||""),
    sourceFileName:String(row&&row.sourceFileName||""),
    batchId:String(batchId||row&&row.batchId||"")
  };
}

function buildApprovedBudgetBatchSummary(batch){
  const batchId=String(batch&&batch.id||batch&&batch.batchId||`budget_${Date.now()}`);
  const property=String(batch&&batch.property||"").trim();
  const rows=(Array.isArray(batch&&batch.rows)?batch.rows:[]).map(row=>normalizeApprovedBudgetRecord(row,batchId,property));
  const periods=[...new Set(rows.map(row=>normalizeFinancialPeriodKey(row.period||"")||row.period||"").filter(Boolean))];
  const years=[...new Set(periods.map(period=>String(period).slice(0,4)).filter(year=>/^\d{4}$/.test(year)))].sort();
  const annualBudgetTotal=rows.reduce((sum,row)=>sum+Number(row.budget||0),0);
  return{
    id:batchId,
    property,
    sourceFileName:String(batch&&batch.sourceFileName||""),
    sourceSheetName:String(batch&&batch.sourceSheetName||""),
    budgetFormat:String(batch&&batch.budgetFormat||""),
    uploadedAt:String(batch&&batch.uploadedAt||new Date().toISOString()),
    archivedAt:String(batch&&batch.archivedAt||""),
    archivedReason:String(batch&&batch.archivedReason||""),
    rowCount:rows.length,
    annualBudgetTotal,
    periods,
    years,
    yearLabel:years.length?years.join(", "):"Unknown",
    rows
  };
}

function normalizeApprovedBudgetState(raw){
  const normalized={records:[],batches:[],archivedBatches:[],updatedAt:null};
  if(raw&&typeof raw==="object"){
    normalized.updatedAt=raw.updatedAt||null;
    if(Array.isArray(raw.records))normalized.records=raw.records.map((row,index)=>normalizeApprovedBudgetRecord(row,row&&row.batchId||`legacy_row_${index}`));
    if(Array.isArray(raw.batches))normalized.batches=raw.batches.map(batch=>buildApprovedBudgetBatchSummary(batch)).filter(batch=>batch.property||batch.rows.length);
    if(Array.isArray(raw.archivedBatches))normalized.archivedBatches=raw.archivedBatches.map(batch=>buildApprovedBudgetBatchSummary(batch)).filter(batch=>batch.property||batch.rows.length);
  }
  if(!normalized.batches.length&&normalized.records.length){
    const grouped=_.groupBy(normalized.records,row=>normalizeCommunityLookupName(row.property||""));
    normalized.batches=Object.entries(grouped).map(([propertyKey,rows],index)=>{
      const batchId=`legacy_batch_${index}_${Date.now()}`;
      const property=String(rows[0]&&rows[0].property||propertyKey||"").trim();
      const batchRows=rows.map(row=>normalizeApprovedBudgetRecord(row,batchId,property));
      return buildApprovedBudgetBatchSummary({
        id:batchId,
        property,
        sourceFileName:String(rows[0]&&rows[0].sourceFileName||"Legacy baseline"),
        uploadedAt:String(rows[0]&&rows[0].updatedAt||normalized.updatedAt||new Date().toISOString()),
        rows:batchRows
      });
    });
    normalized.records=normalized.batches.flatMap(batch=>batch.rows.map(row=>({...row,batchId:batch.id,property:batch.property})));
  }
  if(!normalized.records.length&&normalized.batches.length){
    normalized.records=normalized.batches.flatMap(batch=>batch.rows.map(row=>({...row,batchId:batch.id,property:batch.property})));
  }
  return normalized;
}

function getApprovedBudgetCurrentBatch(property){
  const propertyKey=normalizeCommunityLookupName(property||"");
  return (state.approvedBudgets&&Array.isArray(state.approvedBudgets.batches)?state.approvedBudgets.batches:[])
    .find(batch=>normalizeCommunityLookupName(batch&&batch.property||"")===propertyKey)||null;
}

function getApprovedBudgetArchivedBatches(property){
  const propertyKey=normalizeCommunityLookupName(property||"");
  return (state.approvedBudgets&&Array.isArray(state.approvedBudgets.archivedBatches)?state.approvedBudgets.archivedBatches:[])
    .filter(batch=>normalizeCommunityLookupName(batch&&batch.property||"")===propertyKey)
    .sort((a,b)=>new Date(b.archivedAt||b.uploadedAt||0)-new Date(a.archivedAt||a.uploadedAt||0));
}

function getApprovedBudgetRowsForBatch(batchId){
  const id=String(batchId||"");
  const activeRows=(state.approvedBudgets&&Array.isArray(state.approvedBudgets.records)?state.approvedBudgets.records:[])
    .filter(row=>String(row&&row.batchId||"")===id);
  if(activeRows.length)return activeRows;
  const archivedBatch=(state.approvedBudgets&&Array.isArray(state.approvedBudgets.archivedBatches)?state.approvedBudgets.archivedBatches:[])
    .find(batch=>String(batch&&batch.id||"")===id);
  return archivedBatch&&Array.isArray(archivedBatch.rows)?archivedBatch.rows:[];
}

async function archiveApprovedBudgetBatch(property,batchId){
  state.approvedBudgets=normalizeApprovedBudgetState(state.approvedBudgets);
  const propertyKey=normalizeCommunityLookupName(property||"");
  const batches=Array.isArray(state.approvedBudgets.batches)?state.approvedBudgets.batches:[];
  const target=batchId
    ? batches.find(batch=>String(batch&&batch.id||"")===String(batchId))
    : batches.find(batch=>normalizeCommunityLookupName(batch&&batch.property||"")===propertyKey);
  if(!target)return false;
  const archivedBatch=buildApprovedBudgetBatchSummary({...target,archivedAt:new Date().toISOString(),archivedReason:"manual"});
  state.approvedBudgets.archivedBatches=[archivedBatch,...(state.approvedBudgets.archivedBatches||[]).filter(batch=>String(batch&&batch.id||"")!==String(target.id))];
  state.approvedBudgets.batches=batches.filter(batch=>String(batch&&batch.id||"")!==String(target.id));
  state.approvedBudgets.records=(state.approvedBudgets.records||[]).filter(row=>String(row&&row.batchId||"")!==String(target.id));
  state.approvedBudgets.updatedAt=new Date().toISOString();
  await persistApprovedBudgetState();
  return true;
}

async function replaceApprovedBudgetBatch(batch){
  state.approvedBudgets=normalizeApprovedBudgetState(state.approvedBudgets);
  const normalizedBatch=buildApprovedBudgetBatchSummary(batch);
  const propertyKey=normalizeCommunityLookupName(normalizedBatch.property||"");
  const existing=getApprovedBudgetCurrentBatch(normalizedBatch.property);
  if(existing){
    await archiveApprovedBudgetBatch(existing.property,existing.id);
    state.approvedBudgets=normalizeApprovedBudgetState(state.approvedBudgets);
  }
  state.approvedBudgets.records=[
    ...(state.approvedBudgets.records||[]).filter(row=>normalizeCommunityLookupName(row&&row.property||"")!==propertyKey),
    ...normalizedBatch.rows
  ];
  state.approvedBudgets.batches=[
    ...(state.approvedBudgets.batches||[]).filter(batchItem=>normalizeCommunityLookupName(batchItem&&batchItem.property||"")!==propertyKey),
    normalizedBatch
  ];
  state.approvedBudgets.updatedAt=new Date().toISOString();
  await persistApprovedBudgetState();
  return normalizedBatch;
}

function normalizeFinancialPeriodKey(value,fallbackYear=new Date().getFullYear()){
  const raw=String(value||"").trim();
  if(!raw)return"";
  let match=raw.match(/^(\d{4})-(\d{1,2})$/);
  if(match)return`${match[1]}-${String(Number(match[2])).padStart(2,"0")}`;
  match=raw.match(/^(\d{1,2})[\/-](\d{2,4})$/);
  if(match){
    const year=String(match[2]).length===2?`20${match[2]}`:match[2];
    return`${year}-${String(Number(match[1])).padStart(2,"0")}`;
  }
  match=raw.match(/^([A-Za-z]+)\s+(\d{4})$/);
  if(match){
    const monthIdx=FULL_MONTHS.findIndex(label=>label.toLowerCase()===String(match[1]).toLowerCase())>=0
      ? FULL_MONTHS.findIndex(label=>label.toLowerCase()===String(match[1]).toLowerCase())
      : MONTHS.findIndex(label=>label.toLowerCase()===String(match[1]).slice(0,3).toLowerCase());
    if(monthIdx>=0)return`${match[2]}-${String(monthIdx+1).padStart(2,"0")}`;
  }
  match=raw.match(/^([A-Za-z]+)$/);
  if(match){
    const monthIdx=FULL_MONTHS.findIndex(label=>label.toLowerCase()===String(match[1]).toLowerCase())>=0
      ? FULL_MONTHS.findIndex(label=>label.toLowerCase()===String(match[1]).toLowerCase())
      : MONTHS.findIndex(label=>label.toLowerCase()===String(match[1]).slice(0,3).toLowerCase());
    if(monthIdx>=0)return`${fallbackYear}-${String(monthIdx+1).padStart(2,"0")}`;
  }
  return"";
}

function formatBudgetPeriodLabel(period,includeYear=true){
  const normalized=normalizeFinancialPeriodKey(period);
  if(!normalized)return String(period||"");
  const year=String(normalized).slice(0,4);
  const monthIdx=Number(String(normalized).slice(5,7))-1;
  const month=MONTHS[monthIdx]||String(normalized).slice(5,7);
  return includeYear?`${month} ${year}`:month;
}

function buildFinancialLedgerRows(rows){
  return (Array.isArray(rows)?rows:[]).map(row=>({
    section:String(row&&row.section||""),
    lineItem:String(row&&row.name||""),
    glCode:String(row&&row.gl||""),
    actual:Number(row&&row.yAct||0),
    budget:Number(row&&row.yBud||0),
    annualBudget:Number(row&&row.annBud||0),
    monthlyActual:Number(row&&row.mAct||0),
    monthlyBudget:Number(row&&row.mBud||0),
    monthlyVariance:Number(row&&row.mVar||0),
    ytdVariance:Number(row&&row.yVar||0)
  }));
}

function buildFinancialBudgetLedgerRows(rows){
  return (Array.isArray(rows)?rows:[]).map(row=>({
    section:String(row&&row.section||""),
    lineItem:String(row&&row.lineItem||row&&row.name||""),
    glCode:String(row&&row.glCode||row&&row.gl||""),
    budget:Number(row&&row.budget||0),
    annualBudget:Number(row&&row.annualBudget||0),
    updatedAt:String(row&&row.updatedAt||new Date().toISOString())
  }));
}

async function applyDatasetToAtlasStore(dataset,entity){
  if(!dataset||!entity||entity.kind!=="community")return{ok:true};
  const communityName=String(entity.label||"").trim();
  if(!communityName)return{ok:false,message:"No ATLAS community name was available for this upload."};
  const periodKey=normalizeFinancialPeriodKey(dataset.period||dataset.name||"");
  if(!periodKey)return{ok:false,message:`Could not determine a reporting month for ${dataset.name||"this upload"}.`};
  const store=await loadAtlasCommunityStore();
  const existing=store&&typeof store[communityName]==="object"&&store[communityName]?store[communityName]:{propertyName:communityName};
  const ledger=existing.financialLedger&&typeof existing.financialLedger==="object"?{...existing.financialLedger}:{};
  ledger[periodKey]=buildFinancialLedgerRows(dataset.rows);
  store[communityName]={
    ...existing,
    financialLedger:ledger,
    financialUpdatedAt:new Date().toISOString()
  };
  await persistAtlasCommunityStore(store);
  return{ok:true,periodKey};
}

async function applyApprovedBudgetDatasetToAtlasStore(dataset,entity){
  if(!dataset||!entity||entity.kind!=="community")return{ok:true};
  const communityName=String(entity.label||"").trim();
  if(!communityName)return{ok:false,message:"No ATLAS community name was available for this budget baseline."};
  const grouped={};
  (Array.isArray(dataset.records)?dataset.records:[]).forEach(record=>{
    const periodKey=normalizeFinancialPeriodKey(record&&record.period||"");
    if(!periodKey)return;
    if(!grouped[periodKey])grouped[periodKey]=[];
    grouped[periodKey].push(record);
  });
  if(!Object.keys(grouped).length)return{ok:false,message:"No usable month-by-month budget rows were detected in this workbook."};
  const store=await loadAtlasCommunityStore();
  const existing=store&&typeof store[communityName]==="object"&&store[communityName]?store[communityName]:{propertyName:communityName};
  const budgetLedger=existing.financialBudgetLedger&&typeof existing.financialBudgetLedger==="object"?{...existing.financialBudgetLedger}:{};
  Object.entries(grouped).forEach(([periodKey,records])=>{
    budgetLedger[periodKey]=buildFinancialBudgetLedgerRows(records);
  });
  store[communityName]={
    ...existing,
    financialBudgetLedger:budgetLedger,
    financialBudgetUpdatedAt:new Date().toISOString()
  };
  await persistAtlasCommunityStore(store);
  return{ok:true,periodKeys:Object.keys(grouped)};
}

async function hydrateApprovedBudgetsFromAtlas(){
  try{

    if((storedAtlas.records&&storedAtlas.records.length)||(storedAtlas.batches&&storedAtlas.batches.length)||(storedAtlas.archivedBatches&&storedAtlas.archivedBatches.length)){
      state.approvedBudgets=storedAtlas;
      await persistApprovedBudgetState();
      return;
    }
    const storedLocal=normalizeApprovedBudgetState(loadStoredApprovedBudgets());
    if((storedLocal.records&&storedLocal.records.length)||(storedLocal.batches&&storedLocal.batches.length)||(storedLocal.archivedBatches&&storedLocal.archivedBatches.length)){
      state.approvedBudgets=storedLocal;
      await persistApprovedBudgetState();
      return;
    }
    const store=await loadAtlasCommunityStore();
    const records=[];
    Object.entries(store||{}).forEach(([property,record])=>{
      const ledger=record&&record.financialBudgetLedger&&typeof record.financialBudgetLedger==="object"?record.financialBudgetLedger:{};
      Object.entries(ledger).forEach(([period,rows])=>{
        (Array.isArray(rows)?rows:[]).forEach(row=>{
          records.push({
            property,
            period,
            glCode:String(row&&row.glCode||""),
            lineItem:String(row&&row.lineItem||""),
            section:String(row&&row.section||""),

          });
        });
      });
    });
    if(records.length){
      state.approvedBudgets=normalizeApprovedBudgetState({records,updatedAt:new Date().toISOString()});
      await persistApprovedBudgetState();

  }catch(_error){}

function monthNameToIndex(label){
  const raw=String(label||"").trim().toLowerCase();
  if(!raw)return-1;
  const fullIdx=FULL_MONTHS.findIndex(name=>name.toLowerCase()===raw);
  if(fullIdx>=0)return fullIdx;
  return MONTHS.findIndex(name=>name.toLowerCase()===raw.slice(0,3));
}

function parseBudgetYearStart(text){
  const raw=String(text||"");
  const match=raw.match(/(\d{4})/);
  return match?Number(match[1]):new Date().getFullYear();
}

function extractWorkbookBudgetMeta(workbook){
  const rows=XLSX.utils.sheet_to_json(workbook.Sheets["Set-Up"]||workbook.Sheets["Set-Up "],{header:1,raw:false,defval:""});
  let property="",budgetDescription="",fiscalYearBegins="",budgetYearBegins="";
  (Array.isArray(rows)?rows:[]).forEach(row=>{
    const label=String(row&&row[0]||"").trim();
    const value=String(row&&row[1]||"").trim();
    if(/Property Name/i.test(label)&&!property)property=value;
    if(/Budget Description/i.test(label)&&!budgetDescription)budgetDescription=value;
    if(/Fiscal Year Begins/i.test(label)&&!fiscalYearBegins)fiscalYearBegins=value;
    if(/Budget Year Begins/i.test(label)&&!budgetYearBegins)budgetYearBegins=value;
  });
  return{
    property,
    budgetDescription,
    fiscalYearBegins,
    budgetYearBegins,
    baseYear:parseBudgetYearStart(budgetDescription||budgetYearBegins)
  };
}

function readWorkbookSheetPreview(workbook,sheetName,rowLimit=8){
  const sheet=workbook&&workbook.Sheets&&workbook.Sheets[sheetName];
  if(!sheet)return[];
  return XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:""}).slice(0,rowLimit);
}

function findWorkbookSheetByPriority(workbook,patterns){
  const sheetNames=Array.isArray(workbook&&workbook.SheetNames)?workbook.SheetNames:[];
  for(const pattern of Array.isArray(patterns)?patterns:[]){
    const regex=pattern instanceof RegExp?pattern:new RegExp(String(pattern),"i");
    const match=sheetNames.find(name=>regex.test(String(name||"")));
    if(match)return match;
  }
  return "";
}

function sheetLooksLikeApprovedBudget(rows,sheetName){
  const preview=Array.isArray(rows)?rows:[];
  const flattened=preview.flat().map(cell=>String(cell||"").trim()).filter(Boolean);
  if(/monthly budget detail/i.test(String(sheetName||"")))return true;
  if(flattened.some(cell=>/monthly budget detail/i.test(cell)))return true;
  if(flattened.some(cell=>/monthly budget rpt/i.test(cell)))return true;
  if(flattened.some(cell=>/budget summary rpt/i.test(cell)))return true;
  if(flattened.some(cell=>/import sheet/i.test(cell)))return true;
  if(flattened.some(cell=>/residential\s*-\s*corporate/i.test(cell)))return true;
  const monthRow=preview.find(row=>{
    let count=0;
    (Array.isArray(row)?row:[]).forEach(cell=>{ if(monthNameToIndex(cell)>=0)count+=1; });
    return count>=6;
  });
  if(monthRow)return true;
  return false;
}

function findApprovedBudgetSourceSheetName(workbook){
  const sheetNames=Array.isArray(workbook&&workbook.SheetNames)?workbook.SheetNames:[];
  if(!sheetNames.length)return"";
  const preferred=findWorkbookSheetByPriority(workbook,[
    /monthly budget detail/i,
    /monthly budget rpt/i,
    /budget summary rpt/i,
    /import sheet/i
  ]);
  if(preferred)return preferred;
  if(sheetNames.length===1)return sheetNames[0];
  for(const sheetName of sheetNames){
    const preview=readWorkbookSheetPreview(workbook,sheetName,10);
    if(sheetLooksLikeApprovedBudget(preview,sheetName))return sheetName;
  }
  return "";
}

function buildAnnualBudgetRecordsFromWorkbook(workbook,fileName,entity){
  const meta=extractWorkbookBudgetMeta(workbook);
  const property=String(meta.property||entity&&entity.label||"").trim();
  if(!property)throw new Error("Could not determine which community this approved budget workbook belongs to.");
  const sourceSheetName=findApprovedBudgetSourceSheetName(workbook);
  if(!sourceSheetName)throw new Error("No budget detail tab was found. Expected a Monthly Budget Detail, Monthly Budget Rpt, Budget Summary Rpt, or Import Sheet tab.");
  const rows=XLSX.utils.sheet_to_json(workbook.Sheets[sourceSheetName],{header:1,raw:false,defval:""});
  if(!Array.isArray(rows)||!rows.length)throw new Error("The approved budget workbook tab was empty.");
  let monthHeaderRow=-1;
  let monthColumns=[];
  for(let i=0;i<rows.length;i++){
    const row=rows[i]||[];
    const found=[];
    row.forEach((cell,idx)=>{
      const cellText=String(cell||"").trim();
      const monthIdx=monthNameToIndex(cellText);
      if(monthIdx>=0)found.push({idx,monthIdx,label:cellText});
    });
    if(found.length>=6){
      monthHeaderRow=i;
      monthColumns=found;
      break;
    }
  }
  if(monthHeaderRow<0||!monthColumns.length)throw new Error("Could not find the monthly budget columns in this workbook.");
  let section="";
  const annualTotals={};
  const records=[];
  const extraYearTokenRow=rows[Math.max(0,monthHeaderRow-1)]||[];
  for(let i=monthHeaderRow+1;i<rows.length;i++){
    const row=rows[i]||[];
    const rawGl=String(row[0]||"").trim();
    const rawName=String(row[1]||"").trim();
    const displayLabel=rawName||rawGl;
    if(!rawGl&&!rawName)continue;
    const numericGlMatch=rawGl.match(/^\d{3,6}$/);
    if(!numericGlMatch){
      const heading=(rawGl||rawName).replace(/\s+/g," ").trim();
      if(heading&&heading===heading.toUpperCase()&&!/\d/.test(heading)&&heading.length<40)section=heading;
      continue;
    }
    const glCode=numericGlMatch[0];
    monthColumns.forEach(({idx,monthIdx,label})=>{
      const rawValue=row[idx];
      const budget=Number(String(rawValue??"").replace(/[$,()]/g,match=>match==="("?"-":""))||0;
      if(!Number.isFinite(budget))return;
      let year=meta.baseYear;
      const upperLabel=String(label||"").toUpperCase();
      if(/YR\s*2/.test(upperLabel))year=meta.baseYear+1;
      else if(/YR\s*3/.test(upperLabel))year=meta.baseYear+2;
      else{
        const rowAbove=String(extraYearTokenRow[idx]||"").toUpperCase();
        if(/YR\s*2/.test(rowAbove))year=meta.baseYear+1;
        else if(/YR\s*3/.test(rowAbove))year=meta.baseYear+2;
      }
      const period=`${year}-${String(monthIdx+1).padStart(2,"0")}`;
      const annualKey=`${year}::${glCode}`;
      annualTotals[annualKey]=(annualTotals[annualKey]||0)+budget;
      records.push({
        property,
        period,
        glCode,
        lineItem:rawName||glCode,
        section:section||"",
        budget,
        annualBudget:0,
        sourceFileName:fileName,
        updatedAt:new Date().toISOString()
      });
    });
  }
  records.forEach(record=>{
    const annualKey=`${String(record.period).slice(0,4)}::${record.glCode}`;
    record.annualBudget=Number(annualTotals[annualKey]||0);
  });
  if(!records.length)throw new Error("No account-level monthly budget rows were detected in this workbook.");
  return{
    property,
    sourceSheetName,
    records
  };
}

async function loadApprovedBudgetFile(file,ent){
  state.loading=true;render();
  try{
    if(typeof XLSX==="undefined")throw new Error("Excel parser is not available on this page.");
    const buffer=await file.arrayBuffer();
    const workbook=XLSX.read(buffer,{type:"array"});
    const selectedEntity=getEntityById(ent);
    const parsed=buildAnnualBudgetRecordsFromWorkbook(workbook,file.name,selectedEntity);
    const workbookEntity=getEntityByLabel(parsed.property)||selectedEntity;
    const approvedAt=new Date().toISOString();
    const batchId=`budget_${Date.now()}`;
    const batchRows=parsed.records.map(record=>normalizeApprovedBudgetRecord({...record,batchId,property:parsed.property},batchId,parsed.property));
    state.entity=workbookEntity.id;
    state.uploadEntity=workbookEntity.id;
    state.baselineEntity=workbookEntity.id;
    await replaceApprovedBudgetBatch({
      id:batchId,
      property:parsed.property,
      sourceFileName:file.name,
      sourceSheetName:parsed.sourceSheetName,
      budgetFormat:"company_monthly_detail",
      uploadedAt:approvedAt,
      rows:batchRows
    });
    const atlasResult=await applyApprovedBudgetDatasetToAtlasStore(parsed,workbookEntity);
    state.loading=false;
    state.tab="baseline";
    render();
    if(atlasResult&&atlasResult.ok===false){
      window.alert(atlasResult.message||"The approved budget baseline parsed, but could not be saved back into ATLAS.");

  }catch(error){
    console.error(error);
    state.loading=false;
    render();
    window.alert(String(error&&error.message||error||"Could not load the approved budget workbook."));
  }
}

function getApprovedBudgetPeriodsForBatch(batch){
  if(!batch)return[];
  return [...new Set((Array.isArray(batch.rows)?batch.rows:[])
    .map(row=>normalizeFinancialPeriodKey(row&&row.period||""))
    .filter(Boolean))].sort();

function getCompareDatasetList(entityId){
  const list=Array.isArray(state&&state.store&&state.store[entityId])?state.store[entityId]:[];
  return [...list].sort((a,b)=>{
    const aPeriod=normalizeFinancialPeriodKey(a&&a.period||"");
    const bPeriod=normalizeFinancialPeriodKey(b&&b.period||"");
    if(aPeriod&&bPeriod&&aPeriod!==bPeriod)return aPeriod.localeCompare(bPeriod);
    return Number(a&&a.id||0)-Number(b&&b.id||0);
  });
}

function getLatestDatasetIdForEntity(entityId){
  const list=Array.isArray(state&&state.store&&state.store[entityId])?state.store[entityId]:[];
  return list.length?list[list.length-1].id:null;
}

function buildApprovedBudgetIndex(property,selectedPeriod,rowsOverride,options={}){
  const normalizedPeriod=normalizeFinancialPeriodKey(selectedPeriod||"");
  if(!normalizedPeriod)return{map:{},matchCount:0,source:"none"};
  const year=Number(String(normalizedPeriod).slice(0,4));
  const month=Number(String(normalizedPeriod).slice(5,7));
  const mode=String(options&&options.mode||"cumulative");
  const rows=Array.isArray(rowsOverride)?rowsOverride:getApprovedBudgetRowsFor(property);
  const map={};
  let matchCount=0;
  rows.forEach(record=>{
    const period=normalizeFinancialPeriodKey(record&&record.period||"");
    if(!period||Number(period.slice(0,4))!==year)return;
    const periodMonth=Number(period.slice(5,7));
    const glCode=String(record&&record.glCode||"").trim();
    if(!glCode)return;
    const periodMatches=mode==="month"?period===normalizedPeriod:periodMonth<=month;
    if(periodMatches){
      map[glCode]=(map[glCode]||0)+(Number(record&&record.budget||0)||0);
      matchCount+=1;
    }
  });
  return{map,matchCount,source:matchCount>0?"approved":"uploaded"};
}

function getCompareContext(){
  const actualEntityId=state.compareActualEntity||state.entity;
  const actualEntity=getEntityById(actualEntityId);
  const actualList=getCompareDatasetList(actualEntity.id);
  const actualDatasetId=state.compareActualDs&&actualList.some(item=>Number(item.id)===Number(state.compareActualDs))
    ? Number(state.compareActualDs)
    : getLatestDatasetIdForEntity(actualEntity.id);
  const actualDataset=actualList.find(item=>Number(item.id)===Number(actualDatasetId))||actualList[actualList.length-1]||null;
  const baselineEntityId=state.compareBaselineEntity||state.baselineEntity||state.entity;
  const baselineEntity=getEntityById(baselineEntityId);
  const baselineBatches=getApprovedBudgetBatchOptions(baselineEntity.label);
  const baselineBatch=(state.compareBaselineBatchId&&baselineBatches.some(batch=>String(batch.id)===String(state.compareBaselineBatchId)))
    ? baselineBatches.find(batch=>String(batch.id)===String(state.compareBaselineBatchId))
    : baselineBatches[0]||null;
  const periodOptions=getApprovedBudgetPeriodsForBatch(baselineBatch);
  const baselinePeriod=(state.compareBaselinePeriod&&periodOptions.includes(normalizeFinancialPeriodKey(state.compareBaselinePeriod)))
    ? normalizeFinancialPeriodKey(state.compareBaselinePeriod)
    : periodOptions[periodOptions.length-1]||periodOptions[0]||"";
  const actualPeriod=actualDataset&&normalizeFinancialPeriodKey(actualDataset.period||actualDataset.name||"")||"";
  const budgetRows=baselineBatch&&Array.isArray(baselineBatch.rows)?baselineBatch.rows:[];
  const budgetIndex=baselineBatch&&baselinePeriod
    ? buildApprovedBudgetIndex(baselineEntity.label,baselinePeriod,budgetRows,{mode:"month"})
    : {map:{},matchCount:0,source:"none"};
  return{
    actualEntity,
    actualDataset,
    actualPeriod,
    baselineEntity,
    baselineBatch,
    baselinePeriod,
    budgetIndex,
    budgetRows
  };
}

function buildActualVsBaselineResults(context){
  const actualDataset=context&&context.actualDataset;
  const budgetIndex=context&&context.budgetIndex||{map:{}};
  if(!actualDataset||!Array.isArray(actualDataset.rows)||!actualDataset.rows.length||!context.baselineBatch||!context.baselinePeriod)return null;
  const actualMap=_.keyBy(actualDataset.rows,"gl");
  const allGLs=[...new Set([...Object.keys(actualMap),...Object.keys(budgetIndex.map||{})])];
  const rows=allGLs.map(gl=>{
    const actualRow=actualMap[gl]||{yAct:0,yBud:0};
    const budgetValue=Number((budgetIndex.map||{})[gl]||0)||0;
    const actualValue=Number(actualRow.yAct||0)||0;
    const variance=actualValue-budgetValue;
    const isIncome=isInc(actualRow);
    const favorable=isIncome?variance>0:variance<0;
    return{
      gl:String(gl||""),
      name:String(actualRow.name||""),
      section:String(actualRow.section||""),
      actual:actualValue,
      budget:budgetValue,
      variance,
      variancePct:budgetValue?Math.abs(variance/budgetValue)*100:0,
      isIncome,
      favorable,
      bad:!favorable
    };
  }).filter(row=>row.actual||row.budget);
  const bySection=_.groupBy(rows,"section");
  const sectionSummary=Object.entries(bySection).map(([section,items])=>{
    const actual=items.reduce((s,row)=>s+row.actual,0);
    const budget=items.reduce((s,row)=>s+row.budget,0);
    const variance=actual-budget;
    const favorableCount=items.filter(row=>row.favorable).length;
    const unfavorableCount=items.filter(row=>row.bad).length;
    return{
      section,
      actual,
      budget,
      variance,
      variancePct:budget?Math.abs(variance/budget)*100:0,
      favorableCount,
      unfavorableCount,
      bad:unfavorableCount>favorableCount
    };
  }).filter(row=>row.actual||row.budget).sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance));
  const unfavorableRows=rows.filter(row=>row.bad).sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance));
  const favorableRows=rows.filter(row=>row.favorable).sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance));
  const totalActual=rows.reduce((s,row)=>s+row.actual,0);
  const totalBudget=rows.reduce((s,row)=>s+row.budget,0);
  const netVariance=totalActual-totalBudget;
  const netFavorable=rows.reduce((s,row)=>s+(row.isIncome?(row.actual-row.budget):(row.budget-row.actual)),0);
  const topNegative=unfavorableRows[0]||null;
  const posture=netFavorable>=0?"Protect and hold the line":"Escalate recovery actions";
  const postureDetail=netFavorable>=0
    ? "The selected actual month is tracking at or ahead of the selected baseline month."
    : "The selected actual month is trailing the selected baseline month and needs a management response.";
  return{
    ...context,
    rows,
    sectionSummary,
    unfavorableRows,
    favorableRows,
    totalActual,
    totalBudget,
    netVariance,
    netFavorable,
    topNegative,
    posture,
    postureDetail
  };
}

function summarizeApprovedBudgetRowsByGl(rows){
  const grouped=_.groupBy(Array.isArray(rows)?rows:[],row=>String(row&&row.glCode||row&&row.gl||"").trim());
  return Object.entries(grouped).map(([gl,items])=>{
    const first=items[0]||{};
    const annualBudget=items.reduce((sum,row)=>sum+Number(row&&row.budget||row&&row.annualBudget||row&&row.annBud||0),0);
    return{
      gl,
      name:String(first.lineItem||first.name||gl||""),
      section:String(first.section||""),
      annualBudget,
      rowCount:items.length
    };
  }).filter(row=>row.gl);
}

function summarizeApprovedBudgetRowsByMonth(rows){
  const grouped=_.groupBy(Array.isArray(rows)?rows:[],row=>{
    const gl=String(row&&row.glCode||row&&row.gl||"").trim();
    const section=String(row&&row.section||"").trim();
    const name=String(row&&row.lineItem||row&&row.name||"").trim();
    return `${section}::${gl}::${name}`;
  });
  return Object.entries(grouped).map(([key,items])=>{
    const first=items[0]||{};
    const months={};
    let annualBudget=0;
    items.forEach(item=>{
      const period=normalizeFinancialPeriodKey(item&&item.period||"");
      if(!period)return;
      const budget=Number(item&&item.budget||0)||0;
      months[period]=budget;
      annualBudget+=budget;
    });
    return{
      gl:String(first.glCode||first.gl||"").trim(),
      name:String(first.lineItem||first.name||"").trim(),
      section:String(first.section||"").trim(),
      months,
      annualBudget,
      rowCount:items.length
    };
  }).filter(row=>row.gl);
}

function getCommunityBudgetWatchItems(entityId){

  const actionRows=[
    ...enrichedRows.filter(row=>!row.isIncome&&row.status==="over"),

  ]
    .sort((a,b)=>Math.abs(b.yVar||0)-Math.abs(a.yVar||0))

  const overRows=enrichedRows
    .filter(row=>!row.isIncome&&row.status==="over")

  return{

    underRows,
    overSections,

  };

function parseCSV(text){
const p=Papa.parse(text,{dynamicTyping:false,skipEmptyLines:true,delimitersToGuess:[",","\t","|",";"]});
const raw=p.data;let hIdx=raw.findIndex(r=>r[0]&&String(r[0]).trim()==="Account");
if(hIdx<0)hIdx=raw.findIndex(r=>r.some(c=>String(c||"").toLowerCase().includes("account name")));
if(hIdx<0)hIdx=4;
const rows=[];let sec="",sub="";
const num=v=>{const s=String(v||"").replace(/[$,%()]/g,"").replace(/,/g,"").trim();const n=parseFloat(s);return isNaN(n)?0:n;};
for(let i=hIdx+1;i<raw.length;i++){
const r=raw[i];if(!r||r.length<3)continue;
const c0=String(r[0]||"").trim(),c1=String(r[1]||"").trim();
if(!c0&&c1){sub=c1;continue;}
if(c0&&!c1&&isNaN(parseInt(c0))){sec=c0;continue;}
if(c0&&(/^\d{4}/.test(c0)||parseInt(c0)>=1000)){
rows.push({gl:c0,name:c1,section:sec,subsection:sub,mAct:num(r[2]),mBud:num(r[3]),mVar:num(r[4]),mVarPct:num(r[5]),yAct:num(r[6]),yBud:num(r[7]),yVar:num(r[8]),yVarPct:num(r[9]),annBud:num(r[10]),comment:String(r[11]||"").trim()});
}}
return rows;
}

function parseWorkbook(file){
if(typeof XLSX==="undefined")throw new Error("Excel parser is not available on this page.");
return file.arrayBuffer().then(buffer=>{
const workbook=XLSX.read(buffer,{type:"array"});
const sheetName=findWorkbookSheetByPriority(workbook,[
  /monthly budget detail/i,
  /monthly budget rpt/i,
  /budget summary rpt/i,
  /import sheet/i
])||((workbook.SheetNames||[]).find(name=>{
  const sheet=workbook.Sheets[name];
  if(!sheet)return false;
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:""});
  return Array.isArray(rows)&&rows.some(row=>Array.isArray(row)&&row.some(cell=>String(cell||"").trim()!==""));
})||(workbook.SheetNames||[])[0]);
if(!sheetName)throw new Error("Workbook has no readable sheets.");
const rows=XLSX.utils.sheet_to_json(workbook.Sheets[sheetName],{header:1,raw:false,defval:""});
const csvText=(Array.isArray(rows)?rows:[]).map(row=>(Array.isArray(row)?row:[]).map(cell=>String(cell??""))).map(row=>row.map(cell=>/[,"\n]/.test(cell)?`"${cell.replace(/"/g,'""')}"`:cell).join(",")).join("\n");
return parseCSV(csvText);
});
}

function getAlertProfile(row){
  const token=`${row&&row.section||""} ${row&&row.name||""} ${row&&row.gl||""}`.toLowerCase();
  if(row&&row.isIncome){
    if(/rent|rental|lease/.test(token))return{category:"Revenue",action:"Protect rate, collections, and occupancy conversion this month.",watchFactor:.98,criticalFactor:.95,recoveryPct:.75};
    if(/concession/.test(token))return{category:"Pricing",action:"Tighten concession approvals and reset quote discipline.",watchFactor:.97,criticalFactor:.94,recoveryPct:.6};
    if(/bad debt|delin/.test(token))return{category:"Collections",action:"Escalate collections, payment plans, and skip-risk follow up immediately.",watchFactor:.98,criticalFactor:.94,recoveryPct:.7};
    return{category:"Revenue",action:"Recover revenue leakage before next close.",watchFactor:.98,criticalFactor:.95,recoveryPct:.55};
  }
  if(/payroll|overtime|bonus|temp|contract labor/.test(token))return{category:"Labor",action:"Reset staffing/overtime approvals and require weekly labor variance review.",watchFactor:1.03,criticalFactor:1.08,clawbackPct:.5};
  if(/repair|maintenance|turn|make ready|suppl/.test(token))return{category:"R&M",action:"Gate high-cost work orders and tighten make-ready scope approval.",watchFactor:1.04,criticalFactor:1.1,clawbackPct:.45};
  if(/utilit|water|electric|gas|trash|sewer/.test(token))return{category:"Utilities",action:"Audit site consumption, leaks, and vacant-unit utility controls.",watchFactor:1.04,criticalFactor:1.08,clawbackPct:.2};
  if(/marketing|advertis|resident retention|locator/.test(token))return{category:"Marketing",action:"Reallocate spend to channels converting to signed leases.",watchFactor:1.03,criticalFactor:1.08,clawbackPct:.35};
  if(/admin|office|travel|training/.test(token))return{category:"G&A",action:"Freeze discretionary spend until the variance normalizes.",watchFactor:1.02,criticalFactor:1.06,clawbackPct:.4};
  return{category:"Expense",action:"Require variance approval before month-end close.",watchFactor:1.04,criticalFactor:1.08,clawbackPct:.25};
}

function buildManagerAlert(row,dataset){
  const profile=getAlertProfile(row);
  const expectedPct=getExpectedBudgetUsagePct(dataset);
  const paceGap=(row&&row.budgetPctUsed||0)-expectedPct;
  const variance=Math.abs(Number(row&&row.yVar||0));
  const severity=row&&row.isIncome
    ? ((row&&row.status)==="under"&&variance>Math.max(5000,Math.abs(Number(row&&row.yBud||0))*.12)?"danger":"warning")
    : ((row&&row.status)==="over"&&paceGap>10?"danger":(row&&row.status)==="over"?"warning":"info");
  const reason=row&&row.isIncome
    ? `Revenue is ${f$(variance)} below budget and pacing ${(row&&row.budgetPctUsed||0).toFixed(1)}% of annual target through ${getElapsedMonthsForDataset(dataset)}/12 months.`
    : `Spend is ${f$(variance)} over budget and pacing ${(row&&row.budgetPctUsed||0).toFixed(1)}% of annual plan versus ${(expectedPct).toFixed(1)}% expected.`;
  const recovery=row&&row.isIncome
    ? `Need ${f$(Math.max(0,Number(row&&row.yBud||0)-Number(row&&row.yAct||0)))} of recovered revenue to get back on plan.`
    : `Projected year-end run rate is ${f$(row&&row.projEOY||0)} versus ${f$(row&&row.annBud||0)} annual plan.`;
  return{
    severity,
    gl:row&&row.gl||"",
    name:row&&row.name||"",
    category:profile.category,
    action:profile.action,
    reason,
    recovery
  };
}

function buildThresholdPlanRows(entityId){
  const dataset=getLatestDatasetForEntity(entityId);
  if(!dataset||!Array.isArray(dataset.rows)||!dataset.rows.length)return[];
  const elapsedMonths=getElapsedMonthsForDataset(dataset);
  return enrich(dataset.rows,dataset)
    .filter(row=>Math.abs(Number(row&&row.annBud||0))>2500||Math.abs(Number(row&&row.yAct||0))>2500)
    .map(row=>{
      const profile=getAlertProfile(row);
      const projected=Math.max(0,Number(row&&row.projEOY||0));
      const annualBudget=Math.max(0,Number(row&&row.annBud||0));
      const gap=row.isIncome?Math.max(0,annualBudget-projected):Math.max(0,projected-annualBudget);
      const recommendedAnnual=row.isIncome
        ? projected + gap*profile.recoveryPct
        : projected - gap*profile.clawbackPct;
      const recommendedMonthly=recommendedAnnual/12;
      const watchMonthly=row.isIncome?recommendedMonthly*profile.watchFactor:recommendedMonthly*profile.watchFactor;
      const criticalMonthly=row.isIncome?recommendedMonthly*profile.criticalFactor:recommendedMonthly*profile.criticalFactor;
      const stance=row.isIncome
        ? (row.status==="under"?"Raise collections/revenue threshold":"Hold / modestly grow top-line threshold")
        : (row.status==="over"?"Reset downward with active clawback":"Hold near projected run-rate");
      return{
        ...row,
        category:profile.category,
        action:profile.action,
        stance,
        elapsedMonths,
        recommendedAnnual,
        recommendedMonthly,
        watchMonthly,
        criticalMonthly
      };
    })
    .sort((a,b)=>Math.abs(b.recommendedAnnual-a.annBud)-Math.abs(a.recommendedAnnual-a.annBud));
}

      const topRecovery=rows
        .filter(row=>row.isIncome&&row.status==="under")
        .sort((a,b)=>(b.recommendedAnnual-b.projEOY)-(a.recommendedAnnual-a.projEOY))[0]||null;
      return rows.length?{entity,rows,topReset,topRecovery}:null;
    })
    .filter(Boolean);
}

function enrich(rows,dataset){const elapsed=getElapsedMonthsForDataset(dataset);const expectedPct=getExpectedBudgetUsagePct(dataset);return rows.map(r=>{const inc=isInc(r);const st=getSt(r.yAct,r.yBud,inc);const rr=elapsed>0?r.yAct/elapsed:0;const pe=rr*12;const rem=r.annBud-r.yAct;const pu=r.annBud?(r.yAct/r.annBud)*100:0;return Object.assign({},r,{isIncome:inc,status:st,runRate:rr,projEOY:pe,remaining:rem,budgetPctUsed:pu,elapsedMonths:elapsed,expectedBudgetPct:expectedPct,paceGapPct:pu-expectedPct});});}

function getSummary(enriched){
if(!enriched.length)return null;
const inc=enriched.filter(r=>r.isIncome),exp=enriched.filter(r=>!r.isIncome);
const t=(a,k)=>a.reduce((s,r)=>s+r[k],0);
const sg=_.groupBy(enriched,"section");
const ss=Object.entries(sg).map(([n,items])=>({name:n,count:items.length,yAct:t(items,"yAct"),yBud:t(items,"yBud"),annBud:t(items,"annBud"),overCount:items.filter(r=>r.status==="over").length,watchCount:items.filter(r=>r.status==="watch").length,isIncome:items[0]&&items[0].isIncome}));
const projectedRevenue=t(inc,"projEOY"),projectedExpense=t(exp,"projEOY"),elapsedMonths=enriched[0]&&enriched[0].elapsedMonths||12;
return{incYA:t(inc,"yAct"),incYB:t(inc,"yBud"),incAnn:t(inc,"annBud"),expYA:t(exp,"yAct"),expYB:t(exp,"yBud"),expAnn:t(exp,"annBud"),totalOver:enriched.filter(r=>r.status==="over").length,totalUnder:enriched.filter(r=>r.status==="under").length,totalWatch:enriched.filter(r=>r.status==="watch").length,totalOn:enriched.filter(r=>r.status==="on").length,ss:ss,noi:t(inc,"yAct")-t(exp,"yAct"),noiBud:t(inc,"yBud")-t(exp,"yBud"),projectedNoi:projectedRevenue-projectedExpense,elapsedMonths,expectedBudgetPct:enriched[0]&&enriched[0].expectedBudgetPct||100};
}

function getRecs(enriched,summary){
if(!enriched.length)return[];const r=[];
const overExpense=enriched.filter(x=>!x.isIncome&&x.status==="over").sort((a,b)=>(Math.abs(b.yVar)-Math.abs(a.yVar)));
const underIncome=enriched.filter(x=>x.isIncome&&x.status==="under").sort((a,b)=>(Math.abs(b.yVar)-Math.abs(a.yVar)));
overExpense.slice(0,4).forEach(x=>{const alert=buildManagerAlert(x,{period:`2026-${String(x.elapsedMonths).padStart(2,"0")}`});r.push({t:alert.severity,gl:x.gl,n:`${alert.category}: ${x.name}`,m:`${alert.reason} ${alert.recovery} Action: ${alert.action}`});});
underIncome.slice(0,3).forEach(x=>{const alert=buildManagerAlert(x,{period:`2026-${String(x.elapsedMonths).padStart(2,"0")}`});r.push({t:alert.severity,gl:x.gl,n:`${alert.category}: ${x.name}`,m:`${alert.reason} ${alert.recovery} Action: ${alert.action}`});});
const offsets=enriched.filter(x=>!x.isIncome&&x.yBud>0&&x.yAct<x.yBud*.85&&x.yBud>5000).sort((a,b)=>(b.yBud-b.yAct)-(a.yBud-a.yAct));
if(offsets.length)r.push({t:"info",gl:"",n:"Available Offsets",m:"Use under-running controllable lines to fund recovery. Best offsets: "+offsets.slice(0,3).map(x=>x.name+" ("+f$(x.yBud-x.yAct)+")").join("; ")});
if(summary){const nv=summary.noi-summary.noiBud;const projectedGap=(summary.projectedNoi||0)-(summary.noiBud/Math.max(summary.elapsedMonths,1)*12);r.push({t:nv>=0?"success":"danger",gl:"",n:"NOI Recovery",m:"NOI is "+f$(Math.abs(nv))+" "+(nv>=0?"above":"below")+" budget. Projected full-year NOI is "+f$(summary.projectedNoi||0)+" versus current pace-adjusted plan. "+(projectedGap<0?"Close the gap by attacking labor, R&M, and revenue leakage before next close.":"Current run-rate supports the plan.")});}
return r.slice(0,8);
}

function statusBadge(s){const m={on:{l:"On Track",c:G,b:"#ecfdf5"},watch:{l:"Watch",c:A,b:"#fffbeb"},over:{l:"Over",c:R,b:"#fef2f2"},under:{l:"Under",c:A,b:"#fffbeb"}};const x=m[s]||m.on;return '<span style="display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600;color:'+x.c+';background:'+x.b+'">'+x.l+'</span>';}

function buildPortfolioAlertHighlights(){
  return getEntities()
    .filter(entity=>Array.isArray(state.store[entity.id])&&state.store[entity.id].length)
    .map(entity=>{
      const watch=getCommunityBudgetWatchItems(entity.id);
      if(!watch)return null;
      return{
        entity,
        watch,
        topAlert:(watch.actionRows||[])[0]||null
      };
    })
    .filter(Boolean)
    .sort((a,b)=>{
      const rank={danger:0,warning:1,info:2,success:3};
      return (rank[a.topAlert&&a.topAlert.severity||"success"]??3)-(rank[b.topAlert&&b.topAlert.severity||"success"]??3);
    });
}

function loadFile(file,ent,options={}){
state.loading=true;render();
const lowerName=String(file?.name||"").toLowerCase();
const loader=(lowerName.endsWith(".xlsx")||lowerName.endsWith(".xls")||lowerName.endsWith(".xlsm"))
? parseWorkbook(file)
: file.text().then(text=>parseCSV(text));
loader.then(async rows=>{
const nameMatch=file.name.match(/(\d{2})[.\-_](\d{2})[.\-_](\d{2,4})/);
let period=file.name.replace(/\.\w+$/,"");
if(nameMatch){const m=nameMatch[1],y=nameMatch[3];period=m+"/"+(y.length===2?"20"+y:y);}
const entity=getEntityById(ent);
const ds={id:Date.now(),name:file.name.replace(/\.\w+$/,""),period:period,date:new Date().toLocaleDateString(),rows:rows,rowCount:rows.length,entityLabel:entity&&entity.label||ent};
if(!state.store[ent])state.store[ent]=[];
state.store[ent]=[...state.store[ent],ds];
state.entity=ent;
state.selDs=ds.id;
if(options.keepTab)state.tab=options.keepTab;
else if(options.compareTarget)state.tab="compare";
else state.tab="dash";
if(options.compareTarget==="a")state.cmpA=ds.id;
if(options.compareTarget==="b")state.cmpB=ds.id;
if(options.compareTarget)state.compareMode="month_over_month";
state.loading=false;render();
const atlasResult=await applyDatasetToAtlasStore(ds,entity);
if(atlasResult&&atlasResult.ok===false){
window.alert(atlasResult.message||"The upload loaded into the financial page, but it could not be saved back into ATLAS.");
}
}).catch(e=>{console.error(e);state.loading=false;render();});
}

function drawBarChart(canvasId,data,key1,key2,name1,name2,labelKey){
const canvas=document.getElementById(canvasId);if(!canvas)return;
const ctx=canvas.getContext("2d");
const dpr=window.devicePixelRatio||1;
const rect=canvas.getBoundingClientRect();
canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
ctx.scale(dpr,dpr);
const w=rect.width,h=rect.height;
const margin={top:24,right:15,bottom:60,left:55};
const cw=w-margin.left-margin.right,ch=h-margin.top-margin.bottom;
ctx.clearRect(0,0,w,h);
if(!data.length)return;
const maxVal=Math.max(...data.map(d=>Math.max(d[key1]||0,d[key2]||0)));
const barGroupW=cw/data.length;
const barW=barGroupW*0.35;
ctx.font="10px system-ui";ctx.textAlign="center";
data.forEach((d,i)=>{
const x=margin.left+i*barGroupW;
const h1=maxVal?(d[key1]/maxVal)*ch:0;
const h2=maxVal?(d[key2]/maxVal)*ch:0;
ctx.fillStyle=D;
ctx.fillRect(x+barGroupW*0.1,margin.top+ch-h1,barW,h1);
ctx.fillStyle=L;
ctx.fillRect(x+barGroupW*0.1+barW+2,margin.top+ch-h2,barW,h2);
ctx.fillStyle="#64748b";ctx.save();ctx.translate(x+barGroupW/2,margin.top+ch+8);ctx.rotate(-0.3);
const label=d[labelKey]||"";ctx.fillText(label.length>14?label.substring(0,14)+"..":label,0,0);ctx.restore();
});
ctx.strokeStyle="#e2e8f0";ctx.lineWidth=0.5;
for(let i=0;i<=4;i++){
const y=margin.top+ch-i*(ch/4);
ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(margin.left+cw,y);ctx.stroke();
ctx.fillStyle="#94a3b8";ctx.textAlign="right";ctx.font="10px system-ui";
const val=Math.round(maxVal*i/4);ctx.fillText(val>=1000?(val/1000).toFixed(0)+"k":val,margin.left-5,y+4);
}
ctx.font="10px system-ui";ctx.textAlign="left";
ctx.fillStyle=D;ctx.fillRect(margin.left,margin.top-16,10,10);ctx.fillText(name1,margin.left+14,margin.top-7);
ctx.fillStyle=L;ctx.fillRect(margin.left+90,margin.top-16,10,10);ctx.fillText(name2,margin.left+104,margin.top-7);
}
